\ndalam tempoh 15 tahun.\n\nPISA 2022\n• Literasi Bacaan: Purata skor 388 mata berbanding dengan purata antarabangsa, iaitu 476.\n• Literasi Sains: Purata skor 416 mata berbanding dengan purata antarabangsa, iaitu 485.\n• Literasi Matematik: Purata skor 409 mata berbanding dengan purata antarabangsa, iaitu 472.\nTIMSS 2023\n• Matematik: Purata skor 411 mata berbanding dengan purata antarabangsa, iaitu 478.\n• Sains: Purata skor 426 mata berbanding dengan purata antarabangsa, iaitu 478.\n\nEkuiti\n\n50% pengurangan dalam jurang pencapaian\n(bandar-luar bandar, sosioekonomi, gender)\nmenjelang 2020.\n\n• Pengurangan jurang pencapaian gred purata SPM 2024 berdasarkan lokaliti\n(bandar-luar bandar) sebanyak 26.23%.\n• Pengurangan jurang layak mendapat sijil SPM 2024 berdasarkan jantina sebanyak 52.78%.\n• Pengurangan jurang layak mendapat sijil SPM 2024 berdasarkan sosioekonomi sebanyak\n57.75%.\n\nPerpaduan\n\nSistem pendidikan yang menawarkan perkongsian\npengalaman dan nilai kepada kanak-kanak dengan\nmenghargai kepelbagaian.\n\nIndeks Perpaduan: Skor 8.1 menunjukkan tahap perpaduan yang sangat erat.\n\nKecekapan\n\nSistem yang memaksimumkan keberhasilan murid\nmengikut peruntukan sedia ada.\n\n84.07% sekolah telah ditambah baik dan dinaik taraf.\n\nRajah 3.2 Sasaran dan Pencapaian PPPM 2013 — 2025\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":48,"t":"3.3 PENCAPAIAN MENGIKUT ASPIRASI SISTEM\nAkses\nSetiap kanak-kanak warganegara Malaysia berhak untuk mendapat pendidikan\ntanpa mengira latar belakang sosioekonomi, etnik atau lokasi geograﬁ. Sasaran\nutama bagi aspirasi ini adalah untuk mencapai 100% enrolmen merentas semua\nperingkat pendidikan dari prasekolah hingga menengah atas. Sejak 2013, KPM\ntelah melaksanakan pelbagai prakarsa untuk memperluas akses kepada\npendidikan, menurunkan kadar keciciran dan memastikan peluang pendidikan\nyang terangkum bagi semua murid, termasuk Murid Berkeperluan Pendidikan\nKhas (MBPK) dan murid daripada kumpulan rentan.\nBagi meningkatkan enrolmen prasekolah, usaha yang dilaksanakan termasuk\nmenambah bilangan kelas prasekolah awam, menyediakan bantuan geran\npermulaan untuk penubuhan prasekolah swasta serta memperkukuh bantuan\nyuran pendidikan dan sokongan pembangunan profesional guru prasekolah.\nData menunjukkan peningkatan enrolmen prasekolah untuk kanak-kanak\nberumur 4+ tahun daripada 72.7% pada 2013 kepada 78.34% pada 2024,\nmanakala enrolmen prasekolah untuk kanak-kanak berumur 5+ tahun meningkat\ndaripada 90.8% kepada 93.52% dalam tempoh yang sama.\n\nKadar Keciciran\nPeringkat\nSekolah\nMenengah\n\nPeratus (%)\n\nUsaha untuk merapatkan jurang sedia ada diteruskan dan menyokong Strategi\nB1.3 Mempertingkatkan Keberhasilan Pendidikan dalam Rancangan Malaysia\n\n1.50\n\n2016\n\nKe-13 (RMK13) yang menekankan bahawa pendidikan awal kanak-kanak atau\nprasekolah diwajibkan pada umur lima tahun.\nPada peringkat sekolah rendah, kadar enrolmen telah mencapai 99.39%,\nmanakala enrolmen pada peringkat menengah rendah turut mencatat\npencapaian tinggi pada 96.31%. Enrolmen pada kedua-dua peringkat pendidikan\nini telah melepasi nilai enrolmen sejagat iaitu 95.00%. Namun, jurang yang tipis\nmasih wujud terutamanya pada peringkat menengah atas (92.60%) yang\nmemerlukan perhatian khusus bagi memastikan kesinambungan laluan\npendidikan murid dari peringkat prasekolah hingga ke menengah atas. Oleh itu,\npindaan Rang Undang-undang (RUU) Pendidikan pada 2025 untuk Pelanjutan\nDasar Pendidikan Wajib dari Pendidikan Rendah hingga Pendidikan Menengah\ntelah diluluskan. Hal ini menunjukkan komitmen berterusan kerajaan Malaysia\nuntuk memperkukuh akses pendidikan supaya mencapai nilai enrolmen sejagat\npada semua peringkat.\nSelain itu, usaha seperti Program Outreach Murid Cicir dan Sistem Pengesanan\nKementerian Pendidikan Malaysia (SiPKPM) telah menyumbang kepada\npenurunan kadar keciciran murid secara konsisten, iaitu daripada 1.14% pada\n2019 kepada 0.64% pada 2024.\n\n1.36\n\n1.21\n\n1.14\n\n1.13\n\n1.11\n\n0.99\n\n0.83\n\n2017\n\n2018\n\n2019\n\n2020\n\n2021\n\n2022\n\n2023\n\nTahun\n\nRajah 3.3 Kadar Keciciran Peringkat Sekolah Menengah\n\nBAB 3 PENCAPAIAN SEMASA\n\n0.64\n\n2024\n\nSumber: Bahagian Perancangan dan Penyelidikan Dasar Pendidikan"},{"sec":23,"p":49,"t":"Akses pendidikan bagi MBPK juga telah diperluas dengan peningkatan enrolmen\nyang ketara. Bilangan murid MBPK yang mengikuti program pendidikan khas\nKPM telah meningkat sebanyak 57%, iaitu daripada 93,951 orang pada 2020\nkepada 147,512 orang pada 2025. Peningkatan enrolmen MBPK pada tahun 2025\nmencerminkan kejayaan KPM dalam memperluas akses pendidikan khas. KPM\nmengambil langkah proaktif memantapkan pelaksanaan Rancangan Pendidikan\nIndividu (RPI) menerusi bimbingan berterusan Jurulatih Utama dan program\nkunjung bantu ke sekolah.\n\nEnrolmen Murid Berkeperluan Pendidikan Khas (MBPK) di Sekolah KPM\n120,000\n\nBilangan Murid\n\n100,000\n80,000\n\nSekolah Pendidikan\nKhas (SPK)\n\n60,000\n\nProgram Pendidikan\nKhas Integrasi (PPKI)\nProgram Pendidikan\nInklusif\n(PPI Penuh di Arus\nPerdana Sahaja)\n\n40,000\n20,000\n\nTahun\n\nJumlah\n\nPeratus\nPeningkatan (%)\n\n2020\n\n93,951\n\n-\n\n2021\n\n97,220\n\n3.48\n\n2022\n\n105,785\n\n8.81\n\n2023\n\n116,044\n\n9.70\n\n2024\n\n132,264\n\n13.98\n\n2025\n\n147,512\n\n11.53\n\n2020\n\n2021\n\n2022\n\n2023\n\n2024\n\n2025\n\nTahun\n\nSumber: Bahagian Pendidikan Khas\n\nRajah 3.4 Enrolmen Murid Berkeperluan Pendidikan Khas (MBPK) di Sekolah KPM\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":50,"t":"Peratus\nEnrolmen\nTVET\n\nPeratus (%)\n\nPelbagai usaha turut dilaksanakan untuk menarik minat murid menceburi program kemahiran yang ditawarkan di Kolej Vokasional (KV), Sekolah Menengah Teknik\n(SMT) dan aliran kemahiran seperti Program Vokasional Menengah Atas (PVMA), Mata Pelajaran Vokasional (MPV) dan Perantisan Industri Menengah Atas (PIMA)\ndi sekolah menengah harian. Hasil daripada usaha ini, enrolmen dalam bidang TVET telah menunjukkan peningkatan yang memberangsangkan daripada 4.6 % pada\n2013 kepada 11.14% pada 2024. Walau bagaimanapun, pencapaian ini masih jauh daripada sasaran yang ditetapkan, iaitu 20%. Keadaan ini berpunca daripada\npenawaran peluang pendidikan TVET yang terhad di Kolej Vokasional dan SMT. Justeru, pelaksanaan PVMA dan PIMA di sekolah harian telah diberikan tumpuan\nuntuk memperluas akses kepada pendidikan vokasional.\n\n4.6\n\n5.2\n\n5.3\n\n2013\n\n2014\n\n2015\n\n6.2\n\n7.2\n\n2016\n\n2017\n\n6.0\n\n4.6\n\n2018\n\n2019\n\nTahun\n\n6.1\n\n6.3\n\n6.6\n\n2020\n\n2021\n\n2022\n\n10.5\n\n11.1\n\n2023\n\n2024\n\nSumber: Bahagian Pendidikan dan Latihan Teknikal Vokasional\n\nRajah 3.5 Peratus Enrolmen TVET\n\nPeratus Transisi Murid\nOrang Asli dari Tahun 6\nke Tingkatan 1\n\nPeratus (%)\n\nKPM turut memperluas pelbagai laluan pendidikan seperti Sekolah Sukan, Sekolah Seni, Sekolah Agama Bantuan Kerajaan (SABK), Sekolah Dalam Hospital (SDH)\ndan Sekolah Integriti bagi memastikan setiap murid berpeluang mengembangkan potensi dan minat mereka. Penubuhan Sekolah K9 dengan kemudahan asrama\njuga diperluas untuk memudahkan murid Orang Asli dan peribumi mengakses pendidikan dari peringkat rendah hingga menengah rendah. Namun, peratus kehadiran\ndan kadar transisi murid Orang Asli dan peribumi masih di bawah purata nasional. Keadaan ini menandakan jurang akses perlu diberikan perhatian bagi memastikan\npenyertaan yang menyeluruh oleh semua murid.\n\n74.0\n\n76.7\n\n74.3\n\n80.8\n\n87.8\n\n85.4\n\n89.9\n\n2017\n\n2018\n\n2019\n\n2020\n\n2021\n\n2022\n\n2023\n\nTahun\n\nRajah 3.6 Peratus Transisi Murid Orang Asli dari Tahun 6 ke Tingkatan 1\n\nBAB 3 PENCAPAIAN SEMASA\n\nSumber: Bahagian Pengurusan Sekolah Harian"},{"sec":23,"p":51,"t":"Kualiti\n\nSkor\n\nKualiti sistem pendidikan negara boleh dinilai melalui pencapaian murid dalam\npentaksiran nasional dan antarabangsa yang mencerminkan keberkesanan\nproses PdP dan keupayaan sistem untuk menyampaikan pendidikan yang\nsetanding dengan standard antarabangsa. PPPM 2013 — 2025 menetapkan\naspirasi agar Malaysia berada dalam kelompok sepertiga teratas dalam\npentaksiran antarabangsa PISA dan TIMSS bagi memastikan pencapaian murid\nsetara dengan sistem pendidikan berprestasi tinggi pada peringkat global.\n\nPencapaian Malaysia dalam Literasi Bacaan\n\n-99\n\n-47\n\n-88\n\n2009+\n\nSejak 2013, pelbagai prakarsa dilaksanakan untuk meningkatkan kualiti\npembelajaran murid seperti pelaksanaan kurikulum baharu, pentaksiran\nalternatif dan pembangunan profesionalisme guru. Walau bagaimanapun,\npencapaian semasa menunjukkan kemajuan yang tidak sekata dengan\nbeberapa jurang yang masih ketara.\n\n2012\n\n2015\n\n2018\n\n2022\n\nPusingan PISA\n\nPencapaian Malaysia dalam Literasi Matematik\nSkor\n\n-92\n\n-73\n\n-49\n\n-63\n\n2009+\n\n2012\n\n2018\n\n2022\n\n-51\n\n-69\n\n2018\n\n2022\n\n2015\nPusingan PISA\n\nSkor\n\nDalam pentaksiran antarabangsa, Malaysia masih belum mencapai sasaran\nuntuk tergolong dalam kelompok sistem pendidikan sepertiga teratas. Dalam\nPISA 2022, Malaysia memperoleh skor purata bawah purata OECD dalam\nketiga-tiga literasi iaitu Literasi Bacaan, Literasi Matematik dan Literasi\nSaintiﬁk.\n\n-80\n\n-79\n\n-81\n\n2009+\n\n2012\n\n2015\nPusingan PISA\n\nPurata OECD\n\nMalaysia\n\nRajah 3.7 Pencapaian Malaysia dalam PISA\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":52,"t":"Pencapaian murid dalam peperiksaan nasional Sijil Pelajaran Malaysia (SPM) menunjukkan trend peningkatan yang memberangsangkan. Trend Gred Purata\nKebangsaan (GPK) mencerminkan prestasi calon yang semakin baik dengan nilai GPK yang lebih rendah menandakan pencapaian lebih tinggi. Selain itu, peratus calon\nyang layak menerima sijil SPM terus meningkat sehingga mencapai 94% pada 2024 manakala peratus calon yang lulus semua mata pelajaran meningkat kepada\n62.50%. Bagi item Kemahiran Berﬁkir Aras Tinggi (KBAT) dalam SPM 2024, 88.22% murid mencapai tahap penguasaan minimum, manakala 58.45% calon menunjukkan\npenguasaan baik dalam menjawab item tersebut.\n\nGred Purata Kebangsaan SPM\n\n4.89\n\n4.86\n\n4.80\n\n4.86\n\nPeratus Pensijilan SPM dan Calon yang Lulus\nSemua Mata Pelajaran\n4.74\n\n4.60\n\n4.49\n\n91.60\n86.40\n\n86.72\n\n58.90\n\n59.99\n\n88.68\n\n94.00\n\n88.09\n\nPeratus (%)\n\nGred Purata Kebangsaan\n\n93.50\n\n61.43\n\n60.60\n55.29\n\n62.50\n\n57.10\n\n2018\n\n2019\n\n2018\n\n2019\n\n2020\n\n2021\nTahun\n\nRajah 3.8 Gred Purata Kebangsaan SPM\n\n2021\n\n2022\n\n2023\n\n2024\n\nTahun\n\n2020\n\nBAB 3 PENCAPAIAN SEMASA\n\n2022\n\n2023\n\n2024\n\nSumber: Lembaga Peperiksaan\n\nPensijilan SPM\n\nLulus Semua Mata Pelajaran\nSumber: Lembaga Peperiksaan\n\nRajah 3.9 Peratus Pensijilan SPM dan Calon yang Lulus Semua Mata Pelajaran"},{"sec":23,"p":53,"t":"Walaupun terdapat peningkatan dalam pencapaian keseluruhan SPM,\nmasih terdapat keperluan untuk memberikan tumpuan kepada penguasaan\nkemahiran pemikiran kritis dan penyelesaian masalah. Pencapaian dalam\npentaksiran antarabangsa pula belum mencapai purata antarabangsa. Jurang\nprestasi ini menandakan terdapatnya keperluan untuk terus memperkukuh\nmutu sistem pendidikan negara bagi meningkatkan keberhasilan murid serta\ndaya saing negara pada peringkat global.\nUsaha meningkatkan mutu pendidikan juga merangkumi pengukuhan\npendidikan STEM untuk melengkapkan murid dengan kemahiran pengaplikasian\nsains, teknologi, kejuruteraan dan matematik yang diperlukan bagi menghadapi\ncabaran dunia yang semakin dinamik. Antara usaha yang diberi tumpuan\ntermasuklah peningkatan kompetensi guru bidang STEM dalam menyampaikan\nilmu dan kemahiran yang berkaitan serta peningkatan pembudayaan STEM\nmelalui pendidikan STEM bersepadu dan aktiviti kokurikulum. Dokumen\nKompetensi Guru Bidang STEM dibangunkan sebagai rujukan bagi mengenal\npasti kompetensi yang perlu ada dan dicapai oleh guru bidang STEM. Kaedah\nbagi mengenal pasti tahap kompetensi guru bidang STEM adalah melalui\nmedium penilaian kendiri. Analisis dapatan data daripada penilaian tersebut\nakan menjadi panduan dalam merancang pembangunan profesionalisme\nberterusan yang lebih berfokus dan berstruktur.\n\nPeratus Enrolmen\nMurid Pakej STEM\n\nPeratus (%)\n\nHasil daripada prakarsa yang dilaksanakan, peratus enrolmen murid dalam\nbidang STEM pada tahun 2023 telah meningkat kepada 50.83%. Namun,\nperatus enrolmen ini masih belum mencapai sasaran 60% yang telah ditetapkan.\n\n44.36\n\n43.37\n\n47.18\n\n2018\n\n2019\n\n2020\n\n40.95\n\n43.67\n\n45.73\n\n2021\n\n2022\n\n2023\n\n50.83\n\n2024\n\nTahun\nSumber: Bahagian Perancangan dan Penyelidikan Dasar Pendidikan\n\nRajah 3.10 Peratus Enrolmen Murid Pakej STEM\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":54,"t":"Pengukuhan pendidikan bahasa Inggeris turut diberikan perhatian untuk menghasilkan modal insan yang mahir berbahasa Inggeris dan meningkatkan kebolehpasaran\npada peringkat global. Antara prakarsa untuk mencapai aspirasi ini termasuklah peningkatan proﬁsiensi guru opsyen bahasa Inggeris untuk mencapai tahap\npenguasaan minimum Common European Framework of Reference for Languages (CEFR) C1 supaya murid menerima pengajaran yang bermutu. Melalui kursus\nProfessional Up-skilling of English Language Teachers (Pro-ELT) yang dikendalikan oleh English Language Teaching Centre, sebanyak 33,894 daripada 47,546 guru\ntelah dilatih sehingga 2023. Ujian proﬁsiensi menunjukkan 52.78% guru opsyen bahasa Inggeris mencapai tahap minimum CEFR C1 pada 2023.\n\nGuru Opsyen bahasa Inggeris yang Mencapai Tahap Minimum CEFR C1\nJumlah guru yang\ntelah menduduki ujian\nproﬁsiensi BI\n\n2019\n\n15,593\n\n25,129\n\n2020\n\n17,191\n\n32,712\n\n2021\n\n18,878\n\n37,843\n\n2022\n\n18,066\n\n36,473\n\n2023\n\n19,485\n\n37,090\n\n62.00\nPeratus (%)\n\nTahun\n\nJumlah guru opsyen BI\nyang mencapai tahap\nminimum CEFR C1\n\n52.78\n\n52.60\n49.86\n\n49.53\n\n2019\n\n2020\n\n2021\n\n2022\n\n2023\n\nTahun\nPeratus guru opsyen bahasa Inggeris yang mencapai\ntahap minimum CEFR C1\nSumber: Bahagian Pengurusan Sekolah Harian\n\nGraf 3.11 Guru Opsyen bahasa Inggeris yang Mencapai Tahap Minimum CEFR C1\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":55,"t":"Ekuiti\nPenekanan terhadap ekuiti adalah penting bagi memastikan setiap murid tanpa\nmengira latar belakang mendapat peluang pendidikan bermutu secara adil dan\nsaksama. PPPM 2013 — 2025 menetapkan aspirasi untuk mengurangkan jurang\npencapaian antara kelompok murid sebanyak 50%, khususnya antara murid dari\nsekolah bandar dengan luar bandar, antara murid berstatus sosioekonomi\nberbeza serta antara gender. Sejak tahun 2013, pelbagai prakarsa telah\ndilaksanakan untuk merapatkan jurang ekuiti seperti penambahbaikan\nperuntukan sumber, naik taraf sekolah daif, latihan dan pembangunan\nprofesionalisme guru, pengupayaan kepimpinan sekolah serta intervensi bersasar.\n\nPencapaian Murid Malaysia dalam PISA 2022\nMengikut Lokasi Sekolah\n\n5.40\n\nSkor\n\n5.30\n5.16\n\n5.20\n\nJurang Pencapaian Gred Purata SPM\nMengikut Lokasi Sekolah\n\nGred Purata\n\nPerbezaan pencapaian antara murid di sekolah bandar dengan luar bandar\nmerupakan indikator utama ekuiti dalam pendidikan. Jurang pencapaian gred\npurata SPM antara murid bandar dengan luar bandar di Malaysia telah\nberkurang sebanyak 26.23%. Dalam peperiksaan SPM, kedua-dua kumpulan\nmenunjukkan peningkatan pencapaian dengan jurang yang semakin mengecil\ndari tahun ke tahun seperti yang digambarkan dalam Graf 3.13. Pencapaian\nmurid mengikut lokasi sekolah dalam PISA dan SPM pula masih menunjukkan\nmurid bandar mempunyai tahap prestasi lebih tinggi berbanding murid luar\nbandar.\n\n5.00\n4.80\n\n5.01\n\nJurang: 0.61\n\nJurang: 0.43\n\n4.84\n4.73\n\n4.60\n\n4.58\n\n4.40\n\n4.92\n\nJurang: 0.43\n\nJurang: 0.45\n\n4.47\n\n4.20\n\n2021\n\n2022\n\n2023\n\n2024\n\nTahun\n\nLiterasi Matematik\nBandar\n\nLiterasi Bacaan\nLuar Bandar\n\nBandar\n\nSumber: Bahagian Perancangan dan Penyelidikan Dasar Pendidikan\n\nRajah 3.12 Pencapaian Murid Malaysia dalam PISA 2022 Mengikut Lokasi Sekolah\n\nLuar Bandar\nSumber: Bahagian Pengurusan Sekolah Harian\n\nRajah 3.13 Gred Purata Mengikut Lokasi\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":56,"t":"Jurang Pencapaian Layak Mendapat Sijil SPM Mengikut SES\nPeratus (%)\n\nStatus sosioekonomi kekal sebagai faktor yang mempengaruhi pencapaian\nmurid. Walau bagaimanapun, analisis data SPM menunjukkan perkembangan\nyang positif dengan jurang pencapaian layak mendapat sijil SPM berdasarkan\nstatus sosioekonomi yang semakin mengecil, iaitu sebanyak 57.75% (Rajah 3.15).\nNamun, perbezaan prestasi masih wujud. Status sosioekonomi dalam\npentaksiran PISA diukur melalui Indeks Status Ekonomi, Sosial dan Budaya (SES),\ndengan nilai yang lebih tinggi mencerminkan kedudukan sosioekonomi yang lebih\nbaik. Status sosioekonomi kekal sebagai peramal utama prestasi murid di semua\nnegara peserta PISA termasuk Malaysia (Rajah 3.14).\n\n95.52\n\n93.12\n\n90.87\n\n91.67\n84.17\n\n82.16\n2021\n\n2022\nTahun\n\nSES Rendah\n\n2023\n\nSES Selain Rendah\nSumber: Bahagian Pengurusan Sekolah Harian\n\nRajah 3.15 Jurang Pencapaian Layak Mendapat Sijil SPM Mengikut SES\n\nSkor Purata Pencapaian Matematik Mengikut SES Murid\ndalam PISA 2022\n\nSkor\n\nSukuan\nterbawah SES\n\nSukuan\nkedua SES\n\nSukuan\nketiga SES\n\nSukuan\nteratas SES\n\nMalaysia\n\nPurata OECD\n\nSumber: Bahagian Perancangan dan Penyelidikan Dasar Pendidikan\n\nRajah 3.14 Skor Purata Pencapaian Matematik Menurut SES Murid dalam PISA 2022\n\nBAB 3 PENCAPAIAN SEMASA\n\nSelain lokasi dan sosioekonomi, jurang pencapaian antara gender juga diberikan\nperhatian. Keputusan SPM menunjukkan peningkatan pencapaian bagi keduadua gender, dengan murid perempuan secara konsisten mencapai prestasi lebih\ntinggi. Walau bagaimanapun, jurang pencapaian layak mendapat sijil SPM antara\nlelaki dan perempuan telah mengecil sebanyak 52.78% (Rajah 3.16). Usaha\nberterusan akan dilaksanakan untuk terus mengecilkan jurang pencapaian ini."},{"sec":23,"p":57,"t":"Jurang Pencapaian Layak Mendapat Sijil SPM Mengikut Gender\n95.00\n90.60\n\n93.10\n\n92.10\n\n92.30\n\nPeratus (%)\n\n90.80\n\n92.10\n\n96.54\n\n90.03\n87.50\n\n78.20\n\n2016\n\n79.10\n\n2017\n\n80.00\n\n80.60\n\n2018\n\n2019\n\n83.40\n\n82.50\n\n2020\n\n2021\n\n2022\n\n2023\n\nTahun\n\nPerempuan\n\nLelaki\nSumber: Bahagian Pengurusan Sekolah Harian\n\nRajah 3.16 Jurang Pencapaian Layak Mendapat Sijil SPM Mengikut Gender\n\nUsaha ekuiti turut diperkukuh melalui peluasan program pendidikan yang\nterangkum dan intervensi awal bagi MBPK. Pada tahun 2025, 93.07% MBPK\nmengikuti Program Pendidikan Inklusif (PPI), manakala 75.78% lepasan sekolah\nberjaya melanjutkan pengajian atau memasuki alam pekerjaan yang\nmencerminkan keberkesanan laluan sokongan sedia ada. Latihan guru turut\ndipertingkat dengan 54.47% guru menerima latihan RPI secara dalam talian dan\nbersemuka, sementara saringan serta sokongan awal melalui program intervensi\nseperti Program Perkhidmatan Sokongan dan Intervensi Pendidikan Khas\n(PROSPEK), Program Saringan Penentuan Murid Berkeperluan Pendidikan Khas\n(PROSPER) dan Program Pengesanan Perkembangan dan Intervensi Murid\nPrasekolah (PROSPIM). Setakat tahun 2025, hanya 37.4% sekolah telah dinaik\ntaraf dengan kemudahan mesra OKU. Usaha menaik taraf kemudahan mesra\n\nOKU ini sedang dipergiat bagi menjamin akses kepada pendidikan yang bermutu\nbagi MBPK.\nSecara keseluruhan, usaha untuk meningkatkan ekuiti dalam sistem pendidikan\nnegara telah membawa hasil yang positif. Walaupun begitu, sasaran yang\nditetapkan masih belum dicapai dan jurang pencapaian dalam pelbagai dimensi\nmasih wujud. Usaha berterusan memerlukan sokongan sistem yang lebih utuh,\npengagihan sumber dan intervensi yang lebih bersasar, penyelarasan antara\nagensi yang lebih kukuh dan pemantapan kapasiti pendidik. Keberkesanan\nprakarsa akan terus dioptimumkan melalui pembudayaan data secara analitik\nserta pengintegrasian pendekatan yang lebih sistematik dan mampan bagi\nmemastikan impak jangka panjang yang signiﬁkan.\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":58,"t":"Perpaduan\nPerpaduan merupakan aspek penting untuk menghasilkan sistem pendidikan yang\nmenawarkan perkongsian pengalaman dan nilai kepada kanak-kanak dengan\nmenghargai kepelbagaian. Pendidikan berperanan menyediakan pengalaman\nbersama, memupuk empati dan menggalakkan interaksi merentas kaum serta\nlatar belakang sosioekonomi.\nKPM telah melaksanakan Kajian Indeks Perpaduan untuk mengukur tahap\nperpaduan dalam kalangan guru dan murid berkaitan dengan keupayaan untuk\nmenerima, menghormati dan mengurus perbezaan kaum, budaya, agama dan\nbahasa sama ada di dalam atau di luar bilik darjah. Data terkini menunjukkan\npeningkatan yang konsisten dalam skor indeks perpaduan (Rajah 3.17).\n\nTrend Skor Indeks Perpaduan Sekolah\n8.1\n\nSkor Indeks\nPerpaduan\n\n7.1\n\nErat\n\n6.2\n\nSangat Erat\n\n5.4\n\n2018\n\n2020\n\n2022\nTahun\n\nRajah 3.17 Trend Skor Indeks Perpaduan Sekolah, 2014 — 2024\n\nBAB 3 PENCAPAIAN SEMASA\n\n2024\nSumber: Bahagian Perancangan dan Penyelidikan Dasar Pendidikan"},{"sec":23,"p":59,"t":"INTERPRETASI INDEKS PERPADUAN\nINDEKS\n\nTAHAP PERPADUAN\n\nINTERPRETASI\n\n0.0 – 2.5\n\nRendah (Longgar)\n\nProses penyatupaduan perlu diusahakan dengan gigih\n\n2.6 – 5.0\n\nSederhana (Sederhana)\n\nProses penyatupaduan perlu dipertingkatkan\n\n5.1 – 7.5\n\nTinggi (Erat)\n\nProses penyatupaduan perlu diperkukuhkan\n\n7.6 – 10.0\n\nSangat Tinggi (Sangat erat)\n\nProses penyatupaduan perlu terus dipertahankan\n\nRajah 3.18 Interpretasi Indeks Perpaduan\n\nPeningkatan skor Indeks Perpaduan adalah sejajar dengan pelaksanaan Pelan Hala Tuju Perpaduan (2022) sebagai dokumen rujukan utama bagi\naktiviti perpaduan di sekolah. Program kokurikulum merentas kaum seperti Rancangan Integrasi Murid Untuk Perpaduan (RIMUP), aktiviti badan\nberuniform, sukan dan aktiviti kelab telah menyediakan ruang interaksi yang bermakna dan menyokong pembinaan hubungan sosial. Usaha seperti ini\ntelah menyumbang kepada pelibatan murid daripada pelbagai latar belakang etnik dalam aktiviti perpaduan dengan penyertaan konsisten mencapai\n80–90% setiap tahun. Usaha untuk meningkatkan interaksi merentas etnik secara konsisten, menyeluruh dan bermakna diperkukuh dari semasa ke\nsemasa.\nPendidikan Karakter turut diperkenalkan sebagai asas\npembinaan sahsiah, empati dan kesedaran sivik. Program\nKhidmat Masyarakat (KHIDMAS) menunjukkan 1,183,154\ndaripada 1,655,225 murid sekolah menengah pada tahun\n2024 mendapat skor tertinggi Pentaksiran Aktiviti Jasmani,\nSukan dan Kokurikulum (PAJSK) kerana melaksanakan lebih\ndaripada lima aktiviti khidmat masyarakat. Selain itu, usaha\nmeningkatkan kesejahteraan murid turut menyumbang\nkepada persekitaran sekolah yang lebih kondusif untuk\nperpaduan. Program seperti Program Intervensi Minda Sihat\n(PRISMA) membantu murid meningkatkan kesedaran kendiri,\nregulasi emosi dan kemahiran sosial.\n\nBilangan Guru Bimbingan dan Kaunseling (GBK) yang berdaftar dengan Lembaga\nKaunselor Malaysia turut meningkat kepada 55.07% pada 2023, sekali gus\nmemperkukuh sokongan psikososial di sekolah. Walau bagaimanapun, usaha\nditeruskan supaya semua GBK dilengkapkan dengan kompetensi yang\ndiperlukan untuk melaksanakan peranan mereka secara berkesan. Selain itu,\nnisbah kaunselor kepada murid masih berada pada 1:450, berbanding dengan\nsasaran 1:350. Pencapaian nisbah ini amat penting untuk mewujudkan\npersekitaran sekolah yang selamat dan menyokong pembangunan holistik murid.\nPerpaduan kekal sebagai aspirasi jangka panjang yang memerlukan transformasi\nsistemik untuk mewujudkan ekosistem pendidikan negara yang harmonis dan\nterangkum.\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":23,"p":60,"t":"Kecekapan\nKecekapan sistem pendidikan memainkan peranan penting dalam\nmemaksimumkan keberhasilan murid berdasarkan peruntukan yang ditetapkan.\nSistem pendidikan yang cekap akan memastikan penggunaan sumber awam\nsecara berkesan dan berimpak tinggi. Selain itu, pemantauan berasaskan data,\nautonomi sekolah, pengukuhan pembangunan kapasiti guru dan pemimpin serta\npenggunaan teknologi secara optimum turut diberikan penekanan. Aspirasi ini\nselaras dengan PPPM 2013 — 2025 yang menyatakan bahawa setiap ringgit yang\ndibelanjakan harus memberikan pulangan nilai setimpal terhadap keberhasilan murid.\n\nJumlah projek\nyang diluluskan\n\nProjek telah selesai\n\n1,175\n\nBAB 3 PENCAPAIAN SEMASA\n\nSejak 2013, pelbagai prakarsa telah dilaksanakan untuk memastikan sistem\npendidikan beroperasi secara eﬁsien dan berkesan. Keberhasilan murid\ndipengaruhi oleh ketersediaan prasarana ﬁzikal dan digital yang mencukupi untuk\nmenyokong pembelajaran bermutu dan pengalaman PdP yang terangkum. Oleh\nitu, usaha menaik taraf sekolah telah menjadi keutamaan. Sehingga 31 Disember\n2025, daripada 1,175 projek yang diluluskan pada tahun 2016 hingga 2025, 782\nprojek telah selesai, 179 dalam pembinaan manakala 214 projek dalam fasa\nprabina.\n\n782 (66.55%)\n\nProjek dalam fasa prabina\ndan pembinaan\n\n393 (33.45%)"},{"sec":23,"p":61,"t":"Pengukuhan prasarana digital untuk menyokong pembelajaran turut diberikan\nperhatian, terutamanya dalam era pasca-COVID. Pelbagai usaha telah dilaksanakan\ntermasuk penambahbaikan pelantar Digital Educational Learning Initiative\nMalaysia (DELIMa), penyediaan peluang pembelajaran digital yang lebih luas dan\npenambahbaikan prasarana ICT sekolah. Walau bagaimanapun, akses internet\ndan peranti masih tidak seimbang di kawasan pedalaman dan kompetensi digital\nguru perlu ditingkatkan untuk menyokong pembelajaran yang berkesan. Oleh itu,\npengukuhan prasarana digital diberikan tumpuan untuk memastikan pembelajaran\nyang saksama dan berorientasikan keperluan masa hadapan.\nKecekapan sistem pendidikan turut bergantung pada tadbir urus dan autonomi\nyang berkesan pada peringkat daerah dan sekolah. Program Transformasi Daerah\n(District Transformation Programme - DTP) telah memperkasakan JPN dan PPD\nuntuk memainkan peranan lebih aktif dalam membimbing dan memantau prestasi\nsekolah, termasuk menyediakan peluang pembangunan profesional, mewujudkan\npenunjuk prestasi yang jelas dan budaya membuat keputusan berdasarkan data.\nHasilnya, majoriti PPD di seluruh Malaysia telah memperoleh pencapaian tinggi dalam\nPenarafan Kecemerlangan Pejabat Pendidikan Daerah (PKPPD).\nSekolah turut diberikan autonomi lebih besar dalam aspek seperti pelaksanaan\nkurikulum, pengurusan belanjawan dan penyesuaian program mengikut konteks\ntempatan. Pada 2024, 73% daripada 996 sekolah yang telah diberikan autonomi\npembiayaan saksama berjaya mengoptimumkan perbelanjaan daripada peruntukan\nyang diterima. Bagi memastikan kecekapan sistem pendidikan dapat dioptimumkan\npada masa akan datang, beberapa penambahbaikan seperti latihan bertumpukan\nkepada sekolah berprestasi rendah dalam pengurusan kewangan, mengemas kini\nGaris Panduan Pengurusan Kewangan Sekolah dan menambah baik capaian internet\nuntuk Sistem Perakaunan Kumpulan Wang Sekolah (eSPKWS) supaya beroperasi\ndengan efisien di kawasan pedalaman dan Sabah/Sarawak.\nUsaha meningkatkan kecekapan sistem pendidikan perlu diteruskan bagi memastikan\npenggunaan peruntukan yang berkesan dan penyampaian pendidikan yang bermutu.\nKecekapan tadbir urus dan penggunaan sumber secara berhemah terus menjadi\ntumpuan untuk meningkatkan impak pendidikan dan keberhasilan murid secara\nmenyeluruh.\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":24,"p":62,"t":"3.4 KESIMPULAN\nPencapaian semasa sistem pendidikan menunjukkan kemajuan signiﬁkan sejak tahun 2013 terutamanya dalam peningkatan\nenrolmen murid, pengurangan jurang pencapaian SPM, pengukuhan autonomi sekolah serta peningkatan kapasiti warga pendidikan\ndalam pelbagai aspek yang berkaitan dengan lima aspirasi sistem, iaitu akses, kualiti, ekuiti, perpaduan dan kecekapan. Jurang\nprestasi yang masih wujud dan sasaran yang belum tercapai memerlukan usaha dan komitmen berterusan yang sistematik dan\nmenyeluruh untuk terus mentransformasikan sistem pendidikan negara. Oleh yang demikian, RPM 2026 – 2035 merupakan\nkesinambungan kepada usaha PPPM 2013 – 2025 dengan memberikan peningkatan dan penambahbaikan kepada aspek kualiti,\nakses dan ekuiti, ketersediaan sumber dan kecekapan, keluwesan dan kemampanan.\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":25,"p":63,"t":"BAB\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":26,"p":64,"t":"TERAS STRATEGIK 1 | MEMASTIKAN SISTEM PENDIDIKAN\nMALAYSIA YANG TERANGKUM, DINAMIK DAN RELEVAN\n\nRINGKASAN\nSeiring dengan era globalisasi dan perkembangan pesat\nteknologi, sistem pendidikan perlu melalui transformasi\nmenyeluruh agar selari dengan keperluan semasa dan masa\nhadapan. Usaha ini penting bagi memastikan pendidikan\nyang terangkum, dinamik dan relevan dapat terus memacu\nkemajuan negara serta menjamin kesejahteraan rakyat\ndengan daya saing tinggi pada peringkat global. Singapura,\nIndonesia, Vietnam dan Filipina mempunyai sistem pendidikan\nyang berbeza serta mencerminkan pendekatan tersendiri\ndalam penyampaian pendidikan asas kepada rakyat masingmasing. Sistem pendidikan antara negara mencerminkan bahawa\ntiada satu pun yang mengetepikan perbezaan kerana setiap\nnegara mempunyai konteks sosioekonomi, budaya, sejarah, dasar\nkerajaan dan keperluan masyarakat yang tersendiri. Oleh yang\ndemikian, sistem pendidikan perlu disesuaikan dengan acuan\nnegara masing-masing bagi menjamin keberkesanannya.\n\nSistem Pendidikan\nSistem pendidikan merujuk keseluruhan rangka kerja yang mengatur\nproses pengajaran dan pembelajaran secara formal dalam sesebuah\nnegara atau organisasi. Hal ini meliputi dasar, kurikulum, struktur\npersekolahan, kaedah pentaksiran, latihan guru serta sokongan\npentadbiran dan kewangan. Sistem pendidikan bertujuan memastikan\nsetiap individu mendapat peluang untuk memperoleh ilmu, kemahiran,\nnilai dan sikap yang diperlukan bagi pembangunan diri, masyarakat dan\nnegara.\nSecara ringkas, sistem pendidikan ialah mekanisme yang menyelaras\npenyampaian pendidikan secara terancang dan berterusan, merangkumi\ntahap prasekolah hingga pendidikan tinggi dan mendukung prinsip\nkeadilan, keterangkuman serta pembangunan modal insan.\nSumber: UNESCO\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":26,"p":65,"t":"Pendekatan Pendidikan\nBeberapa Negara ASEAN\n\nSingapura\n\nIndonesia\n\nMemastikan murid menguasai\nkemahiran asas dan bersedia\nuntuk memasuki pendidikan\nmenengah atas yang\nkompetitif.\n\nMemastikan akses\npendidikan yang bermutu,\nkhususnya di kawasan luar\nbandar.\n\nVietnam\n\nFilipina\n\nMemberikan penekanan\nkepada pendidikan teknikal\ndan vokasional bagi\nmelahirkan tenaga kerja\nberkemahiran.\n\nMembentuk murid yang\nberdaya saing dengan\nkemahiran sosial dan\nkepimpinan.\n\nSumber: UNESCO\n\nRajah 4.1 Pendekatan Pendidikan Beberapa Negara ASEAN\n\nTerdapat keperluan untuk mentransformasikan sistem pendidikan Malaysia bagi\nmenghadapi cabaran global dan kemajuan teknologi. Perkara ini bagi\nmemastikan pembangunan modal insan dapat dilaksanakan secara menyeluruh\ndan berkesan. Pendekatan mentransformasikan sistem pendidikan adalah\nmelalui penilaian semula dasar sedia ada dengan mengambil kira amalan terbaik\npada peringkat global yang disesuaikan dengan konteks tempatan. Pendekatan\nini memastikan setiap murid mendapat peluang yang adil dan bersedia untuk\nmenghadapi masa hadapan.\n\nKepentingan Sistem Indeks\nPrestasi Institusi Pendidikan\nPemantauan\nprestasi yang\ndilaksanakan\nsecara sistematik.\n\nMembantu\nperancangan intervensi\npenambahbaikan yang\nlebih tepat.\n\nPelaksanaan yang telus\ndan bersepadu.\n\nMemastikan sekolah\nsentiasa relevan,\nberdaya saing dan\nmemenuhi aspirasi\npendidikan negara.\n\nRajah 4.2 Kepentingan Sistem Indeks Prestasi Institusi Pendidikan KPM\n\nSistem pendidikan perlu dirangka secara terangkum bagi memastikan akses\npendidikan yang bermutu untuk semua, termasuk murid berkeperluan khas\ndan golongan rentan. Antara perkara yang perlu diambil perhatian untuk\nmentransformasikan sistem pendidikan termasuklah keberkesanan pelaksanaan\ndasar, struktur persekolahan dan pentaksiran serta sumber manusia agar selari\ndengan aspirasi pembangunan modal insan yang dihasratkan. Bagi memastikan\nkeberkesanan dan keterjaminan prakarsa tersebut, sistem indeks prestasi\nbersepadu perlu dibangunkan sebagai penanda aras menyeluruh bagi menilai\nmutu dan pencapaian institusi pendidikan secara konsisten.\nTeras Strategik 1 menyasarkan pembentukan generasi berpendidikan, berdaya\ntahan dan berupaya menyumbang kepada pembangunan negara. Sistem\npendidikan yang terangkum dan dinamik menjadi asas kepada akses pendidikan\nyang adil dan menyeluruh seterusnya memberikan peluang kepada setiap murid\nuntuk berjaya, selaras dengan aspirasi Falsafah Pendidikan Kebangsaan.\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":27,"p":66,"t":"4.1 PENGENALAN DAN RASIONAL\n\nSeiring agenda transformasi pendidikan masa hadapan, KPM\nkomited menyediakan sistem pendidikan yang terangkum, dinamik\ndan relevan bagi memastikan peluang setara kepada semua murid,\ndi samping memperkukuh bakat dan keupayaan mereka, selaras\ndengan aspirasi nasional. Strategi ini juga bertujuan untuk melahirkan\ninsan sejahtera dan bersedia menghadapi masa hadapan serta\nmenjadi masyarakat berdaya tahan. Matlamat utama yang\ndihasratkan melalui strategi teras ini adalah untuk meningkatkan\nstandard pendidikan setara dengan piawaian antarabangsa.\nPerkara ini dilaksanakan dengan meneliti dasar sedia ada, terutama\nyang berkaitan dengan pembelajaran murid, struktur persekolahan,\nsumber manusia, pentaksiran pendidikan dan pembangunan\nkerangka indeks dalaman prestasi institusi pendidikan.\nStrategi ini turut menyasarkan peningkatan akses pendidikan\nyang lebih meluas serta pengurangan kadar keciciran murid.\nPelaksanaannya dapat menggalakkan penyertaan yang menyeluruh\ndan terangkum bagi memastikan setiap murid, tanpa mengira latar\nbelakang mendapat peluang yang adil untuk berkembang dan\n\nBAB 4 TERAS STRATEGIK 1\n\nberjaya. Penambahbaikan terhadap mutu dan imej sekolah\nkebangsaan juga dijangka meningkatkan keyakinan ibu bapa untuk\nmemilih sekolah kebangsaan.\nMenerusi strategi ini, kecemerlangan institusi pendidikan\ndipertingkatkan melalui usaha memperkukuh profesionalisme,\nkompetensi dan motivasi pendidik selain menggalakkan mereka\nkekal dalam profesion pendidikan. Seiring dengan itu, autonomi\nterpimpin institusi pendidikan diperkasakan menerusi budaya\npentadbiran yang telus dan bertanggungjawab bagi membolehkan\nkeputusan dibuat secara lebih berkesan berdasarkan keperluan\ninstitusi dan murid. Pendidik turut diberikan akses kepada ketepatan\nmaklumat serta latihan berterusan dalam bidang pentaksiran\npendidikan.\nPelaksanaan strategi Teras Strategik 1 yang menyeluruh berpotensi\nmemberikan impak terhadap sistem pendidikan negara yang\nsignifikan dan menjana perubahan positif."},{"sec":28,"p":67,"t":"4.2 KEADAAN SEMASA\nKeperluan untuk KPM menyemak semula dasar pendidikan sedia ada adalah\nuntuk memastikan dasar yang ada kekal relevan, berkesan dan seterusnya\nmampu memenuhi aspirasi negara serta keperluan murid yang sentiasa berubah.\nKeperluan menyemak dasar sedia ada juga penting agar sesuatu dasar tersebut\nlebih responsif terhadap keperluan semasa dan masa hadapan.\n\nTransformasi sistem pendidikan Malaysia memerlukan pendekatan holistik dan\nkomitmen tinggi supaya lebih berorientasikan kesaksamaan dan terangkuman serta\nberimpak tinggi. Pendidik dapat melaksanakan pengajaran dan pembelajaran\nyang lebih baik agar semua murid mendapat peluang untuk berjaya melalui\nprinsip keadilan dan keterangkuman dasar dalam sistem pendidikan.\n\nDasar pendidikan sedia ada yang\ndiberi tumpuan dalam Teras Strategik 1\n\nStandard Global Penyertaan\nKanak-kanak Berumur 5 Tahun (OECD)\n\nEnrolmen\nmurid\n\n2 Struktur\n\npersekolahan\n\n3 Bahasa\n\nTambahan\n\n1.\n2.\n\n1.\n\n1.\n2.\n\n4 Pentaksiran\n\n1.\n\n5 Sistem\n\n1.\n\nPendidikan\n\nPenarafan\n\nEnrolmen aliran sains masih tidak mencapai\nmatlamat Dasar 60:40 (Sains:Sastera).\nEnrolmen prasekolah berumur lima tahun\nmasih belum mencapai purata standard\nglobal.\n\n•\n\nKebanyakan negara anggota OECD mencatat penyertaan\nkanak-kanak umur 3 – 5 tahun melebihi 90% dan hampir semua\nmewajibkan setahun prasekolah pada umur 5 tahun.\n\n•\n\nStandard global menyasarkan kadar penyertaan prasekolah umur\n5 tahun sekurang-kurangnya 90%, seperti yang diamalkan di negara\nanggota OECD.\n\n•\n\nMalaysia melaporkan kadar GER (Gross Enrolment Rate) prasekolah\nsekitar 90-94% (2020-2024) yang hampir menyamai piawaian global.\nWalau bagaimanapun, terdapat ruang untuk penambahbaikan dari segi\nliputan dan mutu perkhidmatan.\n\nTempoh persekolahan 13 tahun tidak\nsejajar dengan purata global.\n\nPeningkatan permintaan terhadap bahasa\ntambahan seperti mata pelajaran bahasa\nCina dan bahasa Tamil di SK.\nKeperluan bahasa tambahan lain mengikut\npermintaan.\nKeyakinan terhadap pelaksanaan\nPentaksiran Berasaskan Sekolah (PBS)\nmasih rendah.\nKerangka dan instrumen standard\npenarafan prestasi institusi pendidikan\nKPM tidak bersepadu.\n\nMaksud GER Prasekolah\nGER prasekolah merujuk Kadar Penyertaan Kasar bagi pendidikan\nprasekolah. GER prasekolah ialah peratusan jumlah pendaftaran kanakkanak dalam program prasekolah (tanpa mengira umur) berbanding\ndengan jumlah populasi kanak-kanak dalam lingkungan umur rasmi\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":29,"p":68,"t":"4.3 MATLAMAT\nMatlamat Teras Strategik 1 adalah untuk memastikan sistem pendidikan yang terangkum, dinamik dan relevan agar dapat melengkapkan murid dengan ilmu, kemahiran\nserta nilai untuk menghadapi cabaran abad ke-21. Terdapat tiga strategi utama di bawah Teras Strategik 1.\n\nTERAS STRATEGIK 1\n\nMemastikan Sistem Pendidikan Malaysia Yang Terangkum, Dinamik Dan Relevan\n\nSTRATEGI 1\n\nSTRATEGI 2\n\nSTRATEGI 3\n\nMeneliti Keberkesanan dan Kecekapan\nImplementasi Dasar Pendidikan\n\nMemperkasakan Struktur\nPersekolahan Kebangsaan\n\nMemperkasakan Pentaksiran dan\nPeperiksaan Kebangsaan\n\n1.\n\n1.\n\n1.\n\n2.\n3.\n\nMemperkasakan pendidikan sains dan\nmatematik.\nMemperkukuh pelaksanaan dasar\nMemartabatkan bahasa Melayu Memperkukuh\nbahasa Inggeris (MBMMBI).\nMengkaji semula dasar pengambilan dan\npenempatan pegawai perkhidmatan pendidikan.\n\n2.\n\nMemperkasakan struktur persekolahan\nkebangsaan.\nMenambah baik dasar penawaran bahasa\ntambahan serta pengoperasian bahasa Cina\ndan bahasa Tamil.\n\nMemperkasakan sistem pentaksiran\npendidikan kebangsaan.\n\nPEMBOLEH DAYA\nMembangunkan kerangka sistem indeks dalaman prestasi institusi pendidikan secara bersepadu\n\nSecara keseluruhan, prakarsa di bawah teras strategik\nini saling melengkapi untuk memperkukuh daya saing\ndan daya tarikan di institusi pendidikan KPM. Perkara ini\nbagi memastikan sistem pendidikan Malaysia bermutu\ndan setaraf peringkat global, serta mampu menawarkan\npeluang pendidikan terbaik untuk semua.\n\nBAB 4 TERAS STRATEGIK 1\n\nImpak Pelaksanaan\nTeras Strategik 1\n\n1.\n2.\n3.\n\nPeningkatan standard pendidikan negara agar setara\ndengan piawaian antarabangsa.\nPengukuhan kedudukan institusi pendidikan KPM yang\ndiyakini oleh masyarakat.\nPengurangan kadar keciciran pembelajaran melalui\nintervensi bersasar dan pendekatan pendidikan yang\nlebih luwes dan responsif."},{"sec":30,"p":69,"t":"STRATEGI 1: MENELITI KEBERKESANAN DAN KECEKAPAN\nIMPLEMENTASI DASAR PENDIDIKAN\nStrategi ini menumpukan kepada dasar\nteras seperti Dasar 60:40 dan MBMMBI,\ndi samping pemantapan pengambilan dan\npenempatan\npegawai\nperkhidmatan\npendidikan. Melalui penilaian menyeluruh\ndan pelaksanaan yang diperkasakan,\nstrategi ini memastikan keselarasan antara\ndasar, amalan dan keperluan sistem\npendidikan masa hadapan.\nStrategi 1 menekankan kepentingan\nmeneliti keberkesanan dan kecekapan\npelaksanaan dasar pendidikan yang\ndigubal\nsemula\ndapat\nmencapai\nmatlamatnya dengan lebih berkesan.\n\nNisbah dasar 60:40 belum tercapai, data terkini menunjukkan\nsekitar 44 – 47% murid berada dalam aliran Sains/STEM.\n\nKekurangan pakar STEM (pendidik).\n\nRingkasan\nIsu dan\nCabaran\nStrategi 1\n\nFasiliti makmal dan peralatan sains di sekolah tidak mencukupi.\n\nPersepsi murid dan ibu bapa bahawa aliran sains lebih sukar\ndan membebankan.\n\nKurangnya pendedahan awal kepada aplikasi STEM dalam kehidupan\nseharian.\nCabaran bagi memastikan keseimbangan antara penguasaan bahasa\nMelayu sebagai bahasa kebangsaan dengan bahasa Inggeris dan tahap\nkompetensi belum mencapai tahap optimum.\n\nPeluang pembelajaran bahasa tidak menyeluruh dan tahap kompetensi pendidik\nyang belum mencapai tahap optimum, menjejaskan tahap penguasaan murid.\n\nDasar pengambilan dan penempatan pendidik yang kurang jelas mengakibatkan\nketidakseimbangan kepakaran, kekurangan pendidik opsyen dan penempatan yang\ntidak mengikut kepakaran.\n\nRajah 4.3 Ringkasan Isu dan Cabaran Teras Strategik 1\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":30,"p":70,"t":"Isu utama yang perlu ditangani melalui strategi ini ialah meneliti\nkeberkesanan dan kecekapan pelaksanaan dasar pendidikan ialah\njurang ketara antara dasar yang digubal dengan pelaksanaannya.\nDasar 60:40 merujuk dasar kerajaan Malaysia yang menetapkan nisbah\nenrolmen murid dalam aliran sains/teknikal berbanding dengan aliran\nsastera pada peringkat menengah atas dan prauniversiti adalah pada\nkadar 60% aliran sains/teknikal dan 40% aliran sastera.\nDasar 60:40 diperkenalkan sejak tahun 1967 dan dilaksanakan pada\n1970 sebagai sebahagian daripada strategi negara untuk memacu\npembangunan berasaskan ilmu, teknologi dan inovasi. Tujuan utama\ndasar ini adalah untuk meningkatkan bilangan tenaga kerja\nberpengetahuan dalam bidang STEM bagi menyokong aspirasi ke arah\nnegara maju dan berpendapatan tinggi.\n\nPelaksanaan Dasar MBMMBI pula berdepan cabaran dalam usaha\nmengekalkan keseimbangan antara penguasaan bahasa Melayu sebagai\nbahasa kebangsaan dengan bahasa Inggeris sebagai bahasa komunikasi\nantarabangsa. Penguasaan bahasa guru bahasa Melayu dan bahasa\nInggeris yang belum mencapai tahap kompetensi ditetapkan\nmenyebabkan penyampaian PdP kurang berkesan dan menjejaskan\npemahaman murid terhadap konsep asas bahasa.\nDasar sedia ada berkaitan dengan pengambilan dan penempatan\npegawai perkhidmatan pendidikan masih belum sejajar dengan keperluan\nsebenar. Ketidakjelasan dalam pelaksanaan dasar mengakibatkan\nketidakseimbangan kepakaran, kekurangan pendidik opsyen serta\npenempatan yang tidak mengikut bidang kepakaran. Keadaan ini\nmenjejaskan kestabilan tenaga pendidik di sekolah yang memberikan\nkesan terhadap kesinambungan pengajaran dan pembelajaran serta\nmutu pendidikan secara keseluruhan.\n\nPrakarsa Strategi 1\n\nMemperkasakan\npendidikan sains\ndan matematik\n\nRajah 4.4 Prakarsa bagi Strategi 1\n\nBAB 4 TERAS STRATEGIK 1\n\nMemperkukuh\npelaksanaan dasar\nMBMMBI\n\nMengkaji semula\ndasar pengambilan dan\npenempatan pegawai\nperkhidmatan pendidikan"},{"sec":31,"p":71,"t":"PRAKARSA 1: MEMPERKASAKAN PENDIDIKAN SAINS DAN\nMATEMATIK\nObjektif utama ialah:\n1. Menggalakkan lebih ramai murid menyertai bidang STEM.\n2. Menyediakan tenaga kerja yang mencukupi untuk sektor berasaskan STEM.\n3. Mengurangkan kebergantungan kepada tenaga kerja asing berkemahiran tinggi.\n4. Menyokong kemajuan dalam bidang penyelidikan, pembangunan dan inovasi.\nawatankuasa Perancangan Pelajaran Tinggi (1967) menetapkan peralihan nisbah\nunjuran peratus enrolmen murid dalam bidang sains dan teknikal kepada sastera secara\nberansur-ansur mulai tahun 1970 daripada nisbah 45:55 kepada nisbah 60:40 pada tahun\n1980. Jawatankuasa tersebut juga mengesyorkan supaya unjuran peratus enrolmen murid,\nterutama pada peringkat pendidikan menengah atas dan pengajian tinggi mengikut nisbah\n60:40.\n\nKurikulum sedia ada terlalu bertumpukan kepada\nkandungan topikal dan kurang menekankan aplikasi\nd nia se enar serta kema iran erfikir aras tinggi\nPentaksiran pula masih berorientasikan peperiksaan\ndan bukan bersifat autentik yang dapat mendorong\npenerokaan dan inovasi. Selain itu, latihan kepada\npendidik dalam bidang STEM didapati masih tidak\nmencukupi dan lebih tertumpu kepada pendidik\nperingkat menengah atas.\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":31,"p":72,"t":"Isu Dasar 60:40\nKeputusan TIMSS dan PISA menunjukkan prestasi yang\nmembimbangkan, iaitu Malaysia berada dalam kelompok satu\npertiga terbawah. Dalam PISA 2022, skor Malaysia bagi sains,\nmatematik dan bacaan masing-masing berada di bawah purata\nOECD. Laporan TIMSS 2023 pula turut mencatat penurunan\nprestasi dalam matematik dan sains.\n\nNisbah sebenar masih belum tercapai: Data beberapa tahun\nbelakangan ini menunjukkan hanya sekitar 44 – 47% murid berada\ndalam aliran sains/STEM.\n\nFaktor Penyumbang Kelewatan\nPencapaian Nisbah\n\nMinat murid terhadap bidang STEM semakin merosot. Indeks\nPembudayaan STEM menurun daripada 63.96% (2021) kepada\n44.72% (2024). Antara punca utama termasuklah persepsi bahawa\nbidang STEM sukar, kurang pendedahan terhadap kerjaya menarik\ndan kaedah pengajaran yang tidak dikaitkan dengan kehidupan\nsebenar.\n\n•\n•\n•\n\nPeruntukan waktu pengajaran bagi mata pelajaran Sains dan\nMatematik di sekolah Malaysia adalah lebih rendah berbanding\ndengan negara maju seperti Singapura, Jepun, Finland dan Amerika\nSyarikat. Kekurangan masa ini menjejaskan penguasaan yang\nmendalam terhadap konsep STEM.\n\nUsaha Penambahbaikan\n\nIsu autonomi sekolah yang terhad juga menyukarkan sekolah untuk\nmenyesuaikan pendekatan mengikut keperluan murid dan konteks\nsetempat, sekali gus mengehadkan inovasi serta pelaksanaan\nprakarsa STEM.\n\nCabaran Pelaksanaan\n\nBAB 4 TERAS STRATEGIK 1\n\n•\n\n•\n•\n•\n•\n\nKekurangan guru pakar dalam mata pelajaran STEM.\nFasiliti makmal dan peralatan sains yang tidak mencukupi.\nPersepsi murid dan ibu bapa bahawa aliran sains lebih sukar\ndan membebankan.\nKurangnya pendedahan awal terhadap aplikasi STEM dalam\nkehidupan seharian.\n\nPrakarsa STEM4All dan Dekad STEM 2020 – 2030.\nGalakan pendidikan STEM melalui kurikulum yang lebih\nkontekstual dan berasaskan inkuiri.\nKerjasama strategik dengan industri, universiti dan agensi\nberkaitan dalam memperkukuh pendidikan STEM.\nPeningkatan kesedaran melalui program pembudayaan STEM\ndi sekolah rendah dan menengah."},{"sec":31,"p":73,"t":"Aspirasi Dasar\n“IDEAL”\n\nIsu dan Data\n“REALITI”\n\nAnalisis dan Implikasi\n“AKIBAT”\n\nDasar 60:40\n\nMalaysia mencapai nisbah\n60:40 murid Sains/Teknikal\n:Sastera untuk menjadi negara\nberpendapatan tinggi.\n\nBelum capai sejak tahun 1970; enrolmen pakej STEM\nhanya 50.83% (2024); bidang STEM masih tidak\ndiminati.\n\nStandard aspirasi negara belum\ntercapai; keperluan pelaksanaan\nlebih menyeluruh dan relevan.\n\nPencapaian\nMalaysia dalam\nTIMSS dan PISA\n\nSTEM Malaysia kompetitif\npada peringkat\nantarabangsa.\n\nMurid Malaysia berada di kelompok 1/3 terbawah\nTIMSS dan PISA. Contoh PISA 2022 – skor literasi\nsaintiﬁk (416) di bawah purata OECD (485).\n\nKurikulum dan pentaksiran tidak\nselaras dengan standard global;\nmurid kurang penguasaan KBAT.\n\nPPPM 2013 –\n2025 Aspirasi\nTransformasi PdP\n\nSTEM menarik, bermutu dan\ndipandu oleh PdP inovatif\n(PdPc, pentaksiran, latihan\npendidik).\n\nIndeks Pembudayaan STEM menurun: 2021 (63.96) ->\n2024 (44.72); minat murid terhadap STEM merosot.\n\nIntervensi tidak mencukupi; guru\nperlukan lebih banyak sokongan\ndan pelaksanaan bersifat\ntempatan.\n\nMasa PdP\ndan Autonomi\nSekolah\n\nMasa PdP mencukupi untuk\neksplorasi, eksperimen dan\nprojek STEM.\n\nWaktu PdP sains rendah: Tahun 1 – 3 (60 min/seminggu),\nTahun 4 – 6 (120 min/seminggu); autonomi sekolah\nterhad.\n\nSukar laksana pembelajaran\nbermakna; aktiviti pengayaan\ndan pentaksiran projek sering\ndiketepikan.\n\nWalaupun peratusan lepasan bidang STEM kekal stabil\nmelebihi 40% bagi tempoh tahun 2020 hingga tahun 2025,\nekonomi Malaysia masih bergantung pada sektor perkilangan\nasas dan komoditi dengan peluang yang terhad dalam\nbidang penyelidikan, pembangunan, reka bentuk dan inovasi\nberteknologi tinggi berkaitan dengan bidang STEM. Keadaan\nini menyumbang kepada dua situasi seperti yang berikut:\n\n1.\n\nKetidaksepadanan dasar 60:40 dengan realiti industri\nDasar yang bersifat satu hala boleh menyebabkan kehilangan minat murid, tekanan kepada\nsekolah untuk memenuhi petunjuk prestasi utama dan ketidakpadanan antara keberhasilan\npendidikan dengan keperluan sebenar industri.\n2. Penghijrahan tenaga mahir (brain drain)\nLepasan graduan STEM terbaik Malaysia mencari peluang pekerjaan yang lebih mencabar dan\nbergaji lebih tinggi di luar negara seperti Singapura, Australia, Eropah dan Amerika Syarikat.\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":31,"p":74,"t":"Pembangunan Industri Jepun\ndan China berbanding dengan Malaysia\n\nJepun\n\nChina\n\nMalaysia\n\nMemulakan pembangunan\nindustri dan teknologinya\nsecara besar-besaran sejak\nEra Pemulihan Meiji pada akhir\nabad ke-19.\n\nBermula lebih lewat daripada\nJepun, memulakan reformasi\nekonominya pada akhir\ntahun 1970-an dengan\ntumpuan yang jitu untuk\nmenjadi kuasa industri.\n\nMula memberikan tumpuan\nkepada perindustrian\nberteknologi tinggi bermula\ndengan Wawasan 2020 pada\ntahun 1990-an.\n\nRajah 4.5 Pembangunan Industri Jepun dan China berbanding dengan Malaysia\n\nBeberapa kementerian seperti Kementerian Sains, Teknologi dan Ino asi (M STI) masih menyokong\npemerkasaan Dasar 60:40 dengan cadangan penambahbaikan enrolmen aliran sains tulen. KPM juga\ndiberikan ruang untuk menyesuaikan strategi dan sasaran pelaksanaan agar lebih relevan dengan realiti\nsemasa dan keperluan industri. Oleh yang demikian, KPM mencadangkan sasaran 20% murid dalam\naliran sains tulen menjelang tahun 2035.\nMelalui rancangan ini, KPM melaksanakan semakan semula Dasar 60:40 bagi merangka pendekatan\nyang bersesuaian melalui tiga strategi yang dicadangkan, iaitu;\n1.\n2.\n3.\n\nBAB 4 TERAS STRATEGIK 1\n\nStrategi 1 Kajian pelaksanaan dan penambahbaikan dasar (2026 – 2027).\nStrategi 2 Pembangunan sumber, kompetensi pendidik dan pelaksanaan rintis (2028 – 2030).\nStrategi 3 Pelaksanaan dan penilaian program (2031 – 2035)."},{"sec":31,"p":75,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nKajian dan Penambahbaikan\nDasar Pelaksanaan\n\n•\n•\n\nKajian terhadap cabaran pelaksanaan dasar di sekolah dan daerah.\nMenambah baik struktur kandungan, pedagogi dan pentaksiran berdasarkan keperluan\nmemperkukuh aliran sains dan matematik selaras dengan aspirasi dasar 60:40.\n\nFasa 2\n(2028 – 2030)\nPembangunan Sumber,\nKompetensi Pendidik dan\nPelaksanaan Rintis\n\n•\n\nMemperkukuh kurikulum melalui pembangunan garis panduan pengajaran, pembelajaran dan\npentaksiran yang menyeluruh.\nMemantapkan autonomi sekolah bagi merangka pengurusan PdP yang lebih anjal mengikut\nkonteks murid dan kapasiti sekolah.\nMembangunkan proﬁl murid serta memperkukuh pembangunan profesional guru melalui\npenyediaan modul latihan yang berstruktur.\nMelaksanakan fasa rintis yang berfokus bagi menilai keberkesanan dokumen yang dibangunkan\nbagi memastikan dasar yang diperkenalkan berdaya laksana dan berimpak tinggi.\n\n•\n•\n•\n\nFasa 3\n(2031 – 2035)\nPelaksanaan dan\nPenilaian Program\n\n•\n•\n•\n•\n\nMelaksanakan penambahbaikan dasar secara berterusan melalui dapatan rintis dan analisis\nimpak di lapangan.\nMemperluas kefahaman pendidik melalui penataran pelaksanaan dasar secara menyeluruh.\nMemantapkan keberkesanan pelaksanaan dasar melalui pemantauan dan penilaian\nberasaskan data.\nMenyediakan cadangan jangka panjang untuk penyelarasan dengan Dasar Sains, Teknologi\ndan Inovasi Negara (DSTIN).\n\nRajah 4.6 Garis Masa Pelaksanaan Strategi 1 Prakarsa 1\n\nSecara keseluruhannya, isu yang dibangkitkan adalah berkaitan dengan prestasi antarabangsa yang membimbangkan, minat murid yang menurun dan cabaran dalam\nusaha memperkasakan pendidikan STEM. Usaha bersepadu dan reformasi yang menyeluruh diperlukan untuk mengubah iklim STEM masa kini dan memastikan\ngenerasi akan datang mampu bersaing pada peringkat global.\nBAB 4 TERAS STRATEGIK 1"},{"sec":32,"p":76,"t":"PRAKARSA 2:\nMEMPERKUKUH PELAKSANAAN DASAR MEMARTABATKAN\nBAHASA MELAYU DAN MEMPERKUKUH BAHASA INGGERIS\nDasar MBMMBI merupakan prakarsa strategik KPM yang diluncurkan pada tahun 2009 sebagai pengganti dasar Pengajaran dan Pembelajaran Sains dan Matematik\ndalam bahasa Inggeris (PPSMI), dengan matlamat memperkukuh bahasa Melayu sebagai bahasa ilmu, di samping meningkatkan penguasaan bahasa Inggeris sebagai\nbahasa antarabangsa dalam kalangan murid. Pelaksanaannya disokong oleh pelbagai prakarsa seperti Program Literasi dan Numerasi Sekolah Rendah (PLaN)\nmelibatkan murid yang belum menguasai kemahiran asas membaca, menulis dan mengira (3M). Program Dwibahasa (Dual-Language Programme - DLP) dirangka\nbagi membolehkan pengajaran sains dan matematik dalam bahasa Inggeris dilaksanakan di sekolah terpilih. Dasar ini turut memberikan tumpuan kepada peningkatan\nkompetensi pendidik, penyediaan bahan bantu mengajar yang bermutu dan penggunaan teknologi dalam PdP.\n\nDapatan Makmal Penyelesaian Masalah RPM\n2026 – 2035\nCabaran utama yang dikenal pasti\n\nLatihan kepada pendidik yang\nterhad dalam penggunaan\nKerangka Standard Bahasa\nMelayu (KSBM) dan Common\nEuropean Framework of\nReference for Languages\n(CEFR) untuk bahasa Inggeris.\n\nKekeliruan dalam garis\npanduan pelaksanaan;\npencapaian akademik murid\nyang rendah; risiko keciciran\nmurid; ketidaksamaan sosial;\nserta kelemahan daya saing\nnegara pada peringkat global.\n\nRajah 4.7 Dapatan Makmal Penyelesaian Masalah RPM 2026 – 2035\n\nBAB 4 TERAS STRATEGIK 1\n\nKetidakselarasan\npelaksanaan Program\nDLP daripada objektif\nasalnya turut menjejaskan\nkeberkesanan penguasaan\nbahasa Inggeris melalui\npengajaran sains dan\nmatematik.\n\nMenurut laporan PISA 2022, skor\npurata literasi bacaan murid\nMalaysia menurun sebanyak\n27 mata, daripada 415 mata\n(2018) kepada 388 mata (2022).\nHanya 0.2% murid Malaysia\nmencapai Aras Penguasaan 5\natau 6 (prestasi tinggi) berbanding\ndengan purata OECD sebanyak\n7%. Sementara itu, pengesanan\nawal literasi dan numerasi\nmendapati 11% (122,062 daripada\n448,113) murid Tahun 1 pada tahun\n2024 belum menguasai kemahiran\nasas 3M."},{"sec":32,"p":77,"t":"Bagi menangani pelbagai cabaran yang dikenal pasti dalam pelaksanaan dasar MBMMBI, beberapa langkah strategik yang bertujuan memperkukuh keberkesanan\ndasar ini telah dirangka.\n\nGARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPenambahbaikan\nPelaksanaan Dasar MBMMBI\n\n•\n•\n•\n•\n\nFasa 2\n(2028 – 2030)\nPeningkatan Mutu dan\nKompetensi Pendidik dalam\nPdP BM dan BI\n\n•\n•\n•\n•\n•\n\nFasa 3\n(2031 – 2035)\nPengukuhan PdP BM dan BI\n\n•\n•\n\nMemperkukuh keberkesanan dasar MBMMBI melalui semakan dan penilaian strategi pelaksanaan\nsecara menyeluruh.\nMemantapkan intervensi literasi kebangsaan melalui analisis berkala terhadap tahap penguasaan\nbahasa Melayu (BM) dan bahasa Inggeris (BI) murid.\nMenyelaraskan standard kompetensi bahasa melalui penyetaraan KSBM serta pengukuhan CEFR\nbagi guru dan murid.\nMengoptimumkan keberkesanan program BM dan BI yang relevan berasaskan keperluan murid dan\nkonteks sekolah.\nMenjamin tahap kompetensi CEFR bagi guru opsyen BI melalui pemantauan dan garis\npanduan berstruktur.\nMemperkasakan penggunaan bahasa instruksional BI pada peringkat prasekolah.\nMenggalakkan inovasi dalam PdP BM dan BI melalui pelaksanaan\nintervensi bertumpuan yang juga berfungsi sebagai pengisian LADAP.\nMemperkukuh penguasaan guru BM melalui penilaian berasaskan Ujian Penguasaan BM\nGuru (UPBM) selaras dengan standard KSBM.\nMemastikan KSBM menjadi rujukan dalam pengisian kurikulum, penyediaan bahan sokongan dan\npentaksiran (PBS dan peperiksaan pusat).\nMemperkukuh mutu prasarana ﬁzikal dan digital BM dan BI di sekolah.\nMelaksanakan semakan dan penambahbaikan DLP berdasarkan objektif asal program.\n\nRajah 4.8 Garis Masa Pelaksanaan Strategi 1 Prakarsa 2\nBAB 4 TERAS STRATEGIK 1"},{"sec":32,"p":78,"t":"Berdasarkan aktiviti utama yang dirancang, hasil utama dan impak pelaksanaan Dasar MBMMBI yang dihasratkan telah dikenal pasti (Rajah 4.6 Garis Masa\nPelaksanaan Strategi 1 Prakarsa 1). Pendekatan ini disokong oleh penyediaan maklum balas berkala bagi memastikan pelaksanaan dasar yang bermutu, berimpak\nberterusan dan lestari kepada murid, pendidik serta keseluruhan sistem pendidikan.\n\nSolusi\n\nHasil Utama\n\nImpak Strategi\n\nMengenal pasti strategi sedia ada yang masih relevan\nuntuk diperkukuh dan strategi yang tidak lagi berkesan\nuntuk diganti atau ditamatkan pelaksanaannya\n(contoh: Fullbright dan KIA2M).\n\nPenjajaran dasar pelaksanaan yang lebih efektif membolehkan\nsumber diagihkan dengan lebih berkesan.\n\nStrategi pelaksanaan MBMMBI yang\ndikemas kini bagi meningkatkan\nkeberkesanan dasar.\n\nPendidik opsyen dan bukan opsyen BM perlu menduduki\nUPBMG dan mencapai standard kecekapan mengikut\ngaris panduan KSBM. Pendidik opsyen BI pula perlu\nberada pada tahap CEFR yang ditetapkan.\n\nSemua murid mendapat akses kepada guru yang kompeten\nuntuk menyampaikan kandungan bahasa mengikut tahap\nmereka.\n\nStandard kecekapan guru BM dan\nBI ditingkatkan bagi memastikan\nkeberkesanan pengajaran.\n\nMembenarkan sekolah memilih intervensi BM dan BI\n\nMurid mendapat sokongan pembelajaran yang bersasar dan\nberkesan seterusnya mempercepat penguasaan BM dan BI.\n\nProgram BM dan BI dipilih mengikut\nkesesuaian pada peringkat sekolah.\n\nMemastikan program literasi BM dan BI diwajibkan untuk\nsemua murid pada semua tahap (prasekolah, rendah\ndan menengah).\n\nMenjadikan literasi sebagai program mandatori sejak awal\npersekolahan bagi memastikan murid memulakan\npembelajaran dengan asas yang kukuh. Langkah ini dapat\nmengurangkan risiko keciciran pada peringkat seterusnya\nakibat prestasi akademik yang lemah.\n\nPelaksanaan program literasi\nyang wajib pada semua peringkat\npersekolahan.\n\nMelaksanakan semakan semula pelaksanaan DLP\nsecara menyeluruh, termasuk keberkesanan, kesesuaian\ndan kesejajaran dengan tujuan asal.\n\nDLP lebih selaras dengan konteks dan ekosistem sekolah\nserta keperluan murid.\n\nPelaksanaan program DLP yang lebih\nsejajar dengan objektif asal.\n\nmurid. Elakkan pendekatan “satu untuk semua” yang\nkurang berkesan.\n\nSecara keseluruhannya, tahap penguasaan bahasa dalam kalangan murid dan pendidik serta pelaksanaan Program DLP terus diperkukuh melalui pelaksanaan Dasar\nMBMMBI yang lebih berkesan, terancang dan relevan dengan keperluan semasa. Pendekatan ini memastikan penguasaan BM sebagai bahasa ilmu dan perpaduan\ndiperkasakan, sementara kecekapan BI ditingkatkan bagi menyokong aspirasi pendidikan negara.\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":79,"t":"PRAKARSA 3: MENGKAJI SEMULA DASAR PENGAMBILAN DAN\nPENEMPATAN PEGAWAI PERKHIDMATAN PENDIDIKAN (PPP)\n\nPrakarsa ini menumpukan kepada pemerkasaan pelaksanaan pengambilan dan penempatan PPP melalui kajian semula yang dilaksanakan sebagai langkah awal\nbagi memperkukuh dasar sedia ada. Kajian ini menjadi asas kepada pembentukan dasar dan mekanisme pelaksanaan yang lebih berkesan, mantap dan responsif\nterhadap keperluan semasa pendidikan. Keberkesanan pengambilan dan penempatan PPP diperkukuh bagi memberikan impak kepada mutu pengajaran di bilik darjah.\nPengambilan dan penempatan PPP merupakan faktor kritikal yang menentukan keberkesanan sistem pendidikan di Malaysia. Kajian Predictors of Beginning Teachers’\nTeaching Performance (2024) mendapati bahawa pencapaian akademik, pengalaman guru, cara pendidik dilatih dan ditempatkan berkait rapat dengan keberkesanan\npengajaran mereka. Oleh yang demikian, pengambilan, latihan dan penempatan guru perlu dirancang dengan berhati-hati sebagai strategi penting untuk memastikan\nmutu pengajaran yang tinggi dan menyokong kejayaan murid.\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":80,"t":"Perubahan dalam\nStruktur Pengambilan\ndan Penempatan PPP\n\nKonsep Dasar Pengambilan\ndan Penempatan PPP\n\nPenambahbaikan dan\nPengemaskinian Dasar bagi\nMeringankan Beban Pelaksana\ndan Memastikan Mutu serta\nKompetensi Bermakna\n\nPengambilan dan penempatan PPP yang\nstrategik amat penting untuk melahirkan\npendidik dan pemimpin yang profesional,\nterangkum dan berinovasi, seterusnya\nmemacu peningkatan mutu pendidikan\ndan pengurusan sumber manusia secara\nmenyeluruh. Terdapat peluang untuk\nmemperkukuh dasar yang lebih terancang\ndan berpandukan keperluan sebenar bagi\nmengoptimumkan penempatan pendidik\ndan pemilihan pemimpin, meningkatkan mutu\npengajaran, penggunaan sumber secara\nefisien serta memastikan kesamarataan\npendidikan di seluruh negara.\n\nDasar pengambilan dan penempatan PPP\ndigubal bagi memastikan ketelusan, keadilan\ndan konsistensi dengan mengambil kira\nkelayakan, keperluan murid, profil sekolah\ndan komuniti. Pendekatan ini memastikan\nguru ditempatkan di sekolah yang tepat\nmengikut keperluan murid supaya semua\nmurid mendapat peluang pendidikan yang\nsama, jurang pencapaian antara sekolah\ndapat dirapatkan dan pencapaian murid\ndipertingkatkan. Perkara ini juga disokong\noleh sistem data pintar serta strategi\npenempatan yang luwes.\n\nSelaras dengan aspirasi RPM 2026 – 2035,\npenambahbaikan dasar memberikan\ntumpuan kepada pelaksanaan yang lebih\nefektif pada peringkat akar umbi. Perkara ini\ndapat meringankan beban pelaksana tanpa\nmenjejaskan mutu dan kompetensi melalui\npanduan strategik dan anjal yang adaptif.\n\nPenambahbaikan yang berterusan penting\nuntuk memperkukuh imej profesion keguruan\ndan memastikan kemajuan berterusan\nterhadap pencapaian matlamat jangka\npanjang sistem pendidikan di Malaysia.\n\nBAB 4 TERAS STRATEGIK 1\n\nSemakan dasar menstruktur semula\nmekanisme pengambilan dan penempatan\nPPP berdasarkan kompetensi, lokasi\npedalaman, jenis murid serta mata pelajaran\nkritikal. Proses pemilihan diperluas secara\nlebih luwes bagi memenuhi keperluan sebenar\nsekolah tetapi tetap mengekalkan standard\nlatihan praperkhidmatan.\n\nPenambahbaikan dan pengemaskinian\ndasar ini dapat mengoptimumkan sumber\nmanusia agar dapat memberi nilai tambah\nuntuk murid. Usaha ini turut diperkukuh\nmelalui sistem komunikasi bersepadu, analisis\nkeperluan pengambilan dan penempatan\nyang jitu, serta pemantauan digital secara\nmasa nyata.\nPendekatan ini dapat meningkatkan\nkecekapan pelaksanaan dasar serta\nmemperkukuh profesionalisme pendidik\nmelalui latihan dan sokongan berterusan\ndengan komunikasi dan maklum balas dua\nhala yang lebih dinamik."},{"sec":33,"p":81,"t":"Cabaran Pengambilan dan\nPenempatan PPP\nDalam pelaksanaan proses pengambilan dan\npenempatan PPP, antara cabaran yang dihadapi\ntermasuklah memastikan gambaran menyeluruh\ntentang keperluan sebenar, menyeimbangkan\npenempatan guru, meningkatkan mutu\npengambilan dan penempatan serta memastikan\ndata dan maklumat sentiasa konsisten dan\nterkini. Cabaran ini memberikan peluang untuk\nmemperkukuh mekanisme dan sistem sokongan\nagar penempatan g r le i tepat efisien dan\nberkesan.\nStruktur pengambilan guru masih terlalu\nbergantung pada laluan tradisional tanpa\nmengambil kira kepelbagaian bakat dalam pasaran.\nSistem penempatan pula belum mencerminkan\nkeperluan sebenar pada peringkat pelaksana\nkerana sistem sedia ada tidak mampu meramal\nkeperluan masa hadapan dengan tepat. Situasi ini\nmengakibatkan jurang kesesuaian antara bidang\npengkhususan guru dengan lokasi penempatan.\nSelain itu, kekurangan maklumat bersepadu\ndaripada peringkat negeri dan daerah juga\nmenjejaskan kecekapan proses penempatan,\nseterusnya memberikan kesan negatif terhadap\nmutu pengajaran dan pembelajaran di sekolah.\n\nReformasi dasar ini penting untuk memastikan sistem lebih\nresponsif dan bermutu termasuklah membuka ruang kepada\ntenaga profesional luar untuk menyumbang kepakaran di sekolah.\nMekanisme penempatan yang cekap dan telus serta rancangan\nkontingensi juga diwujudkan agar sistem lebih berdaya tahan.\n\nModel Berasaskan Analisis Keperluan\nModel analitik menggunakan data semasa dan sejarah untuk merancang keperluan masa\nhadapan seperti bilangan guru, murid dan kemudahan pendidikan.\n\nKomponen Model\n\nData\nsejarah dan\nsemasa\n\nAnalisis\ncorak dan\ntrend\n\nAplikasi dalam Pendidikan\n\nPemboleh\nubah sosial\ndan ekonomi\n\nTeknologi\nmasa\nhadapan\n\nFaedah Strategik\n\nIntervensi awal mata pelajaran\nkritikal dan kawasan kekurangan\nguru.\n\nPembuatan keputusan\nberpandukan data.\n\nPerancangan pembukaan\nsekolah baharu.\n\nPelaksanaan dasar berdasarkan\njangkaan sebenar.\n\nPerancangan latihan dan\npengambilan IPG/universiti.\n\nPenyelarasan keperluan dan\nbekalan sumber pendidikan.\n\nPenempatan guru secara\noptimum.\n\nMenjamin kesiapsiagaan sistem\npendidikan masa hadapan.\n\nRajah 4.9 Model Berasaskan Analisis Keperluan\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":82,"t":"Prakarsa ini memberikan penekanan terhadap kajian dasar secara menyeluruh\nmerangkumi tiga aspek utama seperti yang berikut:\n1.\n2.\n3.\n\nMemperluas sumber dan laluan pengambilan PPP.\nMemelihara mutu serta persediaan calon PPP.\nMemperkukuh kecekapan penempatan berasaskan keperluan.\n\nPrakarsa ini memberikan penekanan terhadap pemetaan semula laluan\npengambilan cadangan latihan minimum prapenempatan dan pembangunan\nmodel\nberasaskan\nanalisis\nkeperluan\nseperti\nmodel\nberasaskan\nanalisis keperluan (predictive demand model) untuk penempatan yang\nlebih tepat. Selain itu, penyelarasan sistematik antara pihak berkepentingan\ndiperkukuh bagi mengurangkan birokrasi dan mempercepat proses penempatan\npendidik.\n\nMeningkatkan Kejelasan untuk Pelaksanaan di Lapangan\nLaluan yang lebih luwes dan berstruktur akan menyediakan garis panduan yang jelas dan\nmudah difahami oleh semua pihak, terutamanya PPD dan JPN, seterusnya menjimatkan\nmasa dalam proses penerangan dan latihan.\n\nMemberikan Ruang untuk Tumpuan kepada Prakarsa Strategik\nPenambahbaikan dalam pengambilan dan penempatan PPP menjadikan tugas pentadbiran\nlebih efisien, membolehkan tenaga pentadbir memberikan tumpuan kepada peningkatan\nmutu PdP, pembangunan profesional guru serta inovasi dalam sistem pendidikan.\n\nMengurangkan Kesilapan Penempatan dan Ketidaksesuaian\nantara Kepakaran Guru dengan Keperluan Sekolah\nPendekatan model berasaskan analisis keperluan dan penandaan kompetensi yang tepat\ndapat meningkatkan kesesuaian penempatan guru. Hal ini dapat mengurangkan keperluan\nrayuan, pindaan dan aduan, seterusnya meringankan beban pentadbir.\n\nMengurangkan Keperluan Penyelesaian Masalah Secara Reaktif\nMelalui Pendekatan Proaktif dan Berstruktur\nDasar dan pelaksanaan yang lebih jelas serta berstruktur mengurangkan keperluan\npenyelesaian masalah secara reaktif, seterusnya meminimumkan kekeliruan dan aduan\nberulang yang sebelum ini memerlukan penyelesaian manual.\n\nMemudahkan Komunikasi dan Koordinasi\nSistem komunikasi yang diperkukuh (melalui jawatankuasa bersepadu dan S P yang jelas)\ndapat meminimumkan keperluan “mengejar” maklumat secara silo antara agensi.\n\nRajah 4.10 Manfaat Utama Penambahbaikan Dasar Pengambilan dan Penempatan PPP\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":83,"t":"Bagi memastikan profesion keguruan kekal relevan, terangkum dan mampu\nmenarik calon bermutu dari pelbagai latar belakang, sistem pemilihan PPP\nperlu lebih anjal dan menyeluruh. Oleh yang demikian, pelbagai laluan alternatif\nke arah pensijilan pedagogi diterokai secara sistematik bagi membolehkan\nindividu berkelayakan tinggi, termasuk calon daripada industri atau profesion\nlain boleh menyumbang secara langsung di dalam bilik darjah (Rajah 4.11).\n\nPrakarsa pensijilan pedagogi Fast Track dan pemetaan laluan pemilihan PPP,\ntermasuk laluan bukan ikhtisas berpotensi meningkatkan sumber bakat dalam\nprofesion keguruan. Konsep pendidik “generalist” di sekolah rendah diperluas\nbagi memberi keluwesan penempatan PPP di kawasan yang mempunyai\nkekangan sumber, terutama di kawasan luar bandar dan pedalaman.\n\nLaluan Profesional\n\nAnjal/Modular\n\nProgram Khusus\n\nPengalaman terkumpul individu\ndalam bidang kerjaya profesional\nyang bukan bidang pendidikan\ndiberi tawaran memasuki profesion\nkeguruan melalui kursus atau program\nkhas perguruan yang luwes.\n\nMengikuti kursus pedagogi secara\nanjal (modular, hujung minggu, atau\nsecara dalam talian) dalam masa\nyang sama mengajar di sekolah\nsebagai pendidik interim atau pelatih.\n\nPengambilan khas calon untuk mengajar\nmata pelajaran kritikal melalui skim\ngalakan tambahan bagi memastikan\nkesinambungan mutu pengajaran dan\nmemperkukuh kompetensi guru dalam\nmata pelajaran berkenaan.\n\nRajah 4.11 Keluwesan Laluan Kemasukan Guru\n\nPengambilan PPP pada masa hadapan memerlukan anjakan paradigma, iaitu daripada kelayakan akademik semata-mata kepada pendekatan berasaskan kompetensi\ndan kesesuaian individu terhadap keperluan semasa pendidikan seperti yang diamalkan oleh negara-negara maju. Perkara yang diberi tumpuan dalam pengambilan\nPPP adalah seperti berikut:\n1.\n2.\n3.\n\nPelaksanaan kriteria pemilihan berdasarkan penilaian psikometrik dan kompetensi bakal memastikan calon pendidik benar-benar bersedia secara emosi, kognitif\ndan profesional untuk mendidik generasi masa hadapan.\nSyarat latihan minimum sebelum memasuki bilik darjah menjadi penanda aras kepada jaminan mutu pedagogi yang konsisten.\nKeperluan khusus seperti kemahiran teknologi, kecekapan bahasa dan mobiliti rentas bidang atau opsyen turut ditetapkan dengan lebih jelas untuk memastikan\nkesepadanan antara kompetensi pendidik dengan kehendak kurikulum.\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":84,"t":"Perbandingan Mutu Guru di Negara Maju\nFinland\n\nKorea Selatan\n\nAustralia\n\nMinistry of Education and Culture\nFinland, Finnish National Agency for\nEducation (EDUFI) dan universiti\nmelaksanakan latihan guru berasaskan\npenyelidikan dan autonomi pedagogi.\nContoh: kajian tindakan berasaskan\ndata bilik darjah untuk menambah baik\nliterasi dan motivasi belajar.\n\nMinistry of Education Korea, Korea Institute\nfor Curriculum and Evaluation (KICE), Korea\nEducational Development Institute (KEDI)\ndan pejabat pendidikan wilayah\nmenggabung penilaian, bimbingan dan\nlatihan sasaran.\nContoh: pemerhatian berfokus, latihan\nliterasi, peningkatan dibuktikan melalui\nkerja dan data murid.\n\nAustralian Institute for Teaching and School\nLeadership (AITSL) menetapkan standard\nVictorian Institute of Teaching (VIT), NSW\nEducation Standards Authority (NESA),\nQueensland College of Teachers (QCT)\nmengawal selia amalan profesion, prestasi\ndinilai berasaskan impak pembelajaran.\nContoh: peer observation, data diagnostik,\nintervensi dan pentaksiran formatif susulan.\n\nChina\n\nSingapura\n\nMinistry of Education China\nmenetapkan hala tuju,\nmanakala Teaching Research\nOfﬁces memacu komuniti\namalan seperti jiaoyanzu.\nPendekatan berasaskan\npenyelidikan pengajaran\nmelalui perancangan bersama,\ndemonstrasi pengajaran dan\npembelajaran dan reﬂeksi\nberprotokol.\nContoh: guru menganalisis\nmiskonsepsi pecahan,\nmelaksana pengajaran\ndemonstrasi dan menilai\nsemula kefahaman melalui\ntugasan berstruktur.\n\nMOE Singapore menyelaras\npenilaian dan pembangunan\nprestasi guru, disokong oleh\nNational Institute of\nEducation (NIE) Nanyang\nTechnological University\n(NTU) dan Academy of\nSingapore Teachers.\nKitaran prestasi berasaskan\nstandard kompetensi, dialog\nprestasi dan bukti bilik\ndarjah. Contoh: sasaran PdP,\ncoaching pertengahan tahun,\npelarasan pengajaran guna\ndata formatif murid.\n\nRajah 4.12 Perbandingan Mutu Guru di Negara Maju\n\nBAB 4 TERAS STRATEGIK 1\n\nKanada\nCMEC menyokong penyelarasan dasar antara wilayah,\nmanakala Kementerian Pendidikan dan badan profesional\nseperti Ontario College of Teachers mengurus standard\nprofesion keguruan. Mutu PdP diperkukuh melalui kolaborasi\nsekolah, lembaga sekolah dan universiti berasaskan bukti.\nContoh: projek kajian tindakan penulisan membina rubrik,\nmenilai sampel berkala dan melaras pedagogi melalui coaching.\n\nJerman\nStanding Conference of the Ministers of Education and\nCultural Affairs of the Länder in the Federal Republic of\nGermany (KMK) menyelaras kerangka, Akkreditierungsrat\nmemastikan jaminan kualiti program latihan guru, Institute\nfor Educational Quality Improvement( IQB) menyokong\nstandard sistem.\nContoh: audit kurikulum, praktikum dan portfolio profesional\nsebelum penambahbaikan program."},{"sec":33,"p":85,"t":"Penempatan pendidik diselaraskan dengan keperluan sebenar sekolah secara telus, adil, responsif, mengurangkan birokrasi dan mempercepat PPP melapor diri\nke sekolah.\n\nContoh aliran proses sedia ada bagi\npenempatan guru baharu\nBPPDP\nMembuat unjuran\nkeperluan bilangan\nguru untuk diambil\ndan dilatih di IPG/\nUA.\n\nIPGM/UA\n\nBPSH\n\nMembuat\nunjuran\nkeperluan\nbilangan guru\nuntuk diambil\ndan dilatih di\nIPG/UA.\n\nIPGM/UA\nJPN\n\nCalon guru yang\ndilantik oleh SPP\ndisalurkan kepada\nBPSM bagi tujuan\npemprosesan\nsumber manusia.\n\nBPPDP\n\nCalon guru\nditempatkan\nberdasarkan\ndata masa nyata\ndaripada BPSM,\nkekosongan dan\nkeperluan semasa\ndi sekolah.\n\nGraduan IPG/UA\nmemohon perjawatan\nPegawai Perkhidmatan\nPendidikan melalui SPP.\n\nSPP\n\nCadangan penambahbaikan aliran proses\npenempatan guru baharu\n\nCalon\nPasaran\nTerbuka\n\nSurat Siaran\nPenempatan\ndikeluarkan oleh\nBPSH ke JPN\nyang berkenaan.\n\nPPD\n\nGraduan IPG/\nUA memohon\nperjawatan\nmelalui SPP.\n\nSPP\nCalon pasaran\nterbuka memohon\nperjawatan melalui\nSPP (contoh: calon\nB. Ed. TESL swasta).\n\nBPSM\nSekolah\n\nCalon guru yang\ndilantik oleh SPP\nakan disalurkan\nkepada BPSM\nbagi tujuan\npemprosesan\nsumber manusia.\n\nBPSM\n\nPortal\nPenempatan\nBPSH\nCalon yang\nlulus temu duga\nmenyatakan\npilihan sekolah\nyang ada\nkekosongan\nbersesuaian\ndengan opsyen\ndan lokasi. Pada\nmasa yang\nsama, Pengetua/\nGuru Besar\nmenyertakan\npilihan calon\nberdasarkan\nkesesuaian\nkekosongan.\n\nPenempatan\nsekolah luar\nbandar dan\npedalaman yang\nperlu dihebahkan\ndi portal\npenempatan\nBPSH untuk\nmenggalakkan\npadanan\nbersesuaian.\n\nSekolah\nCalon guru yang mendapat\npadanan pilihan ditempatkan terus\noleh BPSH dan surat makluman\ndihebahkan ke JPN dan PPD.\n\nRajah 4.13 Perbandingan Contoh Aliran Proses Sedia Ada dan Cadangan bagi Penempatan Pendidik Baharu\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":86,"t":"Pemilihan PPP yang lebih bermakna, bersandarkan prestasi, potensi dan kepakaran juga diperkenalkan bagi\nmenyokong laluan kerjaya yang lebih tersusun dan bersifat meritokratik.\n\nPemetaan semula laluan\npemilihan guru termasuk\nlaluan alternatif guru.\n\nMemastikan mutu guru\nmelalui latihan minimum\nsebelum masuk bilik darjah.\n\nLaluan pantas\npensijilan pedagogi.\n\nKriteria ambilan\nberdasarkan kompetensi\ndan psikometrik.\n\nMengambil kira\nkeperluan pedagogi\npada masa berkenaan.\n\nMeningkatkan insentif\nuntuk penempatan guru\ndi pedalaman.\n\nKemahiran teknologi,\nkecekapan bahasa dan\nsyarat keperluan opsyen\nberkaitan dengan mata\npelajaran.\n\nMemperluas konsep guru\n“generalist” di SK.\n\nPembangunan sistem model\nberasaskan analisis keperluan\nseperti model ramalan\npermintaan (predictive\ndemand model) mengikut mata\npelajaran, lokasi dan aliran.\n\nPenandaan guru yang\nbermakna.\n\nPindaan ini bertujuan untuk memperluas\nlaluan pemilihan guru melalui pendekatan\nlebih luwes berasaskan keperluan semasa\ndan tetap memastikan mutu pengambilan\nserta latihan guru pre-service kekal terjamin.\nCadangan-cadangan yang dipaparkan\nadalah hasil perbincangan makmal\nyang mencerminkan keperluan untuk\nmemperkasa sistem pemilihan dan\npenempatan guru secara lebih luwes,\nresponsif dan berasaskan keperluan\nsemasa.\nSepanjang sesi libat urus, peserta\nmendapati terdapat kekeliruan merentas\nbahagian berkenaan proses sebenar\npemilihan guru, dasar sedia ada dan\ntitik rujukan yang jelas, mengakibatkan\nketidakselarasan dalam pelaksanaan.\nBanyak maklumat yang dikongsikan\nadalah\nberdasarkan\npengalaman\nlapangan (experiential knowledge), bukan\ndokumen dasar yang seragam.\nOleh yang demikian, cadangan ini bersifat\nperingkat tinggi (high-level) dan bertujuan\nmenjadi pemangkin kepada penambaikan\ndasar sedia ada, bukan pengganti segera.\nPenekanan utama adalah kepada:\n• Keluwesan laluan kemasukan ke\ndalam profesion keguruan\n• Pemeliharaan mutu latihan dan\nkompetensi\n• Penyelarasan antara keperluan masa\nsebenar dan dasar rasmi\n\nRajah 4.14 Cadangan Kandungan Dasar Ambilan dan Penempatan PPP\n\nBAB 4 TERAS STRATEGIK 1"},{"sec":33,"p":87,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2028)\nMemperluas Sumber\nBakat Calon Pendidik\n\n•\n•\n•\n•\n\nFasa 2\n(2029 – 2030)\nPenekanan\nTerhadap Mutu\nPengambilan PPP\n\n•\n\nFasa 3\n(2031 – 2035)\nPenempatan\nBerasaskan Keperluan\n\n•\n•\n•\n•\n\n•\n•\n\nMenyemak dan menyelaras mekanisme pengambilan PPP untuk memastikan keseragaman dan mutu.\nMenambah baik kriteria kelayakan bagi semua calon PPP dari pelbagai institusi termasuk IPG,\nuniversiti awam, swasta dan luar negara.\nMenyediakan modul atau model khas bagi keperluan kursus praperkhidmatan PPP kepada calon\nterbuka/luwes.\nMemperluas saluran komunikasi dan kerjasama antara KPM serta pengeluar calon PPP termasuk\nsektor swasta.\nMelaksanakan sistem saringan dan penilaian kompetensi bagi menapis calon PPP berdasarkan keperluan\nmata pelajaran dan konteks sekolah.\nPemberian latihan tambahan dan kursus khas kepada PPP sebelum penempatan sebenar bagi\nmemperkukuh kesediaan profesional.\nPenggunaan sistem data dan maklumat penempatan untuk mengurus keperluan PPP berdasarkan lokasi\ndan bidang pengajaran.\nPenempatan PPP baharu secara automatik dalam tempoh dua bulan selepas kelulusan pelantikan.\nPenggunaan sistem maklumat bersepadu bagi memastikan padanan pendidik - sekolah lebih optimum.\nMengoptimumkan penempatan PPP dalam tempoh dua bulan sebagai sasaran prestasi utama.\nSemakan dasar secara berkala untuk memastikan sistem kekal responsif terhadap perubahan dan\nkeperluan pendidikan.\n\nRajah 4.15 Garis Masa Pelaksanaan Strategi 1 Prakarsa 3\n\nPelaksanaan prakarsa ini dijangka membawa perubahan besar kepada ekosistem pengambilan dan penempatan PPP dengan proses yang lebih jelas dan tersusun.\nPrakarsa ini juga dapat mengurangkan kesilapan dan beban pentadbiran, seterusnya membolehkan pentadbir memberikan tumpuan kepada peningkatan mutu PdP\ndan pembangunan profesional PPP. Sistem yang diperkemas juga dapat meningkatkan daya tarikan profesion keguruan sebagai kerjaya bermutu dan berimpak tinggi.\nSelain itu, penjajaran dengan Teras Strategik 3 perlu bagi memastikan aspek seperti pedagogi berstruktur, latihan, insentif bakat dan mekanisme penempatan dapat\ndisepadukan.\nSecara keseluruhan, prakarsa ini menawarkan reformasi menyeluruh terhadap aspek pengambilan dan penempatan PPP dengan pendekatan progresif dan berasaskan\ndata.\nBAB 4 TERAS STRATEGIK 1"},{"sec":34,"p":88,"t":"STRATEGI 2: MEMPERKASAKAN STRUKTUR PERSEKOLAHAN\nKEBANGSAAN\n\nStrategi memperkasakan struktur persekolahan kebangsaan penting bagi\nmemastikan sistem pendidikan Malaysia kekal rele an, efisien dan sejajar\ndengan keperluan murid serta kehendak masa hadapan negara. Tempoh\npersekolahan 13 tahun (rendah hingga lepas menengah) perlu dikaji semula\ndengan mengambil kira kesesuaian terhadap perkembangan kognitif, emosi\ndan sosial murid. Pendekatan ini juga merangkumi pendidikan wajib prasekolah\ndengan peluasan akses kepada pendidikan awal kanak-kanak untuk memenuhi\nkeperluan dan potensi murid seawal umur lima tahun, seterusnya memenuhi\n90% dan ke atas enrolmen murid prasekolah berdasarkan standard global.\nStruktur sistem persekolahan yang mantap dapat memastikan kesinambungan\npembelajaran secara progresif dan membuka laluan pendidikan yang\npelbagai seperti akademik atau vokasional yang sesuai dengan kebolehan\n\nBAB 4 TERAS STRATEGIK 1\n\nmurid. Strategi ini juga berperanan penting bagi mengurangkan keciciran\npersekolahan, memperkukuh kesediaan murid untuk menyambung pengajian\nke pendidikan tinggi atau alam pekerjaan, serta menjamin akses pendidikan\
