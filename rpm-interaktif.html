<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPM 2026–2035 · Rujukan Interaktif</title>
<meta name="description" content="Rujukan interaktif Rancangan Pendidikan Malaysia 2026–2035 — carian penuh teks, navigasi mengikut Teras Strategik, Strategi dan Prakarsa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
:root{
  --navy-900:#0A1E36; --navy-850:#0c2440; --navy-800:#0E2A47; --navy-700:#163a5c; --navy-600:#1f4a72;
  --gold:#C9A24B; --gold-br:#E2C172; --gold-deep:#A8842F; --gold-tint:#F4ECD6;
  --paper:#F6F4EE; --paper-2:#EFEBE0; --card:#FFFFFF;
  --ink:#16273A; --ink-soft:#566678; --ink-faint:#8a96a4;
  --cloud:#DDE7EF; --cloud-soft:#8ea6bd; --cloud-faint:#5d7891;
  --line:#E4DECC; --line-soft:#EDE8DA;
  --mark:#FCE9A8;
  --sb-w:340px;
  --r:14px;
  --shadow:0 1px 2px rgba(13,30,52,.06),0 8px 28px -12px rgba(13,30,52,.16);
  --shadow-lg:0 20px 60px -24px rgba(10,30,54,.45);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:"Inter",system-ui,sans-serif;background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
a{color:inherit}
::selection{background:var(--mark);color:#3a2c00}
.app{display:flex;min-height:100vh}

/* ============ SIDEBAR ============ */
.sidebar{width:var(--sb-w);flex:0 0 var(--sb-w);background:linear-gradient(180deg,var(--navy-900),var(--navy-850) 60%,#0b2342);
  color:var(--cloud);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  border-right:1px solid rgba(201,162,75,.18);z-index:40}
.brand{padding:22px 22px 16px;border-bottom:1px solid rgba(201,162,75,.18)}
.brand-top{display:flex;align-items:center;gap:12px;cursor:pointer}
.crest{width:42px;height:42px;flex:0 0 42px;border-radius:9px;border:1.5px solid var(--gold);
  display:grid;place-items:center;background:radial-gradient(120% 120% at 30% 20%,rgba(201,162,75,.22),transparent);}
.crest svg{width:24px;height:24px}
.brand-tt{line-height:1.05}
.brand-tt .b1{font-family:"Fraunces";font-weight:600;font-size:17px;letter-spacing:.2px;color:#fff}
.brand-tt .b2{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-br);margin-top:3px;font-weight:600}
/* search */
.search-wrap{padding:16px 18px 12px}
.search{position:relative}
.search input{width:100%;padding:11px 38px 11px 38px;border-radius:11px;border:1px solid rgba(201,162,75,.28);
  background:rgba(255,255,255,.06);color:#fff;font-size:14px;outline:none;transition:.18s;-webkit-appearance:none;appearance:none}
.search input::-webkit-search-cancel-button,.search input::-webkit-search-decoration{-webkit-appearance:none;appearance:none;display:none}
.search input::placeholder{color:#90a6bb}
.search input:focus{border-color:var(--gold);background:rgba(255,255,255,.1);box-shadow:0 0 0 3px rgba(201,162,75,.15)}
.search .ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:#7f97ad;pointer-events:none}
.search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:6px;
  display:none;place-items:center;color:#9fb4c7}
.search .clr:hover{background:rgba(255,255,255,.1);color:#fff}
.search.has .clr{display:grid}
.search .kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#7f97ad;
  border:1px solid rgba(255,255,255,.18);border-radius:5px;padding:1px 6px;pointer-events:none}
.search.has .kbd{display:none}

.nav{flex:1;overflow-y:auto;padding:6px 10px 20px;scrollbar-width:thin;scrollbar-color:rgba(201,162,75,.3) transparent}
.nav::-webkit-scrollbar{width:8px}
.nav::-webkit-scrollbar-thumb{background:rgba(201,162,75,.28);border-radius:8px}
.nav-sec-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--cloud-soft);
  padding:14px 12px 6px;font-weight:600}
.n-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:8px 11px;border-radius:9px;
  font-size:13.5px;color:#cad8e5;transition:.13s;line-height:1.3;border-left:2px solid transparent}
.n-item:hover{background:rgba(255,255,255,.055);color:#fff}
.n-item.active{background:rgba(201,162,75,.14);color:#fff;border-left-color:var(--gold)}
.n-bab{font-weight:600;color:#e6eef5;font-size:13.5px;margin-top:2px}
.n-bab .tnum{flex:0 0 22px;width:22px;height:22px;border-radius:6px;border:1px solid var(--gold);color:var(--gold-br);
  font-size:11px;font-weight:700;display:grid;place-items:center;font-family:"Fraunces"}
.n-bab .caret{margin-left:auto;width:15px;height:15px;color:#7f97ad;transition:transform .18s}
.n-bab.open .caret{transform:rotate(90deg)}
.n-children{overflow:hidden}
.n-l2{padding-left:20px;font-size:12.8px;color:#b9cadb}
.n-l3{padding-left:34px;font-size:12.3px;color:#9fb4c7}
.n-l2 .dot,.n-l3 .dot{flex:0 0 5px;width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.55}
.n-l3 .dot{background:#6f86a0}
.kind-tag{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:var(--gold-br);
  border:1px solid rgba(201,162,75,.4);border-radius:5px;padding:1px 5px;flex:0 0 auto}
.sb-foot{padding:13px 20px;border-top:1px solid rgba(201,162,75,.18);font-size:11px;color:var(--cloud-soft);
  display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.sb-foot .by{font-family:"Pinyon Script",cursive;font-size:20px;line-height:1.05;color:var(--gold-br)}
.sb-foot .sec{letter-spacing:.04em;line-height:1.3}
.sb-foot b{color:var(--gold-br);font-weight:600}

/* ============ MAIN ============ */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(246,244,238,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:11px 26px;min-height:56px}
.menu-btn{display:none;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--card);place-items:center}
.crumb{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:7px;flex-wrap:wrap;min-width:0}
.crumb .sep{color:var(--gold);opacity:.6}
.crumb b{color:var(--ink);font-weight:600}
.crumb .home-lnk{color:var(--ink-soft)}
.crumb .home-lnk:hover{color:var(--navy-800)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pgref{font-size:11.5px;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);
  border-radius:8px;padding:5px 10px;white-space:nowrap}
.pgref b{color:var(--gold-deep);font-weight:700}
.navbtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;color:var(--navy-700);transition:.13s}
.navbtn:hover:not(:disabled){border-color:var(--gold);color:var(--navy-900);background:var(--gold-tint)}
.navbtn:disabled{opacity:.35;cursor:default}
.navbtn svg{width:17px;height:17px}

.scroll{flex:1;overflow-y:auto}
.wrap{max-width:880px;margin:0 auto;padding:38px 36px 90px}

/* ====== HERO / HOME ====== */
.cover{position:relative;border:1px solid var(--line);border-radius:var(--r);background:
  linear-gradient(165deg,var(--navy-900),var(--navy-800) 55%,var(--navy-700));color:#fff;overflow:hidden;
  padding:46px 44px 40px;box-shadow:var(--shadow)}
.cover::before{content:"";position:absolute;inset:14px;border:1px solid rgba(201,162,75,.32);border-radius:8px;pointer-events:none}
.cover::after{content:"";position:absolute;right:-80px;top:-80px;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,162,75,.16),transparent 70%);pointer-events:none}
.cover .eyebrow{font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold-br);font-weight:600;position:relative}
.cover h1{font-family:"Fraunces";font-weight:600;font-size:clamp(30px,5vw,46px);line-height:1.04;margin:14px 0 6px;letter-spacing:-.01em;position:relative}
.cover .years{font-family:"Fraunces";font-size:clamp(20px,3vw,26px);color:var(--gold-br);font-weight:500;position:relative}
.cover .tag{margin-top:16px;font-family:"Source Serif 4";font-size:16px;color:#cdddea;max-width:46ch;line-height:1.5;position:relative}
.cover .meta{margin-top:18px;font-size:12px;color:#9fb6cb;position:relative;display:flex;gap:16px;flex-wrap:wrap}
.cover .meta span b{color:#e8eef4;font-weight:600}
.cover .sign{position:relative;margin-top:30px;padding-top:16px;text-align:right}
.cover .sign::before{content:"";position:absolute;top:0;right:0;width:120px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,162,75,.7))}
.cover .sign .by{font-family:"Pinyon Script",cursive;font-size:clamp(28px,4.4vw,38px);line-height:.95;color:var(--gold-br);font-weight:400}
.cover .sign .sector{margin-top:7px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9fb6cb;font-weight:600}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:18px 0 6px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 16px 14px;box-shadow:var(--shadow)}
.stat .num{font-family:"Fraunces";font-weight:600;font-size:26px;color:var(--navy-800);line-height:1}
.stat .num .u{font-size:13px;color:var(--gold-deep)}
.stat .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.3}

.sec-head{display:flex;align-items:baseline;gap:12px;margin:42px 0 16px}
.sec-head .k{font-family:"Fraunces";font-weight:600;font-size:21px;color:var(--navy-800)}
.sec-head .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--gold),transparent)}
.sec-head .hint{font-size:12px;color:var(--ink-faint)}

.teras-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.teras{position:relative;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:13px;
  padding:18px 18px 18px 18px;display:flex;gap:15px;transition:.16s;box-shadow:var(--shadow);overflow:hidden}
.teras::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);transform:scaleY(0);transform-origin:top;transition:transform .2s}
.teras:hover{transform:translateY(-2px);border-color:rgba(201,162,75,.55);box-shadow:var(--shadow-lg)}
.teras:hover::after{transform:scaleY(1)}
.teras .ring{flex:0 0 46px;width:46px;height:46px;border-radius:50%;border:1.5px solid var(--gold);
  display:grid;place-items:center;font-family:"Fraunces";font-weight:700;font-size:19px;color:var(--gold-deep);
  background:radial-gradient(120% 120% at 30% 20%,var(--gold-tint),#fff)}
.teras .tt{font-weight:600;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold-deep)}
.teras .desc{font-family:"Source Serif 4";font-size:14.5px;color:var(--ink);line-height:1.4;margin-top:5px;font-weight:500}

.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:8px 16px 8px 9px;box-shadow:var(--shadow)}
.chip .n{width:26px;height:26px;border-radius:50%;background:var(--navy-800);color:var(--gold-br);font-size:12px;
  font-weight:700;display:grid;place-items:center;font-family:"Fraunces"}
.chip .t{font-size:13.5px;font-weight:600;color:var(--navy-800)}
.chip.t-soft .n{background:var(--gold);color:#3a2c00}

.insan{background:linear-gradient(120deg,var(--gold-tint),#fff);border:1px solid var(--line);border-radius:13px;
  padding:20px 22px;box-shadow:var(--shadow)}
.insan .lead{font-family:"Source Serif 4";font-size:15px;color:var(--ink);line-height:1.55;margin:0 0 14px}
.insan .lead b{color:var(--navy-800)}

.quick{display:flex;flex-wrap:wrap;gap:10px}
.qlink{display:inline-flex;align-items:center;gap:8px;background:var(--navy-800);color:#fff;border-radius:10px;
  padding:10px 15px;font-size:13px;font-weight:500;transition:.14s}
.qlink:hover{background:var(--navy-900);box-shadow:var(--shadow)}
.qlink svg{width:15px;height:15px;color:var(--gold-br)}

/* ====== READING VIEW ====== */
.read-head{margin-bottom:8px}
.read-kind{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--gold-deep)}
.read-title{font-family:"Fraunces";font-weight:600;font-size:clamp(24px,3.6vw,33px);line-height:1.12;
  color:var(--navy-900);margin:8px 0 0;letter-spacing:-.01em}
.read-bab{font-size:13px;color:var(--ink-soft);margin-top:9px;display:flex;align-items:center;gap:8px}
.read-bab .pill{background:var(--gold-tint);color:var(--gold-deep);border:1px solid rgba(201,162,75,.4);
  border-radius:7px;padding:2px 9px;font-weight:600;font-size:11.5px}
.read-rule{height:2px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold) 64px,var(--line) 64px,var(--line) 100%);margin:18px 0 6px}

.page-block{margin-top:22px}
.page-tab{display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;margin-bottom:6px}
.page-tab .ln{flex:0 0 26px;height:1px;background:var(--gold);opacity:.5}
.doc p{font-family:"Source Serif 4";font-size:16.5px;line-height:1.72;color:#27384a;margin:0 0 15px;
  text-align:justify;-webkit-hyphens:auto;hyphens:auto}
.doc h4.doc-h{font-family:"Inter";font-weight:700;font-size:13px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--navy-800);margin:22px 0 10px}
.doc mark{background:var(--mark);color:#3a2c00;border-radius:3px;padding:0 2px}
.read-foot{margin-top:40px;padding-top:22px;border-top:1px solid var(--line);display:flex;gap:12px;justify-content:space-between}
.read-foot button{flex:1;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:14px 16px;transition:.14s;box-shadow:var(--shadow);min-width:0}
.read-foot button:hover:not(:disabled){border-color:var(--gold);background:var(--gold-tint)}
.read-foot button:disabled{opacity:.4;cursor:default}
.read-foot .dir{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);font-weight:700}
.read-foot .t{font-size:13.5px;color:var(--navy-800);font-weight:600;margin-top:4px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.read-foot .nx{text-align:right}

/* ====== SEARCH RESULTS ====== */
.sr-head{font-family:"Fraunces";font-weight:600;font-size:24px;color:var(--navy-900);margin:4px 0 4px}
.sr-meta{font-size:13px;color:var(--ink-soft);margin-bottom:22px}
.sr-meta b{color:var(--navy-800)}
.sr-group-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;
  margin:26px 0 11px;display:flex;align-items:center;gap:10px}
.sr-group-label .rule{flex:1;height:1px;background:var(--line)}
.sr-item{display:block;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:15px 17px;margin-bottom:11px;transition:.14s;box-shadow:var(--shadow)}
.sr-item:hover{border-color:var(--gold);transform:translateX(2px);box-shadow:var(--shadow-lg)}
.sr-item .sr-top{display:flex;align-items:center;gap:9px;margin-bottom:5px;flex-wrap:wrap}
.sr-item .sr-title{font-weight:600;font-size:14px;color:var(--navy-800)}
.sr-item .sr-bab{font-size:11.5px;color:var(--ink-faint)}
.sr-item .sr-pg{margin-left:auto;font-size:11px;color:var(--gold-deep);font-weight:700;white-space:nowrap}
.sr-item .sr-snip{font-family:"Source Serif 4";font-size:14px;color:#3c4d5e;line-height:1.55}
.sr-item .sr-snip mark{background:var(--mark);color:#3a2c00;border-radius:3px;padding:0 2px;font-weight:600}
.sr-empty{text-align:center;padding:60px 20px;color:var(--ink-soft)}
.sr-empty .ic{width:46px;height:46px;color:var(--line);margin:0 auto 14px;display:block}
.sr-empty b{color:var(--navy-800);display:block;font-size:16px;font-family:"Fraunces";margin-bottom:6px}

/* overlay for mobile */
.scrim{display:none;position:fixed;inset:0;background:rgba(8,20,36,.5);z-index:39;backdrop-filter:blur(2px)}

@media(max-width:980px){
  .sidebar{position:fixed;left:0;top:0;transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-lg)}
  .app.nav-open .sidebar{transform:translateX(0)}
  .app.nav-open .scrim{display:block}
  .menu-btn{display:grid}
  .stats{grid-template-columns:repeat(2,1fr)}
  .teras-grid{grid-template-columns:1fr}
  .wrap{padding:26px 20px 80px}
  .cover{padding:34px 26px 30px}
  .pgref{display:none}
}
@media(max-width:520px){
  .stats{grid-template-columns:1fr 1fr;gap:9px}
  .read-foot{flex-direction:column}
  .doc p{text-align:left}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}}
@media print{
  .sidebar,.topbar,.read-foot,.scrim{display:none!important}
  .main{display:block}.wrap{max-width:100%;padding:0}
  .doc p{text-align:left}
}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}

/* fade-in */
.view{animation:fade .32s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-top" id="homeBtn" role="button" tabindex="0" title="Halaman Utama">
        <div class="crest">
          <svg viewBox="0 0 24 24" fill="none" stroke="#C9A24B" stroke-width="1.6"><path d="M12 3 4 6v5c0 4.4 3.1 8.2 8 10 4.9-1.8 8-5.6 8-10V6l-8-3Z"/><path d="M9 11.5l2 2 4-4.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="brand-tt">
          <div class="b1">RPM 2026–2035</div>
          <div class="b2">Rancangan Pendidikan Malaysia</div>
        </div>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search" id="searchBox">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg>
        <input id="searchInput" type="search" placeholder="Cari topik, prakarsa, istilah…" autocomplete="off" spellcheck="false" aria-label="Cari dalam dokumen">
        <span class="kbd">/</span>
        <button class="clr" id="searchClr" aria-label="Kosongkan carian"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12" stroke-linecap="round"/></svg></button>
      </div>
    </div>
    <nav class="nav" id="nav" aria-label="Kandungan dokumen"></nav>
    <div class="sb-foot">
      <span class="by">by Cikgu Shahril</span>
      <span class="sec">Sektor Perancangan &amp; Pengurusan PPD, JPN Kedah</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Buka menu"><svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/></svg></button>
      <div class="crumb" id="crumb"></div>
      <div class="tb-right">

kan Pelan Pengurusan Risiko KPM","k":"prak","bab":124,"s":317,"e":320},{"i":140,"lv":2,"pdf":320,"pr":318,"t":"10.4 Kesimpulan","k":"sub","bab":124,"s":320,"e":321},{"i":141,"lv":1,"pdf":321,"pr":319,"t":"Kesimpulan RPM 2026–2035","k":"end","bab":124,"s":321,"e":323},{"i":142,"lv":1,"pdf":323,"pr":321,"t":"Lampiran","k":"end","bab":124,"s":323,"e":351},{"i":143,"lv":1,"pdf":351,"pr":349,"t":"Singkatan","k":"end","bab":124,"s":351,"e":357},{"i":144,"lv":1,"pdf":357,"pr":355,"t":"Glosari","k":"end","bab":124,"s":357,"e":360},{"i":145,"lv":1,"pdf":360,"pr":358,"t":"Indeks","k":"end","bab":124,"s":360,"e":367},{"i":146,"lv":1,"pdf":367,"pr":365,"t":"Rujukan","k":"end","bab":124,"s":367,"e":376}],"pages":[{"sec":0,"p":1,"t":""},{"sec":0,"p":2,"t":""},{"sec":0,"p":3,"t":""},{"sec":0,"p":4,"t":"Hak Cipta © 2026\nKementerian Pendidikan\n\nHak cipta terpelihara. Tidak dibenarkan mengulang terbit mana-mana bahagian artikel, gambar dan isi\nkandungan buku ini dalam apa jua bentuk dan apa jua cara sama ada elektronik, fotokopi, mekanikal,\nrakaman atau cara lain sebelum mendapat izin bertulis daripada Kementerian Pendidikan.\n\nNombor ISBN 978-983-9425-39-0\n\nDiterbitkan oleh:\nKementerian Pendidikan\nBlok E8, Kompleks E, Pusat Pentadbiran Kerajaan Persekutuan,\n62604 Wilayah Persekutuan Putrajaya, Malaysia"},{"sec":0,"p":5,"t":"KANDUNGAN\nKata Pengantar Perdana Menteri\nKata Pengantar Menteri Pendidikan\nKata Pengantar Ketua Setiausaha\nKata Pengantar Ketua Pengarah Pendidikan Malaysia\nRingkasan Eksekutif\n\nBAB 1\n\nPengenalan\n\nLatar Belakang\n1.1 Rukun Negara dan Falsafah Pendidikan Kebangsaan\n1.2 Matlamat Rancangan Pendidikan Malaysia (RPM) 2026 — 2035\n1.3 Lima Ciri Murid\n1.4 Lima Tumpuan Utama RPM 2026 – 2035\n1.5 Tujuh Teras Strategik RPM 2026 – 2035\n1.6 Kaedah Pembangunan Keseluruhan\n1.7 Sasaran Wajib Capai RPM 2026 – 2035\n\nBAB 2\n\nImpak Kepada Pihak Berkepentingan\n\n2.1 Murid\n2.2 Pendidik\n2.3 Institusi Pendidikan Kementerian Pendidikan\n2.4 Ibu Bapa dan K PPM\nPrakarsa 1: Membangunkan Kapasiti Pendidik dan Pemimpin Pendidikan sebagai Peneraju PPM\nStrategi 3: Meningkatkan Advokasi dan Promosi PPM dalam Ekosistem Pendidikan secara Terangkum\nPrakarsa 1: Mengoptimumkan Jaringan dan Jalinan untuk PPM\nPrakarsa 2: Memperkasakan Murid dan Warga KPM sebagai Agen Perubahan Amalan Kemampanan\nStrategi 4: Memperkukuh Pemantauan dan Penilaian Pelaksanaan PPM di Institusi Pendidikan KPM\nPrakarsa 1: Menilai dan Mengiktiraf Institusi Pendidikan KPM yang Menerapkan Amalan Kemampanan\nPemboleh Daya: Pengupayaan Pendanaan, Kepakaran dan Logistik untuk Semua Prakarsa berkaitan PPM\n9.4 Kesimpulan\n\nBAB 10\n\nTeras Strategik 7: Meningkatkan Kecekapan Tadbir Urus dan Sistem Penyampaian\n\nRingkasan\n10.1 Pengenalan dan Rasional\n10.2 Keadaan Semasa\n10.3 Matlamat\nStrategi 1: Mengukuhkan Pelan Komunikasi KPM yang Responsif dan Proaktif\nPrakarsa 1: Memantapkan Pelaksanaan Pelan Strategik Komunikasi KPM yang Berstruktur dan Bersasar"},{"sec":0,"p":11,"t":"Strategi 2: Memperkukuh Fungsi dan Struktur Organisasi Bahagian, Jabatan Pendidikan Negeri, Pejabat Pendidikan Daerah dan\nInstitusi Pendidikan KPM\nPrakarsa 1: Menyusun Semula Fungsi, Struktur dan Perjawatan Bahagian KPM, JPN, PPD dan Institusi Pendidikan KPM\nPrakarsa 2: Memperkasakan Polisi dan Prosedur Penamatan Pegawai di KPM\nStrategi 3: Meningkatkan Pemberian Autonomi Terpimpin kepada Institusi Pendidikan KPM\nPrakarsa 1: Memperkukuh Pelaksanaan Autonomi Terpimpin di Institusi Pendidikan KPM\nPrakarsa 2: Mengoptimumkan Penggunaan Fasiliti dan Prasarana di Institusi Pendidikan KPM\nStrategi 4: Memperkasakan Pengurusan Perubahan dan Risiko\nPrakarsa 1: Membangunkan Pelan Pengurusan Perubahan KPM\nPrakarsa 2: Membangunkan Pelan Pengurusan Risiko KPM\n10.4 Kesimpulan\n\nKesimpulan RPM 2026 – 2035\nLampiran\nSingkatan\nGlosari\nIndeks\nRujukan"},{"sec":0,"p":12,"t":"KATA PENGANTAR\n\nPERDANA MENTERI\nDewasa ini, pendidikan terus kekal sebagai tunjang utama dalam menterjemah\nmaksud pembangunan negara, selain menjadi nadi dan sendi pembentukan\ninsan yang menyeluruh. Dengan menjamin pendidikan yang bermutu tinggi,\nmasyarakat yang berilmu dan berdaya saing mampu dijelmakan, lantas\nmemperkukuh mobiliti sosial dan bakat masa depan yang berpaksi pada nilai\ndan jati diri yang ampuh.\nRancangan Pendidikan Malaysia (RPM) 2026 – 2035 adalah lanjutan dasar\nyang menandakan tekad berterusan Kerajaan dalam memperkukuh sistem\npendidikan negara agar ia kekal menyemangati zaman dan tuntutannya, serta\nbersifat terangkum. Ia menjadi pernyataan hala tuju negara yang\nmemungkinkan pendidikan sebagai hak yang asasi kepada semua serta\nmenjadi salah satu cabang untuk melonjak negara di bidang sosial dan ekonomi.\nKemunculan revolusi digital yang semakin canggih dan kecerdasan buatan\n(Artiﬁcial Intelligence) telah meletakkan negara di persimpangan yang penting.\nPerkembangan teknologi yang sangat pantas ternyata telah merubah cara\nmanusia menyerap ilmu pengetahuan dan bekerja. Justeru, Malaysia mesti\nmelihat cabaran ini sebagai manfaat kepada negara dan berusaha\nmenanggapinya agar pendidikan terus relevan sebagai tunjang pembangunan\nnegara yang lestari dan berdaya saing untuk generasi akan datang.\nPada peringkat global, Malaysia tegas menyesuaikan sistem pendidikan\ndengan piawaian antarabangsa tanpa mengorbankan jati diri kenegaraan,\ndengan aspirasi utuh dalam menjadikan negara sebagai hab ilmu serantau yang\nmampu menarik bakat, memacu aspek penyelidikan berimpak tinggi serta\nmelahirkan warganegara global yang progresif. Lantaran itu, kita akan\nmemastikan setiap prakarsa dilaksanakan secara telus, wujud\npertanggungjawaban dan berkesan, dengan kejayaannya bergantung pada\nkomitmen menyeluruh seluruh tenaga dalam ekosistem pendidikan dan\ndukungan padu rakyat dalam usaha kita mengolah sistem pendidikan nasional."},{"sec":0,"p":13,"t":"Akhirul kalam, RPM 2026 – 2035 akan memastikan masa depan\nnegara terus menyinar dengan ilmu pengetahuan sebagai\ntonggak. Saya menyeru kepada semua agar dasar ini digalas\nsecara bersama dalam usaha dan upaya membentuk dan\nmencorak generasi masa hadapan yang cintakan ilmu\npengetahuan, berjiwa besar dan teguh jati diri demi sebuah\nMalaysia yang sejahtera dan bermaruah.\n\nDato’ Seri Anwar bin Ibrahim\nPerdana Menteri"},{"sec":1,"p":14,"t":"KATA PENGANTAR\n\nMENTERI PENDIDIKAN\nPendidikan ialah landasan utama pembinaan bangsa dan tamadun. Dalam\nkonteks Malaysia yang majmuk dan berdaya saing, pendidikan menjadi\nasas perpaduan nasional, kemajuan sosial dan kemakmuran ekonomi.\nRPM 2026 – 2035 yang bertemakan “Merapatkan Jurang, Meningkatkan Mutu,\nMeraih Kejayaan Bersama” menzahirkan komitmen berterusan kementerian\nuntuk mempertingkat keberhasilan sistem pendidikan negara melalui akses\nsaksama dan peningkatan mutu yang berterusan agar kejayaan dapat\ndikongsi bersama oleh semua pihak.\nRancangan ini digubal sebagai kompas strategik untuk memperkukuh sistem\npendidikan negara agar kekal relevan, berdaya saing dan berpaksikan\nkemanusiaan bagi menghadapi dekad yang penuh cabaran. Rancangan ini\nterhasil melalui proses libat urus yang menyeluruh, melibatkan pendidik, murid,\nibu bapa, pemimpin pendidikan, komuniti dan sektor industri bagi memastikan\ndasar pendidikan berakar pada realiti sebenar di lapangan.\nDalam tempoh 10 tahun mendatang, pendidikan Malaysia perlu bergerak\nmelangkaui sempadan tradisional, daripada sistem berorientasikan\npeperiksaan kepada pembelajaran yang menekankan pemikiran kritikal,\nkreativiti dan inovasi. Transformasi ini menuntut pembaharuan kurikulum,\npedagogi dan pentaksiran untuk membentuk generasi murid yang celik ilmu\ndan teknologi, berkemahiran menyelesaikan masalah, berdaya cipta dan anjal\nmenghadapi perubahan.\nKecemerlangan akademik semata-mata tidak harus menjadi satu-satunya\nukuran keberhasilan sistem pendidikan negara. Arah tuju baharu pendidikan\nMalaysia mesti menekankan keseimbangan kepada pemerkasaan pendidikan\nkarakter dan nilai bagi melahirkan warganegara beretika dan pemimpin masa\nhadapan. Pendidik sebagai egen perubahan akan terus diperkasa melalui\npembangunan profesionalisme, manakala kepimpinan sekolah dan ekosistem\nsokongan akan diperkukuh bagi memastikan persekitaran pembelajaran\nkondusif kepada perkembangan potensi dan sahsiah murid."},{"sec":1,"p":15,"t":"Rancangan ini juga menegaskan keadilan pendidikan dengan\nmemastikan tiada murid yang tertinggal. Pendidikan bermutu mesti\ndapat dinikmati oleh semua, tanpa mengira latar belakang\nsosioekonomi, lokasi atau keupayaan. Setiap dasar, intervensi dan\nprakarsa akan dilaksanakan secara terangkum dan berimpak nyata\nterhadap kehidupan murid serta komuniti.\nSaya menyeru seluruh rakyat Malaysia untuk menjadikan rancangan ini\nsebagai tanggungjawab bersama. KPM komited untuk merealisasikan\nwawasan RPM 2026 – 2035, demi masa depan generasi Malaysia\nMADANI dan sistem pendidikan yang menjadi kebanggaan serta\npemangkin kemajuan dan kesejahteraan negara.\n\nFadhlina Sidek\nMenteri Pendidikan"},{"sec":2,"p":16,"t":"KATA PENGANTAR\n\nKETUA SETIAUSAHA\n\nRancangan Pendidikan Malaysia (RPM) 2026 – 2035 adalah kesinambungan\nusaha transformasi pendidikan negara, sambil membuka lembaran baharu\ndalam usaha memperkukuh sistem pendidikan untuk dekad seterusnya.\nRancangan ini memberikan penekanan terhadap lima tumpuan utama, iaitu\nmutu, akses dan ekuiti, ketersediaan sumber dan kecekapan, keluwesan serta\nkemampanan yang menjadi asas strategi pembangunan pendidikan negara.\nKementerian Pendidikan (KPM) memainkan peranan penting bagi memastikan\ndasar, perancangan dan pelaksanaan program pendidikan dilaksanakan\ndengan cekap, berintegriti dan berimpak. Sebagai organisasi besar yang\nmenaungi jutaan murid, ratusan ribu pendidik dan institusi pendidikan di seluruh\nnegara, keberkesanan rancangan ini bergantung pada sistem tadbir urus yang\nmantap, koordinasi yang eﬁsien dan budaya kerja berasaskan akauntabiliti\nserta prestasi. Prinsip-prinsip ini menjadi landasan bagi memastikan setiap\nstrategi diterjemahkan dengan jayanya pada semua peringkat.\nRPM 2026 – 2035 dibangunkan melalui proses libat urus yang terangkum dan\nberasaskan data dan bukti. Kaedah pembangunan menyeluruh ini memastikan\nrancangan ini berpaksikan keperluan semasa dan sejajar dengan aspirasi\nmasa hadapan negara, di samping memperkukuh dasar dan keberkesanan\npelaksanaannya."},{"sec":2,"p":17,"t":"Dalam tempoh 10 tahun akan datang, sistem pendidikan Malaysia\nperlu diperkasa agar menjadi lebih tangkas, adaptif, berwawasan\ndan selari dengan perkembangan global. KPM komited\nmenyampaikan pendidikan yang cekap, terangkum dan\nmenumpukan kepada keberhasilan murid. Langkah ini\nmerangkumi peningkatan keupayaan KPM melalui inovasi digital,\npenambahbaikan prasarana ﬁzikal dan digital, pengoptimuman\nsumber serta pemantapan pentadbiran dan akauntabiliti pada\nsemua peringkat. Tadbir urus berasaskan data dan prestasi\nmenjadi pemangkin untuk memastikan setiap prakarsa\nmemberikan nilai tambah kepada pembangunan insan dan\nnegara.\nKejayaan rancangan ini memerlukan kepimpinan berterusan dan\nkolaborasi seluruh ekosistem pendidikan. Hal ini menuntut\n\nkomitmen aktif antara kerajaan, sektor swasta, masyarakat sivil,\nibu bapa dan warga pendidikan di lapangan. Pendidikan\nmerupakan agenda nasional yang memerlukan penyertaan\nmenyeluruh (whole-of-nation approach) dan rancangan ini akan\nmenjadi hasil usaha kolektif rakyat Malaysia yang percaya\nbahawa pendidikan merupakan pelaburan paling bernilai untuk\nmasa hadapan negara.\nDengan semangat integriti, profesionalisme dan dedikasi, KPM\nakan terus memacu pelaksanaan RPM 2026 – 2035 bagi\nmemastikan setiap anak Malaysia mendapat peluang terbaik\nuntuk berkembang sebagai insan berilmu, berakhlak, berdaya\ntahan dan berjati diri kukuh demi Malaysia yang makmur dan maju.\n\nDato’ Ts. Dr. Hj. Aminuddin bin Hassim\nKetua Setiausaha"},{"sec":3,"p":18,"t":"KATA PENGANTAR\n\nKETUA PENGARAH PENDIDIKAN MALAYSIA\n\nPendidikan ialah nadi pembangunan negara dan setiap generasi bergantung\npada kekuatan sistem pendidikannya untuk mencorakkan masa depan\nbangsa. Bagi menghadapi dunia yang semakin kompleks, pendidikan bukan\nlagi sekadar proses menyampaikan ilmu, tetapi menjadi medan membina\nkeperibadian, menanam nilai dan memperkasakan potensi manusia.\nRancangan Pendidikan Malaysia 2026 — 2035 memperkukuh asas yang telah\ndibina melalui PPPM 2013 — 2025 dan menjadi panduan strategik bagi dekad\nakan datang untuk memastikan sistem pendidikan negara terus kukuh,\nadaptif dan berdaya tahan menghadapi cabaran abad ke-21 dan seterusnya.\nProses pembangunan rancangan ini menekankan penyertaan luas pelbagai\npihak, termasuk wakil KPM, agensi negeri, institusi pengajian, industri,\npertubuhan masyarakat serta libat urus awam melalui Jelajah Masa Depan\nPendidikan Negara (JMDPN) yang mengumpulkan pelbagai pandangan dan\ncadangan daripada murid, pendidik, ibu bapa, pentadbir, masyarakat sivil dan\nsektor swasta.\nRancangan Pendidikan Malaysia (RPM) 2026 — 2035 menggambarkan\nkesungguhan KPM dalam usaha mengemudi transformasi pendidikan dengan\nberpaksikan keseimbangan antara ilmu, kemahiran dan nilai. Dalam tempoh\n10 tahun mendatang, sistem pendidikan negara perlu terus berkembang\ndengan berasaskan lima tumpuan utama, iaitu mutu, akses dan ekuiti,\nketersediaan sumber dan kecekapan, keluwesan dan kemampanan."},{"sec":3,"p":19,"t":"Antara tumpuan utama rancangan ini termasuklah pemerkasaan\npendidikan karakter dan nilai sebagai asas pembentukan sahsiah\nmurid. Dalam dunia yang semakin berorientasikan teknologi dan\nmaterial, nilai seperti amanah, hormat, tanggungjawab, empati\ndan semangat cinta akan negara mesti terus dipupuk. Sekolah\nbukan sekadar tempat menimba ilmu, tetapi institusi\npembentukan insan.\nBagi memastikan kejayaan rancangan ini, peranan pendidik ialah\nteras utama. Pendidik merupakan agen perubahan, pencetus\ninspirasi dan pembentuk masa hadapan anak bangsa. Oleh itu,\nKPM akan terus memperkukuh pembangunan profesionalisme\nberterusan bagi memastikan para pendidik memiliki kompetensi\ndan kecekapan yang selaras dengan tuntutan semasa.\n\nKepimpinan sekolah, pegawai pendidikan daerah dan negeri serta\nsemua warga pendidik mesti berganding bahu melaksanakan\ntanggungjawab ini dengan penuh dedikasi dan semangat kolektif.\nAkhirnya, RPM 2026 — 2035 ini bukan sekadar dokumen dasar,\ntetapi satu amanah dan janji kita kepada masa hadapan. Saya\nmenyeru seluruh warga pendidik untuk menjadikan rancangan ini\nsebagai panduan tindakan dan sumber inspirasi bagi\nmelaksanakan tanggungjawab mendidik dengan penuh iltizam\ndan kasih. Marilah kita jadikan sistem pendidikan Malaysia\nsebagai contoh kecemerlangan sistem yang melahirkan insan\nberilmu, berkarakter dan berjati diri yang mampu memimpin\nnegara ke arah kemajuan dan kesejahteraan sejagat.\n\nDatuk Dr. Mohd Azam bin Ahmad\nKetua Pengarah Pendidikan Malaysia"},{"sec":4,"p":20,"t":"RINGKASAN EKSEKUTIF\n\nRANCANGAN PENDIDIKAN MALAYSIA 2026 — 2035\n\nMemacu Transformasi Pendidikan Negara\nRancangan Pendidikan Malaysia (RPM) 2026 — 2035 ialah rancangan\nmenyeluruh untuk mengubah landskap pendidikan negara. Rancangan ini\nbertujuan meningkatkan mutu, akses dan ekuiti, ketersediaan sumber\ndan kecekapan, keluwesan serta kemampanan dalam pendidikan.\nRancangan ini mengambil kira perubahan dunia yang pantas,\nmemastikan sistem pendidikan kita kekal relevan, dinamik dan luwes.\nPendekatan transformatif yang berlandaskan perspektif nasional dan\nglobal disasarkan untuk melahirkan individu yang berpandangan luas,\nmampu berﬁkir secara kritikal, berdaya tahan dan berdaya saing, selaras\ndengan aspirasi negara. Strategi yang digariskan didorong oleh\nkemajuan teknologi, keperluan masyarakat serta perubahan dalam\ndunia pendidikan dan pekerjaan global.\nKecerdasan Buatan (Artiﬁcial Intelligence - AI) akan memainkan peranan\nkritikal pada masa hadapan dan murid akan didedahkan atau dilengkapi\ndengan kemahiran teknologi terkini. Murid juga dapat mengemudi dunia\ndigital ini secara bertanggungjawab, beretika dan berupaya untuk\nmenjadi pengguna teknologi yang bijak dan berhemah.\nKPM telah meneliti pencapaian, jurang dan cabaran daripada RPM\n2013 – 2025. Penilaian berdasarkan rancangan sebelum ini menjadi asas\npenting untuk membentuk strategi dan prakarsa baharu bagi tempoh\n2026 – 2035 agar benar-benar memenuhi harapan pendidikan negara.\n\nKepimpinan tertinggi kerajaan dan KPM komited untuk memantau\nkemajuan, membimbing serta terlibat secara langsung dalam\npenyelesaian isu pelaksanaan. Bagi menjamin kelestarian transformasi\nyang dirancang, KPM akan mengenal pasti dan memupuk bakat\npemimpin masa hadapan yang berteraskan nilai dan berwawasan.\nMemperkasakan Kecekapan Pentadbiran dan Sistem Penyampaian\nRancangan Pendidikan Malaysia 2026 — 2035 menggariskan pelan\ntindakan yang jelas dan realistik untuk mempertingkat sistem pendidikan\nsecara menyeluruh. Kejayaan rancangan ini bergantung pada\nkecekapan semua warga pendidikan bawah KPM melalui peningkatan\nkapasiti sumber manusia, kecekapan operasi dan tadbir urus. Fungsi dan\nstruktur bahagian-bahagian di Kementerian, Jabatan Pendidikan Negeri\n(JPN), Pejabat Pendidikan Daerah (PPD) serta institusi pendidikan akan\ndiperkasakan. Tiga pelan pengurusan penting akan dibangunkan, iaitu\nPelan Komunikasi Strategik, Pelan Pengurusan Perubahan dan Pelan\nPengurusan Risiko untuk menyokong pelaksanaan RPM 2026 – 2035.\nPendekatan Libat Urus dengan Komuniti dan Pihak Berkepentingan\nPembangunan RPM 2026 — 2035 melibatkan maklum balas daripada\npelbagai pihak, termasuk warga pendidikan, ibu bapa, komuniti, agensi\nkerajaan, sektor swasta dan badan bukan kerajaan. KPM akan terus\nmenggalakkan pelibatan bermakna semua pihak berkepentingan.\nPemantauan berkala akan dijalankan bagi setiap prakarsa untuk"},{"sec":4,"p":21,"t":"memastikan transformasi pendidikan berjalan lancar dan selaras dengan\nmatlamat yang ditetapkan.\nImpak yang Dijangka Menjelang Tahun 2035\nRPM 2026 – 2035 dirangka untuk merapatkan jurang pencapaian yang masih\nwujud selepas tamatnya Pelan Pembangunan Pendidikan Malaysia (PPPM)\n2013 – 2025. Antara langkah utama termasuklah mengukuhkan sistem\npendidikan sedia ada, mempersiapkannya menghadapi cabaran masa hadapan\ndan memastikannya kekal berdaya saing di peringkat global. Rancangan ini\nmenggariskan transformasi melalui tujuh teras strategik utama berkaitan sistem,\npendidikan, murid, pendidik, prasarana ﬁzikal dan digital, sinergi, kemampanan\nserta tadbir urus.\nTransformasi menyeluruh ini mengambil masa selama 10 tahun, namun\nperubahan dijangka mula kelihatan menjelang tahun 2030. Antara impak\nutamanya termasuklah penstrukturan semula sistem persekolahan kebangsaan\nagar lebih anjal, responsif dan setara, di samping menjadikan sekolah\nkebangsaan pilihan utama ibu bapa. Semua murid disasarkan untuk menguasai\nliterasi dan numerasi pada akhir Tahap Satu, manakala peratusan calon yang\ntidak layak mendapat Sijil Pelajaran Malaysia (SPM) dan kadar keciciran dijangka\nmenurun. KPM juga berhasrat melahirkan murid yang seimbang dari segi intelek,\nsahsiah dan daya tahan emosi.\n\nProfesion keguruan akan diperkukuh sebagai tunjang pendidikan dengan\nmenumpukan kepada peranan pendidik kepada pengajaran dan pembelajaran\n(PdP) dan memastikan aspek kesejahteraan diberikan keutamaan. Pendidik\njuga akan diberikan peluang membangunkan profesionalisme berterusan\nsecara berstruktur, luwes dan relevan. Peningkatan jumlah pemimpin\nberkeupayaan tinggi juga akan memperkasakan kecekapan institusi pendidikan\nKPM.\nSemua institusi pendidikan KPM disasarkan mencapai piawaian minimum\nprasarana ﬁzikal dan digital. Amalan pemantauan sumber dan pelaporan\nberkala berasaskan data akan menjadi norma di semua institusi pendidikan KPM.\nKerjasama KPM dengan pihak berkepentingan akan membina ekosistem\npendidikan yang terangkum, responsif dan mampan. Sinergi antara institusi\npendidikan KPM dengan pelbagai rakan strategik akan menyediakan saluran\nsumbangan yang lebih telus. Prakarsa yang menekankan pembudayaan\nkemampanan dan kewarganegaraan global akan melahirkan murid yang\nmemiliki nilai, tingkah laku dan cara hidup yang positif demi kesejahteraan masa\nhadapan. Penjajaran fungsi, penyusunan semula struktur organisasi KPM dan\npemerkasaan autonomi terpimpin akan meningkatkan prestasi pendidikan\nnegara."},{"sec":4,"p":22,"t":"KESIMPULAN\nRPM 2026 – 2035 ialah rancangan menyeluruh pendidikan negara bukan sahaja\nuntuk generasi kini, tetapi juga untuk masa hadapan negara. Melalui rancangan ini,\nKPM akan mengukuhkan sistem pendidikan demi memastikannya kekal relevan\ndan berdaya saing pada peringkat global. Kejayaan transformasi ini memerlukan\nkomitmen padu daripada setiap rakyat Malaysia, melalui kerjasama erat\nkerajaan, komuniti, pendidik dan semua pihak berkepentingan. Dengan matlamat\nyang jelas dan tindakan yang terancang, KPM yakin impak positif menjelang\ntahun 2035 akan memberikan manfaat besar kepada sektor pendidikan dan\npembangunan negara secara keseluruhan."},{"sec":5,"p":23,"t":"BAB\n\nBAB 1 PENGENALAN"},{"sec":6,"p":24,"t":"PENGENALAN\n\nLATAR BELAKANG\nDunia sedang bergerak pantas dalam era globalisasi, membawa perubahan\nbesar dalam ekonomi, sosial dan politik. Ledakan teknologi dan pengaruh\nmedia sosial kini menimbulkan cabaran yang unik, iaitu kebanjiran sumber\ndan jumlah maklumat yang boleh mengelirukan. Masyarakat yang berilmu\ndan berakhlak mampu memahami hak dan tanggungjawab mereka,\nbertindak rasional serta tidak mudah terpengaruh oleh unsur yang boleh\nmerosakkan perpaduan dan kestabilan negara. Pendidikan merupakan\ntunjang utama untuk memastikan hala tuju pembangunan pendidikan selari\ndengan perubahan global, sekali gus membentuk masyarakat yang berilmu,\nberakhlak dan berdaya tahan menghadapi cabaran dunia yang semakin\nkompleks.\nPendidikan menjadi pemangkin utama dalam membasmi kemiskinan,\nmeningkatkan tahap kesihatan, memperkukuh mutu hidup serta menjamin\nkeamanan dan kestabilan.\nKajian Bank Dunia (World Bank Group’s Education Watch, 2023)\nmenunjukkan secara global, setiap penambahan satu tahun persekolahan\ndapat meningkatkan pendapatan individu sebanyak 10 peratus. Dapatan ini\nmembuktikan bahawa setiap individu perlu mendapat pendidikan sehingga\nke tahap yang tertinggi bagi memastikan negara dapat melahirkan bakat\nberkemahiran tinggi. Hal ini amat penting bagi memacu produktiviti,\nmempercepat inovasi, menjana pertumbuhan ekonomi, mengukuhkan\ninstitusi dan memupuk perpaduan sosial.\n\nBAB 1 PENGENALAN\n\nDalam ekonomi moden, daya saing sesebuah negara banyak bergantung\npada keupayaan rakyatnya mencipta nilai melalui ilmu dan inovasi. Malaysia\nmempunyai potensi besar dalam aspek ini, terutamanya dengan bakat\ngolongan muda yang boleh dimanfaatkan melalui pelaburan dalam pendidikan.\nPendidikan bermutu membuka peluang kepada setiap individu untuk\nmeningkatkan mutu hidup di samping menyumbang secara aktif kepada\npembangunan dan keharmonian negara. PPPM 2013 – 2025 sebelum ini\ntelah menggariskan lima aspirasi sistem, iaitu Akses, Kualiti, Ekuiti,\nPerpaduan dan Kecekapan. Lima aspirasi sistem ini memberikan tumpuan\nkepada penambahbaikan dasar pendidikan dan pelaksanaan program\nsecara berperingkat. Dalam masa yang sama, tempoh ini turut menguji\nkeupayaan sistem apabila berdepan pandemik COVID-19, ledakan\nteknologi yang semakin pantas serta kemunculan AI yang memberikan\nkesan dalam pelbagai aspek, termasuklah kesejahteraan dan kesihatan\nmental murid. Cabaran ini harus ditangani dengan segera dalam usaha\nmemastikan pendidikan negara berupaya melahirkan individu yang holistik\nselari dengan Falsafah Pendidikan Kebangsaan.\nBerdasarkan jurang pencapaian daripada rancangan terdahulu, RPM\n2026 – 2035 kini memberikan tumpuan kepada perancangan strategik\nbaharu. Rancangan ini memperkukuh sistem pendidikan negara agar lebih\nberdaya tahan dan memacu pertumbuhan negara selaras dengan aspirasi\nnasional."},{"sec":7,"p":25,"t":"1.1 RUKUN NEGARA DAN FALSAFAH PENDIDIKAN KEBANGSAAN\nRukun Negara diperkenalkan untuk mencapai perpaduan yang kukuh\ndalam kalangan pelbagai kaum di Malaysia bagi menjamin keharmonian\nnasional. Falsafah Pendidikan Kebangsaan (FPK) menggariskan hasrat\nutama negara, iaitu membentuk insan yang seimbang dari segi jasmani,\nemosi, rohani dan intelek. Nilai teras seperti adab, amanah, ihsan, hormat,\nkasih sayang, kerjasama, tolak ansur, cinta ilmu, cinta negara dan\nkesedaran kelestarian merupakan asas kepada pembentukan karakter\ninsan sejahtera.\nRPM 2026 — 2035 menterjemahkan Rukun Negara dan FPK kepada\ntindakan nyata. Rancangan ini akan memastikan murid menguasai ilmu\nasas yang kukuh, membina karakter mulia dan menguasai kemahiran abad\nke-21, di samping menghayati nilai serta menjadi warganegara yang aktif.\nPendekatan pengajaran akan memupuk pemikiran yang mendalam melalui\npembelajaran berasaskan inkuiri, penyelesaian masalah, projek kolaboratif\ndan kerja berpasukan. Sistem pentaksiran akan lebih seimbang,\nmerangkumi penilaian formatif dan sumatif untuk mengukur bukan sahaja\nkemajuan akademik, tetapi juga perkembangan karakter termasuk sikap\npositif, semangat kerjasama, keupayaan reﬂeksi diri dan nilai kerohanian\nyang teguh.\nPeranan pendidik pula adalah sebagai pembimbing dan pembentuk bakat\nmasa hadapan. KPM akan terus melatih pendidik untuk memperkukuh\n\nkemahiran mengajar, bimbingan emosi, literasi data dan pedagogi digital\nyang beretika. Budaya sekolah akan dibentuk berasaskan peraturan yang\njelas, teladan yang baik, amalan apresiasi, sistem bimbingan rakan sebaya\nserta pelibatan aktif ibu bapa dan komuniti. Persekitaran pembelajaran\nyang selamat, kondusif dan mampan amat penting untuk menyokong\npembentukan nilai murni.\nSetiap murid, dari prasekolah hingga menengah atas, termasuklah murid\nberkeperluan pendidikan khas berhak menikmati pengalaman\npembelajaran bermutu yang sama bagi memastikan akses dan ekuiti dalam\npendidikan. Sokongan khusus akan diberikan melalui intervensi akademik\ndan emosi, pemerkasaan bahasa kebangsaan, pendedahan kepada\nbahasa tambahan, literasi digital, pengukuhan Sains, Teknologi,\nKejuruteraan dan Matematik (STEM), Pendidikan dan Latihan Teknikal dan\nVokasional (TVET) serta program kokurikulum yang membangunkan\nsahsiah, kepimpinan dan kesihatan ﬁzikal.\nTadbir urus akan mengutamakan akauntabiliti dan ketelusan. Keputusan di\nsekolah akan berlandaskan data, dengan tumpuan utama kepada murid.\nKerjasama dengan komuniti, industri dan masyarakat akan diperkukuh.\nAmalan kemampanan di sekolah akan diterapkan untuk menghargai alam\nsekitar, memelihara sumber semula jadi dan memupuk rasa tanggungjawab\nterhadap generasi akan datang.\n\nBAB 1 PENGENALAN"},{"sec":8,"p":26,"t":"1.2 MATLAMAT RPM 2026 – 2035\nEvolusi sistem pendidikan di Malaysia bermula dengan usaha awal kerajaan\nkolonial British untuk mewujudkan sistem pendidikan di Tanah Melayu yang\nbertumpkuan kepada integrasi nasional menjelang kemerdekaan melalui\npenubuhan satu jawatankuasa yang dipengerusikan oleh L.J Barnes dan\nseterusnya manghasilkan Laporan Barnes (1950). Cadangan daripada Laporan\nBarnes berhubung pemansuhan sekolah vernakular telah mendapat tentangan\ndaripada masyarakat Cina. Bagi meredakan keadaan, Jawatankuasa Fenn-Wu\ntelah ditubuhkan dan seterusnya mengeluarkan Laporan Fenn-Wu (1951).\nLaporan ini mencadangkan sekolah Cina, sekolah Tamil dan sekolah Melayu\ndibenarkan beroperasi dengan menggunakan bahasa pengantar masing-masing.\nSeterusnya, Penyata Razak (1956) menjadi asas kepada Sistem Pendidikan\nKebangsaan dengan matlamat menyatupadukan kaum melalui satu kurikulum\nyang sama, penggunaan Bahasa Melayu sebagai bahasa pengantar utama dan\nsekolah yang bercorak kebangsaan, manakala Laporan Rahman Talib (1960)\npula menekankan pendidikan percuma di sekolah rendah dan pengukuhan\nsekolah kebangsaan. Usaha ini kemudiannya menjadi asas kepada Akta\nPelajaran 1961 yang membentuk Sistem Pendidikan Kebangsaan. Laporan\nJawatankuasa Kabinet Mengkaji Pelaksanaan Dasar Pelajaran (1979) telah\nmemperluas matlamat pendidikan kepada pembangunan insan yang seimbang\ndari segi intelek, rohani, emosi dan jasmani. Laporan ini menghasilkan Kurikulum\nBersepadu Sekolah Rendah (KBSR) dan Kurikulum Bersepadu Sekolah Menengah\n(KBSM) yang menyeimbangkan ilmu, kemahiran dan nilai serta memperkukuh jati\ndiri dan semangat patriotisme murid.\nPendidikan abad ke-21 di Malaysia berkembang secara lebih strategik melalui\nPelan Induk Pembangunan Pendidikan (PIPP) 2006 — 2010 dan PPPM 2013 — 2025.\nKedua-dua rancangan ini bertumpukan kepada peningkatan mutu, pemerkasaan\npendidik, kepimpinan sekolah dan pembangunan kemahiran abad ke-21 untuk\nmelahirkan modal insan bertaraf global.\n\nBAB 1 PENGENALAN\n\nWalaupun setiap rancangan pendidikan mempunyai tumpuan dan pendekatan\nberbeza mengikut zamannya, matlamat asas kekal konsisten, iaitu melahirkan\ninsan yang seimbang dan harmonis selaras dengan FPK dan Rukun Negara.\nMatlamat ini menekankan pembangunan holistik individu, perpaduan nasional,\npenguasaan ilmu dan kemahiran relevan untuk menghadapi cabaran global.\nNegara-negara di rantau ASEAN dan negara maju lain turut berkongsi matlamat\npendidikan yang sama, berlandaskan konsep pembangunan murid secara\nmenyeluruh dan berasaskan nilai. Negara maju seperti Finland, Jepun dan Korea\nSelatan juga memberikan keutamaan kepada kesejahteraan murid,\npembelajaran berasaskan nilai dan keseimbangan ilmu serta kehidupan. Filipina\ndan Brunei Darussalam pula menumpukan kepada patriotisme, potensi diri dan\nkemahiran berdaya saing.\nNegara-negara ini menganggap pendidikan bukan sekadar pemerolehan ilmu,\ntetapi proses membentuk individu yang beretika, berempati dan mampu\nmenyesuaikan diri dengan perubahan dunia.\nDalam era global yang kompleks, pendekatan pembangunan insan seimbang\namat penting. Hal ini bagi memastikan pendidikan tidak hanya melahirkan murid\ncemerlang intelek, tetapi juga individu berakhlak, berperikemanusiaan dan\nharmoni. Matlamat RPM 2026 – 2035 adalah untuk melahirkan insan sejahtera\nyang beradab, berilmu, berkemahiran, berdaya tahan dan berkeyakinan yang\nberteraskan FPK.\nMatlamat ini menekankan bahawa pendidikan perlu melahirkan individu yang\nseimbang dari segi sahsiah, emosi, sosial dan rohani serta berupaya menghadapi\ncabaran masa hadapan dengan ilmu, nilai dan kemahiran yang relevan melalui\npembelajaran sepanjang hayat."},{"sec":9,"p":27,"t":"1.3 LIMA CIRI MURID\nHuraian ringkas bagi setiap ciri Insan Sejahtera adalah seperti yang berikut:\n\nBeradab\n\nMurid yang memiliki\nsikap dan tingkah\nlaku yang sopan,\nmenghormati orang\nlain, bertimbang rasa,\nmenghayati nilai serta\nmempraktikkan etika\ndan adab yang baik. Ciri\nmurid ini menekankan\npembentukan nilai moral\ndan keperibadian yang\ntinggi, berakhlak mulia\nserta warganegara yang\nbertanggungjawab.\n\nBerilmu\n\nMurid yang memiliki\nilmu pengetahuan\nyang luas meliputi\nbidang akademik dan\nbukan akademik serta\n\nkritis dan kreatif. Murid\nsentiasa berusaha untuk\nmemahami kandungan\npembelajaran\ndan mampu\nmengaplikasikannya\ndalam kehidupan harian.\n\nBerkemahiran\n\nBerdaya\nTahan\n\nMurid yang memiliki\nkemahiran praktikal\ndan teknikal bagi\nmenghadapi cabaran\nkehidupan dan dunia\npekerjaan sebenar.\nMurid juga menguasai\nkemahiran masa\nhadapan, seperti\nkemahiran penyelesaian\nmasalah yang kompleks\ndan penyelesaian\nmasalah melalui\npembelajaran\nkolaboratif selain\nkemahiran insaniah\nyang menjadi kunci\nkejayaan dan\nkelangsungan hidup\npada abad ke-21.\n\nMurid yang berdaya\n\nmental dan emosi,\nmampu bersedia\nmenghadapi cabaran\ndalam pembelajaran\ndan kehidupan. Murid\nmampu menyesuaikan\ndiri serta menghadapi\ntekanan, kegagalan\ndan kesulitan dengan\nsikap positif dan tidak\nmudah berputus asa.\nMurid juga bertekad dan\nsentiasa berusaha untuk\nmencapai matlamat\nwalaupun berhadapan\ndengan pelbagai\nhalangan.\n\nBerkeyakinan\n\nMurid yang mempunyai\nkepercayaan yang utuh\nterhadap keupayaan\ndan potensi diri, mampu\nberkomunikasi dengan\nbaik serta berani untuk\nmencuba perkara yang\nbaharu dan berﬁkiran\nterbuka. Keyakinan\nsebagai warganegara\nyang baik dan\nbertanggungjawab\ndiperkukuh berasaskan\nkepercayaan kepada\nRukun Negara sebagai\ntonggak perlembagaan\nnegara.\n\nRajah 1.1 Lima Ciri Murid yang Membentuk Insan Sejahtera\n\nBAB 1 PENGENALAN"},{"sec":10,"p":28,"t":"1.4 LIMA\nTUMPUAN\nUTAMA RPM\n2026 – 2035\nBagi merealisasikan matlamat RPM 2026 – 2035,\nlima tumpuan utama menjadi pemacu\ntransformasi sistem pendidikan negara.\n(Rajah 1.2).\n\nINSAN\nSEJAHTERA\n\nTumpuan RPM 2026 — 2035\nMutu, Akses dan Ekuiti, Ketersediaan Sumber dan Kecekapan,\nKeluwesan dan Kemampanan\nRajah 1.2 Kerangka RPM 2026 — 2035\n\nBAB 1 PENGENALAN"},{"sec":10,"p":29,"t":"MUTU\n\nMutu sistem pendidikan merujuk kepada keupayaan dan kesediaan\nsistem dalam menyediakan peluang dan pengalaman pembelajaran\nyang terbaik untuk semua murid. Tumpuan penting merangkumi pelbagai\naspek seperti kurikulum, pedagogi dan pentaksiran yang bermutu,\nprasarana ﬁzikal dan digital yang kondusif serta menyokong PdP,\npengurusan dan tadbir urus yang cekap serta sistem sokongan holistik\nuntuk perkembangan murid. Oleh itu, mutu pendidikan perlu terus\ndiperkukuh secara berterusan untuk meningkatkan keberhasilan setiap\nmurid.\nAspirasi untuk memastikan setiap murid mendapat akses kepada\npendidikan bermutu juga selari dengan Matlamat Pembangunan\nMampan - Pendidikan Bermutu (SDG4), iaitu “memastikan pendidikan\nyang terangkum dan saksama serta menggalakkan peluang\npembelajaran sepanjang hayat untuk semua”. Bagi merealisasikan\naspirasi ini, sistem pendidikan negara perlu mencapai tahap mutu yang\nsetanding dengan sistem pendidikan berprestasi tinggi pada peringkat\nglobal.\nPrestasi Malaysia dalam Programme for International Student\nAssessment (PISA) 2022 dan Trends in International Mathematics and\nScience Study (TIMSS) masih di bawah purata antarabangsa. Oleh itu,\nusaha memperkukuh mutu sistem pendidikan perlu menjadi keutamaan.\nSasaran KPM adalah untuk mencapai purata skor antarabangsa dalam\npentaksiran TIMSS dan PISA.\n\nPencapaian murid dalam SPM, khususnya dalam mata pelajaran teras\nturut menjadi keutamaan sebagai petunjuk mutu sistem. Meskipun calon\nlayak menerima sijil SPM telah pun meningkat, usaha untuk\nmeningkatkan peratusan murid yang mencapai sekurang-kurangnya\ngred kepujian dalam SPM masih perlu diperkukuh.\nTaraf mutu institusi pendidikan di Malaysia secara umumnya berada\npada tahap baik dengan pelbagai usaha penambahbaikan berterusan\noleh KPM untuk memastikan standard yang setara dengan amalan\nantarabangsa. Pelbagai mekanisme penilaian seperti akreditasi, audit\ninstitusi, pemantauan pencapaian murid dan penilaian berasaskan\nkompetensi guru dilaksanakan. Walau bagaimanapun, terdapat\nkeperluan untuk terus memperkukuh konsistensi pelaksanaan di\nlapangan bagi meningkatkan kapasiti pendidik dan memperkukuh\npembuatan keputusan berasaskan data dan bukti seterusnya\nmemastikan setiap institusi mencapai tahap kecemerlangan yang\nmampan dan terangkum.\nAspirasi KPI Mutu:\n1. Murid mencapai sekurang-kurangnya gred C bagi keempat-empat\nmata pelajaran Bahasa Melayu, Bahasa Inggeris, Matematik dan\nSejarah.\n2. 33 peratus sekolah mencapai taraf mutu cemerlang (Sekolah\nInspirasi).\n\nBAB 1 PENGENALAN"},{"sec":10,"p":30,"t":"AKSES DAN EKUITI\nAkses dan ekuiti merangkumi dua aspek utama, iaitu memastikan semua\nkanak-kanak mendapat akses kepada pendidikan bermutu serta menjamin peluang\npendidikan yang setara dan adil bagi setiap individu. Konsep kesaksamaan dan\nkesetaraan ini menegaskan bahawa setiap kanak-kanak warganegara Malaysia\nberhak mendapat pendidikan bermutu, tanpa mengira latar belakang sosial,\nekonomi, geograﬁ dan ketidakupayaan.\nMalaysia telah mencapai kadar penyertaan yang tinggi bagi pendidikan rendah dan\nmenengah. Namun, tumpuan kini beralih kepada usaha memperluas akses\npendidikan bermutu pada peringkat prasekolah. Usaha ini selaras dengan sasaran\n4.2 dalam SDG4 yang menekankan keperluan memastikan semua kanak-kanak\nmendapat akses kepada pendidikan awal dan prasekolah yang bermutu.\nSehubungan dengan itu, sistem pendidikan negara berhasrat memastikan\npenyertaan sejagat dari peringkat prasekolah hingga menengah atas. Antara\nprakarsa utama termasuklah memperkukuh pendidikan prasekolah bagi\nkanak-kanak berumur lima tahun dan disokong oleh Kurikulum Prasekolah 2026\nuntuk merapatkan jurang pembelajaran dengan memastikan pendidikan wajib\nprasekolah dilaksanakan seperti dalam RMK13.\nAspirasi KPI Akses dan Ekuiti:\n1. Enrolmen sejagat pada setiap peringkat pendidikan prasekolah hingga\nmenengah atas.\n2. Pengurangan 50 peratus dalam jurang pencapaian bandar dan luar bandar.\n3. Pengurangan 70 peratus dalam jurang pencapaian jantina dan sosioekonomi.\n\nBAB 1 PENGENALAN"},{"sec":10,"p":31,"t":"KETERSEDIAAN SUMBER DAN KECEKAPAN\n\nKetersediaan sumber dan kecekapan melibatkan kesediaan dan akses\nmurid serta pendidik terhadap pelbagai jenis bahan pengajaran dan\npembelajaran, di samping keupayaan sistem menggunakan sumber\nsedia ada dengan cekap.\nKetersediaan sumber merujuk kepada penyediaan prasarana fizikal dan\ndigital yang berfungsi, bahan pengajaran dan peralatan bersesuaian\nuntuk mewujudkan iklim pembelajaran kondusif, sejajar dengan\nkurikulum abad ke-21. Berdasarkan Laporan Bank Dunia (Bending\nBamboo Shoots: Strengthening Foundational Skills, 2024), bekalan\nsumber manusia (terutama pendidik terlatih) dan sumber kewangan\nyang mencukupi berperanan penting dalam aktiviti perkembangan\nmurid.\nKecekapan pula ialah kemampuan sistem pendidikan untuk\nmemanfaatkan sumber secara berkesan dan efisien bagi mencapai\nhasil yang diingini. Tumpuan ini merangkumi tadbir urus yang cekap,\npenyampaian pendidikan yang bermutu dan penambahbaikan\nberterusan dalam proses PdP.\n\nyang mencukupi dan relevan, manakala sumber yang tersedia hanya\nakan memberikan impak jika dimanfaatkan dengan berkesan.\nSelain sumber kewangan, kepakaran, kemudahan fizikal dan sokongan\nteknikal adalah penting sebagai asas keupayaan sistem. Penilaian\nkecekapan sistem pendidikan juga perlu menekankan pulangan hasil\ndan nilai daripada pelaburan pendidikan. Meskipun sistem pendidikan\nMalaysia menerima peruntukan yang tinggi secara konsisten,\npeningkatan keberhasilan murid masih belum sepadan dengan sumber\nyang disalurkan. Oleh itu, tumpuan kepada keberkesanan perbelanjaan\nperlu menekankan penggunaan sumber dan pelaburan yang\nmemberikan pulangan maksimum kepada murid melalui penyampaian\nprakarsa pendidikan yang tepat pada masanya.\nAspirasi KPI Ketersediaan Sumber dan Kecekapan:\n1. Semua institusi pendidikan KPM yang mempunyai bangunan daif\nakan dinaik taraf.\n2. Pulangan nilai/hasil daripada perbelanjaan pendidikan bagi murid.\n\nOleh itu, kecekapan dan ketersediaan sumber perlu dilihat sebagai\naspek yang saling melengkapi. Sistem yang cekap memerlukan sumber\n\nBAB 1 PENGENALAN"},{"sec":10,"p":32,"t":"KELUWESAN\n\nKEMAMPANAN\n\nKeluwesan menekankan keupayaan sistem pendidikan untuk menyesuaikan\npendekatan pedagogi mengikut keperluan dan keupayaan murid, persekitaran\npembelajaran yang dinamik serta perkembangan teknologi. Pendekatan\npembelajaran yang lebih terangkum dan berpusatkan murid memberikan\npeluang kepada setiap murid mendalami bidang pembelajaran berdasarkan\nminat, kebolehan dan kecenderungan masing-masing. Keluwesan juga\nmerangkumi keanjalan dalam tadbir urus pendidikan bagi meningkatkan\nkecekapan, akauntabiliti dan integriti dalam penyampaian pendidikan.\n\nKemampanan memberikan tumpuan kepada usaha memelihara dan\nmelestarikan sistem pendidikan agar kekal relevan, berdaya tahan dan mampu\nmemenuhi keperluan masa hadapan. Kemampanan merupakan teras baharu\ndalam RPM 2026 — 2035 yang menekankan pembudayaan kemampanan,\nmerangkumi dimensi alam sekitar, sosial dan ekonomi dalam ekosistem\npendidikan. Penekanan ini selaras dengan Matlamat Pembangunan Mampan\n(SDG) bagi memastikan pembangunan bakat yang berdaya saing, beretika dan\nberorientasikan masa hadapan.\n\nTumpuan ini memastikan sistem pendidikan mampu bertindak balas secara\nadaptif terhadap perubahan keperluan murid, kepelbagaian konteks setempat\ndan tuntutan landskap global yang sentiasa berubah. Pada masa yang sama,\nkeluwesan memperkukuh pemberdayaan sistem untuk membuat keputusan\nsecara kontekstual dan memperkasa pelaksana di peringkat akar umbi. Oleh itu,\nbermutu merupakan asas penting untuk memastikan sistem pendidikan kekal\nrelevan, tangkas dan berdaya tahan dalam menghadapi cabaran masa hadapan.\n\nOleh itu, warga pendidikan perlu dilengkapi dengan kesedaran, pengetahuan dan\nkeupayaan untuk bertindak secara bertanggungjawab terhadap isu\nkemampanan pada peringkat tempatan dan global. Pembudayaan amalan\nkemampanan ini akan diintegrasikan melalui pendekatan holistik di semua\ninstitusi pendidikan KPM. Manfaat pendidikan dapat dinikmati secara adil oleh\ngenerasi kini dan akan datang untuk melahirkan generasi yang bukan sahaja\nberilmu dan berkemahiran, tetapi juga bertanggungjawab terhadap\nkesejahteraan masyarakat dan kelestarian bumi.\n\nAspirasi KPI Keluwesan:\n1. Semua institusi pendidikan KPM mendapat autonomi terpimpin sekurangkurangnya dalam satu bidang, sama ada kurikulum, kewangan, sumber\nmanusia, pengurusan murid atau perolehan.\n\nBAB 1 PENGENALAN\n\nAspirasi KPI Kemampanan:\n1. Semua warga institusi pendidikan KPM membudayakan amalan kemampanan."},{"sec":11,"p":33,"t":"1.5 TUJUH TERAS STRATEGIK RPM 2026 – 2035\nTransformasi sistem pendidikan melalui RPM 2026 — 2035 didorong oleh tujuh teras strategik untuk mempercepat perubahan ekosistem pendidikan seiring dengan\nperkembangan dunia.\n\nTeras\nStrategik 1\n\nTeras\nStrategik 2\n\nTeras\nStrategik 3\n\nTeras\nStrategik 4\n\nMemastikan Sistem Pendidikan\nMalaysia yang Terangkum, Dinamik\ndan Relevan\n\nMengoptimumkan Potensi Setiap\nMurid Melalui Pengalaman\nPembelajaran yang Bermakna\nuntuk Menjadi Warganegara Global\n\nMentransformasikan Pendidik\nagar Berkeupayaan Tinggi dan\nBerorientasikan Masa Hadapan\n\nMemantapkan Prasarana\nFizikal dan Digital di Semua\nInstitusi Pendidikan KPM\n\nTeras\nStrategik 5\n\nTeras\nStrategik 6\n\nTeras\nStrategik 7\n\nMempergiat Sinergi antara Institusi\nPendidikan KPM dengan Semua\nPihak Berkepentingan\n\nMembudayakan Kemampanan\ndalam Ekosistem Pendidikan\n\nMeningkatkan Kecekapan Tadbir\nUrus dan Sistem Penyampaian\n\nRajah 1.3 Tujuh Teras Strategik RPM 2026 — 2035\n\nSetiap teras strategik ini mempunyai strategi dan prakarsa yang digubal berdasarkan penelitian pelbagai isu, cabaran dan potensi. Hal ini penting\nbagi memastikan setiap prakarsa memberikan impak dan mutu yang tinggi terhadap transformasi yang disasarkan.\nBAB 1 PENGENALAN"},{"sec":12,"p":34,"t":"1.6 KAEDAH\nPEMBANGUNAN\nKESELURUHAN\n\nRPM 2026 — 2035 merupakan kesinambungan strategik daripada rancangan terdahulu yang\ndirangka melalui pendekatan menyeluruh kerajaan (whole of government) dan pendekatan\nmenyeluruh masyarakat (whole of society) serta memastikan pelibatan keseluruhan ekosistem\npendidikan. Ekosistem ini meliputi kementerian, agensi kerajaan dan swasta, institusi pendidikan,\nmasyarakat, ibu bapa serta murid yang turut terlibat dalam membentuk hala tuju pendidikan\nnegara. Rancangan ini dibina berlandaskan visi untuk melahirkan insan sejahtera dan menjadikan\npendidikan sebagai pemacu utama pembangunan modal insan negara. Oleh itu, usaha merapatkan\njurang, meningkatkan mutu dan mencapai kejayaan bersama merupakan tumpuan utama dalam\nproses pembangunannya.\nPembangunan RPM 2026 — 2035 melalui proses yang menyeluruh dan berlapis, yang menggabungkan\nSesi Libat Urus (SLU) dan Diskusi Kumpulan Berfokus (DKB) yang menghimpunkan pandangan\npelbagai pihak berkepentingan. Proses ini turut diperkukuh melalui pelaksanaan Jelajah Masa Depan\nPendidikan Negara (JMDPN) 2024 di seluruh negara selama sembilan bulan pada tahun 2024. Melalui\ndapatan proses ini, teori perubahan serta rangka kerja strategik bagi setiap teras telah dibentuk,\nseterusnya memacu pembangunan keseluruhan RPM 2026 — 2035 sebagai rancangan yang\nberasaskan data, aspirasi nasional, bukti empirikal dan keperluan semasa sistem pendidikan.\nPembangunan RPM 2026 — 2035 berpandukan proses yang menyeluruh, iaitu:\n\nSesi Libat Urus dan Diskusi Kumpulan Bertumpuan mengenai isu\ndasar, penyampaian, pentadbiran dan pelibatan masyarakat.\n\nJelajah Masa Depan Pendidikan Negara 2024 dilaksanakan di seluruh\nnegara bermula pada bulan Februari hingga Oktober 2024. Sebanyak\n31,106 input berjaya dikumpulkan daripada pelbagai pihak\nberkepentingan. Semua input telah diteliti, dianalisis dan\ndibincangkan dengan menyeluruh dalam sesi DKB yang melibatkan\n320 orang pakar dalam bidang masing-masing.\n\nPembentukan teori perubahan dan rangka kerja strategik untuk\nsetiap teras.\nPembangunan RPM 2026 — 2035.\n\nRajah 1.4 Proses pembangunan RPM 2026 — 2035\n\nBAB 1 PENGENALAN"},{"sec":12,"p":35,"t":"Makmal Penyelesaian Masalah diadakan untuk memastikan strategi dan prakarsa\nyang dibangunkan secara “penciptaan bersama” (co-creation) melibatkan\npelbagai pihak berkepentingan secara menyeluruh dan bermakna. Prakarsa\nbagi setiap teras strategik disemak dan disahkan untuk menilai kesesuaian dan\nkeberkesanan prakarsa serta merangka rancangan strategik dan rancangan\npelaksanaan. Dalam sesi ini, prakarsa dibincangkan dan diperhalusi secara kritikal\noleh pihak berkepentingan yang terdiri daripada pakar akademik, kementerian,\nagensi awam dan swasta serta pelibatan badan antarabangsa seperti pihak\nBank Dunia dan United Nations Children’s Fund (UNICEF). Tumpuan diberikan\nkepada kebertanggungjawaban dan pemilikan bahagian untuk memastikan\nkestabilan pelaksanaan jangka panjang.\nSesi sindikasi kepimpinan turut dilaksanakan untuk membentangkan hasil makmal\nkepada pihak kepimpinan tertinggi bagi mendapatkan maklum balas. Selain itu,\nlawatan penanda aras antarabangsa ke Jerman dan Perancis diadakan untuk\nmendapatkan input yang menyeluruh dan menyeluruh.\nSeterusnya, siri jerayawara dilaksanakan di seluruh negara untuk memberikan\npenerangan berkenaan prakarsa dan mendapatkan sokongan menyeluruh\ndaripada pelbagai pihak berkepentingan dalam ekosistem pendidikan awam\nsebelum pelancaran rasmi RPM 2026 — 2035.\n\nPelaksanaan RPM 2026 — 2035 dibahagikan kepada tiga fasa utama, iaitu:\n\nFasa 1\nPrakarsa Jangka\nPendek\n(2026 — 2027):\n\nFasa 2\nPrakarsa Jangka\nSederhana\n(2028 — 2030):\n\nFasa 3\nPrakarsa Jangka\nPanjang\n(2031 — 2035):\n\nMemberikan\ntumpuan kepada\npelaksanaan\nprakarsa yang dapat\nmenunjukkan impak\nsegera.\n\nMenumpukan kepada\npengukuhan dan\npeluasan pelaksanaan.\n\nMenumpukan\nkepada kelestarian,\npenambahbaikan\nberterusan dan\npelarasan dasar\nberdasarkan hasil dan\npembelajaran daripada\nfasa sebelumnya.\n\nBAB 1 PENGENALAN"},{"sec":13,"p":36,"t":"1.7 SASARAN WAJIB CAPAI RPM 2026 – 2035\nSlogan \"Merapatkan Jurang, Meningkatkan Mutu, Meraih Kejayaan Bersama” (Closing\nthe Gap, Raising the Bar, Together We Succeed) mencerminkan semangat kerjasama\nseluruh ekosistem pendidikan bagi memastikan tiada murid yang tertinggal, setiap\nsekolah terus meningkatkan prestasi dan semua pihak bergerak seiring menuju\nkejayaan yang terangkum dan mampan.\n\nBagi menjayakan agenda RPM 2026 — 2035, kerangka rancangan ini\nmenggariskan beberapa sasaran wajib capai yang perlu disemarakkan pada\nperingkat akar umbi. (Rajah 1.5)\n\nSasaran Wajib Capai RPM 2026 — 2035\nTumpuan\n\nTeras Strategik\n\nMutu\n\nMemastikan sistem pendidikan Malaysia terangkum, dinamik dan\nrelevan\n\nAkses\ndan Ekuiti\n\nMengoptimumkan potensi setiap murid melalui pengalaman\npembelajaran yang bermakna untuk menjadi warganegara global\n\nMeningkatkan Mutu\n•\n•\n•\n•\n•\n\nMentransformasikan pendidik agar berkeupayaan tinggi dan\nberorientasi masa hadapan\nKetersediaan\nSumber dan\nKecekapan\n\nMemantapkan prasarana fizikal dan digital di semua institusi\npendidikan KPM\n\nKeluwesan\n\nMempergiat sinergi antara institusi pendidikan KPM dengan\nsemua pihak berkepentingan\nMembudayakan kemampanan dalam ekosistem pendidikan\n\nKemampanan\nMeningkatkan kecekapan tadbir urus dan sistem penyampaian\n\n•\n•\n•\n•\n\nMurid mencapai sekurang-kurangnya gred C bagi keempat-empat mata pelajaran\nBahasa Melayu, Bahasa Inggeris, Matematik dan Sejarah.\nSemua murid mencapai tahap sosioemosi sejahtera dan adab yang baik.\nSemua murid mencapai tahap kompetensi digital pada tahap intermediate dan ke\natas (merujuk Digital Competency Score).\n90 peratus murid Tahap 2 hingga Tingkatan 5 mencapai tahap kesihatan fizikal\ncergas dalam ujian SEGAK (Standard Kecergasan Murid).\nSemua murid menguasai sekurang-kurangnya kemahiran dwibahasa iaitu bahasa\nMelayu dan bahasa Inggeris.\nSemua institusi pendidikan KPM mempunyai Ikon Lestari.\nSemua MBPK mencapai tahap potensi mengikut keupayaan masing-masing.\nMalaysia mencapai skor purata yang setara dengan standard pentaksiran\nantarabangsa.\nSemua murid menguasai kemahiran berfikir secara kritis dan kreatif.\n\nBeradab\n\n•\n•\n•\n\nBerilmu\n\nBerkemahiran\n\nBerdaya Tahan\n\nBerkeyakinan\n\nSemua murid menguasai literasi dan numerasi pada akhir Tahap I.\nSemua institusi pendidikan KPM dilengkapi dengan kemudahan prasarana asas.\nSemua institusi pendidikan KPM dilengkapi dengan rangkaian internet berkelajuan\ntinggi (keseluruhan institusi) dan peranti digital.\n\nMerapatkan Jurang\nRajah 1.5 Sasaran Wajib Capai RPM 2026 - 2035\n\nBAB 1 PENGENALAN\n\nKerangka dan Sasaran Wajib Capai RPM 2026 — 2035 ialah panduan komprehensif untuk\nmemperkukuh sistem pendidikan negara dalam tempoh 10 tahun akan datang."},{"sec":14,"p":37,"t":"BAB\n\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN"},{"sec":14,"p":38,"t":"IMPAK KEPADA PIHAK BERKEPENTINGAN\n\nPelaksanaan RPM 2026 — 2035 membawa impak positif dan manfaat besar\nkepada semua pihak berkepentingan dalam sistem pendidikan, termasuklah\nmurid, pendidik, institusi pendidikan KPM, ibu bapa, komuniti dan industri.\n\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN"},{"sec":15,"p":39,"t":"2.1 MURID\n\nPendidikan Bermutu\nuntuk Semua\n\nPengalaman Pembelajaran\nBermakna\n\nPembelajaran\nDiperibadikan\n\nSokongan Kesejahteraan\nMenyeluruh\n\nMurid mendapat akses penuh kepada pendidikan bermutu dari\nprasekolah hingga menengah atas. Mereka memulakan alam\npersekolahan dengan asas literasi dan numerasi yang kukuh,\ndilengkapi kemahiran dan pengetahuan yang diperlukan untuk\nberjaya dan melangkah yakin ke peringkat seterusnya.\n\nMurid menikmati pengalaman pembelajaran yang\nmenyeronokkan dan bermakna. Hal ini mendorong mereka\nberkembang secara menyeluruh dan mempersiapkan diri\nmenjadi warganegara global yang aktif dan bertanggungjawab.\n\nPenggunaan teknologi membolehkan pembelajaran\nyang berasaskan keperluan sebenar dan mengikut tahap\nperkembangan murid.\n\nPembangunan Karakter\ndan Jati Diri\n\nPenguasaan Pelbagai\nBahasa\n\nPendedahan Terhadap Amalan Kemampanan\ndan Kewarganegaraan Global\n\nMurid dibentuk menjadi individu yang berjati diri kukuh dan seimbang\ndari segi jasmani, emosi, rohani serta intelek. Mereka berdaya tahan\nmenghadapi cabaran masa hadapan dan mampu menyumbang\nsecara positif kepada masyarakat dan negara.\n\nMurid menguasai Bahasa Melayu dan Bahasa Inggeris, berpeluang\nmempelajari bahasa tambahan seperti Bahasa Cina, Bahasa Tamil\ndan Bahasa Isyarat Malaysia. Kemahiran pelbagai bahasa ini akan\nmeningkatkan daya saing mereka dan membolehkan komunikasi\nberkesan merentas budaya dan konteks.\n\nMurid memperoleh kemahiran dan pengalaman praktikal untuk\nmenyelesaikan isu kemampanan melalui pembelajaran kontekstual.\nMurid menghayati nilai kemanusiaan sejagat, bertindak secara\nbertanggungjawab terhadap isu tempatan dan global.\n\nMurid menerima sokongan penuh untuk kesejahteraan mereka\ndalam persekitaran sekolah yang selamat, terangkum dan responsif.\nModel Sistem Sokongan Pelbagai Peringkat menjadi kerangka\nutama bagi memastikan kesejahteraan murid sentiasa terpelihara.\n\nRajah 2.1 Impak Pelaksanaan RPM 2026 – 2035 kepada Murid\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN"},{"sec":16,"p":40,"t":"2.2 PENDIDIK\n\nTumpuan\nkepada Tugas\nHakiki\n\nPendidik dapat memberikan\ntumpuan kepada tugas utama\nseperti persediaan, pengajaran\ndan bimbingan murid yang\nmemberikan impak langsung\nkepada hasil pembelajaran.\nHal ini mengurangkan tekanan\nkerja dan meningkatkan\nkesejahteraan serta kepuasan\nkerja pendidik.\n\nPembangunan\nProfesionalisme\nyang Luwes\n\nPendidik berpeluang\nmengikuti latihan yang relevan\ndan bersesuaian, melalui\npendekatan pembelajaran\nyang luwes, bersasar dan\nberasaskan data. Hal ini\nmemastikan peningkatan\nkompetensi yang berterusan.\n\nRajah 2.2 Impak Pelaksanaan RPM 2026 – 2035 kepada Pendidik\n\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN\n\nKompetensi\nPendidik yang\nRelevan\n\nPendidik dapat meningkatkan\ndan menyesuaikan kemahiran\nprofesional mereka, selaras\ndengan keperluan semasa dan\nmasa hadapan.\n\nGalakan\nPenyelidikan\ndan Inovasi\n\nPendidik digalakkan\nmenjalankan penyelidikan\ndan inovasi dalam pendidikan.\nUsaha ini memperkukuh\namalan profesional mereka\ndan menyumbang kepada\npeningkatan mutu sistem\npendidikan secara menyeluruh."},{"sec":17,"p":41,"t":"2.3 INSTITUSI PENDIDIKAN KEMENTERIAN PENDIDIKAN\n\nKepimpinan Berwawasan\ndan Berprestasi Tinggi\n\nAutonomi\nTerpimpin\n\nPrasarana Fizikal dan Digital\nStrategik dan Responsif\n\nKecekapan\nTadbir Urus\n\nInstitusi pendidikan diterajui\noleh pemimpin yang\nberwawasan, berkeupayaan\ntinggi dan membuat keputusan\nberdasarkan data.\n\nKeluwesan dalam pengurusan\nkurikulum, murid, sumber\nmanusia, kewangan dan\nperolehan membolehkan\nsekolah membuat keputusan\nyang lebih kontekstual dan\nresponsif terhadap keperluan\nmurid serta komuniti setempat.\n\nPembangunan prasarana\n\nPendigitalan sistem pengurusan\ndan perancangan sumber,\ndisokong oleh data masa nyata\ndan pengurangan pertindihan\nyang meningkatkan kecekapan\ntadbir urus, ketelusan dan\nkeberkesanan penyampaian\nperkhidmatan pendidikan.\n\npendidikan KPM berasaskan\nprinsip reka bentuk sejagat dan\nterangkum. Hal ini mewujudkan\npersekitaran pembelajaran\nyang kondusif, menyokong\nproses PdP yang berkesan dan\nmeningkatkan keberhasilan\nmurid.\n\nRajah 2.3 Impak Pelaksanaan RPM 2026 – 2035 kepada KPM\n\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN"},{"sec":18,"p":42,"t":"2.4 IBU BAPA DAN KOMUNITI\n\nKerjasama\nStrategik\n\nKerjasama yang terancang, telus dan efektif\nmemperkukuh sinergi KPM dengan pihak\nberkepentingan, dan memberikan manfaat\nkepada ibu bapa serta komuniti.\n\nPelbagai Mekanisme\nPelibatan Pihak\nBerkepentingan\n\nPihak berkepentingan mempunyai peluang\nuntuk menyumbang kepada pembangunan\npendidikan melalui pelbagai cara, termasuklah\nmobilisasi tenaga sukarelawan seperti guru\nbersara, kaunselor dan profesional industri.\n\nPelibatan Aktif Ibu Bapa,\nKomuniti, Sekolah dan\nPihak Swasta\n\nEkosistem Penyaluran\nSumber yang Lebih Kukuh\n\nIbu bapa, komuniti dan sektor swasta\nberperanan lebih aktif menyokong\npihak sekolah untuk meningkatkan mutu\npembelajaran dan membentuk perkembangan\nmurid secara menyeluruh.\n\nProses penyaluran dan perkongsian sumber\nmenjadi lebih pantas, telus dan bersepadu\nmelalui sistem Platform Digital Sehenti (One\nPoint Access - OPA).\n\nKomunikasi\nBerkesan\n\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN\n\nIbu bapa dan masyarakat menerima maklumat\npendidikan yang lebih jelas, konsisten\ndan mudah difahami bagi meningkatkan\nkefahaman dan sokongan terhadap dasar\ndan prakarsa pendidikan.\n\nRajah 2.4 Impak Pelaksanaan RPM 2026 – 2035 kepada Ibu Bapa dan Komuniti\n\nTanggungjawab\nSivik Bersama\n\nPeningkatan rasa tanggungjawab sosial\npihak luar terhadap pendidikan dan budaya\nkolaboratif yang mampan akan memastikan\npendidikan terus menjadi usaha bersama\nseluruh masyarakat."},{"sec":19,"p":43,"t":"2.5 INDUSTRI\n\nBakat\nBerorientasikan\nMasa Hadapan\n\nTenaga Kerja\nMahir Pelbagai\nBahasa\n\nPlatform Digital\nSehenti untuk\nIndustri\n\nPeningkatan\nPelaburan dan\nPertumbuhan\nIndustri Baharu\n\nPengukuhan bakat dalam\nbidang STEM dan TVET serta\npendedahan kepada ekonomi\nhijau melahirkan tenaga\nkerja yang relevan, inovatif\ndan berdaya saing untuk\nmemenuhi keperluan industri\nmasa hadapan.\n\nIndividu yang fasih\nberkomunikasi dalam Bahasa\nMelayu dan Bahasa Inggeris\nserta berkebolehan bertutur\ndalam bahasa antarabangsa\ndan tambahan mempunyai\nkelebihan daya saing di\npasaran kerja tempatan dan\nantarabangsa.\n\nPlatform tunggal ini\nmenyelaras dan memudahkan\nkerjasama strategik antara\nindustri dengan KPM,\nmemastikan sokongan industri\nlebih tersusun dan selaras\ndengan keperluan semasa.\n\nSistem pendidikan yang\nbermutu dapat menarik\npelaburan domestik dan\nantarabangsa dengan\njaminan bakat tempatan yang\nkompeten dan selaras dengan\nkeperluan semasa serta\nmasa hadapan. Penekanan\nterhadap kemahiran abad\nke-21 dan bidang pekerjaan\nlestari turut membantu\nmemacu pertumbuhan sektor\nbaharu seperti teknologi\nhijau dan tenaga boleh\ndiperbaharui.\n\nRajah 2.5 Impak Pelaksanaan RPM 2026 – 2035 kepada Industri\nBAB 2 IMPAK KEPADA PIHAK BERKEPENTINGAN"},{"sec":20,"p":44,"t":"BAB\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":21,"p":45,"t":"PENCAPAIAN SEMASA\n\n3.1 PENGENALAN\n\nSistem pendidikan negara telah melalui pelbagai fasa transformasi bagi meningkatkan mutu pendidikan dan keberhasilan murid. Pelan Pembangunan Pendidikan\nMalaysia 2013 — 2025 merupakan rancangan jangka panjang yang bertujuan mentransformasikan sistem pendidikan negara berasaskan visi “Pendidikan Bermutu,\nInsan Terdidik, Negara Sejahtera”. Rancangan tersebut mempunyai tiga objektif utama, iaitu:\n•\n•\n•\n\nMemahami prestasi dan cabaran semasa sistem pendidikan Malaysia.\nMewujudkan visi dan aspirasi yang jelas bagi setiap murid.\nMenggariskan transformasi sistem pendidikan yang menyeluruh termasuk perubahan struktur dan fungsi Kementerian.\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":21,"p":46,"t":"PPPM 2013 — 2025 telah menetapkan lima aspirasi sistem, iaitu akses, kualiti, ekuiti, perpaduan dan kecekapan. Bagi mencapai aspirasi sistem\ntersebut, PPPM 2013 — 2025 telah merangka transformasi melalui 11 anjakan.\n\nRajah 3.1 Anjakan Pelan Pembangunan Pendidikan Malaysia (PPPM) 2013 — 2025\n\nPelbagai prakarsa telah dilaksanakan di bawah setiap anjakan tersebut yang membawa kemajuan kepada sistem pendidikan negara. Namun, pandemik COVID-19\ntelah memberikan impak kepada pelaksanaan rancangan secara menyeluruh dan menuntut perubahan dari segi pendekatan dan keutamaan. Pengalaman ini menuntut\nkeperluan sistem pendidikan yang resilien dan tangkas serta memberikan pengajaran penting bagi pembangunan strategi transformasi yang lebih terangkum dan berdaya\ntahan.\nBab ini memberikan gambaran menyeluruh mengenai prestasi semasa sistem pendidikan negara dengan menggariskan kejayaan yang telah dicapai serta jurang dan\ncabaran yang masih wujud. Penilaian ini menjadi asas penting untuk menentukan tumpuan strategik RPM 2026 — 2035.\n\nBAB 3 PENCAPAIAN SEMASA"},{"sec":22,"p":47,"t":"3.2 RINGKASAN\nPPPM 2013 — 2025 telah menghasilkan pelbagai pencapaian penting dalam sistem pendidikan Malaysia yang boleh dinilai berdasarkan indikator prestasi utama bagi\nlima aspirasi sistem yang telah ditetapkan.\n\nAspirasi\n\nSasaran\n\nAkses\n\n100% enrolmen merentas semua peringkat pendidikan\ndari prasekolah hingga menengah atas.\n\nPencapaian\nPrasekolah\n\n93.52%\n\nRendah\n\n99.39%\n\nMenengah Rendah\n\n96.31%\n\nMenengah Atas\n\n92.60%\n\n*data pada 30 Jun 2024\n\nKualiti\n\nNegara dalam kelompok sepertiga teratas dalam\npentaksiran antarabangsa seperti Programme for\nInternational Student Assessment (PISA) dan Trends in\nInternational Mathematics and Science Study (TIMSS)
