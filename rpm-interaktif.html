si.\nPembiayaan alternatif, termasuklah model konsesi melibatkan pelbagai pihak dan\nsumbangan komuniti yang dikoordinasikan secara sistematik.\n\n5 aris Masa Pelaksanaan Strategi 1 Prakarsa 4\nBAB 7 TERAS STRATEGIK 4"},{"sec":88,"p":228,"t":"Mengoptim mkan Prasarana Sedia Ada KPM\nasa\n2026 202\nangka Pendek\n\n•\n•\n\nasa 2\n(2028 — 2030\nangka Seder ana\n\n•\n•\n\nasa 3\n2035\nangka Pan ang\n\nRa a\n\n6 aris Masa Pelaksanaan Strategi 1 Prakarsa 4\n\nBAB 7 TERAS STRATEGIK 4\n\n•\n•\n\nPemetaan dan penilaian awal prasarana fizikal dan digital dilaksanakan di institusi\npendidikan KPM bagi mengenal pasti kefungsian aset dan potensi pemanfaatan\nsemula.\nInstrumen penilaian standard dan garis panduan dibangunkan sebagai asas\npelaksanaan pemanfaatan aset.\nPemanfaatan aset diperluas melalui penggunaan dashboard digital di semua institusi\npendidikan KPM dan penilaian penuh terhadap aset yang berpotensi untuk guna sama,\ntukar fungsi atau disewakan.\nKaedah guna sama, tukar fungsi atau penyewaan mula dilaksanakan.\n\nTadbir urus dan pemantauan aset diperkukuh melalui pengemaskinian data masa nyata\ndan semakan dasar secara berkala.\nPemanfaatan aset digiatkan melalui kaedah guna sama, tukar fungsi atau penyewaan."},{"sec":88,"p":229,"t":"Menaik ara Prasarana S kan di Sem a Instit si Pendidikan KPM\nasa\n2026 202\nangka Pendek\n\n•\n\nasa 2\n2030\nangka Seder ana\n\n•\n\nasa 3\n2035\nangka Pan ang\n\n•\n\n•\n\n•\n\n•\n\nRa a\n\nPemetaan dan penilaian kerosakan prasarana sukan di institusi pendidikan KPM seluruh\nnegara.\nPenyelenggaraan asas dan naik taraf kemudahan sukan asas dilaksanakan bagi\nmemastikan keselamatan dan kesediaan penggunaan.\n\nTumpuan pada menaik taraf prasarana sukan di Pusat Latihan aerah dan sekolah bitara\nsukan bagi memenuhi keperluan latihan berprestasi tinggi.\nPembekalan alatan sukan asas diperluas ke semua institusi pendidikan KPM.\n\nPelaksanaan pemenuhan piawaian prasarana sukan di semua Sekolah Sukan Malaysia\ndan Sekolah Sukan egeri, manakala semua sekolah KPM dilengkapi dengan kemudahan\nsukan asas yang lengkap.\nFM berasaskan zon diperkenalkan bagi mengoptimumkan kos dan memenuhi keperluan\npenyelenggaraan mengikut spesifikasi.\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 4\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":88,"p":230,"t":"Memodenkan P sat S m er\nasa\n2026 202\nangka Pendek\n\n•\n•\n•\n•\n•\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n\n•\n\nPelaksanaan naik taraf ruang dan prasarana fizikal pusat sumber secara berfasa.\nPelaksanaan sistem pengurusan pusat sumber bersepadu di semua institusi pendidikan\nKPM.\nPelaksanaan kiosk digital kendiri di semua pusat sumber institusi pendidikan KPM.\nPeluasan pemerkasaan prakarsa naik taraf ruang kolaboratif di pusat sumber secara\nberfasa untuk pelaksanaan akti iti STEM/T PSS/ pendidikan digital.\nRintis pelaksanaan pusat sumber yang dikuasakan dengan AI di institusi pendidikan KPM.\n\n•\n\nPemodenan PSS dilaksanakan sepenuhnya di semua institusi pendidikan KPM.\n\n•\n•\n\nasa 3\n2035\nangka Pan ang\n\nRa a\n\naik Taraf Prasarana Pusat Sumber Pelaksanaan pemetaan keperluan dan perancangan naik taraf\nruang pusat sumber.\nPendigitalan Pusat Sumber Pembangunan sistem pengurusan pusat sumber bersepadu.\nPelaksanaan rintis kiosk digital kendiri yang menepati spesifikasi ditetapkan KPM (spesifikasi\ndan bilangan peranti, lokasi, kepelbagaian bahan sumber pembelajaran yang boleh diakses, dan\nsebagainya).\nPemerkasaan prakarsa naik taraf ruang kolaboratif di pusat sumber secara berfasa untuk\npelaksanaan akti iti STEM/T PSS/pendidikan digital.\nPerancangan pemerkasaan AI dalam perkhidmatan pusat sumber institusi pendidikan.\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 4\n\nRancangan pelaksanaan ini bertujuan menyediakan kemudahan asas yang lengkap, lestari dan terangkum di semua institusi pendidikan KPM menjelang tahun 2035. Melalui\npelaksanaan berfasa yang terancang, rancangan ini meningkatkan keselesaan dan keselamatan murid dan mengurangkan jurang kemudahan antara sekolah di kawasan bandar\ndengan luar bandar. Usaha ini menyokong matlamat KPM untuk mewujudkan persekitaran pembelajaran yang kondusif dan berdaya tahan, sekali gus memastikan pendidikan\nyang terangkum dan bermutu untuk semua.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":89,"p":231,"t":"STRATEGI 2: MEMPERKASAKAN PRASARANA DIGITAL UNTUK\nPENDIDIKAN\nalam dunia pascapandemik dan perkembangan pesat teknologi, institusi pendidikan perlu\nmenyediakan persekitaran pembelajaran yang menggabungkan elemen fizikal dan digital sebagai\nkeperluan asas. Melalui strategi ini, semua warga pendidik dan murid mempunyai akses adil, selamat\ndan setara kepada teknologi pendidikan tanpa mengira lokasi atau latar belakang sosioekonomi.\n\nPrakarsa Strategi 2\n\nMentrans ormasikan\npengalaman pem ela aran\ndengan ino asi teknologi\n\nRa a\n\nMenam a aik prasarana\ndigital instit si pendidikan KPM\n\nPrakarsa bagi Strategi 2\n\nKajian terkini menunjukkan masih wujud jurang digital antara sekolah bandar dengan luar bandar\ndalam capaian internet, ketersediaan peranti, kemudahan sokongan teknikal dan tahap keberkesanan\npenggunaan pelantar pembelajaran digital. Strategi ini menumpukan pada peluasan capaian internet\nberkelajuan tinggi dan stabil, penyediaan peranti bermutu, pembangunan sistem sokongan teknikal\nserta pengoperasian pelantar pembelajaran digital mesra pengguna dan bersepadu. Pendekatan ini\nmenyokong pelaksanaan KP2027 dan pembelajaran berasaskan AI, di samping memastikan setiap\nmurid memperoleh pendidikan adil dan bermakna dalam era digital.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":90,"p":232,"t":"PRAKARSA 1: MENTRANSFORMASIKAN PENGALAMAN\nPEMBELA ARA\nE A I\nASI TEK L I\nPendekatan bagi mentransformasikan pengalaman pembelajaran dengan ino asi teknologi memberikan tumpuan pada pemerkasaan landskap pendidikan melalui penerapan teknologi\nkecerdasan AI secara menyeluruh dalam proses PdP.\nTeras Strategik 4 Strategi 2 Prakarsa 1 ini merangkumi komponen pelaksanaan yang berikut\n\nSistem Pem ela aran Adapti\n\nMelaraskan kandungan dan akti iti pembelajaran\nmengikut tahap keupayaan dan kadar perkembangan\nmurid, memastikan setiap murid menerima pengalaman\nyang sesuai dan mengoptimumkan potensi mereka.\n\nSistem Sokongan Pendidik\n\nRancangan Pela aran dan Laporan\n\nMenyediakan bantuan automatik dalam\npenyediaan rancangan pengajaran,\npembangunan bahan digital dan pemantauan\nprestasi murid, membolehkan pendidik\nmenumpukan masa pada aktiviti\npembelajaran berimpak tinggi.\n\nAlat Pemanta an Keselamatan\nB li dan Kesi atan Mental\n\nMenggunakan AI untuk mengesan tingkah\nlaku mencurigakan atau tanda awal isu seperti\nbuli dan tekanan emosi, memaklumkan pendidik\nuntuk tindakan inter ensi segera.\n\nRa a\n\nPelaksanaan\nPem ela aran\nDiperi adikan yang\ndik asakan ole AI\nAI Po ered Personalised\nLearning Melal i\nModel AI KPM\n\n20 Komponen Pelaksanaan Teras Strategik 4 Strategi 2 (Komponen 1)\n\nBAB 7 TERAS STRATEGIK 4\n\ntor Pintar Agen Pedagogi\n\nBerfungsi sebagai tutor digital peribadi\nyang membimbing murid secara langkah\ndemi langkah, membolehkan pembelajaran\nkendiri lebih tersusun dan interaktif.\n\nAI C at ots dan Pem ant Maya\n\nPenggredan dan\nMakl m Balas A tomatik\n\nMenyediakan bantuan dalam talian sepanjang\nmasa (24/7) untuk menjawab pertanyaan,\nmemberikan panduan dan menyokong\npembelajaran di luar waktu persekolahan.\n\nMenilai tugasan dan memberikan maklum\nbalas segera kepada murid, mempercepat\nproses pembelajaran dan meningkatkan\nkecekapan pendidik.\n\nIntegrasi R nt k Pem ela aran M ltimodal\n\nMenggabungkan teknologi Realiti Lanjutan ( R)\ntermasuklah ideo, audio, gamifikasi dan alat 3 untuk\npengalaman pembelajaran interaktif dan menyeronokkan."},{"sec":90,"p":233,"t":"Pelantar pem ela aran digital DELIMa yang dik asakan ole AI\n\nELIMa 3.0 merupakan ersi terbaharu yang mengintegrasi\nAI berasaskan Model Bahasa Raya (LLM) yang direka khas\nuntuk sektor pendidikan.\n\nEmpat modul utama menjadi tunjang kepada keupayaan\nELIMa 3.0 adalah seperti yang berikut\n\nMod l M rid\n\nMod l Pendidik\n\ni. Modul ini memberikan tumpuan pada\npengalaman pembelajaran digital yang\ndiperibadikan, adaptif dan terangkum.\nAI menyesuaikan kandungan dan aktiviti\nberdasarkan pencapaian dan keperluan\nmurid.\n\ni. Modul ini memperkukuh pembangunan\nprofesionalisme berterusan (Continuous\nProfessional e elopment - CP )\npendidik.\n\nii. Menyediakan pensijilan automatik bagi\nkursus atau latihan yang diselesaikan\ndan membolehkan murid menjejak\nkemajuan.\niii. Ruang kolaboratif pelbagai bahasa\nmembolehkan interaksi tanpa batasan\ngeografi atau linguistik.\ni . Akti iti berasaskan simulasi interaktif\ndan gamifikasi meningkatkan moti asi,\npelibatan dan minat murid.\n\nRa a\n\nPelantar ini berfungsi sebagai pembantu digital peribadi\nkepada pendidik dan murid dengan mencadangkan bahan\npembelajaran yang sesuai, memudahkan akses kepada\nsumber pendidikan dan memberikan bimbingan akademik\nserta sokongan emosi secara lebih pintar dan bersasar.\n\nii. Penyediaan pembantu AI untuk\nmenghasilkan bahan pengajaran\npantas, rele an dan sejajar kurikulum.\niii. Ruang kolaboratif digital membolehkan\nperkongsian amalan terbaik dan ino asi\npedagogi di seluruh negara.\ni . Portfolio digital mendokumentasikan\npencapaian sebenar dan memudahkan\npengiktirafan kompetensi.\n. Latihan kendiri berasaskan AI\ndisesuaikan dengan keperluan\npembangunan kerjaya pendidik.\n\n2 Komponen Pelaksanaan Teras Strategik 4 Strategi 2 (Komponen 2)\n\nMod l a atan\n\nKPM PN PPD Sekola\n\nMod l Peng r san Sekola\n\ni. Modul ini memperkukuh pentadbiran\ndan penyeliaan pendidikan di pelbagai\nperingkat.\n\ni. Modul ini menumpukan pada\nkecekapan operasi dan tadbir urus\ndi sekolah.\n\nii. Automasi pengguna memudahkan\npengurusan akaun dan akses sistem\nsecara selamat.\n\nii. Dashboard analitik memantau\nprestasi akademik, kehadiran\ndan perkembangan murid secara\nmenyeluruh.\n\niii. Akses data pendidikan masa nyata\nmembolehkan penilaian prestasi\nsekolah dan murid dengan segera.\ni . Sistem keselamatan berpusat\nmemastikan integriti dan\nkebolehpercayaan maklumat.\n. Antara muka pengguna (User\nInterface - UI) mesra memudahkan\npentadbiran secara cekap dan intuitif.\n\niii. Sistem pengurusan kelas dan jadual\nberasaskan AI mengoptimumkan\npenggunaan masa dan sumber.\ni . Automasi laporan prestasi dan\npencapaian murid membolehkan\npelaporan cepat, tepat dan telus.\n. Menyokong keputusan berasaskan\ndata melalui analisis ramalan untuk\nperancangan strategik lebih berkesan.\nBAB 7 TERAS STRATEGIK 4"},{"sec":90,"p":234,"t":"Pem ang nan LMS se agai pelantar pem ela aran dalam talian\nnt k instit si pendidikan KPM lepas menenga\n\nPembangunan LMS merupakan langkah strategik\nbagi memperkukuh transformasi digital pendidikan\nnegara, terutamanya untuk institusi pendidikan KPM\nlepas menengah.\n\nPembangunan LMS menyediakan\n• Akses terbuka kepada kursus dan modul digital\nbagi memperluas peluang pembelajaran tanpa\nkekangan masa dan tempat.\n• Penilaian automatik prestasi guru pelatih\nuntuk menjamin pemantauan prestasi secara\nberterusan.\n• Kolaborasi menyeluruh antara pensyarah, pelatih,\ndengan pentadbir akademik dalam satu sistem\nyang saling berintegrasi.\n\nLMS ialah pelantar pembelajaran dalam talian\nserta ekosistem pembelajaran pintar yang\nmematuhi piawaian Agensi Kelayakan Malaysia\n(Malaysian ualifications Agency - M A) bagi\npelaksanaan Pembelajaran Terbuka dan arak\nauh ( pen and istance Learning L).\nPematuhan terhadap keperluan akreditasi\nini penting untuk memastikan pengiktirafan,\nkebolehpercayaan dan mutu program latihan yang\ndijalankan secara dalam talian.\n\nRa a\n\n22 Komponen Pelaksanaan Teras Strategik 4 Strategi 2 (Komponen 3)\n\nBAB 7 TERAS STRATEGIK 4\n\nengan pelaksanaan ini, LMS menjadi pelantar\npembelajaran rasmi dalam talian bagi institusi lepasan\nmenengah di bawah KPM, seterusnya memperkukuh\nekosistem latihan berpendidikan digital yang bermutu,\ncekap dan berdaya saing."},{"sec":90,"p":235,"t":"Pelaksanaan AI-Powered Classroom di instit si pendidikan KPM\n\nRa a\n\nPelaksanaan AI-Powered Classroom\nbagi menyokong pembelajaran\ndiperibadikan yang dipacu AI\nmemberikan tumpuan kepada\nkeperluan murid melalui analitik\npembelajaran dan kandungan adaptif,\nmembolehkan pengalaman belajar\ndisesuaikan mengikut tahap, minat\ndan kemajuan indi idu, serta\nsokongan masa nyata yang\nmemperkasa penglibatan, kefahaman\ndan pencapaian murid secara\nberterusan dalam persekitaran\npembelajaran digital yang selamat.\n\nBilik darjah ini bukan hanya ruang\nberteknologi tinggi, tetapi satu\nekosistem pembelajaran masa\nhadapan yang disokong oleh pelantar\nELIMa ersi baharu. Bilik darjah\nini mengintegrasikan analitik data,\npembelajaran adaptif, Realiti Lanjutan\n( R) dan maklum balas masa nyata,\nsekali gus membolehkan pendidik\nmemberikan tumpuan pada pengajaran,\nbukan urusan pentadbiran.\n\nPrakarsa ini dilaksanakan secara\nberfasa, bermula dengan projek rintis\ndan diperluas mengikut kesediaan\nsekolah. AI-Powered Classroom menjadi\npemangkin penting ke arah pendidikan\nyang lebih tersuai, terangkum dan\nberdaya saing global, pembelajaran\nmurid dan pengajaran pendidik.\n\n23 Komponen Pelaksanaan Teras Strategik 4 Strategi 2 (Komponen 4)\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":90,"p":236,"t":"GARIS MASA PELAKSANAAN\nPelaksanaan Teras Strategik 4 Strategi 2 Prakarsa 1 melalui fasa yang berikut berdasarkan tiga komponen yang digariskan, iaitu\n\nMelaksanakan Pem ela aran Diperi adikan yang Dik asakan ole AI\nAI Po ered Personalised Learning Melal i Model AI KPM\nasa\n2026 202\nangka Pendek\n\n•\n•\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n\nasa 3\n2035\nangka Pan ang\n\n•\n•\n•\n•\n\nRa a\n\naris Masa Pelaksanaan Strategi 2 Prakarsa 1\n\nBAB 7 TERAS STRATEGIK 4\n\nTumpuan pada pembinaan asas Model AI KPM termasuklah pembangunan prototaip Model\nBahasa Raya (Large Language Model - LLM) untuk pemprosesan bahasa Melayu, penubuhan\npasukan pakar dan pembangunan set data awal dari pelantar ELIMa dan EMIS.\nIntegrasi awal dengan sistem pembelajaran sedia ada dan modul untuk MBPK juga dilaksanakan.\nPiawaian etika dan keselamatan data ditetapkan.\n\nTumpuan pada pengukuhan LLM KPM dan peluasan fungsi AI, termasuklah pembelajaran kendiri,\nsistem analitik prediktif dan personalisasi pembelajaran mengikut profil, gaya belajar dan minat\nmurid.\nIntegrasi AI dalam pelantar ELIMa diuji dan dasar pelaksanaan disemak untuk keadilan,\nketerangkuman dan pri asi.\n\nModel AI digunakan sepenuhnya di semua peringkat institusi pendidikan dengan integrasi data\nnasional masa nyata.\nFungsi cadangan pelantar ELIMa pintar diperkasakan untuk pembelajaran adaptif, pemantauan\nperkembangan dan inter ensi automatik.\nAI terangkum menyokong murid MBPK, komuniti luar bandar dan golongan minoriti.\nAnalisis data nasional digunakan untuk dasar dan penambahbaikan kurikulum berterusan."},{"sec":90,"p":237,"t":"Pelantar Pem ela aran Digital Educational Learning Initiative Malaysia (DELIMa)\nyang Dik asakan ole AI\nasa\n2026 202\nangka Pendek\n\n•\n•\n•\n•\n•\n•\n•\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n\nPeningkatan latihan guru bagi peluasan penggunaan ELIMa 3.0\nPeningkatan kerjasama dengan rakan strategik bagi perkembangan dan penambahan aplikasi\nAI.\n\nasa 3\n2035\nangka Pan ang\n\n•\n\nELIMa 3.0 beroperasi sepenuhnya sebagai ekosistem pembelajaran pintar dengan\nantara muka masa hadapan dan pengalaman pengguna dengan keupayaan AI yang\nterus diperkembangkan.\nLatihan guru yang berterusan bagi pemantapan penggunaan ELIMa dalam PdP.\nAudit keselamatan siber dan pengurusan data dilaksanakan secara menyeluruh.\nPemantapan integrasi global dengan ekosistem teknologi pendidikan serantau dan\nantarabangsa.\nFungsi inter ensi AI yang lebih tersuai menyokong pembelajaran adaptif dan holistik murid.\nRancangan kelestarian sistem dan tadbir urus baharu memastikan operasi jangka panjang.\nPerancangan ELIMa generasi baharu.\n\n•\n•\n•\n•\n•\n•\n\nRa a\n\nPenggunaan ELIMa 3.0 yang dikuasakan oleh AI.\nPengembangan fungsi AI dan integrasi automasi data pendidikan, termasuklah onboarding/\noffboarding pengguna melalui Sistem Pengurusan Pengguna (SPP) dan ELIMa B T lanjutan\ndengan ciri emosi serta pembelajaran tersuai.\nPeningkatan antara muka dan pengalaman pengguna (UI/U ).\nTerjemahan kandungan automatik termasuklah memperkenalkan tulisan awi.\nLaluan pembelajaran diperkuat dengan sokongan AI dan data masa nyata, manakala Portfolio\nigital dan Profil Pendidik disepadukan dengan rekod latihan berasaskan AI.\nDashboard pengurusan diperluas ke peringkat PP dan P untuk pelaporan dan analisis\nberasaskan data.\nLatihan guru bagi peluasan penggunaan ELIMa 3.0.\n\n25 aris Masa Pelaksanaan Strategi 2 Prakarsa 1\nBAB 7 TERAS STRATEGIK 4"},{"sec":90,"p":238,"t":"Mem ang nkan LMS Se agai Pelantar Pem ela aran Dalam alian\nagi Instit si Pendidikan Lepas Menenga\nasa\n2026 202\nangka Pendek\n\n•\n\nTumpuan pada penetapan asas pelaksanaan LMS, termasuklah kajian keperluan pengguna\nmelalui libat urus dan soal selidik, penubuhan awatankuasa Pembangunan LMS serta\npembangunan prototaip sistem di beberapa institusi pendidikan KPM terpilih. Reka bentuk LMS\nmengikuti Standard 5.1.2 MQA, merangkumi akses bahan pengajaran, forum interaksi, penilaian,\npemantauan perkembangan murid dan saluran bantuan.\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n\nTumpuan pada pengukuhan dan peluasan penggunaan LMS di institusi pascamenengah.\nPembangunan penuh sistem berdasarkan hasil ujian rintis, integrasi dengan rekod murid sedia ada\ndan latihan berstruktur untuk pensyarah, tutor serta pentadbir LMS.\nKebolehskalaan sistem dipertingkatkan untuk menyokong pembelajaran hibrid dan berasaskan\nteknologi, manakala pemantauan prestasi dilakukan melalui dashboard masa nyata dan sistem\nanalitik pembelajaran.\nAudit tahunan dijalankan bagi memastikan pematuhan Standard 5.1.2 MQA.\n\n•\n•\n\nasa 3\n2035\nangka Pan ang\n\n•\n•\n•\n\nRa a\n\n26 aris Masa Pelaksanaan Strategi 2 Prakarsa 1\n\nBAB 7 TERAS STRATEGIK 4\n\nTumpuan pada pengukuhan LMS sebagai model nasional pembelajaran digital.\nPelaksanaan menyeluruh di semua institusi pascamenengah, pemantauan prestasi berterusan,\npensijilan atau audit pematuhan Standard 5.1.2 COPPA-ODL MQA, serta pengukuhan sistem\nanalitik untuk cadangan inter ensi dan penambahbaikan berterusan.\nPenubuhan LMS nasional sebagai model rujukan berstandard tinggi juga dilaksanakan."},{"sec":90,"p":239,"t":"Melaksanakan AI-Powered Classroom di Instit si Pendidikan KPM\nasa\n2026 202\nangka Pendek\n\n•\n•\n•\n•\n•\n\nasa 2\n2030\nangka Seder ana\n\nasa 3\n2035\nangka Pan ang\n\n•\n•\n•\n•\n\n•\n•\n•\n•\n\nRa a\n\nPelaksanaan projek AI-Powered Classroom di sekolah terpilih secara berfasa (bandar/luar bandar)\nyang mempunyai capaian internet, guru bersedia dan prasarana digital.\nPembangunan garis panduan AI-Powered Classroom (spesifikasi peralatan, perisian, reka bentuk\nbilik darjah, modul latihan guru).\nKolaborasi dengan rakan strategik industri untuk bekalan peralatan AI dan latihan teknologi,\ntermasuklah pengkomputeran pinggiran (edge computing).\nLatihan awal pendidik dalam konsep asas AI, pedagogi digital dan penggunaan pelantar ELIMa.\nPenilaian impak awal terhadap pembelajaran murid dan pengajaran guru.\nPeluasan AI-Powered Classroom kepada institusi pendidikan KPM dengan kemudahan minimum\n(capaian pelantar ELIMa dan peranti sedia ada).\nPelaksanaan alat pembelajaran adaptif, R dan gamifikasi dalam PdP.\nPenggunaan dashboard cerapan pembelajaran murid oleh guru untuk inter ensi awal dan berkesan.\nPemantapan penyelenggaraan peranti melalui sistem pengurusan aset pintar.\n\nAI-Powered Classroom dijadikan norma dalam reka bentuk bilik darjah baharu dan naik taraf\nbilik sedia ada.\nPelaksanaan menyeluruh pembelajaran diperibadikan dipacu AI, termasuklah dalam penilaian\nprestasi murid.\nRancangan naik taraf kapasiti pendidik secara berterusan melalui pensijilan mikro dan\nbimbingan digital.\nPengurusan data pembelajaran dan keputusan inter ensi dipandu oleh AI secara sistematik.\n\naris Masa Pelaksanaan Strategi 2 Prakarsa 1\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":91,"p":240,"t":"PRAKARSA 2: MENAMBAH BAIK PRASARANA DIGITAL DI\nI STITUSI PE I IKA KPM\nTeras Strategik 4 Strategi 2 Prakarsa 2 dirangka dengan hasrat untuk memperkasakan sistem pendidikan digital secara menyeluruh, memastikan semua institusi pendidikan KPM tanpa\nmengira lokasi atau saiz menikmati akses prasarana digital yang stabil, berdaya tahan dan mampu menyokong proses PdP abad ke-21. Matlamat akhir prakarsa ini adalah untuk\nmemastikan setiap sekolah menikmati mutu capaian digital yang setara dan berfungsi sepenuhnya.\nPelaksanaan prakarsa ini digerakkan melalui dua objektif utama, iaitu\n\nekti\n\nMeningkatkan Per ekalan Prasarana Digital agi\nMenyokong PdP\n\nMemantapkan Rangkaian Ka asan Setempat\nLocal Area Net ork LAN dan Rangkaian Ka asan\nL as\nide Area Net ork\nAN Sel r\nInstit si Pendidikan KPM\n\nPeningkatan prasarana digital berasaskan Internet of Things\n(IoT)\nmerupakan langkah penting bagi memperkukuh pembelajaran STEM dan\nT ET di Malaysia, sejajar dengan keperluan Re olusi Industri 4.0. Teknologi\nseperti Realiti Maya ( irtual Reality - R), Realiti Terimbuh (Augmented\nReality - AR) dan Realiti Campuran (Mi ed Reality - MR) membolehkan\npengalaman pembelajaran lebih praktikal dan menyeronokkan, manakala\nintegrasi pelantar berasaskan awan dan IoT membolehkan analisis data masa\nnyata serta akses pembelajaran yang lebih luas, khususnya bagi murid di\nkawasan luar bandar.\n\nTransformasi pendidikan digital masa ini memerlukan sistem internet\nyang menyeluruh, stabil dan bermutu bagi memastikan pelantar pembelajaran\ndigital seperti pelantar ELIMa, LMS, kelas hibrid dan bilik darjah berasaskan AI\ndapat berfungsi dengan berkesan.\n\nPelbagai peranti dan perisian sokongan terkini memperkaya pengalaman\npembelajaran amali (hands-on) murid, manakala LMS dan pelantar digital lain\nmembolehkan pembelajaran lebih terangkum, luwes dan berpusatkan murid.\n\nRa a\n\nekti 2\n\nbjektif Teras Strategik 4 Strategi 2 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4\n\nTiga tumpuan utama dikenal pasti sebagai asas pelaksanaan prakarsa\ntransformasi pendidikan digital, iaitu\n1. Penekanan pada peningkatan jalur lebar, peluasan liputan\ni-Fi dan\npeningkatan kestabilan rangkaian di sekolah.\n2. Memperkukuh sokongan terhadap pelantar pembelajaran digital perlu\ndiutamakan bagi memastikan warga pendidik dan murid memperoleh akses\ntanpa had kepada sumber ilmu serta bahan pengajaran yang menyeluruh.\n3. Penyelesaian terhadap isu sambungan internet yang lemah perlu diutamakan\nkerana masalah ini menjejaskan keberkesanan proses PdP di sekolah."},{"sec":91,"p":241,"t":"GARIS MASA PELAKSANAAN\nekti\n\nMeningkatkan Per ekalan Prasarana Digital agi Menyokong PdP\n\naris Masa Pelaksanaan Peningkatan Pembekalan Bahan Sokongan Pembelajaran igital (2026 – 2035)\nasa\n(2026 — 202\nangka Pendek\nPengenalan dan\nPelaksanaan Perc\n\n•\n•\n•\n\naan\n\n•\n•\n\nRa a\n\nMengenal pasti keperluan STEM dan T ET di sekolah dan kolej okasional.\nPelaksanaan perintis kelas pintar dengan peranti asas PdP termasuklah IoT.\nPenyediaan peranti asas projektor, papan pintar, komputer riba, T pintar dan pembesar suara untuk PdP\nyang jelas serta berkesan.\nMBPK penggunaan peranti audio isual, tablet dan bahan pembelajaran digital disesuaikan dengan\nkeperluan indi idu.\nPembangunan kandungan animasi dan isual, pelantar awan asas (cloud) disediakan untuk akses bahan\npembelajaran tanpa peranti berkuasa tinggi.\n\nasa 2\n(2028 — 2030\nangka Seder ana\nPengem angan dan\nPenyemp rnaan\n\n•\n•\n•\n•\n•\n•\n•\n\nPeluasan kelas pintar ke lebih banyak institusi, terutamanya di kawasan luar bandar.\nPenambahan modul IoT lanjutan PLC, robotik, sensor\nT, ESP32 dan pencetak 3 .\nPengenalan peranti automasi pintar dan sistem pengurusan kelas pintar untuk meningkatkan PdP.\nKandungan R ( R/AR) diperluas latihan pendidik dalam pedagogi R dilaksanakan pada skala besar.\nPenggunaan lebih banyak peranti IoT dan robotik seperti\nB T Magician dan sistem pemantauan digital.\nPelantar awan diperluas ke sekolah luar bandar dan asrama dengan sistem pengagregatan (caching).\nMBPK teknologi adaptif seperti sarung tangan R dan kandungan gamifikasi disediakan.\n\nasa 3\n2035\nangka Pan ang\nPenyeragaman dan\nPengoptim man\n\n•\n•\n•\n•\n\nEkosistem kelas pintar distrukturkan sebagai norma baharu dalam PdP STEM dan T ET di seluruh negara.\nPenggunaan R dipertingkatkan termasuklah ujian simulasi, latihan keselamatan dan pembelajaran kendiri.\nIntegrasi AI dalam IoT dan robotik untuk pengurusan dan pengoptimuman pembelajaran.\nEkosistem digital MBPK disepadukan dengan pelantar pembelajaran kebangsaan perkembangan dipantau\nmelalui sistem sokongan digital peribadi.\n\naris Masa Pelaksanaan bjektif 1 Strategi 2 Prakarsa 2\nBAB 7 TERAS STRATEGIK 4"},{"sec":91,"p":242,"t":"GARIS MASA PELAKSANAAN\nekti\n\nMeningkatkan Per ekalan Prasarana Digital agi Menyokong PdP\n\naris Masa Pelaksanaan Peningkatan Pembekalan Peranti igital (2026 – 2035)\nasa\n2026 202\nangka Pendek\n\n•\n•\n•\n•\n•\n•\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n•\n•\n•\n•\n\nasa 3\n2035\nangka Pan ang\n\nRa a\n\n•\n•\n•\n•\n\nPelaksanaan tertumpu pada kajian dasar dan penyediaan keperluan asas sebagai landasan pelaksanaan\njangka panjang.\nKajian jurang digital nasional bagi mengenal pasti tahap keperluan pendidik dan murid.\nKajian kebolehlaksanaan skim beli dan tuntut bagi pendidik, dasar pinjaman peranti untuk murid,\nterutamanya golongan berkeperluan dan sekolah luar bandar.\nPerolehan dan pengagihan peranti melalui pusat sumber sekolah yang lengkap dengan perisian asas PdP.\nPenyediaan garis panduan pengurusan peranti merangkumi pinjaman, penyelenggaraan, belanjawan dan\npelaporan.\nDashboard berpusat dibangunkan untuk memantau penggunaan peranti dan kesannya terhadap prestasi\npembelajaran.\nPemantapan pelaksanaan dasar dan peluasan capaian peranti ke semua institusi pendidikan KPM.\nProgram beli dan tuntut diteruskan dengan sasaran peningkatan penyertaan tahunan.\nPenambahan peranti pinjaman untuk murid mengikut keperluan dan dilengkapi dengan perisian utama\npembelajaran digital.\nPenilaian impak jurang digital antara bandar dengan luar bandar dilakukan.\nAudit penggunaan dan penyelenggaraan peranti untuk memastikan pematuhan garis panduan.\nDashboard berpusat digunakan untuk memantau capaian, keberkesanan PdP digital dan penyelesaian\naduan teknikal.\n\nPengukuhan sistem dan automasi tadbir urus peranti digital.\nPelaksanaan penuh skim beli dan tuntut mengikut nisbah yang ditetapkan.\nPemantauan garis panduan dan audit tahunan diteruskan.\nIntegrasi automasi digital dan AI untuk pengurusan aset serta sokongan teknikal.\n\n30 aris Masa Pelaksanaan bjektif 1 Strategi 2 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":91,"p":243,"t":"Sementara itu, garis masa pelaksanaan bagi objektif kedua adalah seperti yang berikut\n\nekti 2 Memantapkan LAN dan\nasa\n2026 202\nangka Pendek\n\n•\n•\n•\n•\n\nRa a\n\nAN Sel r\n\nSekola dan Instit si Pendidikan KPM\n\nPenilaian dan perancangan menyeluruh terhadap prasarana sedia ada.\nAudit rangkaian di semua sekolah dan institusi pendidikan untuk mengenal pasti keperluan penaiktarafan.\nPenyediaan rancangan penaiktarafan nasional strategi pelaksanaan, standard teknikal dan model\npembiayaan berperingkat.\nPelaksanaan projek rintis di sekolah luar bandar dan kawasan berisiko tinggi.\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n•\n\nPenaiktarafan rangkaian secara meluas di seluruh negara.\nLA dan sambungan internet dinaik taraf. Peningkatan liputan i-Fi.\nPemantapan penggunaan pelantar digital oleh pendidik dan murid sejajar dengan prakarsa pelantar\nELIMa 3.0 dan Model AI KPM.\n\nasa 3\n2035\nangka Pan ang\n\n•\n•\n\nPeluasan liputan LA dan A menyeluruh ke institusi pendidikan KPM.\nPengoperasian penuh Sistem Pemantauan Capaian asional ( MS/ C) untuk pemantauan prestasi\ndan penyelesaian masalah secara masa nyata di semua peringkat.\nPeningkatan keberkesanan penyelenggaraan dan tindak balas teknikal penilaian tahap kepuasan\npengguna setiap tahun.\n\n•\n\naris Masa Pelaksanaan bjektif 2 Strategi 2 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":92,"p":244,"t":"STRATEGI 3: MENAMBAH BAIK SISTEM PINTAR DAN TADBIR\nURUS BERPANDUKAN DATA\nTeras Strategik 4 Strategi 3 memberikan tumpuan kepada pengukuhan tadbir urus berpandukan\ndata bagi menjadikan sistem pendidikan negara lebih cekap, responsif dan berasaskan bukti. KPM\nmembangunkan sistem maklumat pintar yang menggunakan data raya (big data), AI dan EWS untuk\nmengenal pasti murid berisiko dan menyokong intervensi bersasar.\nStrategi ini memberikan tumpuan kepada:\n•\n•\n\nPembangunan sistem maklumat pintar, saling terhubung dan bersepadu.\nPengukuhan tadbir urus data untuk memastikan integriti, keselamatan dan keberkesanan\npelaksanaan dasar pendidikan.\n\nPrakarsa Strategi 3\n\nMemperkukuh tadbir urus pendidikan melalui\nsistem maklumat dan data pintar serta terhubung\n\nRajah 7.32 Prakarsa bagi Strategi 3\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":93,"p":245,"t":"PRAKARSA 1: MEMPERKUKUH TADBIR URUS PENDIDIKAN\nMELALUI SISTEM MAKLUMAT DAN DATA PINTAR SERTA\nTERHUBUNG\nPelaksanaan prakarsa ini dijadualkan dari tahun 2026 hingga tahun 2035 secara berfasa, bermula\ndengan pembangunan sistem, diikuti oleh proses ujian, penambahbaikan, peluasan capaian dan\npelaksanaan penuh di semua institusi pendidikan KPM.\nBagi mencapai matlamat prakarsa ini, empat komponen dikenal pasti, iaitu:\nJadual 7.2 Empat Komponen Strategi 3\n\nEWS\n\nDireka untuk mengesan murid yang berisiko mengalami\nkeciciran dalam pembelajaran.\n\nEMIS Pintar\n\nMemperkukuh pengurusan maklumat premis pendidikan melalui\nsistem maklumat bersepadu dengan keupayaan analitik ramalan\nbagi membantu membuat keputusan berpandukan data,\nmeningkatkan kecekapan pentadbiran sekolah dan jabatan serta\nmemperkukuh pengagihan sumber pendidikan secara strategik.\n\nEDW KPM\n\nBerfungsi sebagai sumber data tunggal bagi semua analisis\npendidikan merentas data murid, sekolah dan pendidik serta\nmenyokong pelaporan masa nyata.\n\nMOEIS\n\nPenambahbaikan untuk memperkukuh pengurusan pendidikan\nyang menyeluruh, berorientasikan pengguna dan memudahkan\npenyelarasan data serta proses pentadbiran di semua peringkat.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":93,"p":246,"t":"GARIS MASA PELAKSANAAN\nPem ang nan Sistem Amaran A al E S\nasa\n2026 202\nangka Pendek\nPenilaian dan\nPembangunan Asas\nasa 2\n2030\nangka Seder ana\nRamalan dan Inter ensi\n\nasa 3\n2035\nangka Pan ang\nPenam a aikan dan\nPemanta an Berter san\n\nRa a\n\n•\n•\n•\n•\n\n•\n•\n•\n•\n•\n\n33 aris Masa Pelaksanaan Strategi 3 Prakarsa 1\n\nBAB 7 TERAS STRATEGIK 4\n\nagi Pengesanan Keciciran Pem ela aran M rid\n\nTumpuan kepada pembentukan asas sistem EWS dengan objektif dan kriteria ditetapkan untuk\nmengenal pasti murid berisiko keciciran berdasarkan kehadiran, pencapaian 3M dan tahap pelibatan.\nipetakan data saringan, kehadiran, psikometrik serta aspek motor halus dan kasar murid.\nijalankan penilaian kesiapsiagaan prasarana digital sekolah dan literasi digital pendidik.\nimulakan Pembangunan prototaip E S dan ujian rintis di pelantar ELIMa.\n\nPenggunaan model ramalan bagi mengenal pasti murid berisiko dan pelaksanaan inter ensi tersasar.\nMurid dikategorikan MBPK, Asas, Pertengahan dan Tinggi. Pendidik dan ibu bapa dimaklumkan untuk\ninter ensi akademik dan psikososial.\nKeberkesanan inter ensi dianalisis dan model disemak secara berterusan.\nPengukuhan, automasi dan kesinambungan sistem.\nModel AI dilatih semula berdasarkan data baharu dan analitik inter ensi.\nPemantauan berkala dilaksanakan dan laporan prestasi automatik disediakan kepada sekolah,\nPP dan P ."},{"sec":93,"p":247,"t":"GARIS MASA PELAKSANAAN\nMemperk k\n\nasa\n2026 202\nangka Pendek\nEMIS a ar siap\ndi ang nkan Penyepad an\ndata instit si pendidikan\ndalam sat sistem t nggal\n\n•\n•\n\nasa 2\n2030\nangka Seder ana\nPenggunaan penuh EMIS\ndi sel r instit si KPM\n\n•\n\n•\n•\n•\n\n•\n•\n•\n•\n\nasa 3\n•\n2035\n•\nangka Pan ang EMIS matang\nse agai sistem agi tad ir r s\n•\nprasarana KPM Penilaian\n•\nimpak nasional Integrasi\n•\na tomasi AI dalam\npenyelenggaraan ramalan\npredicti e maintenance\nRa a\n\nEkosistem Peng r san Makl mat Premis Pendidikan Melal i\nPem ang nan EMIS Pintar yang Bersepad\nMelaksanakan analisis keperluan, pemetaan proses kerja dan semakan struktur tadbir urus EMIS.\nMembangunkan sistem EMIS baharu (backend, frontend, keselamatan siber, blockchain, automasi\nasas).\nMenyepadukan data di semua peringkat KPM dalam satu pangkalan data pusat.\nMelantik EMIS Champion di setiap institusi pendidikan KPM dan menyediakan modul latihan asas.\nMengaktifkan semula Pegawai Teknikal di PK sebagai sokongan lapangan.\n\nMenjalankan latihan intensif secara meluas dan berperingkat untuk uru ata, Penolong urutera dan\npentadbir.\nMelaksanakan penambahbaikan sistem berdasarkan maklum balas pengguna (UI/U , fungsi laporan,\nautomasi).\nMengukuhkan sistem rujukan tunggal (single data source) bagi Bahagian Pengurusan Aset untuk\nperancangan penyelenggaraan.\nMenyelaraskan proses kerja baharu berdasarkan S P EMIS Pintar Bersepadu.\nMenjalankan audit keselamatan data tahunan dan pengukuhan protokol blok rantai (blockchain)/log\naudit.\n\nMenyepadukan EMIS dengan sistem-sistem lain KPM (E\n, Analitik EMIS, Pemetaan IS).\nMelaksanakan teknologi AI untuk penyelenggaraan ramalan (predicti e maintenance) bangunan\n(unjuran kerosakan, keutamaan penyelenggaraan).\nMembangunkan modul lanjutan untuk IoT (sensor kelembapan, struktur, elektrik).\nMemantapkan pusat sokongan EMIS hibrid (onsite dan remote serta automasi).\nMewujudkan model operasi lestari (sustainability plan) untuk memastikan EMIS kekal rele an\nmenjelang tahun 2035.\n\naris Masa Pelaksanaan Strategi 3 Prakarsa 1\nBAB 7 TERAS STRATEGIK 4"},{"sec":93,"p":248,"t":"GARIS MASA PELAKSANAAN\nMe\n\ndkan G dang Data ED\n\nasa\n2026 202\nangka Pendek\nPem ang nan Sistem\ndan Prasarana\n\n•\n\nasa 2\n2030\nangka Seder ana\nPelaksanaan dan\nPenggunaan Penuh\n\n•\n\nasa 3\n2035\nangka Pan ang\nPeng k an Ino asi dan\nKelestarian ED\n\nRa a\n\n•\n•\n\n•\n\n•\n•\n•\n•\n•\n\nSe agai S m er\n\nnggal Data Kementerian Pendidikan\n\nPembangunan gudang data merangkumi pembelian perkakasan, pemindahan teknologi, latihan literasi\ndata dan pelaksanaan tadbir urus sistem.\nPemasangan perkakasan utama untuk operasi penyimpanan dan pemprosesan data.\nPenetapan standard keselamatan, penyepaduan sumber data dan protokol akses pengguna.\n\nE\ndigunakan sepenuhnya di semua peringkat KPM sebagai sumber utama analisis dan perancangan\nstrategik.\nigunakan untuk pemantauan dasar, pelaporan prestasi dan membuat keputusan berpandukan bukti.\n\nBudaya kerja berpandukan data digiatkan di semua peringkat.\nPengukuhan prasarana dan peningkatan keupayaan sistem bagi menyokong pertumbuhan data jangka\npanjang.\nAutomasi proses pengurusan data dan penerapan analitik lanjutan termasuklah pemodelan ramalan.\nPengintegrasian menyeluruh antara E\ndengan semua sistem utama KPM dan agensi berkaitan.\nPenilaian impak nasional dan pembangunan rancangan kelestarian E\ngenerasi seterusnya selepas tahun\n2035.\n\n35 aris Masa Pelaksanaan Strategi 3 Prakarsa 1\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":93,"p":249,"t":"GARIS MASA PELAKSANAAN\nMenam a Baik Mod l Sistem Bersepad KPM M EIS\n\nRa a\n\nnt k Menyokong Peng r san Pendidikan\n\nasa\n2026 202\nangka Pendek\nPerancangan dan\nPem ang nan Mod l Asas\n\n•\n•\n\nMenjalankan audit sistem M EIS sedia ada.\nMereka bentuk semula proses dan pembangunan tiga modul asas seperti pengurusan enrolmen,\nperjawatan dan pencapaian akademik.\n\nasa 2\n2030\nangka Seder ana\nPem ang nan Mod l\nIntegrasi dan Dashboard\nNasional\n\n•\n•\n•\n\nMembangunkan modul selebihnya.\nMengintegrasikan M EIS dengan sistem kerajaan yang lain.\nMelancarkan dashboard nasional berasaskan analitik masa nyata bagi pemantauan prestasi di semua\nperingkat KPM.\n\nasa 3\n2035\nangka Pan ang\nPemantapan Pengg naan\nLati an Lan tan dan\nPenam a aikan\n\n•\n•\n•\n\nMemantapkan penggunaan M EIS di seluruh ekosistem pendidikan KPM.\nMelaksanakan latihan lanjutan kepada semua pengguna.\nMenambah baik sistem secara berterusan berdasarkan maklum balas pengguna dan keperluan semasa.\n\n36 aris Masa Pelaksanaan Strategi 3 Prakarsa 1\nBAB 7 TERAS STRATEGIK 4"},{"sec":94,"p":250,"t":"7.4 KESIMPULAN\nTeras Strategik 4 yang menekankan usaha memperkukuh prasarana di semua institusi pendidikan KPM merupakan manifestasi komitmen berterusan KPM dalam\nusaha membina ekosistem pendidikan yang mantap. Berpaksikan tiga komponen utama, iaitu prasarana fizikal, prasarana digital dan sistem maklumat pintar, teras\nini menjadi asas kepada transformasi pendidikan ke arah institusi yang terangkum, lestari dan berimpak tinggi. Sinergi dan kesepaduan ketiga-tiga komponen\ntersebut akan memastikan institusi pendidikan KPM kekal rele an, dinamik dan berdaya saing bagi mendepani cabaran global. Pelaksanaan strategi menyeluruh ini\nbukan sahaja memperkukuh mutu pendidikan, malah menjamin akses pembelajaran bermakna bagi setiap murid selaras dengan aspirasi pendidikan abad ke-21\nserta isi Malaysia sebagai sebuah negara berilmu, berdaya tahan dan berino asi.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":95,"p":251,"t":"BAB"},{"sec":96,"p":252,"t":"TERAS STRATEGIK 5 | MEMPERGIAT SINERGI ANTARA INSTITUSI\nPENDIDIKAN KPM DENGAN PIHAK BERKEPENTINGAN\n\nRINGKASAN\n\nTeras Strategik 5 memberikan keutamaan kepada pembinaan\nhubungan strategik antara institusi pendidikan KPM dengan pihak\nberkepentingan untuk mewujudkan ekosistem pendidikan yang\nterangkum, responsif dan mampan. Pelibatan aktif pihak\nberkepentingan seperti ibu bapa, komuniti, agensi kerajaan, pihak\nswasta serta badan bukan kerajaan yang berdaftar berupaya\nmembantu KPM dalam penyediaan Prasarana Pendidikan, sekali gus\nmenyokong pembangunan ekosistem institusi pendidikan di bawah\nKPM yang kondusif bagi melaksanakan proses pembelajaran secara\nholistik dan berkualiti.\n\nBAB 8 TERAS STRATEGIK 5\n\nVisi teras ini adalah untuk memastikan keperluan institusi pendidikan KPM\ndapat dipadankan dengan sumbangan pihak berkepentingan secara telus,\nadil dan saksama. Pendekatan ini menjadikan kaedah perancangan dan\nsemua pihak terhadap keupayaan institusi pendidikan KPM.\nTeras Strategik 5 merangkumi tiga strategi utama, iaitu memperkukuh dasar\nkerjasama antara KPM dengan pihak berkepentingan dan ekosistem\npenyaluran sumber yang tersusun serta meningkatkan pelibatan pihak\nberkepentingan dengan institusi pendidikan KPM."},{"sec":97,"p":253,"t":"8.1 PENGENALAN DAN RASIONAL\nKeadaan\nsemasa\n\n•\n\n•\n\n•\n\nKerjasama institusi\npendidikan KPM\ndengan pihak\nberkepentingan tidak\nberstruktur.\nTiada sistem berpusat\nuntuk menyalurkan\nsumbangan daripada\npihak berkepentingan.\nPelibatan pihak\nberkepentingan tidak\nmenyeluruh dan tidak\nmampan.\n\nInput\n\n•\n\nDasar kerjasama sedia\nada dengan pihak\nberkepentingan.\n\n•\n\nKepakaran, jaringan\ndan sumber daripada\npihak berkepentingan.\n\n•\n\nPrasarana digital dan\nsistem pengurusan\ndata KPM.\n\n•\n\nPelibatan agensi\nkerajaan lain sebagai\npenyokong.\n\nOutput\n\nAktiviti\n\n•\n\nPelarasan kerangka\npengurusan sumbangan\ndengan pihak\nberkepentingan.\n\n•\n\nSatu kerangka\npengurusan\nsumbangan yang\nmenyeluruh.\n\n•\n\nPembangunan pelantar\ndigital sehenti.\n\n•\n\n•\n\nPemerkasaan\nmekanisme pelibatan\nrakan strategik:\n- Program\nKesukarelawanan\n\nPelantar digital sehenti\nyang menyelaras dan\nmemadankan\nsumbangan pihak\nberkepentingan\ndengan institusi\npendidikan.\n\n- Pembangunan\nkemudahan dan\nfasiliti yang luwes\n\n•\n\nTenaga pengajar\nsukarela ditempatkan\nmengikut keperluan\ninstitusi pendidikan\nKPM.\n\n•\n\nPembangunan fasiliti\npendidikan di kawasan\nakses terhad.\n\nOutcome\n\n•\n\nPenyaluran sumber\nyang cekap, telus dan\nresponsif.\n\n•\n\nKerjasama lebih\nstrategik antara\ninstitusi pendidikan\nKPM dengan pihak\nberkepentingan.\n\n•\n\nPeningkatan akses\nkepada pendidikan\nbermutu di kawasan\nluar bandar.\n\nRajah 8.1 Gambaran Keseluruhan Teras Strategik 5: Mempergiat Sinergi antara Institusi Pendidikan KPM dengan Pihak Berkepentingan\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":97,"p":254,"t":"Pelibatan pihak berkepentingan merupakan elemen\npenting dalam memperkukuh mutu pendidikan secara\nmenyeluruh. Institusi pendidikan KPM yang menjalinkan\nhubungan strategik dengan pihak berkepentingan lazimnya\nmenunjukkan perkembangan murid yang lebih holistik.\nJalinan kerjasama ini turut meningkatkan keberkesanan\npelaksanaan prakarsa KPM kerana sokongan pihak luar\nberupaya membantu menangani kekangan sumber dan\nkepakaran.\nKPM telah melaksanakan pelbagai program dan prakarsa\nuntuk\nmengukuhkan\nkerjasama\ndengan\npihak\nberkepentingan. Namun, pelaksanaannya masih tidak\nmenyeluruh dan konsisten. Di samping itu, perubahan\nlandskap pendidikan masa ini menuntut pendekatan\nkerjasama yang lebih sistematik, teratur dan berlandaskan\ndata berpusat.\nSelain itu, ketiadaan pelantar maklumat berpusat\nmenyebabkan penyumbang sukar memahami keperluan\nsebenar institusi pendidikan KPM. Contohnya, pada\nperingkat sekolah, proses permohonan bagi program\nkerjasama sering melibatkan dokumentasi dan prosedur\nkelulusan yang melibatkan pelbagai peringkat. Keadaan ini\nmelambatkan pelaksanaan dan mengurangkan minat pihak\nberkepentingan untuk menyalurkan sumbangan melalui\nsaluran yang formal.\nOleh itu, Teras Strategik 5 dirangka untuk membangunkan\nekosistem kerjasama pendidikan yang lebih terancang dan\nmenyeluruh bagi memastikan semua murid memperoleh\npeluang pembelajaran yang setara serta menerima\nsokongan berterusan.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":98,"p":255,"t":"8.2 KEADAAN SEMASA\nPelibatan pihak berkepentingan dalam ekosistem pendidikan negara amat penting\nselaras dengan perubahan keperluan murid serta aspirasi sistem pendidikan abad\nke-21.\nKPM telah memperkenalkan Dasar Sekolah Sebagai Institusi Masyarakat pada tahun\n1985 dan diperluas melalui beberapa prakarsa bawah PPPM 2013 — 2025. Namun\nbegitu, perubahan landskap pendidikan semasa menuntut pelibatan dinamik dan\nresponsif semua pihak dengan mekanisme pelaksanaan kerjasama strategik yang\nkonsisten, berstruktur dan mengikut keperluan institusi pendidikan KPM.\nAntara cabaran utama KPM termasuklah kekurangan koordinasi dari segi kerjasama\nantara institusi pendidikan KPM dengan pihak berkepentingan, ketidakpadanan\nsumbangan dengan keperluan institusi pendidikan KPM serta pelibatan pihak\nberkepentingan yang bersifat sementara dan tidak mampan. Hal ini menyukarkan\npenyaluran sumbangan secara sistematik dan bersasar kepada institusi pendidikan\nKPM.\nSelain itu, karenah birokrasi dari segi prosedur pengurusan permohonan\nmelaksanakan program atau penyaluran sumbangan, telah melambatkan proses\npelaksanaan projek dan menimbulkan kekeliruan dalam kalangan penyumbang.\nPerkara ini dirumitkan lagi dengan saluran komunikasi yang tidak eﬁsyen dan\nmenyeluruh.\nDari aspek insentif kepada penyumbang, penghargaan yang diberikan adalah\nbersifat sementara, tidak seragam dan berbeza pada setiap peringkat. Ketiadaan\nmekanisme pemberian insentif dan pengiktirafan yang teratur pada peringkat\nnasional, KPM, JPN, PPD mahupun institusi pendidikan KPM memberikan implikasi\nnegatif terhadap keberkesanan dan kemampanan kerjasama antara institusi\npendidikan KPM dengan pihak berkepentingan.\nSecara keseluruhannya, cabaran yang wujud menunjukkan keperluan mendesak\nuntuk mewujudkan mekanisme pelaksanaan kerjasama yang lebih sistematik, telus\ndan menumpukan bagi memastikan kerjasama strategik antara institusi pendidikan\nKPM dengan pihak berkepentingan, berimpak tinggi dan selari dengan keperluan\ninstitusi pendidikan KPM di seluruh negara.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":99,"p":256,"t":"8.3 MATLAMAT\nTERAS STRATEGIK 5\n\nMEMPERGIAT SINERGI ANTARA INSTITUSI PENDIDIKAN KPM DENGAN\nPIHAK BERKEPENTINGAN\n\nSTRATEGI 1\n\nSTRATEGI 2\n\nSTRATEGI 3\n\n1.\n\n1.\n\n1.\n\nMemperkukuh dasar\nkerjasama antara KPM\ndengan pihak berkepentingan\n\nMemperkasakan dasar kerjasama\nantara institusi pendidikan KPM\ndengan pihak berkepentingan.\n\nMemperkukuh ekosistem\npenyaluran sumber\n\nMemperkukuh ekosistem\npenyaluran sumber.\n\nKPM mengiktiraf bahawa kerjasama merentas sektor mampu memperkukuh\nsokongan terhadap murid, memperluas peluang pembelajaran dan\nmempercepat pencapaian aspirasi sistem pendidikan. Oleh itu, pendekatan\nkerjasama baharu yang lebih terbuka, terangkum dan berasaskan kepercayaan\nbersama-sama perlu diwujudkan. Pendekatan ini berpaksikan keyakinan bahawa\npendidikan bukan tanggungjawab sekolah semata-mata, tetapi merupakan\nusaha menyeluruh seluruh masyarakat.\n\nBAB 8 TERAS STRATEGIK 5\n\nMeningkatkan pelibatan pihak\nberkepentingan dengan institusi\npendidikan KPM\n\nMempelbagaikan mekanisme\npelibatan dan kerjasama\npihak berkepentingan.\n\nTeras Strategik 5 memberikan tumpuan kepada usaha mempergiat sinergi\nantara institusi pendidikan KPM dengan pihak berkepentingan. Setiap strategi\nbawah teras ini disokong oleh prakarsa yang mampu mencetuskan gelombang\nperubahan yang signiﬁkan terhadap landskap kerjasama pendidikan negara."},{"sec":100,"p":257,"t":"STRATEGI 1:\nMEMPERKUKUH DASAR KERJASAMA ANTARA\nKPM DENGAN PIHAK BERKEPENTINGAN\nKeberkesanan pelaksanaan kerjasama strategik bergantung kepada kewujudan dasar yang jelas, konsisten dan selaras\ndengan keperluan semasa.\nPelaksanaan dasar kerjasama sering terjejas oleh ketidakselarasan dokumen rujukan, syarat yang tidak lagi relevan dan\nproses pentadbiran yang berlapis. Sekolah berdepan kekangan apabila perlu mendapatkan kelulusan daripada pelbagai\nperingkat, manakala penyumbang luar pula menghadapi kesukaran memahami saluran rasmi, tempoh pemprosesan dan\nsyarat penyertaan. Keadaan ini menimbulkan persepsi bahawa kerjasama dengan institusi pendidikan KPM merupakan\nproses yang rumit dan memakan masa.\nSelain itu, ketiadaan rangka kerja pengiktirafan yang konsisten menyebabkan penyumbang berasa usaha mereka kurang\ndihargai. Akibatnya, minat untuk terlibat dalam program pendidikan jangka panjang semakin berkurangan walaupun\nbanyak pihak bersedia menyumbang dana, kepakaran atau sokongan teknikal.\n\nPrakarsa Strategi 1\n\nMemperkasakan dasar kerjasama antara KPM dengan pihak berkepentingan\nRajah 8.2 Prakarsa bagi Strategi 1\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":101,"p":258,"t":"PRAKARSA 1: MEMPERKASAKAN DASAR KERJASAMA ANTARA\nKPM DENGAN PIHAK BERKEPENTINGAN\nTumpuan utama diberikan kepada penyelarasan semula dokumen dasar, proses kerja, saluran permohonan serta mekanisme pelaksanaan supaya lebih responsif\nterhadap keperluan semasa dan lebih mesra pengguna pada semua peringkat.\nLangkah awal pelaksanaan melibatkan analisis terperinci terhadap dasar dan pekeliling sedia ada bagi mengenal pasti pertindihan, kekeliruan serta syarat yang tidak\nlagi relevan. Hasil analisis tersebut akan menjadi asas pembentukan kerangka pengurusan sumbangan yang menekankan proses yang seragam, lebih ringkas dan\ndapat dilaksanakan tanpa birokrasi berlebihan.\nBagi menggalakkan penyertaan pihak berkepentingan, kerangka tersebut akan memperkenalkan mekanisme pengiktirafan yang lebih teratur dan konsisten pada\nsemua peringkat daripada sekolah hingga ke peringkat KPM. Latihan dan SLU akan dianjurkan untuk memberikan panduan kepada pemimpin sekolah, PPD dan JPN\nberkaitan tatacara baharu serta tanggungjawab masing-masing untuk memastikan pelaksanaan dasar kerjasama tersebut berjalan lancar.\n\nSurat Pekeliling Ikhtisas KPM Bil. 3 2018:\nPanduan Penyaluran dan Penerimaan Sumbangan\ndaripada Sektor Swasta dan Bukan Swasta.\nSurat Pekeliling Ikhtisas KPM Bil. 5 2018:\nGP Perwakilan Kuasa daripada Ketua Pendaftar\nInstitusi. Pendidikan dan Guru kepada Pendaftar.\nSurat Makluman Panduan Penerimaan\nHadiah Aset Alih dan Aset Tidak Alih KPM\n– 29 Mei 2023\n\nSatu Surat Pekeliling\nIkhtisas yang jelas, tepat,\ndan merangkumi semua\naspek, disertakan dengan\ncarta alir yang terperinci,\nkelulusan secara dalam\ntalian, serta kuasa kelulusan\nyang tidak disentralisasikan.\n\nMembuka laluan kerjasama yang lebih terancang, telus dan mudah diluluskan, sekali gus memperkukuh sinergi\nKPM dengan pihak berkepentingan dalam pembangunan pendidikan negara.\nRajah 8.3 Memperkasakan Dasar kerjasama KPM dengan Pihak Berkepentingan\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":101,"p":259,"t":"Penetapan peranan dan tanggungjawab yang lebih jelas akan memperkukuh hubungan antara institusi pendidikan KPM dengan pihak berkepentingan, sekali gus\nmembentuk jaringan kerjasama yang lebih kukuh dan mampan.\nPenambahbaikan terhadap pelaksanaan dasar kerjasama ini juga akan membantu memperluas penyertaan pihak berkepentingan daripada pelbagai sektor termasuk\nindustri, universiti, alumni dan komuniti.\nKerangka baharu ini juga akan menambah baik pekeliling sedia ada supaya lebih menyeluruh, jelas dan responsif. Di samping menyusun semula proses kerja,\nmempermudah urusan kelulusan dan memperincikan tanggungjawab setiap pihak.\nSemakan terhadap pekeliling ini akan meneliti keperluan untuk memperuntukkan autonomi terkawal kepada institusi pendidikan KPM, khususnya dalam menerima\nsumbangan tertentu agar proses kelulusan dapat dipermudah tanpa perlu melalui pelbagai peringkat birokrasi.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":102,"p":260,"t":"STRATEGI 2:\nMEMPERKUKUH EKOSISTEM PENYALURAN SUMBER\nSecara umumnya, keperluan institusi pendidikan KPM berbeza\nmengikut konteks setempat. Sebahagian besar institusi pendidikan\nKPM masih membuat permohonan secara manual, manakala\npenyumbang pula menghadapi kesukaran untuk mendapatkan\ngambaran menyeluruh tentang keperluan sebenar pada peringkat\ninstitusi pendidikan KPM. Oleh itu, satu sistem pemadanan berpusat\ndiperlukan untuk menyelaras permintaan dan penawaran secara\nberkesan.\nDi samping itu, ketiadaan repositori digital tunggal menyebabkan\npenyaluran sumber menjadi tidak adil di mana terdapat sekolah yang\nmenerima sokongan berulang, manakala ada juga sekolah yang tidak\nmendapat akses kepada sumbangan yang relevan. Jurang perbezaan\nini lebih ketara antara sekolah bandar dengan luar bandar, khususnya\ndi kawasan pedalaman yang berdepan cabaran logistik dan jaringan\nkerjasama.\n\nBAB 8 TERAS STRATEGIK 5\n\nPrakarsa Strategi 2\n\nMemperkukuh ekosistem penyaluran sumber\nRajah 8.4 Prakarsa bagi Strategi 2\n\nOleh itu, Strategi 2 memberikan tumpuan kepada pembinaan ekosistem yang dapat\nmenyatukan semua proses penyaluran sumber, bermula daripada permohonan hingga\npemantauan, melalui satu platform digital sehenti. Dengan ini, setiap sumbangan dapat\ndipadankan secara tepat, adil dan telus berdasarkan data keperluan institusi pendidikan\nKPM."},{"sec":103,"p":261,"t":"PRAKARSA 1: MEMPERKUKUH EKOSISTEM PENYALURAN SUMBER\nPrakarsa ini memperkenalkan pembangunan Sistem Akses Tunggal (SAT), iaitu pelantar digital sehenti bersepadu yang menyenaraikan\nkeperluan institusi pendidikan KPM dan tawaran sumbangan daripada pihak berkepentingan. SAT berfungsi sebagai repositori menyeluruh yang\nmembolehkan proses permohonan, pemadanan, kelulusan dan pemantauan dilaksanakan dalam satu persekitaran bersepadu.\nMelalui SAT, institusi pendidikan KPM dapat mengemukakan keperluan secara lebih teratur, manakala penyumbang boleh meneliti keperluan\ntersebut mengikut kategori, lokasi, tahap keutamaan dan impak. Sistem pemadanan automatik akan mencadangkan padanan yang paling sesuai\nberdasarkan data, sekali gus menjadikan proses lebih cekap dan bersasar. Langkah ini membantu mengurangkan pertindihan bantuan dan\nmemastikan kawasan yang kurang menerima sokongan mendapat peluang yang saksama.\nSAT turut menyediakan papan pemuka interaktif yang memaparkan status permohonan, trend bantuan mengikut negeri, peta keperluan nasional\ndan indikator kesiapsiagaan institusi pendidikan KPM. Integrasi sistem ini dengan pangkalan data sedia ada membolehkan maklumat dipadankan\ndengan lebih tepat dan sentiasa dikemas kini.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":103,"p":262,"t":"PROSES PEMBANGUNAN DAN PELAKSANAAN SAT\n\n1. Pembangunan Asas\n\n2 Reka Bent k dan Konfig rasi Sistem\n\nKerja-kerja asas merangkumi penilaian sistem sedia ada,\npemetaan keperluan pengguna, pembangunan terma rujukan\ndan penyediaan rangka teknikal. Proses kodifikasi piawaian\nkerjasama turut dilaksanakan bagi memastikan semua data\ndirekodkan secara seragam.\n\nFasa ini memberikan tumpuan kepada pembinaan struktur\nsistem, reka bentuk antaramuka pengguna, penetapan\nperanan pengguna dan integrasi dengan pangkalan data\nsedia ada. Keperluan pematuhan undang-undang, termasuk\nperlindungan data peribadi, turut disemak.\n\n3. Pembangunan dan Ujian Rintis\n\n4. Pelaksanaan Penuh dan Penambahbaikan\n\nSistem dibangunkan sepenuhnya dan diuji melalui projek\nrintis yang melibatkan institusi pendidikan KPM terpilih.\nLatihan diberikan kepada pentadbir sekolah, PPD, JPN dan\npenyumbang bagi memastikan penggunaan sistem difahami\ndengan jelas.\n\nSAT dilaksanakan secara nasional dengan pemantauan\nberkala. Mekanisme maklum balas akan digunakan bagi\nmenambah baik sistem secara berterusan serta memastikan\nketepatan ciri padanan pintar dapat ditingkatkan dari\nsemasa ke semasa.\n\nRajah 8.5 Proses Pembangunan dan Pelaksanaan SAT\n\nPelaksanaan SAT dijangka mengubah pendekatan penyelarasan kerjasama pendidikan pada peringkat kebangsaan.\n\nManfaat SAT\nPlatform ini akan:\n1. Meningkatkan ketelusan dalam penyaluran bantuan.\n2. Mempercepat proses pemadanan antara tawaran dengan keperluan sekolah.\n3. Memastikan sekolah yang kurang bernasib baik menerima sokongan yang lebih\nbersasar.\n4. Memudahkan penyumbang menilai impak jangka panjang.\n5. Membantu KPM merancang intervensi berasaskan data masa nyata.\n\nBAB 8 TERAS STRATEGIK 5\n\nSAT juga akan mengukuhkan keyakinan pihak\nberkepentingan untuk terus terlibat dalam pembangunan\npendidikan dan memastikan kemampanan penyaluran\nsumbangan, berikutan adanya sistem pelaporan impak\nyang lebih teratur yang membolehkan mereka menilai\nkeberkesanan program dengan lebih tepat.\nSelain itu, kerjasama dengan yayasan pendidikan seperti\nYayasan Didik Negara dan Yayasan Guru Tun Hussein Onn\nakan diperkasakan."},{"sec":104,"p":263,"t":"STRATEGI 3:\nMENINGKATKAN PELIBATAN PIHAK BERKEPENTINGAN\nDENGAN INSTITUSI PENDIDIKAN KPM\nInstitusi pendidikan KPM perlu berfungsi sebagai pusat\nkolaboratif yang menghubungkan kepakaran pelbagai pihak bagi\nmemperkukuh pengalaman pembelajaran murid. Dalam konteks\nini, peningkatan pelibatan pihak berkepentingan menjadi\nkeutamaan strategik untuk memastikan semua murid mendapat\nakses kepada pendidikan dan persekitaran pembelajaran yang\nbermutu.\nWalaupun pelbagai prakarsa kerjasama telah dilaksanakan,\nmasih ada ruang peluasan untuk pelibatan pihak berkepentingan\ndalam ekosistem pendidikan. Sebagai contoh, kekurangan sumber\nmanusia di sekolah, khususnya pendidik dan kaunselor, serta ruang\ndan peluang yang terhad bagi murid untuk memperoleh\npendedahan industri dan pembangunan bakat khusus menuntut\npendekatan pelibatan yang lebih bersasar, berstruktur dan meluas.\n\nPrakarsa Strategi 3\n\nMempelbagaikan mekanisme pelibatan dan\nkerjasama pihak berkepentingan\nRajah 8.6 Prakarsa bagi Strategi 3\n\nStrategi\nmemberikan\ntumpuan\nkepada\nusaha\nmempelbagaikan mekanisme pelibatan pihak berkepentingan\nmelalui program sukarelawan pendidikan dan pembangunan\nkemudahan dan fasiliti pendidikan.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":105,"p":264,"t":"PRAKARSA 1: MEMPELBAGAIKAN MEKANISME PELIBATAN DAN\nKERJASAMA PIHAK BERKEPENTINGAN\nPrakarsa ini memperkenalkan dua komponen utama yang saling melengkapi, iaitu mobilisasi tenaga sukarelawan pendidikan dan aksesibiliti kepada kemudahan\npendidikan yang luwes. Kedua-duanya bertujuan mengatasi kekangan sumber sedia ada dan mempertingkatkan pengalaman pembelajaran murid di seluruh negara.\n\nSUKARELAWAN PENDIDIKAN\n\nPEMBANGUNAN KEMUDAHAN DAN FASILITI YANG\nLUWES\n\nProgram Sukarelawan Pendidikan merupakan suatu prakarsa khidmat\nmasyarakat yang melibatkan penyertaan aktif komuniti setempat, merangkumi\npelajar Institut Pengajian Tinggi (IPT), guru bersara, kaunselor, individu\nprofesional serta syarikat dan agensi korporat. Program ini bertujuan untuk\nmembantu dan menyokong institusi pendidikan di bawah KPM melalui\npelaksanaan aktiviti kesukarelawanan yang dirancang secara sistematik,\nberstruktur dan berterusan.\n\nSelain sokongan tenaga manusia, prakarsa ini turut memberikan tumpuan\nkepada pembangunan fasiliti pendidikan yang dapat memenuhi keperluan murid\ndi kawasan dengan akses terhad. Penubuhan pusat kecemerlangan pendidikan,\npusat pengembangan bakat seperti ruang latihan sukan dan seni melalui\nkerjasama dengan sektor swasta membolehkan murid memperoleh pengalaman\npembelajaran di luar bilik darjah. Prakarsa ini amat penting bagi membolehkan\nmurid memperoleh pengalaman pembelajaran di luar bilik darjah serta\npendedahan awal kepada bidang kemahiran dan laluan kerjaya yang relevan\ndengan keperluan masa hadapan.\n\nPelibatan komuniti daripada pelbagai latar belakang serta bidang kepakaran\nyang luas turut memberikan manfaat yang signiﬁkan bukan sahaja kepada murid,\nmalah kepada para sukarelawan sendiri. Program ini membuka ruang kepada\nahli komuniti untuk menyumbang kembali kepada masyarakat, berkongsi ilmu\ndan pengalaman, serta memperkukuh jalinan kerjasama antara institusi\npendidikan dengan komuniti setempat. Secara tidak langsung, usaha ini dapat\nmemupuk semangat kesukarelawanan, tanggungjawab sosial serta keprihatinan\nterhadap pembangunan pendidikan negara.\n\nSelain itu, bilik darjah modular akan dibangunkan oleh rakan strategik sebagai\npenyelesaian jangka pendek dan sederhana di kawasan yang menghadapi\nkekurangan prasarana pendidikan kekal, kadar keciciran murid yang tinggi atau\nkesukaran mengakses sekolah oleh murid. Reka bentuk modular membolehkan\nruang pembelajaran dibina dan dipasang dengan cepat mengikut keperluan\nlokasi serta jumlah murid.\n\nPada peringkat awal, pemetaan rakan strategik dan penyediaan modul latihan sukarelawan akan\ndijalankan bagi memastikan setiap peranan difahami dengan jelas. Penempatan sukarelawan dan\npembinaan fasiliti rintis akan dilaksanakan secara berperingkat dengan memberikan keutamaan\nkepada sekolah yang mempunyai keperluan paling mendesak.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":106,"p":265,"t":"8.4 KESIMPULAN\nTeras Strategik 5 menggariskan komitmen KPM\nuntuk memperkukuh ekosistem kerjasama antara\ninstitusi\npendidikan\nKPM\ndengan\npihak\nberkepentingan secara menyeluruh, dengan\nmewujudkan kerangka pengurusan sumbangan\nyang eﬁsien bagi penyaluran sumber secara\noptimum dengan pelibatan pihak berkepentingan\nberasaskan keperluan sebenar institusi pendidikan\nKPM. Sinergi yang kukuh ini mampu menjadi\npemangkin\nkepada\npembangunan\ninstitusi\npendidikan KPM yang lebih berdaya saing,\nterangkum dan responsif terhadap keperluan masa\nhadapan.\n\nBAB 8 TERAS STRATEGIK 5"},{"sec":107,"p":266,"t":"BAB\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":108,"p":267,"t":"TERAS STRATEGIK 6 | MEMBUDAYAKAN KEMAMPANAN\nDALAM EKOSISTEM PENDIDIKAN\n\nRINGKASAN\nTeras Strategik 6 memberikan tumpuan kepada usaha\nmembudayakan kemampanan melalui pembentukan\nsahsiah, nilai dan amalan warga KPM. Peralihan ke arah\npembangunan mampan menuntut agar setiap murid celik\nilmu dan berupaya untuk memahami, menganalisis serta\nbertindak terhadap isu tempatan dan antarabangsa.\nPendidikan untuk Pembangunan Mampan (PPM) menjadi\nasas utama kepada transformasi ini. PPM bertujuan\nuntuk melahirkan murid yang mempunyai kesedaran\nmendalam tentang alam sekitar, kesejahteraan sosial\ndan pembangunan ekonomi, sejajar dengan agenda\nnasional dan global.\n\nTeras Strategik 6 menekankan bahawa nilai seperti\nempati, tanggungjawab, pemeliharaan alam sekitar dan\nkewarganegaraan global perlu disemai secara konsisten\nsepanjang hayat bermula dari peringkat awal pendidikan.\nPendekatan pembudayaan PPM bersifat menyeluruh\ndan menekankan peranan institusi pendidikan sebagai\npusat pembudayaan kemampanan.\nPembudayaan kemampanan melalui pedagogi holistik\ndan berpusatkan murid,\nserta diterajui pemimpin\ntransformatif\nyang\nmewujudkan\nbudaya\ndan\nsokongan komuniti\nyang\nmembolehkan\nnilai\nkemampanan\nberkembang dalam keseluruhan\nekosistem pendidikan.\n\nImpak PPM yang diterapkan akan melangkaui bilik\ndarjah apabila murid menghayati dan mengamalkan nilai\ntersebut di rumah, komuniti dan masyarakat setempat,\nsekali gus mencetuskan gelombang pembudayaan\nkemampanan pada skala yang lebih besar.\nTeras strategik ini dipacu oleh enam prakarsa dan\nsatu pemboleh daya. Usaha ini merangkumi integrasi\nPPM dalam kurikulum dan kokurikulum; penyediaan\nmurid dengan kemahiran berkaitan dengan pekerjaan\nlestari; pembangunan kapasiti pendidik dan pemimpin\ninstitusi pendidikan; peningkatan advokasi dan pelibatan\nkomuniti; serta pengukuhan mekanisme pemantauan\ndan penilaian pelaksanaan. Pendekatan ini disokong oleh\npemboleh daya dalam bentuk pendanaan, kepakaran\ndan sokongan logistik bagi memastikan pelaksanaan\nsemua prakarsa berlaku secara tekal dan berimpak\ntinggi.\nPembudayaan kemampanan melalui Teras Strategik\n6 membawa perubahan sistemik dan terangkum\nyang akan melahirkan generasi berdaya tahan,\nbertanggungjawab dan cakna terhadap cabaran global.\nTransformasi ini berupaya mewujudkan warga institusi\npendidikan yang progresif dan bersedia menghadapi isu\nalam sekitar, perubahan iklim dan sosioekonomi.\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":109,"p":268,"t":"9.1 PENGENALAN DAN RASIONAL\nPembangunan mampan yang diperkenalkan melalui Laporan Brundtland 1987\nmenekankan kepentingan generasi semasa menggunakan sumber untuk memenuhi\nkeperluan tanpa menjejaskan kemampuan generasi akan datang meneruskan\nkelangsungan hidup mereka. Prinsip ini berasaskan keseimbangan antara tiga\ntonggak utama, iaitu sosial, ekonomi dan alam sekitar. Bagi merealisasikan aspirasi\npembangunan mampan, setiap individu perlu dilengkapi dengan ilmu, kemahiran,\nnilai dan tingkah laku positif agar dapat menyumbang kepada kehidupan yang\nsejahtera, peka terhadap alam sekitar serta menghormati keadilan sosial dan\nekonomi.\n\nUsaha mendukung pembangunan mampan melalui dasar dan strategi nasional\ntelah bermula sejak 1970-an dan kemudiannya diarusperdanakan dalam RMK6\nhingga RMK13. PPM pula diperkukuh sebagai hala tuju dalam sistem pendidikan\nMalaysia, selari dengan komitmen global terhadap Matlamat Pembangunan\nMampan (Sustainable Development Goals - SDG) 2030.\nPPM memainkan peranan penting dalam memupuk kesedaran murid terhadap\naspek kemampanan seperti keamanan, hak asasi, keadilan sosial, perubahan iklim\ndan kepelbagaian budaya. PPM membentuk murid sebagai warganegara global\nyang bertanggungjawab melalui pendekatan pedagogi yang berpusatkan murid.\nAsas pendidikan kemampanan dicetuskan melalui gabungan pendekatan PPM\ndan Pendidikan Kewarganegaraan Global (Global Citizenship Education - GCED)\nke arah perubahan transformatif (Rajah 9.1).\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":109,"p":269,"t":"MATLAMAT\nPENDIDIKAN UNTUK\nPEMBANGUNAN\nMAMPAN\n• Visi: Mengupayakan murid\nmembuat keputusan yang\nbertanggungjawab terhadap:\n• Integriti alam sekitar\n• Kebolehlaksanaan ekonomi\n• Masyarakat yang adil untuk\nmasa ini dan hadapan\n• Tema:\n• Perubahan iklim\n• Biodiversiti\n• Pengurusan risiko bencana\n• Kepenggunaan mampan\n• Pembasmian kemiskinan\n\nPERSAMAAN\n• Visi: Mengupayakan murid pada semua\nperingkat pendidikan menjadi proaktif\nke arah dunia yang lebih adil, aman,\nbertoleransi, terangkum dan lestari\n• Penekanan kepada pedagogi holistik\nyang mengutamakan kandungan dan\nhasil pembelajaran, serta proses dan\npersekitaran pembelajaran\n• Pendidikan Transformatif: Penekanan\nkepada tindakan, perubahan dan\ntransformasi\n• Peningkatan kemahiran yang lebih luas:\n• Pemupukan nilai dan sikap\n• Kemahiran kolaborasi, komunikasi\ndan pemikiran kritis\n\nMATLAMAT PENDIDIKAN\nKEWARGANEGARAAN\nGLOBAL\n• Mewujudkan rasa kekitaan dan\nberperikemanusiaan sebagai sebahagian\ndaripada komuniti global\n• Menghargai nilai kepelbagaian, hak asasi\nmanusia dan demokrasi yang dipupuk\nmelalui pengalaman pada peringkat\nsetempat dan global\n• Mengupayakan murid untuk terlibat aktif\ndan bertindak secara bertanggungjawab\nke arah dunia yang aman, terangkum dan\nbertoleransi\n• Tema:\n• Keamanan dan hak asasi manusia\n• Persefahaman antara budaya\n• Pendidikan kewarganegaraan\n• Menghargai kepelbagaian\n• Keterangkuman\n• Toleransi\n\nRajah 9.1 Persamaan Domain PPM dan GCED\nBAB 9 TERAS STRATEGIK 6"},{"sec":109,"p":270,"t":"Matlamat Pembangunan Mampan 2030\nMatlamat Pembangunan Mampan merupakan kerangka global yang menyatukan seluruh dunia ke arah\nkesalinghubungan aspek alam sekitar dan sosioekonomi demi mencapai pembangunan mampan. Sasaran 4.7 bagi\nSDG4 (Pendidikan Bermutu) menekankan kepentingan PPM, khususnya untuk memastikan murid memperoleh pengetahuan\ndan kemahiran berkaitan pembangunan mampan.\nPPM menekankan kesedaran untuk menghargai keamanan, semangat kewarganegaraan global, empati dan beretika,\nmenghormati kepelbagaian serta mengiktiraf sumbangan budaya terhadap pembangunan mampan. Selain itu, PPM\nmemupuk pemahaman hak asasi manusia, tanggungjawab, keadilan serta kebolehan membuat keputusan dan bertindak\nberasaskan maklumat.\n\nTeras Strategik 6 menumpukan kepada anjakan dalam\nkurikulum, latihan pedagogi dan kepimpinan, advokasi serta\nmekanisme pemantauan dan penilaian. Anjakan ini\nakan dijayakan melalui pendekatan keseluruhan institusi\n(whole-of-institution approach) dan kerjasama pelbagai pihak\ntermasuklah komuniti, industri, pertubuhan masyarakat sivil\n(Civil Society Organisation - CSO) dan agensi kerajaan.\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":110,"p":271,"t":"9.2 KEADAAN SEMASA\nUsaha membudayakan kemampanan dalam sistem pendidikan Malaysia telah\ndilaksanakan lebih dua dekad melalui pelbagai dasar, program dan kerjasama. Pada\ntahun 1998, KPM telah menerbitkan Buku Panduan Guru Pendidikan Alam Sekitar\nmerentas kurikulum untuk sekolah rendah dan menengah. Seterusnya pada tahun 2016,\nBuku Panduan Kelestarian Global diterbitkan sebagai rujukan bagi pengintegrasian\nelemen PPM merentas kurikulum.\n\n0.88\n\n0.88\n\n0.90\n0.83\n\nDalam konteks semasa, aktiviti berkaitan dengan pembangunan mampan masih belum\ndilaksanakan secara menyeluruh. Keadaan ini berpunca daripada model pelaksanaan\nkepimpinan sekolah serta ketersediaan kerjasama strategik.\n\nPada peringkat global, prestasi\nMalaysia melalui indikator SDG 4.7\nmenunjukkan bahawa skor Malaysia\ndalam setiap komponen berada dalam\nkelompok kedudukan teratas yang\nmenunjukkan kemajuan yang kukuh,\ndengan skor tertinggi dalam aspek\npendidikan guru, iaitu 0.90 (daripada 1)\nseperti di Rajah 9.2.\nNamun demikian, dapatan soal selidik\nPISA 2018 bagi kompetensi global\nmenunjukkan bahawa murid Malaysia\nberumur 15 tahun masih memiliki tahap\nkesedaran yang rendah terhadap isu\nglobal, komunikasi antara budaya dan\ntindakan berasaskan nilai kemampanan.\n\nMurid yang terpinggir serta murid lelaki\nmencatatkan skor yang lebih rendah\ndalam semua komponen. Keadaan ini\nmenunjukkan bahawa penerapan nilai\ndan kompetensi kemampanan masih\nbelum diterapkan secara konsisten dan\noptimum.\nDapatan\nSEA-PLM\n2019\npula\nmenunjukkan bahawa murid sekolah\nrendah di Malaysia mempunyai tahap\nkeprihatinan yang tinggi terhadap isu\nperubahan iklim dan pencemaran. Hal ini\nmencerminkan potensi besar dalam\nkalangan murid untuk mengembangkan\nnilai kemampanan, namun memerlukan\npendekatan pembelajaran yang lebih\nsistematik dan transformatif agar dapat\nditerjemahkan kepada tindakan.\n\nDasar\nPendidikan\nKebangsaan\n\nKurikulum\n\nPendidikan\nGuru\n\nPentaksiran\nMurid\n\nRajah 9.2 Skor Pemerkasaan Pendidikan Kewarganegaraan Global dan Pendidikan\nuntuk Pembangunan Mampan dalam Arus Perdana, Malaysia\nWalaupun elemen PPM telah diintegrasikan dalam kurikulum, kokurikulum dan aktiviti\nkomuniti sekolah, pelaksanaannya perlu diperluas secara menyeluruh dan tekal di semua\ninstitusi pendidikan.\nSecara keseluruhannya, pengintegrasian PPM dalam sistem pendidikan memerlukan\npelaksanaan yang lebih sistematik, seragam, melibatkan semua warga pendidik dan\npemimpin serta dimantapkan lagi dengan kaedah penilaian dan pemantauan yang\nberterusan.\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":111,"p":272,"t":"9.3 MATLAMAT\nMatlamat Teras Strategik 6 adalah untuk membudayakan kemampanan dalam seluruh ekosistem pendidikan, selaras dengan tumpuan RPM 2026 — 2035.\n\nTERAS STRATEGIK 6\n\nMEMBUDAYAKAN KEMAMPANAN DALAM EKOSISTEM PENDIDIKAN\n\nSTRATEGI 1\n\nSTRATEGI 2\n\nMemperkasakan PPM\ndalam kalangan murid.\n\nMengupayakan pendidik dan pemimpin\npendidikan bagi menerajui PPM.\n\n1.\n\n1.\n\n2.\n\nMengintegrasikan PPM dalam\nkurikulum dan kokurikulum.\nMenyediakan murid dengan kemahiran\nberkaitan bidang pekerjaan lestari.\n\nSTRATEGI 3\n\nMembangunkan kapasiti pendidik\ndan pemimpin pendidikan sebagai\npeneraju PPM.\n\nSTRATEGI 4\n\nMeningkatkan advokasi dan\npromosi PPM dalam ekosistem\npendidikan secara terangkum.\n\nMemperkukuh pemantauan dan\npenilaian pelaksanaan PPM di\ninstitusi pendidikan KPM.\n\n1.\n\n1.\n\n2.\n\nMengoptimumkan jaringan dan\njalinan untuk PPM.\nMemperkasakan murid dan warga\npendidikan sebagai agen perubahan\namalan kemampanan.\n\nMenilai dan mengiktiraf institusi\npendidikan KPM yang menerapkan\namalan kemampanan.\n\nPEMBOLEH DAYA\nPengupayaan pendanaan, kepakaran dan logistik untuk semua prakarsa berkaitan PPM\n\nBAB 9 TERAS STRATEGIK 6\n\nTeras Strategik 6 merangkumi empat strategi utama dan enam\nprakarsa ke arah membudayakan kemampanan dalam\nekosistem pendidikan secara sistematik.\nTeras strategik ini menumpukan kepada pembudayaan\nkemampanan melalui pendekatan holistik yang merangkumi\npembentukan kompetensi kemampanan murid, pengupayaan\npendidik dan pemimpin pendidikan, advokasi yang terangkum\ndan berterusan serta pemantauan dan penilaian yang\nmenyeluruh.\nSetiap strategi disokong oleh prakarsa yang merangkumi\npengintegrasian PPM dalam kurikulum dan kokurikulum,\npenyediaan murid dengan kemahiran berkaitan pekerjaan lestari,\npengukuhan kapasiti pendidik dan pemimpin, advokasi melalui\nMakmal Aktif Lestari (MAL), pusat sehenti untuk perkongsian\nmaklumat PPM serta penarafan amalan kemampanan di institusi\npendidikan KPM. Pemboleh daya pendanaan, kepakaran dan\nlogistik akan menyokong pelaksanaan prakarsa agar berlaku\nsecara berterusan dan transformatif.\nHasil yang ingin dicapai melalui teras strategik ini ialah\npembentukan generasi murid yang celik kemampanan dan\nmampu berdaya saing dalam pasaran kerja masa hadapan yang\ncenderung kepada ekonomi hijau. Institusi pendidikan KPM pula\nberfungsi sebagai pusat aktiviti kemampanan yang\nmengamalkan\npengurusan\nbertanggungjawab\ndan\nberkolaboratif, pedagogi berpusatkan murid, penggunaan\nsumber secara berhemah serta kerjasama aktif dengan komuniti\ndan pihak berkepentingan.\nDalam jangka masa panjang, pelaksanaan strategi dan prakarsa\nbagi teras strategik ini akan menyumbang kepada pembentukan\nmasyarakat yang terangkum, stabil dan bertanggungjawab\nterhadap alam sekitar serta kesejahteraan global."},{"sec":112,"p":273,"t":"STRATEGI 1: MEMPERKASAKAN PPM DALAM\nKALANGAN MURID\nStrategi pertama memberikan tumpuan kepada usaha memperkukuh kompetensi dan nilai\nkemampanan dalam kalangan murid melalui integrasi PPM secara holistik dalam kurikulum dan\nkokurikulum. Strategi ini akan menyepadukan elemen PPM yang meliputi aspek pengetahuan,\nkemahiran berfikir, nilai dan etika, tindakan dan ad okasi serta kerjasama dan komunikasi selaras\ndengan kerangka KP2027 dan kokurikulum. Hasilnya, murid dapat membuat keputusan secara\nbertanggungjawab dan berasaskan maklumat. Strategi ini turut memberikan tumpuan kepada\npenyediaan bakat bidang kemahiran dan teknologi hijau yang dapat memenuhi keperluan\nekonomi yang lebih mampan.\n\nPrakarsa Strategi 1\n\nMengintegrasikan PPM\ndalam kurikulum dan\nkokurikulum\n\nMenyediakan murid dengan\nkemahiran berkaitan bidang\npekerjaan lestari\n\nRajah 9.3 Prakarsa bagi Strategi 1\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":113,"p":274,"t":"PRAKARSA 1: MENGINTEGRASIKAN PPM DALAM KURIKULUM\nDAN KOKURIKULUM\nMatlamat prakarsa ini adalah untuk melahirkan generasi murid yang memiliki kompetensi\nkemampanan berpandukan kepada dokumen kurikulum kebangsaan. Integrasi PPM\ndalam kurikulum dan kokurikulum merupakan asas kepada pembentukan kompetensi dan\nliterasi kemampanan. PPM melalui Elemen Merentas Kurikulum (EMK) akan dilaksanakan\ndaripada peringkat rendah hingga lepas menengah. Penyampaiannya bersifat lebih\ndinamik dengan mengambil kira kepelbagaian gaya pembelajaran murid termasuklah\nmurid berkeperluan khusus seperti Murid Berkeperluan Pendidikan Khas (MBPK). Bagi\ngolongan ini, pendekatan multimodal mengutamakan penggunaan pelbagai deria dan\nsumber pembelajaran yang bersesuaian. Pendekatan multimodal ini juga memberikan\nruang kepada mereka meneroka isu kemampanan mengikut gaya pembelajaran dan\nkeupayaan masing-masing.\nSelain itu, pendekatan pedagogi berpusatkan murid (student-centred) dan diterajui oleh\nmurid (student-led) seperti pembelajaran berasaskan inkuiri, projek dan masalah perlu\ndilaksanakan bagi membina kompetensi dan literasi kemampanan. Aktiviti dan amalan\nkolaboratif merupakan asas kepada pelaksanaan prakarsa bagi teras strategik ini yang\nturut melibatkan kerjasama komuniti setempat dan pihak berkepentingan. Pendekatan ini\nbukan sahaja menghubungkan pembelajaran dan penyelesaian masalah dunia sebenar,\ntetapi turut membina kemahiran komunikasi, keyakinan dan kepimpinan dalam kalangan\nmurid.\n\nRajah 9.4 Kerangka Kompetensi Kemampanan\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":113,"p":275,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\n\n•\n\nPembangunan dan penataran dokumen kurikulum, kokurikulum dan panduan\npelaksanaan pengintegrasian PPM berdasarkan kerangka kompetensi\nkemampanan yang telah diselaraskan dengan kerangka KP2027 dan kokurikulum.\n\n•\n\nPelaksanaan, pemantauan dan penilaian dokumen kurikulum, kokurikulum\ndan panduan pelaksanaan melibatkan semua institusi pendidikan KPM secara\nberperingkat.\n\n•\n\nPemantauan, penilaian dan pelaporan berterusan untuk melihat keberkesanan\npelaksanaan pengintegrasian PPM dalam kurikulum dan kokurikulum melalui\nsemakan berkala untuk penambahbaikan dan pelanjutan pelaksanaan.\n\nPembangunan dan Penataran Dokumen Kurikulum\ndan Kokurikulum Baharu secara Berperingkat\n\nFasa 2\n(2028 – 2030)\nPelaksanaan, Pemantauan dan Penilaian secara\nBerperingkat di Institusi Pendidikan KPM\n\nFasa 3\n(2031 – 2035)\nPemantauan, Penilaian dan Pelaporan untuk\nPenambahbaikan dan Pelanjutan Pelaksanaan\nPengintegrasian PPM\n\nRajah 9.5 Garis Masa Pelaksanaan Strategi 1 Prakarsa 1\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":114,"p":276,"t":"PRAKARSA 2: MENYEDIAKAN MURID DENGAN KEMAHIRAN\nBERKAITAN BIDANG PEKERJAAN LESTARI\n\nMatlamat prakarsa ini adalah untuk\nmelahirkan bakat TVET KPM yang\ndilengkapi dengan kemahiran\nrelevan untuk memenuhi peluang\npekerjaan masa hadapan dalam\nsektor hijau\n\nPrakarsa ini bertepatan dengan matlamat pembangunan\nnegara menerusi Pelan Hala Tuju Peralihan Tenaga Negara\n(NETR) dan Pelan Induk Perindustrian Baharu 2030 (NIMP 2030)\nyang menyokong peralihan ekonomi negara ke arah yang lebih\nmampan.\nBidang pekerjaan lestari atau ekonomi hijau menunjukkan trend\npermintaan dan potensi besar pada masa hadapan. Sehubungan\ndengan itu, prakarsa ini memberikan tumpuan kepada penyediaan\nbakat masa hadapan dalam bidang TVET dengan kemahiran\nyang dapat meningkatkan peluang dan daya saing mereka pada\nperingkat domestik dan global.\nProgram TVET KPM yang berpotensi untuk pengintegrasian\nkemahiran dan teknologi hijau adalah seperti automotif, elektrik\ndan elektronik, pertanian serta penyejukbekuan dan penyamanan\nudara.\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":114,"p":277,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPembangunan, Penataran dan\nPelaksanaan Modul Kelestarian bagi\nProgram TVET Terpilih di Kolej Vokasional\n\n•\n\nPembangunan, penataran dan pelaksanaan modul kelestarian bagi program TVET\nterpilih di Kolej Vokasional dan pengintegrasian elemen PPM dalam Kurikulum\nStandard Kolej Vokasional (KSKV).\n\nFasa 2\n(2028 – 2030)\nPeluasan Pelaksanaan, Penataran,\nPemantauan dan Penilaian\nModul Kelestarian Program TVET\ndi Kolej Vokasional\n\n•\n\nPeluasan pelaksanaan, penataran, pemantauan dan penilaian modul kelestarian\nbagi program TVET di Kolej Vokasional serta penambahbaikan kerjasama industri\nberasaskan perkembangan semasa dan keperluan industri. Selain itu, kolaborasi\ndan jaringan dengan rakan industri tempatan, serantau dan global untuk latihan\nindustri dan perkongsian ilmu melalui upskilling dan reskilling kemahiran TVET\nberkaitan kemampanan.\n\nFasa 3\n(2031 – 2035)\nPemantauan, Penilaian dan Penarafan\nKolej Vokasional sebagai Model Institusi\nPendidikan Mampan\n\n•\n\nPemantauan dan penilaian untuk penambahbaikan dan pelanjutan pelaksanaan\nmodul kelestarian bagi program TVET serta penarafan Kolej Vokasional sebagai\nmodel institusi pendidikan mampan.\n\nRajah 9.6 Garis Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":115,"p":278,"t":"STRATEGI 2: MENGUPAYAKAN PENDIDIK DAN\nPEMIMPIN PENDIDIKAN BAGI MENERAJUI PPM\nPendidik dan pemimpin pendidikan merupakan tonggak utama dalam\nmemastikan pelaksanaan PPM dengan berkesan di institusi pendidikan KPM.\nMereka berperanan sebagai agen perubahan yang memacu amalan\nkemampanan dalam kalangan murid, komuniti dan keseluruhan ekosistem\ninstitusi pendidikan KPM. Strategi ini memberikan tumpuan kepada\npeningkatan kesedaran dan kompetensi pendidik serta pemimpin pendidikan\nagar nilai dan amalan PPM dapat diaplikasikan dalam gaya kepemimpinan dan\npengurusan serta diintegrasikan secara holistik dalam PdP dan pentaksiran,\nseterusnya membentuk budaya organisasi.\nPelaksanaan PPM secara menyeluruh menuntut penguasaan pengetahuan\nyang mendalam tentang isu global, kebolehsuaian pedagogi dan kepimpinan,\nkemampuan mengintegrasikan nilai kemampanan dalam PdP serta kepekaan\nterhadap konteks komuniti setempat.\n\nPrakarsa Strategi 2\n\nMembangunkan kapasiti pendidik dan\npemimpin pendidikan sebagai peneraju PPM\n\nRajah 9.7 Prakarsa bagi Strategi 2\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":116,"p":279,"t":"PRAKARSA 1: MEMBANGUNKAN KAPASITI PENDIDIK DAN\nPEMIMPIN PENDIDIKAN SEBAGAI PENERAJU PPM\nMatlamat prakarsa ini adalah untuk mengupayakan pendidik dan pemimpin pendidikan\nbagi menerajui usaha membina ekosistem pendidikan yang mampan\n\nPengintegrasian PPM dalam\nkurikulum serta latihan guru\npraperkhidmatan dan dalam\nperkhidmatan.\n\nIntegrasi\nelemen PPM\n\nPengintegrasian PPM dalam modul\nutama seperti Program Kelayakan\nProfesional Pemimpin Pendidikan\nKebangsaan (NPQEL) dan Kursus\nKepimpinan\nuntuk\nPemimpin\nPertengahan (Leadership Course for\nMiddle Leaders). Pemimpin institusi\npendidikan KPM akan dibimbing untuk\nmelaksanakan pendekatan seluruh\ninstitusi dalam usaha mewujudkan\nbudaya organisasi yang mampan.\n\nTiga\nKomponen\nUtama\nPembangunan\nKapasiti\n\nPengukuhan\nkepimpinan\ninstitusi\npendidikan KPM\n\nJurulatih Utama beroperasi sebagai\nrujukan profesional dan teknikal yang\nmembimbing institusi pendidikan KPM\ndalam melaksanakan aktiviti PPM.\n\nPengupayaan\nJurulatih\nUtama (JU)\n\nPrakarsa ini memberikan\ntumpuan kepada penyediaan\nlatihan yang sistematik kepada\nguru praperkhidmatan dan\ndalam perkhidmatan serta\npemimpin di institusi pendidikan\nKPM, PPD, JPN dan KPM.\nLatihan\nuntuk\nmenerajui\namalan kemampanan akan\ndilaksanakan seca
