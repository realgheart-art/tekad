banding dengan standard global. Agensi\nPendidikan Kebangsaan Finland melaporkan bahawa guru dan pemimpin\nsekolah semakin aktif menyertai aktiviti pembangunan profesionalisme\nberterusan hasil peningkatan peruntukan kerajaan. Dapatan kajian Teaching and\nLearning International Survey (TALIS) 2018 turut mendapati bahawa guru\nmenganggap pembangunan profesionalisme bermutu tinggi sebagai satu\ndaripada tiga keutamaan dalam perbelanjaan sistem pendidikan.\n\nLALUAN KERJAYA DAN KEPIMPINAN PENDIDIKAN\n\nPada masa yang sama, pembiayaan latihan masih bergantung hampir\nsepenuhnya kepada dana kerajaan yang terhad. Kekurangan model\npembiayaan strategik yang melibatkan pelbagai rakan kerjasama boleh\nmenjejaskan kesinambungan pelaksanaan latihan. Di samping itu, bilangan\npenyedia latihan dan kerjasama strategik sedia ada juga terhad kepada institusi\npendidikan KPM.\n\nPendekatan yang lebih berstruktur dan berasaskan keperluan sebenar akan\nmemastikan pembangunan profesionalisme pendidik memberikan kesan kepada\nmotivasi pendidik, mutu pengajaran dan hasil pembelajaran murid.\n\nPembangunan kepimpinan dalam sistem pendidikan merupakan komponen\npenting bagi menjamin keberkesanan pengurusan institusi pendidikan KPM dan\npersekitaran yang menyokong keberhasilan murid. Namun begitu, ekosistem\nkepimpinan pendidikan di Malaysia masih berdepan dengan beberapa kekangan\ndalam kesinambungan dan pembangunan kepimpinan pendidikan pada semua\nperingkat KPM. Keadaan ini menandakan keperluan penambahbaikan dalam\nreka bentuk dan pelaksanaan latihan kepimpinan bagi memastikan pemimpin\npendidikan dilengkapi dengan kecekapan yang relevan dengan tuntutan\nsemasa.\nSistem pendidikan juga berdepan dengan isu kekurangan pelapis kepimpinan\npada peringkat sekolah. Jawatan guru besar dan pengetua masih cenderung diisi\noleh pendidik kanan yang hampir bersara. Walaupun KPM telah menukar kriteria\npelantikan berasaskan senioriti kepada pelantikan berasaskan kecekapan sejak\ntahun 2013, pelaksanaan ini masih belum menghasilkan kesinambungan\nkepimpinan yang dinamik dan progresif.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":64,"p":176,"t":"Pengetua\n\nGuru Besar\n\nPPP yang dilantik oleh KPM untuk\nmengetuai dan memacu kepimpinan\nsekolah menengah.\n\nPPP yang dilantik oleh KPM untuk\nmengetuai dan memacu kepimpinan\nsekolah rendah.\n\nSelain itu, laluan kerjaya pemimpin sekolah masih terhad, iaitu jawatan\nguru besar sebelum ini hanya setakat Gred DG12 tanpa laluan\nkenaikan pangkat yang jelas dan berstruktur. Keadaan ini bukan sahaja\nmenjejaskan motivasi, malah mewujudkan ketidakseimbangan dalam\npengurusan sumber manusia.\nEKOSISTEM PENYELIDIKAN DAN INOVASI PENDIDIKAN\nPada masa ini, ekosistem penyelidikan dan inovasi di KPM masih\nkurang berstruktur dan terpisah. Ketiadaan pusat penyelaras pada\nperingkat KPM menyebabkan aktiviti penyelidikan dikendalikan secara\nberasingan oleh pelbagai bahagian tanpa koordinasi menyeluruh.\nKeadaan ini menyumbang kepada kadar pembudayaan penyelidikan\ndan inovasi yang rendah, iaitu hanya 1.66% pendidik terlibat secara aktif\ndalam penyelidikan dan 1.4% dalam inovasi (Bahagian Profesionalisme\nGuru, 2022). Jurang ini jelas menunjukkan keperluan mendesak untuk\nmemperkukuh kapasiti penyelidikan dan inovasi agar sistem pendidikan\nnegara menjadi lebih dinamik dan berdaya saing.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":65,"p":177,"t":"6.3 MATLAMAT\nTERAS STRATEGIK 3\n\nMentransformasikan Pendidik agar Berkeupayaan Tinggi dan Berorientasikan Masa Hadapan\n\nSTRATEGI 1\n\nSTRATEGI 2\n\nSTRATEGI 3\n\nSTRATEGI 4\n\n1.\n\n1.\n\n1.\n\n1.\n\nMeningkatkan\nkesejahteraan pendidik\n\n2.\n\nMenumpukan peranan\nguru kepada pengajaran\ndan pembelajaran\nMemperkasakan\nkesejahteraan pendidik\nmelalui keseimbangan\nholistik\n\nMemperkasakan kompetensi\npendidik melalui pemberdayaan\npembangunan profesionalisme\nberterusan secara berstruktur dan\nbermutu\nMemantapkan pembangunan\nprofesionalisme berterusan\nsecara berstruktur untuk\nmemastikan tahap kompetensi\npendidik kekal relevan\n\nMentransformasikan latihan\nkeguruan agar bersifat\nadaptif, dinamik dan relevan\n\n2.\n\nMemperkasakan latihan\nkeguruan agar luwes dan\nrelevan\nMemperkukuh mekanisme\njaminan mutu latihan guru\ndalam perkhidmatan\n\nMembangunkan pemimpin\ntransformatif, berkeupayaan\ntinggi dan berorientasikan\nmasa hadapan\n\n2.\n\nMemperkasakan perancangan\npengganti dengan membentuk\nkumpulan pelapis pemimpin\npendidikan yang berteraskan nilai\ndan berwawasan sistemik\nMewujudkan keluwesan\npenempatan guru besar di\nsekolah rendah dan dari sekolah\nrendah ke sekolah menengah\n\nPEMBOLEH DAYA\nMembudayakan penyelidikan dan inovasi berimpak tinggi melalui penubuhan pusat yang memberikan tumpuan kepada penyelidikan dan inovasi di bawah KPM\n\nTeras Strategik 3 berhasrat untuk mentransformasikan pendidik agar\nberkeupayaan tinggi dan berorientasikan masa hadapan. Kerangka strategi ini\nmemberikan tumpuan kepada usaha meningkatkan kesejahteraan pendidik,\nmemperkukuh kompetensi profesional, menambah baik latihan keguruan serta\nmembangunkan pemimpin pendidikan transformatif. Teras strategik ini turut\ndisokong oleh satu pemboleh daya yang memberikan tumpuan kepada\npembudayaan penyelidikan dan inovasi berimpak tinggi di bawah KPM.\n\nHasil daripada pelaksanaan strategi dalam teras strategik ini, pendidik akan\nmenerima latihan yang relevan dan selari dengan keperluan abad ke-21 untuk\nmeningkatkan prestasi akademik, sahsiah murid dan pembangunan bakat dengan\nlebih cemerlang di sekolah. Selain itu, pembudayaan penyelidikan dan inovasi\nakan menjadi pemangkin kepada sistem pendidikan yang lebih berasaskan data\ndan berdaya saing.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":66,"p":178,"t":"STRATEGI 1: MENINGKATKAN KESEJAHTERAAN PENDIDIK\nIsu kesejahteraan pendidik masa kini dipengaruhi oleh pelbagai faktor termasuk\nbeban tugas yang berlebihan atau di luar skop tugas utama, persekitaran kerja,\ntekanan emosi serta kekurangan peluang pembangunan profesional yang\nmenepati keperluan sebenar. Dapatan daripada TALIS 2024 menunjukkan\nbahawa faktor seperti kestabilan pekerjaan serta persekitaran tempat kerja\nadalah penting dalam membentuk pilihan kerjaya pendidik di sesetengah negara.\n\nPrakarsa Strategi 1\n\nMenumpukan peranan guru kepada\npengajaran dan pembelajaran\n\nMemperkasakan kesejahteraan pendidik\nmelalui keseimbangan holistik\n\nRajah 6.3 Prakarsa bagi Strategi 1\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":67,"p":179,"t":"PRAKARSA 1:\nMENUMPUKAN\nPERANAN\nGURU KEPADA\nPENGAJARAN\nDAN\nPEMBELAJARAN\nGaris Panduan Tadbir Urus Sekolah Menengah\ndan Sekolah Rendah (MySG) menggariskan\nwaktu bekerja guru adalah sebanyak 45 jam\nseminggu, dengan 25 hingga 30 jam\ndiperuntukkan kepada guru mata pelajaran\nmengikut tahap persekolahan bagi aktiviti\nPdP. Bagi memastikan peruntukan masa\ndalam garis panduan ini dipatuhi, langkah\nsegera yang diambil untuk meringankan\nbeban tugas guru di seluruh negara adalah\nmelalui peluasan pelantikan pembantu guru.\nPeranan pembantu guru diperincikan dengan\njelas bagi mengelakkan pertindihan fungsi\ndengan Anggota Kumpulan Pelaksana (AKP)\nsedia ada.\n\nJadual 6.1 Pelaksanaan 45 Jam Waktu Bekerja Bukan Pejabat Selama Seminggu untuk Guru Sekolah Rendah\n\nSEKOLAH RENDAH\nPelaksanaan PdP\n\nKekerapan\n\nJam Seminggu\n\n30 waktu x 30 minit\n\n15 jam\n\nSebelum PdP\n\n1 jam x 5 hari\n\n5 jam\n\nSelepas PdP\n\n1 jam x 5 hari\n\n5 jam\n\nKokurikulum*\n\n60 minit x 3 waktu\n\n3 jam\n\n2 jam x 5 hari\n\n10 jam\n\nPelaksanaan PdP\n\nLain-lain/Tugas Rencam**\nJumlah Jam Bekerja\n\n38 jam\n\nWaktu Rehat\n\n7 jam\n\nJumlah Keseluruhan Waktu Bekerja Selama Seminggu\n\n45 jam\n\n* Pelaksanaan semasa kebanyakan sekolah rendah ialah 2 jam.\n** Waktu persekolahan dan bilangan guru sekolah rendah kurang berbanding dengan sekolah menengah\nmenyebabkan guru berpotensi tinggi terlibat dengan tugas-tugas rencam (merangkumi tugas sampingan/tugas\nsokongan/tugas tambahan/tugas ad hoc)\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":67,"p":180,"t":"Jadual 6.2 Pelaksanaan 45 Jam Waktu Bekerja Bukan Pejabat Selama Seminggu untuk Guru Sekolah Menengah\n\nSEKOLAH MENENGAH\n\nSINGAPURA\n\nKekerapan\n\nJam Seminggu\n\n40 waktu x 30 minit atau\n30 waktu x 40 minit\n\n20 jam\n\nDi Singapura, staf pentadbiran dan eksekutif\nmerupakan sebahagian daripada Pasukan\nPentadbiran Sekolah (School Administration\nTeam - SAT) yang bekerja rapat dengan pendidik\nuntuk mengurus pentadbiran dan operasi\nsekolah. Antara jawatan dalam SAT termasuklah:\n\nSebelum PdP\n\n1 jam x 5 hari\n\n5 jam\n\n•\n\nSelepas PdP\n\n1 jam x 5 hari\n\n5 jam\n\nKokurikulum*\n\n60 minit x 3 waktu\n\n3 jam\n\n1 jam x 5 hari\n\n5 jam\n\nPelaksanaan PdP\nPelaksanaan PdP\n\n•\n\n•\nLain-lain/Tugas Rencam**\nJumlah Jam Bekerja\n\n38 jam\n\n•\n\nWaktu Rehat\n\n7 jam\n\n•\n\nJumlah Keseluruhan Waktu Bekerja Selama Seminggu\n\n45 jam\n\n* Pelaksanaan semasa kebanyakan sekolah menengah ialah 3 jam.\n** Waktu persekolahan dan bilangan guru sekolah rendah kurang berbanding dengan sekolah\nmenengah menyebabkan guru berpotensi tinggi terlibat dengan tugas-tugas rencam (merangkumi tugas\nsampingan/tugas sokongan/tugas tambahan/tugas ad hoc)\nPeruntukan waktu bekerja guru untuk sekolah rendah (Oktober 2021) dan sekolah menengah (Jun 2022)\ndalam MySG.\n\nBAB 6 TERAS STRATEGIK 3\n\nPengurus Pentadbiran: Mengetuai pasukan\npentadbiran dan mengurus operasi harian\npejabat.\nPengurus Operasi: Menyelia pegawai\nsokongan operasi dan mengurus\npenyelenggaraan fasiliti sekolah.\nEksekutif Pentadbiran: Menyokong\npengurusan kewangan, sumber manusia dan\nperolehan.\nPegawai Sokongan Korporat: Melaksanakan\ntugasan pentadbiran seperti pengisian data\ndan penyelarasan maklumat.\nPegawai atau Pengurus ICT: Mengurus\nprasarana ICT sekolah serta memberikan\nlatihan dan sokongan kepada guru dan\nmurid.\n\nStaf sokongan berperanan khusus menyokong\noperasi sekolah bagi membolehkan guru\nmemberikan tumpuan kepada PdP. Usaha ini\nturut mewujudkan persekitaran sekolah yang\nselamat dan kondusif."},{"sec":67,"p":181,"t":"PENSTRUKTURAN SEMULA TUGAS GURU MELALUI\nDASAR 80:20\nDasar 80:20 diperkenalkan untuk menangani isu beban tugas guru yang\nberlebihan tanpa menjejaskan skop profesional mereka. Dasar ini menggariskan\n80% masa guru mata pelajaran diperuntukkan untuk aktiviti berkaitan dengan\nPdP, manakala 20% diperuntukkan untuk tugasan bukan PdP. Prakarsa ini\nberhasrat untuk menstruktur semula tugas guru supaya guru dapat melaksanakan\nperanan profesional mereka dengan lebih berkesan, meningkatkan mutu\npenyampaian dalam bilik darjah serta mengurangkan tekanan akibat beban\nkerja yang tidak memberikan impak yang tinggi terhadap keberhasilan murid.\nMelalui penggubalan dasar ini, pengurusan masa kerja guru akan diperincikan\ndengan lebih jelas berdasarkan skop profesional mereka. Langkah ini juga\nmewujudkan mekanisme kawal selia yang membolehkan pemantauan berterusan\nterhadap pelaksanaan Melindungi Masa Instruksional (MMI).\n\nAntara amalan terbaik antarabangsa yang selari dengan penstrukturan\nsemula tugas guru dan dasar 80:20 termasuklah:\nIceland membahagikan tugas guru sebanyak 40 jam seminggu kepada\ntiga komponen utama: (A) tugas utama pengajaran termasuklah\npenyediaan dan susulan PdP; (B) aktiviti bukan pengajaran termasuklah\npembangunan profesional, mesyuarat, kolaboratif dan komunikasi\ndengan ibu bapa; dan (C) tugasan khas yang dipersetujui bersama-sama\ndengan pemimpin sekolah. Sekolah mempunyai keluwesan menentukan\nagihan masa yang sesuai, namun sebarang masa yang diperuntukkan\nbagi komponen C perlu digantikan dengan pengurangan masa dalam\ntugasan komponen A dan B.\nSumber: Results from TALIS 2024: The State of Teaching , OECD, 2025\n\nGARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPenggubalan dasar dan pembangunan skop\n\nPenggubalan dasar dan pembangunan skop awal bagi pelaksanaan dasar\npembahagian tugas guru 80:20 serta peluasan prakarsa pembantu guru.\n\nFasa 2\n(2028 – 2030)\nRintis dan penilaian keberkesanan rintis\n\nPelaksanaan rintis dan penilaian keberkesanan rintis untuk penambahbaikan\nprakarsa.\n\nFasa 3\n(2031 – 2035)\nPelaksanaan penuh dan peluasan\n\nPelaksanaan penuh dasar 80:20 secara konsisten dan selaras pada semua\nperingkat.\n\nRajah 6.4 Garis Masa Pelaksanaan Strategi 1 Prakarsa 1\nBAB 6 TERAS STRATEGIK 3"},{"sec":68,"p":182,"t":"PRAKARSA 2: MEMPERKASAKAN KESEJAHTERAAN PENDIDIK\nMELALUI KESEIMBANGAN HOLISTIK\nKPM berhasrat menangani isu kesejahteraan\npendidik secara menyeluruh selaras dengan\nkeperluan asas manusia. Prakarsa ini dirangka\nberpandukan Kerangka Hierarki Keperluan Maslow\nyang menegaskan bahawa manusia perlu memenuhi\nlima tahap keperluan secara berperingkat, iaitu\nbermula daripada keperluan fisiologi, keselamatan,\nkepunyaan sosial, penghargaan diri sehinggalah\nmencapai kesempurnaan kendiri. Pendidik hanya\ndapat berfungsi secara optimum apabila keperluan\nasas serta psikososial mereka dipenuhi secara\nmenyeluruh dan bersepadu.\n\nKesejahteraan merupakan konsep yang\nmerangkumi pelbagai dimensi. Kerangka\nkesejahteraan guru dalam pekerjaan\nyang dibangunkan oleh OECD (2020)\nmenggariskan empat dimensi utama\nkesejahteraan guru, iaitu kognitif, kendiri,\nfizikal dan mental serta sosial Keempat\nempat dimensi ini mempengaruhi tahap\ntekanan keseluruhan guru serta motivasi\nmereka yang seterusnya memberikan\nkesan kepada proses dan keberkesanan\nPdP serta kesejahteraan murid.\nDipetik daripada Teachers’ well-being: A framework\nfor data collection and analysis oleh OECD, 2020\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":68,"p":183,"t":"Antara langkah pertama untuk memastikan aspek fisiologi dan keselamatan pendidik dipenuhi termasuklah melalui usaha menaik taraf ruang kerja pendidik agar lebih\nkondusif dan selesa. Untuk meningkatkan keselamatan psikologi dan tahap kepunyaan sosial dalam kalangan pendidik, peluasan akses kepada sokongan psikososial\ndan pengukuhan jaringan komuniti turut dilaksanakan.\nSaringan kesejahteraan pendidik dilaksanakan untuk mengenal pasti tahap kesejahteraan pendidik dan keperluan sokongan mereka. Profil Kesejahteraan uru secara\ndigital akan ditambah baik dalam platform Sistem Pengurusan Perkhidmatan Kaunseling (e2PK) supaya pendidik boleh menilai tahap kesejahteraan kendiri secara\nberkala. Pendekatan ini membolehkan pelaksanaan intervensi, pencegahan, pemulihan dan pembangunan dilakukan secara bersasar serta berpandukan data.\n\nIndeks Kesejahteraan Guru (IKG) KPM\nmengandungi 11 domain, iaitu motivasi;\nautonomi dan kompetensi; kesejahteraan\npsikologi; keselarasan kerja dan\npersekitaran; sistem sokongan; ketersediaan\ndan penggunaan sumber; resilien;\nperkembangan diri; keseimbangan kerja dan\nkehidupan; pengurusan kerja;\ndan kesejahteraan digital.\n\nKetersediaan\ndan\nPenggunaan\nSumber\n\nAutonomi dan\nKompetensi\n\nKeselarasan\nKerja dan\nPersekitaran\n\nKesejahteraan\nPsikologi\n\nResilien\n\nKeseimbangan\nKerja dan\nKehidupan\n\nIndeks\nKesejahteraan\nGuru\n\nSistem\nSokongan\n\nPengurusan\nKerja\n\nMotivasi\n\nPerkembangan\nDiri\n\nKesejahteraan\nDigital\n\nRajah 6.5 Indeks Kesejahteraan Guru KPM\nBAB 6 TERAS STRATEGIK 3"},{"sec":68,"p":184,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nSaringan awal dan\npersediaan\n\n•\n\nFasa 2\n(2028 – 2030)\nPelaksanaan dan saringan\nberterusan\n\n•\n•\n\nPelaksanaan saringan kesejahteraan pendidik dijalankan secara berterusan.\nData yang diperoleh digunakan untuk memantau kesejahteraan pendidik, mengenal pasti\nkeperluan sokongan dan pelaksanaan intervensi secara bersasar.\n\nFasa 3\n(2031 – 2035)\nKajian impak dan pelaporan\n\n•\n\nPelaksanaan saringan kesejahteraan pendidik dan pelaksanaan intervensi secara\nbersasar diteruskan.\nKajian impak dan pelaporan untuk menilai keberkesanan prakarsa dan memastikan\nintervensi yang dilaksanakan berimpak tinggi.\n\nRajah 6.6 Garis Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 6 TERAS STRATEGIK 3\n\n•\n\n•\n\nPelaksanaan saringan awal menggunakan IK dan penambahbaikan profil kesejahteraan\npendidik.\nNaik taraf platform e2PK untuk membolehkan pendidik menilai tahap kesejahteraan\nkendiri secara lebih berkesan."},{"sec":69,"p":185,"t":"STRATEGI 2: MEMPERKASAKAN KOMPETENSI PENDIDIK\nMELALUI PEMBERDAYAAN PEMBANGUNAN PROFESIONALISME\nBERTERUSAN SECARA BERSTRUKTUR DAN BERMUTU\nPengukuhan profesionalisme pendidik menjadi keutamaan KPM untuk memastikan\nsistem pendidikan negara bermutu tinggi. Sehubungan dengan itu, prakarsa\nbawah strategi ini bertujuan memantapkan pembangunan profesionalisme\nberterusan secara berstruktur untuk memastikan tahap kompetensi pendidik kekal\nrelevan dan berorientasikan masa hadapan. Melalui pelaksanaan pembangunan\nprofesionalisme berstruktur yang berasaskan kompetensi, pendidik akan\ndibekalkan dengan kemahiran terkini secara sistematik dan berterusan selari\ndengan keperluan pendidikan abad ke-21.\n\nPrakarsa Strategi 2\n\nMemantapkan pembangunan\nprofesionalisme berterusan secara\nberstruktur untuk memastikan tahap\nkompetensi pendidik kekal relevan\n\nRajah 6.7 Prakarsa bagi Strategi 2\nBAB 6 TERAS STRATEGIK 3"},{"sec":70,"p":186,"t":"PRAKARSA 1: MEMANTAPKAN PEMBANGUNAN\nPROFESIONALISME BERTERUSAN SECARA BERSTRUKTUR UNTUK\nMEMASTIKAN TAHAP KOMPETENSI PENDIDIK KEKAL RELEVAN\nStandard Guru Malaysia 2.0 (SGM 2.0) yang diperkenalkan pada tahun 2023\nmerupakan rujukan utama untuk menilai dan memantau kompetensi guru di Malaysia.\nSGM 2.0 membolehkan guru membuat penilaian kendiri, merancang pembangunan\nprofesionalisme berterusan dan memastikan latihan serta prakarsa pembangunan\nsejajar dengan keperluan laluan kerjaya guru dan peningkatan keberhasilan murid. Selain\nitu, Kamus Kompetensi PPP Laluan PdP (2023) dan Kamus Kompetensi Pemimpin Sistem\n(2024) memperincikan kompetensi yang perlu dimiliki oleh PPP mengikut peranan dan\ngred berdasarkan laluan kerjaya.\n\nPrakarsa ini akan memperkukuh pembangunan profesionalisme berterusan\nsecara berstruktur melalui pemetaan kompetensi dan latihan berstruktur\nyang menepati keperluan sebenar tenaga pendidik. Usaha ini akan\nmemastikan pembangunan profesionalisme yang lebih bersasar, relevan\ndan berimpak tinggi. Analisis latihan berdasarkan kompetensi, latihan dan\naktiviti pembangunan profesionalisme berterusan yang dilaksanakan perlu\nberpandukan analisis mendalam terhadap profil kompetensi indi idu yang\nmerangkumi kemahiran, pengetahuan dan prestasi semasa. Pendekatan\nini juga mengelakkan pembaziran sumber terhadap latihan yang tidak\nmenambah nilai kepada amalan pendidik.\nRajah 6.8 Kerangka Standard Guru Malaysia 2.0\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":70,"p":187,"t":"Latihan pembangunan profesionalisme berstruktur merangkumi kursus jangka pendek, sederhana dan panjang\nbagi memenuhi keperluan pendidik mengikut fungsi, peranan, laluan kerjaya, gred dan jawatan yang disandang.\nInstrumen berasaskan kompetensi dibangunkan mengikut bidang tugas dan gred perkhidmatan supaya jurang kompetensi dapat dikenal pasti secara sistematik\ndan telus untuk membolehkan perancangan latihan individu yang lebih tepat dan berkesan. Pendekatan pembangunan profesionalisme berterusan berasaskan\nkompetensi turut menekankan pengukuran hasil pembelajaran sebenar berbanding dengan jam latihan semata-mata.\n\nPENDEKATAN YANG MENEKANKAN UPSKILLING, RESKILLING DAN CROSS-SKILLING\nPendekatan yang menekankan upskilling, reskilling dan cross-skilling amat penting untuk memastikan kompetensi pendidik kekal relevan dengan keperluan semasa\nserta memperkukuh tahap profesionalisme mereka.\n\nUpskilling bertujuan meningkatkan kemahiran sedia ada bagi memperkukuh mutu\npengajaran dan pembelajaran.\nReskilling membantu pendidik memperoleh kemahiran baharu yang diperlukan untuk\nmenyesuaikan diri dengan perubahan peranan dan konteks pendidikan.\nCross-skilling pula membolehkan pendidik menguasai kemahiran yang pelbagai atau merentas\nbidang untuk menyokong keperluan murid dan sekolah.\nPENYELARASAN DAN PENGUKUHAN DASAR\nPenyelarasan dasar turut menjadi komponen penting dalam prakarsa ini, melibatkan pengintegrasian dasar sedia ada ke dalam satu kerangka pembangunan\nprofesionalisme pendidik berasaskan kompetensi yang menyeluruh dan bersepadu. Usaha ini melibatkan penyelarasan menyeluruh antara dokumen rujukan utama\nseperti SGM 2.0, Dasar Pembangunan Bakat Perkhidmatan Awam dan Pelan Induk Pembangunan Profesionalisme Keguruan (PIPPK) bagi memastikan hala tuju\npembangunan profesionalisme pendidik lebih selaras dan berstruktur serta mudah difahami.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":70,"p":188,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nAnalisis jurang dan\nkeperluan semasa\n\n•\n•\n\nAnalisis untuk mengenal pasti jurang kompetensi secara menyeluruh dan sistematik.\nPemetaan kompetensi, pembangunan instrumen kompetensi, pembangunan modul\nlatihan bersasar, pengintegrasian platform latihan sedia ada serta pembinaan pangkalan\ndata kompetensi PPP.\n\nFasa 2\n(2028 – 2030)\nPengukuhan dan peluasan\n\n•\n\nPengukuhan latihan pembangunan profesionalisme berterusan dan peluasan akses\nlatihan bermutu kepada warga pendidik.\nPenyelarasan sumber peruntukan latihan pembangunan profesionalisme berterusan\ndengan kerjasama pelbagai pihak.\n\nFasa 3\n(2031 – 2035)\nPemantapan pelaksanaan\ndan penilaian impak\n\n•\n\nRajah 6.9 Garis Masa Pelaksanaan Strategi 2 Prakarsa 1\n\nBAB 6 TERAS STRATEGIK 3\n\n•\n\nPengukuhan pelaksanaan dan penilaian impak untuk mengkaji keberkesanan latihan\nterhadap kompetensi pendidik dan pencapaian murid bagi penambahbaikan secara\nberterusan."},{"sec":71,"p":189,"t":"STRATEGI 3: MENTRANSFORMASIKAN LATIHAN KEGURUAN\nAGAR BERSIFAT ADAPTIF, DINAMIK DAN RELEVAN\nGuru merupakan tunjang kepada sistem pendidikan negara. Program pendidikan\nguru yang merangkumi latihan praperkhidmatan dan dalam perkhidmatan\nperlu bersifat adaptif, dinamik dan relevan dengan keperluan semasa serta\nberorientasikan masa hadapan. Untuk mencapai matlamat ini, latihan keguruan\nyang bermutu tinggi dan menepati keperluan guru perlu dilaksanakan.\n\nPrakarsa Strategi 3\n\nMemperkasakan latihan keguruan\nagar luwes dan relevan\n\nMemperkukuh mekanisme jaminan mutu\nlatihan guru dalam perkhidmatan\n\nRajah 6.10 Prakarsa bagi Strategi 3\nBAB 6 TERAS STRATEGIK 3"},{"sec":72,"p":190,"t":"PRAKARSA 1: MEMPERKASAKAN LATIHAN KEGURUAN AGAR\nLUWES DAN RELEVAN\nLatihan keguruan dan pembangunan profesionalisme berterusan memainkan\nperanan penting dalam memastikan mutu serta keberkesanan pengajaran di bilik\ndarjah. Latihan keguruan yang diberikan perlu seiring dengan keperluan semasa\ndan berorientasikan masa hadapan. Oleh itu, prakarsa ini diperkenalkan bagi\nmemperkasakan latihan keguruan dan pembangunan profesionalisme berterusan\nmelalui pendekatan yang lebih berstruktur dan menggunakan sokongan teknologi.\n\nPENDEKATAN YANG LEBIH LUWES UNTUK\nLATIHAN GURU\nLatihan guru sedia ada telah menyumbang kepada pembangunan tenaga\npengajar bermutu. Namun, bagi memenuhi keperluan dunia pendidikan yang\nsemakin kompleks dan dinamik, latihan guru perlu beranjak ke arah struktur\nyang lebih luwes dan berasaskan kompetensi. Pada masa ini, struktur kurikulum\npendidikan guru masih boleh dipertingkat bagi memberikan lebih ruang dan\npeluang kepada guru untuk menyesuaikan pembelajaran mengikut minat dan\nkeperluan.\nPendekatan ini membantu melahirkan guru yang memenuhi keperluan pelbagai\nkonteks dalam ekosistem pendidikan negara. Prakarsa ini juga menyokong\npelaksanaan strategi B1.5 dalam RMK13 yang menekankan pemantapan\nkompetensi dan kecekapan warga pendidik.\n\nBAB 6 TERAS STRATEGIK 3\n\nPEMBANGUNAN PROFESIONALISME BERTERUSAN\nBERBENTUK MODULAR\nModul pembangunan profesionalisme berterusan yang disediakan perlu mengikut\nminat dan keperluan pendidik, murid dan sekolah. Pendidik boleh mengikuti\nkursus atau modul pembangunan profesionalisme berterusan yang selaras\ndengan bidang serta laluan perkembangan kerjayanya. Modul yang selesai diikuti\njuga boleh diiktiraf sebagai kelayakan mikro dan dikumpulkan untuk membina\nkelayakan yang lebih tinggi seperti sijil, diploma atau ijazah. Pendekatan ini turut\nmenawarkan keluwesan dari segi tempoh dan mod penyampaian.\n\nSOKONGAN TEKNOLOGI\nUntuk menjayakan prakarsa ini, Sistem Pengurusan Pembelajaran (SiPP) yang\nbersepadu berfungsi sebagai hab pembelajaran dinamik yang menyatukan\npelbagai sumber dan peluang daripada pembekal latihan serta rakan industri.\nPendekatan ini secara langsung memperkukuh penyampaian latihan pendidik\nserta menggalakkan laluan pembangunan profesional yang lebih tersusun dan\nmudah diakses bagi semua pendidik. Di samping itu, Komuniti Pembelajaran\nProfesional (Professional Learning Community - PLC) maya antara pendidik\ndengan pakar industri juga boleh diperkukuhkan."},{"sec":72,"p":191,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nAnalisis keperluan dan\npenstrukturan kurikulum\n\n•\n\nAnalisis jurang latihan keguruan serta penstrukturan kurikulum praperkhidmatan dan\nlatihan guru dalam perkhidmatan berdasarkan keperluan.\n\nFasa 2\n(2028 – 2030)\nPelaksanaan dan peluasan\n\n•\n\nKurikulum latihan keguruan mengikut bidang dirintis untuk memastikan kebolehlaksanaan\nsebelum diperluas ke semua pembekal latihan.\n\nFasa 3\n(2031 – 2035)\nPengukuhan, pembudayaan dan\npenilaian impak\n\n•\n\nPengukuhan kurikulum latihan keguruan melalui proses penambahbaikan berpandukan\nmaklum balas kepuasan pelanggan.\nPembudayaan amalan pembangunan profesionalisme berterusan supaya dapat\ndilaksanakan secara konsisten.\nPenilaian impak untuk mengkaji keberkesanan latihan.\n\n•\n•\n\nRajah 6.11 Garis Masa Pelaksanaan Strategi 3 Prakarsa 1\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":73,"p":192,"t":"PRAKARSA 2: MEMPERKUKUH MEKANISME JAMINAN\nMUTU LATIHAN GURU DALAM PERKHIDMATAN\nSGM 2.0, Dasar Latihan Sumber Manusia KPM (2020) dan Dasar Kawalan\nMutu Latihan (DKKL) PPP (2024) berfungsi sebagai piawaian rujukan\nbagi semua penganjur dan pembekal latihan dalam dan luar KPM.\nPendekatan ini menyediakan garis panduan yang jelas untuk menyokong\npenyampaian latihan yang lebih konsisten, berimpak dan bertumpu\nkepada pembangunan profesionalisme berterusan yang bermakna.\nWalau bagaimanapun, latihan dalam perkhidmatan masih berdepan\ndengan cabaran ketidakseragaman mutu kerana pengelolaan latihan\ndijalankan secara berasingan oleh pelbagai pihak.\n\nMEKANISME JAMINAN MUTU LATIHAN\nKPM berhasrat memperkukuh sistem penjaminan mutu latihan pendidik\nmelalui pendekatan yang lebih berpusat, bersepadu dan seragam.\nSehubungan dengan itu, mekanisme kawalan mutu akan diperkasakan\nbagi memastikan latihan dalam perkhidmatan mencapai piawaian yang\nditetapkan. Oleh itu, pelibatan pakar bidang perlu diutamakan bagi\nmenyokong mekanisme jaminan mutu latihan ini.\n\nKERJASAMA DENGAN RAKAN STRATEGIK DAN\nINDUSTRI\nPrakarsa ini juga akan memudahkan kerjasama strategik dengan\npembekal latihan terpilih yang melibatkan institusi pengajian tinggi, NGO\ndan sektor swasta yang berpotensi menyumbang kepada sistem latihan\npendidik. Kerjasama ini diperlukan untuk menangani beberapa cabaran\nsedia ada termasuklah kapasiti terhad agensi KPM untuk memenuhi\nsemua keperluan latihan terutamanya dalam bidang kepakaran khusus.\nPendekatan ini juga membuka ruang untuk penyaluran dana yang\nlebih mampan melalui kerjasama dengan pihak berkepentingan yang\nberkongsi matlamat untuk meningkatkan mutu pendidikan negara.\n\nBAB 6 TERAS STRATEGIK 3\n\nPembangunan kursus secara kolaboratif dengan pembekal latihan luar KPM pula\nmembolehkan modul disesuaikan mengikut keperluan dan keutamaan semasa. Bagi\nmenjamin kesinambungan latihan yang ditawarkan, tempoh dan bentuk kerjasama juga\nperlu dipertimbangkan dengan teliti serta mengutamakan kerjasama jangka panjang\nyang kukuh dan strategik."},{"sec":73,"p":193,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nAnalisis keperluan, pemetaan\ndan pemusatan\n\n•\n\nFasa 2\n(2028 – 2030)\nPelaksanaan dan kajian awal\n\n•\n•\n\nPelaksanaan latihan bersepadu berdasarkan hasil analisis dan pemetaan.\nKajian awal untuk menilai keberkesanan mekanisme yang digunakan dan mengenal pasti\npenambahbaikan bagi memastikan latihan mencapai piawaian yang ditetapkan.\n\nFasa 3\n(2031 – 2035)\nPengukuhan dan analisis\nkeberkesanan pelaksanaan\n\n•\n\nPengukuhan peranan pusat kawalan mutu dengan penekanan kepada penyepaduan\nsistem dan pematuhan kepada piawaian kebangsaan.\nPelaksanaan mekanisme pemantauan, pelaporan dan penilaian bagi menilai\nkeberkesanan pelaksanaan.\n\n•\n•\n\n•\n\nAnalisis keperluan latihan dalam perkhidmatan serta audit dan pemetaan pembekal\nlatihan dalam dan luar KPM.\nPerancangan bagi pemusatan pusat kawalan mutu latihan.\nPengukuhan kerjasama strategik dengan pihak berkepentingan untuk menyokong\npenyampaian latihan yang bermutu dan pelbagai.\n\nRajah 6.12 Garis Masa Pelaksanaan Strategi 3 Prakarsa 2\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":74,"p":194,"t":"STRATEGI 4: MEMBANGUNKAN PEMIMPIN TRANSFORMATIF,\nBERKEUPAYAAN TINGGI DAN BERORIENTASIKAN MASA HADAPAN\nStrategi ini bertujuan membentuk pemimpin yang transformatif, berkeupayaan tinggi dan berorientasikan masa hadapan melalui dua prakarsa utama. Pertama,\nmembangunkan pelapis pemimpin yang berteraskan nilai dan berwawasan sistemik melalui latihan transformatif dan laluan perancangan penggantian yang terancang.\nKedua, meningkatkan mobiliti kerjaya guru besar dengan laluan yang luwes hingga ke jawatan pengetua.\n\nPrakarsa Strategi 4\n\nMemperkasakan perancangan pengganti dengan\nmembentuk kumpulan pelapis pemimpin pendidikan\nyang berteraskan nilai dan berwawasan sistemik\n\nMewujudkan keluwesan penempatan guru besar\ndi sekolah rendah dan dari sekolah rendah ke\nsekolah menengah\n\nRajah 6.13 Prakarsa bagi Strategi 4\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":75,"p":195,"t":"PRAKARSA 1: MEMPERKASAKAN PERANCANGAN PENGGANTI\nDENGAN MEMBENTUK KUMPULAN PELAPIS PEMIMPIN\nPENDIDIKAN YANG BERTERASKAN NILAI DAN BERWAWASAN\nSISTEMIK\nPelantikan pemimpin perlu mengutamakan kecekapan dan kompetensi yang\nditunjukkan oleh calon dan bukan berasaskan tempoh perkhidmatan. Pada\ntahun 2013, KPM menukarkan kriteria pelantikan daripada mengikut tempoh\nperkhidmatan kepada kecekapan kepimpinan. Sebagai contoh, calon pemimpin\nperlu mempunyai pengalaman sebagai guru kanan mata pelajaran atau guru\npenolong kanan dan menamatkan Program Kelayakan Profesional Pemimpin\nPendidikan Kebangsaan ( ational Professional ualification for Educational\nLeaders - NPQEL). Namun, antara penambahbaikan yang boleh dilaksanakan\ntermasuklah garis panduan laluan kepimpinan yang lebih jelas, modul latihan\nyang relevan dengan keperluan semasa serta sistem pemantauan dan sokongan\nsusulan yang lebih menyeluruh.\nPemimpin transformatif ialah pemimpin yang mampu membawa\nperubahan menyeluruh dengan visi dan misi yang jelas, melibatkan\npembangunan sumber manusia serta membentuk budaya kerja\npositif bagi mencapai matlamat organisasi.\n\nPemimpin sistem merupakan PPP berjawatan hakiki dalam\npengurusan bermula dari gred DG9 hingga DG14 yang bertugas\ndi PPD, JPN, Bahagian KPM dan institusi pendidikan KPM.\n\nOleh itu, pembentukan kumpulan pelapis pemimpin pendidikan akan dilaksanakan\nsecara berterusan pada semua fasa (2026 – 2035) menerusi kursus asas\nkepimpinan kepada PPP oleh Bahagian Pengurusan Sumber Manusia (BPSM)\ndan Institut Aminuddin Baki (IAB) dengan sokongan Jemaah Nazir, JPN dan PPD.\nTumpuan utama kursus asas kepimpinan ialah menggabungkan pendekatan\npembelajaran teradun (gabungan teori, amali, dan refleksi) bagi memastikan\nkeberkesanan program. Seterusnya, pelaksanaan sistem pemantauan\nberterusan seperti Tindak Ikut Tindak Lanjut (TITL) selama dua tahun dan\npelaksanaan komuniti amalan (Community of Practice - CoP) untuk menyokong\npelaksanaan di institusi pendidikan KPM.\nHasil prakarsa ini menunjukkan laluan kepimpinan pendidikan bermula daripada\nPPP Gred DG9 dilantik menjadi ketua panitia sehingga jawatan pengurusan yang\nlebih tinggi di sekolah, PPD, JPN atau mana-mana bahagian di KPM mengikut\nkeperluan.\nBAB 6 TERAS STRATEGIK 3"},{"sec":75,"p":196,"t":"LALUAN KERJAYA PEMIMPIN PENDIDIKAN YANG JELAS\nPPP Gred DG9 yang telah berkhidmat sekurang-kurangnya lima tahun layak memohon mengikuti kursus asas kepimpinan yang disediakan oleh IAB. Seterusnya,\nPPP Gred DG10 hingga DG14 yang memiliki kompetensi yang menepati kriteria ditetapkan layak mengikuti kursus kepimpinan dan mempunyai peluang untuk dilantik\nmenjawat jawatan pengurusan pertengahan seperti Guru Kanan Mata Pelajaran, Penolong Kanan atau Penolong Pengarah dan sebagainya di Bahagian, JPN atau PPD\nsekiranya ada keperluan.\n\nMinimum 5 tahun\nDG9\n\nA\n\nGuru akademik biasa\n\nMemegang perjawatan asal sekiranya tidak memenuhi syarat kelulusan atau\ntiada keperluan semasa\n\nB\n\nJawatan pengurusan\npertengahan\n\nDilantik menjadi Ketua Panitia/Guru Kanan Mata Pelajaran sekiranya ada\nkeperluan\n\nKursus Asas\nKepimpinan\n\nJPN akan menggunakan data sumber manusia KPM yang berpusat bagi tujuan pemilihan pemimpin pendidikan berdasarkan keperluan.\n\nRajah 6.14 Cadangan Proses untuk Mewujudkan Kumpulan Pelapis Pemimpin Sekolah Seawal Gred DG9\n\nMengikut kriteria yang ditetapkan\nDG10–DG14\n\nA\n\nJawatan asal\n\nMemegang perjawatan asal sekiranya tidak memenuhi syarat kelulusan atau\ntiada keperluan semasa\n\nB\n\nJawatan pengurusan\nperingkat seterusnya\n\nDilantik menjadi Guru Kanan Mata Pelajaran/Penolong Kanan di sekolah\natau Penolong Pengarah dan sebagainya di Bahagian/JPN/PPD sekiranya\nada keperluan.\n\nKursus asas\nkepimpinan\n\nJPN akan menggunakan data sumber manusia KPM yang berpusat bagi tujuan pemilihan pemimpin pendidikan berdasarkan keperluan.\n\nRajah 6.15 Cadangan Proses untuk Mewujudkan Kumpulan Pelapis Pemimpin Sistem untuk Gred DG10 – DG14\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":75,"p":197,"t":"PEMBENTUKAN KUMPULAN PELAPIS PEMIMPIN PENDIDIKAN BERTERASKAN NILAI DAN BERWAWASAN\nSISTEMIK\nPembinaan kumpulan pelapis pemimpin pendidikan memastikan kelangsungan kepimpinan bermutu melalui pendekatan sistemik dengan mengenal pasti, membimbing,\ndan menyediakan barisan kepimpinan baharu.\n\nMembina kumpulan pelapis\npemimpin pendidikan berteraskan\nnilai dan berwawasan sistemik.\n\nMembangunkan modul\nberteraskan nilai dan\nwawasan sistemik serta\nmengintegrasikan elemen\nberkaitan dalam latihan\npemimpin muda yang akan\nditerajui oleh IAB.\n\nKerjasama dengan agensi\nluar dalam membudayakan\nnilai dan wawasan sistemik\nkepada pelapis pemimpin\npendidikan melalui latihan\nkepimpinan dalam\nperkhidmatan.\n\nTumpuan utama yang diperlukan dalam kalangan\nkumpulan pelapis pemimpin:\n• Pengaruh Berteraskan ilai ( alue-based Influence)\n• Pelaksanaan dan Sokongan\n• Visi dan Strategi Kepimpinan\n• Pembangunan Profesionalisme\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":75,"p":198,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPenstrukturan dan Persediaan\n\n•\n\nFasa 2\n(2028 – 2030)\nPengukuhan dan\nPelaksanaan Strategik\n\n•\n•\n\nFasa 3\n(2031 – 2035)\nPenstabilan dan Kelestarian\n\n•\n\nRajah 6.16 Garis Masa Pelaksanaan Strategi 4 Prakarsa 1\n\nBAB 6 TERAS STRATEGIK 3\n\n•\n•\n•\n\n•\n\n•\n\nPembinaan asas transformasi kepimpinan pendidikan melalui penggubalan dasar dan\nkerangka perancangan pengganti kepimpinan pendidikan.\nPembangunan pangkalan data pemimpin berpotensi.\nPengenalpastian kumpulan pelapis pemimpin melalui proses penilaian bakat.\nPembangunan modul latihan kepimpinan transformatif berasaskan nilai, kompetensi dan\nvisi masa hadapan.\nPelaksanaan menyeluruh dan pengukuhan sistem pembangunan kepimpinan.\nPengukuhan pangkalan data bakat kepimpinan bagi menyokong perancangan\npenggantian.\nPenilaian pelaksanaan bagi menilai keberkesanan strategi dan menentukan keperluan\npenambahbaikan.\nPembentukan kumpulan pelapis pemimpin pendidikan berteraskan nilai dan berwawasan\nsistemik.\nPembudayaan kepimpinan berasaskan nilai, inovasi dan pembelajaran berterusan."},{"sec":76,"p":199,"t":"PRAKARSA 2: MEWUJUDKAN KELUWESAN PENEMPATAN GURU\nBESAR DI SEKOLAH RENDAH DAN DARI SEKOLAH RENDAH\nKE SEKOLAH MENENGAH\nPrakarsa kedua ini bertujuan memaksimumkan impak kepimpinan melalui penempatan guru besar secara luwes yang bersesuaian dengan keperluan sekolah dan\nkompetensi yang dimiliki seperti penempatan guru besar ke jawatan pengetua. Langkah ini merupakan kunci kepada penambahbaikan di sekolah secara menyeluruh\ndan mampan kerana laluan kerjaya guru besar akan diperluaskan merentasi gred DG12 yang memberi peluang perkembangan kepimpinan yang berterusan.\nKeserasian kepimpinan mengikut lokaliti dapat meningkatkan prestasi sekolah. Kepakaran dan pengalaman pemimpin dimanfaatkan sepenuhnya di\nsamping menggalakkan pendekatan kepimpinan yang adaptif dan responsif.\n\nDG12\n\nDG12\n\nGuru besar Gred DG12 yang telah:\n• berkhidmat selama enam tahun\n• memenuhi syarat umum dan syarat\nkhusus yang ditetapkan oleh IAB dan\nBPSM\n\nGuru besar Gred DG12 yang telah:\n• berkhidmat sekurang-kurangnya\ntiga tahun\n• berjaya membuat pembaharuan\nkepada sekolah\n\nLaluan 1:\nGuru besar dinaikkan ke Gred DG13/DG14 tetapi kekal sebagai\nGuru Besar di sekolah rendah yang sama.\n\nLaluan 2:\nGuru besar dinaikkan ke Gred DG13/DG14 untuk menjawat jawatan\nPengetua di sekolah menengah mengikut keperluan dan syarat\nyang ditentukan.\n\nLaluan 3:\nBoleh dipindahkan ke sekolah rendah lain melalui penempatan\nsemula (job rotation) mengikut keperluan dan syarat yang\nditentukan.\n\nRajah 6.17 Cadangan Laluan untuk Keluwesan Penempatan Guru Besar\nBAB 6 TERAS STRATEGIK 3"},{"sec":76,"p":200,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPenstrukturan dan Persediaan\n\n•\n•\n•\n\nFasa 2\n(2028 – 2030)\nPelaksanaan Penempatan\n\n•\n\nPerancangan kepada pelaksanaan awal yang melibatkan projek rintis penempatan di\nbeberapa negeri atau daerah terpilih.\n\nFasa 3\n(2031 – 2035)\nPenstabilan dan Kelestarian\n\n•\n•\n\nPelaksanaan dasar penempatan keluwesan secara menyeluruh di semua negeri.\nPemantauan pelaksanaan dan audit prestasi tahunan akan dilakukan secara berterusan\nuntuk penambahbaikan.\n\nRajah 6.18 Garis Masa Pelaksanaan Strategi 4 Prakarsa 2\n\nPenggubalan dasar penempatan guru besar yang luwes melibatkan pengumpulan data\ndan maklum balas daripada pihak berkepentingan.\nPembangunan kerangka yang merangkumi syarat, panduan, kriteria serta mekanisme\npenempatan.\nKajian rintis untuk menguji kesesuaian kerangka.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":77,"p":201,"t":"PEMBOLEH DAYA: MEMBUDAYAKAN PENYELIDIKAN DAN\nINOVASI BERIMPAK TINGGI MELALUI PENUBUHAN PUSAT YANG\nMEMBERIKAN TUMPUAN KEPADA PENYELIDIKAN DAN INOVASI\nDI BAWAH KPM\nPenubuhan pusat yang memberikan tumpuan kepada penyelidikan dan inovasi pendidikan di bawah KPM merupakan langkah strategik dan kritikal untuk\nmemperkukuh amalan inovatif dan berkesan serta penggubalan dasar pendidikan berasaskan bukti. Pusat ini berperanan sebagai pusat rujukan terbaik (centre of\nexcellence) bagi amalan pendidikan yang terkini serta menyelaras pengurusan dan pelaksanaan penyelidikan. Fungsi pusat juga merangkumi pengurusan geran,\nlatihan, pemantauan dan penyebaran hasil yang berkaitan dengan aktiviti penyelidikan dan inovasi. Prakarsa ini bukan sahaja akan meningkatkan pelibatan\npendidik malah menyokong penghasilan penyelidikan dan inovasi yang berimpak tinggi. Penyelarasan tajuk dan bidang keutamaan juga memastikan\npenggunaan dana lebih berkesan dan mengelakkan pertindihan kajian.\n\nLaporan OECD (2022) menegaskan jurang antara penyelidikan\ndengan pelaksanaan dasar sering berlaku kerana tiadanya\nstruktur institusi yang menyokong pemindahan pengetahuan\nsecara sistematik. Tanpa pusat khusus, hasil penyelidikan berisiko\nkekal dalam dokumen akademik tanpa diterjemahkan ke dalam\ndasar atau amalan.\nUNESCO melalui laporan Reimagining our futures together: A new\nsocial contract for education (2021), menyeru negara anggota\nuntuk memperkukuh ekosistem penyelidikan pendidikan bagi\nmenangani cabaran abad ke-21 secara kolektif dan saintifik.\n\nInstitut Kurikulum dan Penilaian Korea (Korea Institute\nfor Curriculum and Evaluation - KICE) yang ditubuhkan\npada 1998 sebagai sebuah institusi penyelidikan yang\ndibiayai kerajaan, memainkan peranan penting dalam\nusaha meningkatkan mutu pendidikan sekolah rendah dan\nmenengah. KICE menjalankan penyelidikan menyeluruh\nberkaitan dengan kurikulum dan pentaksiran, merangka\ndasar pendidikan serta memastikan hasil penyelidikan\ndapat diterapkan secara berkesan dalam amalan.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":77,"p":202,"t":"Pusat ini memacu budaya penyelidikan dan inovasi pendidikan melalui bimbingan,\ninsentif dan pengiktirafan bagi menggalakkan serta menyokong pelibatan\naktif pendidik. Pangkalan data pusat diwujudkan untuk merekodkan pelibatan\ndan pencapaian dalam penyelidikan dan inovasi, termasuklah penulisan dan\npenerbitan jurnal, paten, hak cipta serta aktiviti komersialisasi.\nAkses terbuka kepada data dan dapatan penyelidikan akan memudahkan\npenyebaran hasil untuk diterjemahkan ke dalam amalan pendidikan di lapangan.\n\nKerjasama yang lebih erat dan mampan antara KPM dengan institusi pengajian\ntinggi dan agensi luar adalah penting untuk memupuk budaya perkongsian ilmu\ndan amalan terbaik. Melalui pusat ini, KPM berpotensi untuk menjadi peneraju\npenyelidikan pendidikan pada peringkat antarabangsa melalui penerbitan jurnal\nberindeks, kerjasama global dan pengiktirafan berprestij. Budaya penyelidikan\ndan inovasi ini menjadi asas pengukuhan dan penggerak pelaksanaan semua\nstrategi dalam Teras Strategik 3.\n\nGARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nAnalisis keperluan,\npemetaan dan pemusatan\n\nPembinaan kerangka serta keperluan asas penyelidikan dan inovasi di dalam sistem\npendidikan menerusi penubuhan pusat yang memberikan tumpuan kepada penyelidikan\ndan inovasi.\n\nFasa 2\n(2028 – 2030)\nPeluasan dan penilaian\nkeberkesanan\n\nPeluasan dan penilaian keberkesanan penyelidikan dan inovasi dalam sistem pendidikan\nnegara.\n\nFasa 3\n(2031 – 2035)\nPembudayaan penyelidikan\ndan inovasi\n\nPembudayaan amalan penyelidikan dan inovasi dalam sistem pendidikan negara dengan\nmemastikan hasil penyelidikan dan inovasi memberikan impak kepada dasar serta amalan\npendidikan secara meluas.\n\nRajah 6.19 Garis Masa Pelaksanaan Pemboleh Daya\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":78,"p":203,"t":"6.4 KESIMPULAN\nPendidik merupakan penggerak utama kejayaan pelaksanaan dasar dan reformasi pendidikan yang menyumbang kepada pembangunan negara. Transformasi\npendidikan hanya dapat direalisasikan apabila sistem pendidikan diterajui oleh tenaga pendidik yang berkeupayaan tinggi dan berorientasikan masa hadapan.\nPelaksanaan strategi dan prakarsa di bawah Teras Strategik 3 menegaskan komitmen berterusan KPM untuk memperkukuh profesionalisme keguruan dan meningkatkan\nkompetensi pendidik agar terus relevan dalam landskap pendidikan yang dinamik.\nMelalui pendekatan menyeluruh yang menitikberatkan peningkatan kompetensi, kesejahteraan, kepimpinan serta pembudayaan penyelidikan dan inovasi, pendidik\nakan mendapat sokongan yang menyeluruh dan bersedia menghadapi cabaran pendidikan abad ke-21. Usaha ini akan memperkukuh keupayaan sistem pendidikan\ndi Malaysia untuk melahirkan bakat masa hadapan yang beradab, berilmu, berkemahiran, berdaya tahan dan berkeyakinan selaras dengan aspirasi RPM 2026 – 2035.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":79,"p":204,"t":"BAB\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":80,"p":205,"t":"TERAS STRATEGIK 4 | MEMANTAPKAN PRASARANA FIZIKAL DAN DIGITAL DI\nSEMUA INSTITUSI PENDIDIKAN KPM\n\nRINGKASAN\nTeras Strategik 4 memberikan tumpuan kepada memantapkan prasarana di institusi pendidikan KPM serta bertujuan menyediakan persekitaran pembelajaran\nyang bersedia bagi menghadapi cabaran Revolusi Industri 4.0 dan agenda pendidikan global. Usaha ini melibatkan tiga komponen utama, iaitu prasarana ﬁzikal,\ndigital dan sistem maklumat pintar.\n\nSemua prakarsa dilaksanakan melalui\nPembangunan sistem maklumat pintar\nPembangunan prasarana bagi institusi\nSemua Prakarsa dilaksanakan melalui\nPembangunan sistem maklumat pintar\nperancangan\nberpandukan\ndata\ndan\nseperti Gudang Data (Enterprise Data\npendidikan baharu menggunakan\nperancangan berpandukan data dan\nseperti Gudang Data (Enterprise Data\nantara kementerian.Warehouse - EDW), Sistem\nWarehouse\n- EDW), Sistem Maklumat\nKerangka Sekolah Sedia Masa Hadapankolaborasikolaborasi\nantara kementerian.\nMaklumat\nPengurusan\nPengurusan Pendidikan\n(EducationalPendidikan (Educational\nmerangkumi reka bentuk sejagat dan\nManagement Information\nSystem - Information System Management\nkelestarian, serta menekankan\naspek prasarana\ndigital, KPM\nEMIS), Sistem Bersepadu\nKPMSistem\n(MinistryBersepadu KPM (Ministry\nDari aspekDari\ninfrastruktur\ndan\nEMIS),\npenggunaan bahan mesra alam dan\nof Education Integrated System berusaha\nuntuk\nmemperkukuh\ninfostruktur\ndigital,\nKPM\nberusaha\nof Education Integrated System kecekapan tenaga.\nAwal (Early\nuntuk memperkukuh\npenggunaan\npenggunaan\nteknologi denganMOEIS) dan Sistem Amaran\nMOEIS)\ndan Sistem Amaran Awal (Early\nWarning System - EWS)\nmemperkukuh\nteknologi dengan\nmenyediakan\nbilik\nmenyediakan bilik darjah digital, peranti\nWarning\nSystem - EWS) memperkukuh\ntadbir\nurus\npendidikan\nberpandukan\nperanti untuk guru\nDi kawasan bandar padat, pendekatan darjah digital,\nuntuk guru dan murid serta capaian\ntadbir urus pendidikan berpandukan\ndata dan bukti.\ndan murid serta capaian Internet\nsekolah menegak dan Pembangunan\ninternet\ndata dan bukti.\nberkelajuan\ntinggi. berkelajuan tinggi.\nBerorientasikan Transit (TransitOriented Development - TOD) diperluas.\nSistem ini berupaya memberikan\nSistem ini berupaya memberikan\nbaharu\nseperti AI, Realiti\namaran awal untuk murid\nberisiko\namaran\nawal untuk murid berisiko\nTeknologi Teknologi\nbaharu seperti\nAI, Realiti\nkeciciran\ndan membantu\nLanjutanReality\n(Extended\nReality - XR)\ndan pembelajaran\nLanjutan (Extended\n- XR) dan\nkeciciran\npembelajaran dan membantu\nDi kawasan pedalaman, tumpuan\nmembuat keputusan strategik melalui\nsistem pengurusan\npembelajaranpembelajaran\nsistem pengurusan\nmembuat keputusan strategik melalui\npenggunaan data masa nyata.\ndiberikan kepada penyediaan\n(Learning Management\nSystem (Learning Management\nSystem\npenggunaan data masa nyata.\npembelajaran\nprasarana pendidikan yang mampan. LMS) memperkasakan\nLMS) memperkasakan pembelajaran\nsepanjang hayat serta menjadikan\nSinergi antara ketiga-tiga komponen ini\nhayat serta menjadikan\nSinergi antara ketiga-tiga komponen\npendidikansepanjang\nlebih interaktif.\nakan memastikan institusi pendidikan\npendidikan lebih interaktif.\nini akan memastikan institusi\nkekal\nrelevan, dinamik dan\npendidikan KPM kekalKPM\nrelevan,\ndinamik\ndan berdaya saing bagi\nmenghadapi\nberdaya\nsaing bagi menghadapi\ncabaran global.\ncabaran global.\nBAB 7 TERAS STRATEGIK 4"},{"sec":81,"p":206,"t":"7.1 PENGENALAN DAN RASIONAL\nPrasarana pendidikan merupakan tunjang utama kepada sistem pendidikan negara yang berdaya\ntahan, saksama dan responsif terhadap perubahan zaman. Teras ini menekankan pembangunan\nprasarana dengan memberikan tumpuan pada tiga komponen utama, iaitu (i) memperkukuh\npembangunan prasarana yang terangkum dan lestari; (ii) peluasan prasarana digital pendidikan\nserta; (iii) mewujudkan sistem pintar dan tadbir urus berpandukan data.\nPelaksanaan Teras Strategik 4 turut mendorong transformasi digital yang menyeluruh melalui\nintegrasi sistem maklumat, AI dan analitik data raya dalam pengurusan pendidikan.\nTeras ini berperanan sebagai pemangkin transformasi sistem pendidikan kebangsaan dengan\nmemastikan semua sekolah, kolej dan institut pendidikan guru dilengkapi dengan kemudahan ﬁzikal\ndan digital yang terkini, kondusif, selamat dan menyokong pembelajaran abad ke-21.\nTeras Strategik 4 memberikan tumpuan kepada pembangunan institusi pendidikan berorientasikan\nkeperluan masa hadapan melalui prasarana yang terangkum, bilik darjah berdaya digital serta\nsistem pintar dan bersepadu. Tumpuan ini penting bagi memastikan persekitaran pembelajaran\nyang saksama, berimpak tinggi dan mampu merapatkan jurang pendidikan sedia ada antara\nsekolah bandar, luar bandar, pedalaman dan pulau.\nBerdasarkan data semasa, masih terdapat sekolah KPM yang belum memenuhi tahap piawaian\nminimum prasarana asas seperti bekalan elektrik, bekalan air bersih, kemudahan tandas yang\nsempurna dan bilik darjah yang kondusif. Keadaan ini sekali gus menjejaskan mutu pembelajaran\nserta melebarkan jurang dalam kalangan murid di pelbagai lokasi. Oleh itu, Teras Strategik 4\nmenggariskan beberapa prakarsa bersasar yang bakal dilaksanakan bagi meningkatkan tahap\nprasarana ﬁzikal dan digital di sekolah yang masih berada di bawah garis asas agar semua murid,\ntanpa mengira lokasi atau latar belakang mempunyai peluang pembelajaran yang setara.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":81,"p":207,"t":"Beberapa prakarsa di bawah Teras Strategik 4 turut memberikan tumpuan\npada meningkatkan mutu persekitaran pembelajaran melalui pemodenan bilik\ndarjah dengan teknologi pembelajaran digital dan AI, peluasan capaian internet\nberkelajuan tinggi serta pemantapan sistem maklumat yang membolehkan\npenggunaan data secara pintar dan strategik.\nTiga strategi yang digariskan adalah seperti yang berikut\n• Memperkukuh pembangunan prasarana yang terangkum dan lestari.\n• Memperkasakan prasarana digital untuk pendidikan.\n• Menambah baik sistem pintar dan tadbir urus berpandukan data.\n\nPelaksanaan strategi memerlukan pelbagai input termasuklah peruntukan\npembangunan daripada RMK, dana alternatif daripada sektor swasta, data\nbersistem daripada EMIS, E\n, pelantar ELIMa, serta sokongan kepakaran\nteknikal dan teknologi pendidikan. Akti iti utama merangkumi pembangunan dan\nnaik taraf sekolah berasaskan reka bentuk sejagat yang terangkum, pemberian\nperanti digital kepada murid dan pendidik secara menyeluruh, peluasan\nsambungan internet stabil dan berkelajuan tinggi ke semua institusi pendidikan\nserta pembangunan sistem digital bersepadu seperti LMS, E S dan Business\nIntelligence Dashboard.\nMelalui pelaksanaan prakarsa ini, beberapa output utama disasarkan, antaranya\ntermasuklah persekitaran pembelajaran yang lengkap dan selamat, penggunaan\npelantar ELIMa secara aktif oleh pendidik dan murid, pelaksanaan sistem\npenyelenggaraan yang sistematik serta capaian digital yang saksama di semua\ninstitusi pendidikan. Selain itu, sistem pengurusan berpandukan data dapat\nmenyokong tadbir urus yang telus dan responsif terhadap keperluan sebenar.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":82,"p":208,"t":"7.2 KEADAAN SEMASA\nKPM melaksanakan pelbagai prakarsa pembangunan dan penaiktarafan\nkemudahan pendidikan sejak beberapa dekad lalu, termasuklah pembinaan bilik\ndarjah baharu, penyediaan kemudahan untuk pendidikan khas, kemudahan\nmesra alam sekitar serta pembinaan semula bangunan sekolah yang daif secara\nberperingkat. Usaha turut ditumpukan pada pengukuhan keupayaan sekolah\ndalam usaha mendukung pelaksanaan pedagogi digital melalui penyediaan\nperalatan teknologi pendidikan dan akses internet yang stabil.\nLangkah-langkah ini menyokong pembangunan sistem pendidikan yang lebih\nlestari dan berdaya saing.\nTeras Strategik 4 juga mengambil kira keperluan global terhadap kelestarian\ndan daya tahan prasarana pendidikan. Amalan terbaik antarabangsa seperti\nprakarsa Right to Learn di Finland, Building Schools for the Future di United\nKingdom dan sekolah pintar berasaskan TMK di Korea Selatan menunjukkan\nbahawa pelaburan dalam reka bentuk sejagat, sistem digital bersepadu dan\ntadbir urus berasaskan data mampu memperkukuh mutu pendidikan serta\nkesaksamaan akses.\nMenyedari hakikat ini, Malaysia perlu bergerak seiring dengan arus global\nmelalui pembangunan prasarana yang terangkum dan lestari serta berdaya\nsaing.\nPembangunan prasarana pendidikan ini mencerminkan komitmen berterusan\nKPM dalam usaha memperkukuh asas ﬁzikal dan digital institusi pendidikan di\nseluruh negara. Selain itu, penggunaan pelantar DELIMa yang digunakan secara\naktif oleh pendidik dan murid serta perancangan pembinaan kerangka sekolah\nmasa hadapan menjadi pemacu utama kepada transformasi kemudahan\npendidikan.\n\nBAB 7 TERAS STRATEGIK 4\n\nNamun begitu, masih terdapat kelemahan ketara, khususnya dari aspek\nketidakseimbangan pembangunan prasarana antara kawasan bandar, luar\nbandar dan pedalaman. Banyak sekolah masih belum memenuhi keperluan\nminimum dari segi kemudahan ﬁzikal dan akses kepada teknologi digital.\nKebergantungan terhadap kaedah penyelenggaraan secara pembetulan\n(corrective maintenance) pula menjejaskan kecekapan pengurusan aset dan\nmenyumbang kepada peningkatan kos jangka masa panjang. Di samping itu,\nhanya 48 peratus murid dikenal pasti menggunakan pelantar DELIMa secara\naktif. Walaupun penggunaan aktif pelantar DELIMa adalah tinggi, masih\nterdapat 24 peratus guru yang berada pada tahap asas dalam kompetensi\ndigital. Situasi ini menggambarkan wujudnya jurang kesediaan digital yang perlu\ndiatasi melalui pendekatan yang lebih strategik.\nFaktor luaran turut membawa pelbagai peluang dan cabaran. Antara peluang\nyang dikenal pasti termasuklah keserasian Teras Strategik 4 dengan dasar\nnasional seperti RMK13 dan Dasar Pendidikan Digital, di samping potensi\nkerjasama melalui kaedah pembiayaan alternatif seperti perkongsian\nawam-swasta (Public Private Partnership), tanggungjawab sosial korporat\n(Corporate Social Responsibility - CSR) serta pelibatan komuniti. Kemajuan\nteknologi seperti AI, analitik data raya (big data analytics) dan sistem\npengkomputeran awan (cloud computing) turut menyediakan ruang bagi\npenambahbaikan ketara dalam pendekatan pembelajaran dan tadbir urus\npendidikan. Walau bagaimanapun, faktor seperti ketidaktentuan ekonomi,\nperubahan iklim, isu keselamatan data serta jurang prasarana digital antara\nkawasan dikhuatiri menjadi penghalang kepada kejayaan pelaksanaan Teras\nStrategik 4."},{"sec":83,"p":209,"t":"7.3 MATLAMAT\nMatlamat Teras Strategik 4 adalah untuk memantapkan prasarana di semua institusi pendidikan KPM. Teras ini dilaksanakan melalui tiga strategi utama yang saling\nmelengkapi, iaitu pembangunan prasarana yang terangkum dan lestari, prasarana digital untuk pendidikan serta sistem pintar dan tadbir urus berpandukan data.\n\nTERAS STRATEGIK 4\n\nMEMANTAPKAN PRASARANA FIZIKAL DAN DIGITAL DI SEMUA\nINSTITUSI PENDIDIKAN KPM\n\nSTRATEGI 1\n\nSTRATEGI 2\n\nSTRATEGI 3\n\n1.\n\nMemperkukuh pembangunan prasarana\npendidikan yang strategik dan responsif.\n\n1.\n\nMentransformasikan pengalaman\npembelajaran dengan inovasi teknologi.\n\n1.\n\n2.\n\nMemantapkan pengurusan aset,\npenyelenggaraan proaktif dan berfasa\nuntuk kelestarian prasarana KPM.\n\n2.\n\nMenambah baik prasarana digital\ndi institusi pendidikan.\n\n3.\n\nMemperkasakan prasarana dan sokongan\npembelajaran bagi pendidikan khas.\n\n4.\n\nMemperkukuh kemudahan sedia ada yang\nberfungsi, terangkum dan berimpak.\n\nMemperkukuh Pembangunan\nPrasarana yang Terangkum dan Lestari\n\nMemperkasakan Prasarana Digital\nuntuk Pendidikan\n\nMenambah Baik Sistem Pintar dan\nTadbir Urus Berpandukan Data\nMemperkukuh tadbir urus pendidikan\nmelalui sistem maklumat dan data pintar\nserta terhubung.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":84,"p":210,"t":"STRATEGI 1: MEMPERKUKUH PEMBANGUNAN PRASARANA\nYANG TERANGKUM DAN LESTARI\nPrakarsa Strategi 1\n\nMemperkukuh pembangunan\nprasarana pendidikan yang\nstrategik dan responsif\n\nMemperkasakan prasarana dan\nsokongan pembelajaran bagi\npendidikan khas\n\nMemantapkan pengurusan aset,\npenyelenggaraan proaktif dan\nberfasa untuk kelestarian\nprasarana KPM\n\nMemperkukuh kemudahan\nsedia ada yang berfungsi,\nterangkum dan berimpak\n\nPrasarana sedia ada didapati belum sepenuhnya memenuhi\nkehendak kurikulum baharu, keperluan transformasi digital serta\nkeperluan murid berkeperluan pendidikan khas (MBPK). Teras\nStrategik 4 Strategi 1 menekankan perkara yang berikut:\n•\n\nMemanjangkan jangka hayat prasarana dan\nmempertingkatkan keberkesanan perancangan\npembangunan pendidikan.\n\n•\n\nMelaksanakan Kerangka Sekolah Sedia Masa Hadapan\nsebagai asas kepada pembangunan sekolah yang luwes,\nmampan dan responsif terhadap keperluan lokaliti serta\nperubahan masa hadapan.\n\n•\n\nMemastikan akses pendidikan yang setara bagi MBPK\ndengan mengintegrasikan prinsip keterangkuman dalam\nreka bentuk dan pelaksanaan prasarana pendidikan.\n\n•\n\nMelengkapkan kemudahan asas di sekolah dan menaik taraf\nserta mengoptimumkan penggunaan kemudahan sedia ada\nbagi mewujudkan persekitaran pembelajaran yang dinamik,\nmoden, terangkum dan berimpak tinggi.\n\n•\n\nMemodenkan Pusat Sumber Sekolah (PSS) dengan\npenyesuaian semula fungsinya agar dapat menyokong\nmodel pembelajaran hibrid, pendidikan STEM, literasi digital\ndan perkembangan bakat murid secara bersepadu.\n\nRajah 7.1 Prakarsa bagi Strategi 1\n\n•\n\nBAB 7 TERAS STRATEGIK 4\n\nkurang dimanfaatkan seperti sekolah kurang murid (SKM)\ndan kuarters yang tidak digunakan."},{"sec":85,"p":211,"t":"PRAKARSA 1: MEMPERKUKU PEMBA U A PRASARA A\nPENDIDIKAN YANG STRATEGIK DAN RESPONSIF\nPrakarsa\nini\nmemberikan\ntumpuan\npada\nmemperkukuh pembangunan prasarana pendidikan\nsecara menyeluruh dengan menyeimbangkan\nkeperluan fizikal, pedagogi dan kesaksamaan akses\nkepada pendidikan bermutu. Usaha ini bertujuan\nmerapatkan jurang prasarana antara bandar,\nluar bandar dan pedalaman, serta memastikan\nkemudahan sedia ada sejajar dengan keperluan\nkurikulum baharu, pendekatan digital dan keperluan\nMBPK.\n\nSekola Sedia Masa adapan\n\nt re Ready Sc ool\n\nRS\n\nMerupakan institusi pendidikan KPM yang reka bentuk bangunan dan persekitaran alam bina mematuhi brif\ndan spesifikasi mengikut keperluan reka bentuk sejagat (uni ersal design), lokaliti, kurikulum, jenis institusi\npendidikan KPM serta keperluan bangunan hijau dan pasif.\n\nPelaksanaan prakarsa ini diterajui melalui Kerangka\nSekolah Sedia Masa adapan yang berasaskan tiga\nprinsip utama, iaitu seperti yang berikut\n1.\n\n2.\n\n3.\n\nReka bentuk sejagat yang mengutamakan\nkeluwesan ruang pembelajaran, akses untuk\nsemua murid termasuklah MBPK dan integrasi\nteknologi pendidikan terkini.\nPembangunan mampan yang menggabungkan\nunsur hijau seperti sistem penuaian air hujan,\ntenaga boleh diperbaharui dan bahan binaan\nyang mesra alam.\nPendekatan kontekstual yang memastikan reka\nbentuk sekolah mengambil kira faktor geografi,\nbudaya dan keperluan komuniti setempat.\n\nReka Bent k Se agat\ndan Prevention through\nDesign PtD\n\nKelestarian dan\nBang nan i a\n\nReka Bent k\nBerasaskan Konteks\n\nKecekapan dan\nKepraktisan\n\nKeperl an Asas\ndan ngsi\n\nRuang atau bilik darjah\nluwes dengan kaedah\nPdP yang tradisional,\npendidikan terbuka dan\nhibrid.\n\n• Reka bentuk hijau dan\npasif (contohnya jimat\ntenaga, penuaian air\nhujan dan panel solar).\n\n• Reka bentuk bangunan\nmenitikberatkan\nkeadaan setempat\nseperti ribut, banjir,\nlaluan haiwan liar,\nseismik dan pesisir laut.\n\n• Kaedah pembinaan\nyang lebih efektif dari\nsegi masa, kos dan\npraktikal (contohnya\nIndustrialised Building\nSystem - IBS).\n\nKeperluan asas untuk\npembelajaran yang\nselesa dan kondusif\ndipenuhi.\n\n• Reka bentuk bersepadu\ndan terangkum.\n\nModel baharu sekolah\nmenegak ( ertical\nschool).\n\n• Reka bentuk mesra\npenyelenggaraan.\n\n• Reka bentuk dengan\nciri keselamatan khusus.\n\nGaris Pand an dan R\nPematuhan aris Panduan Peraturan Pembangunan oleh Kementerian\nEkonomi (KE) dan aris Panduan Kemudahan Masyarakat oleh PLA Malaysia.\nReka bentuk sejagat MS1184.\n\nRa a\n\nKeperluan asas\nmengikut kurikulum\ndipatuhi.\nKomunikasi dua hala\nwujud antara infra\ndengan murid dalam\npelaksanaan kurikulum.\n\nkan\n\nPematuhan keperluan B MBA (Uniform Building By-Laws - UBBL)\nPematuhan syarat-syarat Pihak Berkuasa Tempatan (PBT)\nTatacara perolehan dan tempoh pelaksanaan.\n\n2 Kerangka Sekolah Sedia Masa adapan (Future Ready School)\nBAB 7 TERAS STRATEGIK 4"},{"sec":85,"p":212,"t":"Kaedah pembinaan moden seperti Sistem Binaan Berindustri (Industrialised\nBuilding System - IBS) dan Pemodelan Maklumat Bangunan (Building Information\nModelling - BIM) digunakan bagi mempertingkatkan tahap kecekapan serta\nketepatan dalam proses pembinaan. Selain itu, pelbagai sumber pembiayaan\nturut diteroka melalui kerjasama antara sektor awam dan swasta, sumbangan\npihak korporat melalui program CSR dan pelibatan komuniti setempat serta\nalumni sekolah. Pengoptimuman bangunan sedia ada turut dilaksanakan bagi\nmenambah baik penggunaan ruang pembelajaran.\n\nPrakarsa ini dijangka menghasilkan prasarana pendidikan baharu yang\nmemenuhi keperluan semasa, anjal dan berdaya tahan. Bilik darjah dilengkapi\ndengan kemudahan teknologi terkini yang menyokong pedagogi abad ke-21,\nmanakala standard kebolehcapaian dan akses bagi MBPK dapat dilaksanakan\nsecara menyeluruh di semua institusi pendidikan KPM.\n\nGARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut\n\nRa a\n\nasa\n2026 202\nPenam a aikan\nPelaksanaan dan\nKerangka\n\nMenubuhkan awatankuasa Teknikal FRS untuk menyelaraskan dasar, garis panduan dan penanda\naras antarabangsa. Fasa ini menumpukan pada pembangunan asas kerangka berteraskan reka\nbentuk sejagat, kelestarian, fungsi asas dan kesesuaian konteks tempatan sebagai panduan\nutama pelaksanaan.\n\nasa 2\n2030\nPenginstit sian\nKerangka dan\nPem rnian\n\nMelaksanakan SLU bersama-sama pihak berkepentingan bagi menambah baik dan\nmemuktamadkan kerangka. Uji laksana simulasi projek perintis turut dijalankan bagi menilai\nkepraktisan, keluwesan dan keberkesanan sebelum diterbitkan dalam bentuk panduan rasmi\npelaksanaan.\n\nasa 3\n2035\nPenilaian Impak dan\nPenam a aikan\nBerter san\n\nMenilai keberkesanan pelaksanaan berdasarkan kos, keberfungsian prasarana dan kesesuaian\ndengan lokaliti. apatan penilaian digunakan untuk menambah baik pelaksanaan dan\nmemastikannya kekal rele an serta mampan mengikut perubahan keperluan pendidikan,\npersekitaran sosial semasa dan teknologi semasa.\n\n3 aris Masa Pelaksanaan Strategi 1 Prakarsa 1\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":86,"p":213,"t":"PRAKARSA 2: MEMA TAPKA PE URUSA ASET,\nPE ELE\nARAA PR AKTIF A BERFASA U TUK\nKELESTARIAN PRASARANA KPM\nPrakarsa ini bertujuan memperkukuh sistem pengurusan aset sedia ada dengan beralih daripada pendekatan reaktif kepada pengurusan aset yang bersifat proaktif,\nsistematik dan berkesan. Pelaksanaannya dirancang secara berfasa dari tahun 2026 hingga tahun 2035 bagi memastikan semua proses perolehan, penyelenggaraan\ndan pemantauan aset dilaksanakan dengan teratur.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":86,"p":214,"t":"Jadual 7.1 Kerangka Konsep Pemantapan Pengurusan Aset, Penyelenggaraan Proaktif dan Berfasa untuk Kelestarian Prasarana KPM\n\nMEMANTAPKAN PENGURUSAN ASET, PENYELENGGARAAN PROAKTIF DAN\nBERFASA UNTUK KELESTARIAN PRASARANA KPM\ndan melengkapkan data aset bagi pengurusan sumber yang lebih strategik dan berkesan.\n\nSorotan Projek:\n\nPenerangan Konsep: Pemantapan pengurusan aset yang lebih strategik dengan pematuhan kepada Dasar Pengurusan Aset Kerajaan. Antara\nstrategi yang dicadangkan termasuklah mengambil kira penyelenggaraan secara pencegahan (preventive maintenance), selain penyelenggaraan\nsecara pembetulan (corrective maintenance) yang sedia ada dilaksanakan. Hal ini bagi meningkatkan keberkesanan dan kecekapan pengurusan aset,\npenyelarasan sumber, menepati piagam pelanggan serta memanjangkan jangka hayat aset\n\nPengurusan Fasiliti\nAset Bersepadu\n\nPerancangan pelaksanaan\npenyelenggaraan secara pencegahan\n(preventive maintenance) bagi\nmeningkatkan keberkesanan dan\nmengurangkan kos jangka panjang seperti\npengurusan penyelenggaraan secara\nFacility Management dan Task-based.\n\nRasionalisasi\nPerjawatan Teknikal\n\nPenstrukturan semula bilangan\nperjawatan teknikal di PPD dan\nJPN untuk menyokong pelaksanaan\n\nDigitalisasi\ndan Teknologi\n\nPenggunaan teknologi untuk\nmengurus data-data penyelenggaraan\naset kerajaan seperti penggunaan\ndashboard dan penambahbaikan\nsistem EMIS.\nPerancangan jangka masa panjang\nuntuk Penggunaan Building Information\nModeling (BIM) sebagai pangkalan data\nkitar hayat aset untuk pemantauan dan\nanalisis bersepadu.\n\nPengurusan aktiviti OSPPUN\n(Operasi, Senggara, Pemulihan,\nPemuliharaan, Ubah Suai dan Naik Taraf)\nsecara sistematik.\n\nPengukuhan Dasar dan\nRancangan Strategik\n\nMemperkasakan pelaksanaan Pelan\nStrategik Pengurusan Aset (PSPA)\nOperasi berlandaskan Tatacara\nPengurusan Aset Tak Alih Kerajaan\n(TPATA), Tatacara Pengurusan Aset Alih\nKerajaan KM 2/1 dan Pelan Pengurusan\nPerolehan.\n\nMelengkapkan prasarana dan aset pendidikan bagi memastikan kemudahan pengajaran\ndan pembelajaran yang terangkum mengikut keperluan.\n\nMengoptimumkan\nperuntukan perolehan aset.\n\nperalatan digital, makmal dan bengkel.\n\nKeluwesan pengurusan\nperolehan semasa.\n\nInstitusi dan aset KPM mempunyai jangka hayat lebih lama dan berdaya tahan dengan kefungsian\nserta penggunaan sumber yang optimum dan pulangan pelaburan yang tinggi kepada kerajaan\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":86,"p":215,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut\n\nProfil Aset Pem ang nan Sistem\nasa\n(2026 — 202\nangka Pendek\n\n•\n\n•\n\nRa a\n\nPenambahan/integrasi modul ke dalam EMIS melibatkan modul\n1. Penyelenggaraan\n2. Premis Bukan Sekolah\n3. Laporan penilaian Facility Condition Assessment (FCA)\n4. Pelaporan penilaian Building Condition Assessment (BCA)\nPenambahbaikan sistem pelaporan melalui dashboard.\n\nasa 2\n(2028 — 2030\nangka Seder ana\n\n•\n•\n\nPenambahan/integrasi modul ke dalam EMIS melibatkan modul\n1. Pelaporan penilaian BCA\nPenambahbaikan sistem pelaporan melalui dashboard.\n\nasa 3\n(2031 — 2035\nangka Pan ang\n\n•\n•\n\nSistem yang boleh membantu pelaksanaan penyelenggaraan proaktif.\nPenambahbaikan sistem secara berterusan.\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":86,"p":216,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut:\n\nPembangunan Kapasiti dan Kompetensi dalam Pemulihan dan Penyelenggaraan Aset\nFasa 1\n(2026 — 2027)\nJangka Pendek\n\n•\n\nFasa 2\n(2028 — 2030)\nJangka Sederhana\n\n•\n\nPeningkatan bilangan staf bukan pendidik yang terlatih dan mendapat pensijilan\ndalam pengurusan aset dan penyelenggaraan.\n\nFasa 3\n(2031 — 2035)\nJangka Panjang\n\n•\n\nSekolah dan premis bukan sekolah mempunyai sekurang-kurangnya satu staf\nbukan pendidik yang terlatih dan mendapat pensijilan dalam pengurusan aset\ndan penyelenggaraan.\n\nRajah 7.5 Garis Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4\n\n•\n\nKit pengurusan aset yang menyeluruh dibangunkan termasuklah pusat sehenti\n(One Stop Centre - OSC), spesiﬁkasi, dasar dan garis panduan.\nLatihan bagi meningkatkan kompetensi staf bukan pendidik bagi pengurusan\naset dan penyelenggaraan."},{"sec":86,"p":217,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut\n\nPenubuhan Task Force Pem li an dan Penyelenggaraan Aset\n\nRa a\n\nasa\n(2026 — 202\nangka Pendek\n\n•\n\nPenubuhan task force/ response team yang terdiri daripada Subject Matter\nExpert (SME)/ pakar berpengetahuan teknikal dalam penyelenggaraan,\nperolehan dan pengurusan aset mengikut zon untuk semua institusi pendidikan\nKPM.\n\nasa 2\n(2028 — 2030\nangka Seder ana\n\n•\n\nPeluasan task force/response team yang terdiri daripada SME/pakar\nberpengetahuan teknikal dalam penyelenggaraan, perolehan dan pengurusan\naset mengikut zon untuk semua institusi pendidikan KPM.\n\nasa 3\n(2031 — 2035\nangka Pan ang\n\n•\n\nPeluasan task force/response team yang terdiri daripada SME/pakar\nberpengetahuan teknikal dalam penyelenggaraan, perolehan dan pengurusan\naset ke semua institusi pendidikan KPM.\n\n6 aris Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":86,"p":218,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut\n\nKemampanan Ke angan dan S m er dalam ad ir r s Aset Kera aan\nMengurangkan kebergantungan dana kerajaan melalui pendanaan swasta\n\nasa\n(2026 — 202\nangka Pendek\n\n•\n•\n\nRa a\n\nasa 2\n(2028 — 2030\nangka Seder ana\n\n•\n\nasa 3\n(2031 — 2035\nangka Pan ang\n\n•\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4\n\n•\n\n•\n\nPenganjuran SLU bersama-sama Kementerian Kewangan, Syarikat Berkaitan\nKerajaan ( o ernment-Linked Company - LC), Lembaga asil alam egeri\n(L\n), agensi swasta,\ndan pihak berkepentingan.\nCadangan pelepasan cukai bagi sumbangan penyelenggaraan, perolehan aset\ndan pembekal utiliti.\n\nPeratusan pelibatan sumbangan peruntukan agensi swasta,\ndan agensi\nkerajaan lain terus meningkat.\nPeratusan sekolah yang menerima manfaat daripada prakarsa pengurangan\nkebergantungan dana kerajaan meningkat.\n\nPeratusan pelibatan sumbangan peruntukan agensi swasta,\ndan agensi\nkerajaan lain terus meningkat.\nPeratusan sekolah yang menerima manfaat daripada prakarsa pengurangan\nkebergantungan dana kerajaan terus meningkat."},{"sec":86,"p":219,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut\n\nKeadaan Aset dan Kecekapan perasi\n\nRa a\n\nasa\n(2026 — 202\nangka Pendek\n\n•\n\nAset kritikal diselenggarakan mengikut jadual melalui pendekatan\npenyelenggaraan pencegahan yang merangkumi sistem bekalan air, sistem\nelektrik, sistem mekanikal dan sistem pembentungan.\n\nasa 2\n2030\nangka Seder ana\n\n•\n\nAset kritikal diselenggarakan mengikut jadual melalui pendekatan\npenyelenggaraan pencegahan yang merangkumi sistem bekalan air, sistem\nelektrik, sistem mekanikal dan sistem pembentungan.\n\nasa 3\n2035\nangka Pan ang\n\n•\n\nAset kritikal diselenggarakan mengikut jadual melalui pendekatan\npenyelenggaraan pencegahan yang merangkumi sistem bekalan air, sistem\nelektrik, sistem mekanikal dan sistem pembentungan.\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":86,"p":220,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini dilaksanakan melalui tiga fasa seperti yang berikut\n\nKetersediaan Aset Ali yang Berdaya Ta an Memen i Elemen Hi a\nErgonomik F t ristik dengan Teknologi Semasa dan Kepel agaian F ngsi\n\nRa a\n\nasa\n(2026 — 202\nangka Pendek\n\n•\n\nPenghasilan dokumen standard spesifikasi bagi perolehan aset yang memenuhi\nkriteria berdaya tahan, memenuhi elemen ergonomik, futuristik dan pelbagai\nfungsi.\n\nasa 2\n(2028 — 2030\nangka Seder ana\n\n•\n\nPelaksanaan perolehan aset berpandukan spesifikasi standard.\n\nasa 3\n(2031 — 2035\nangka Pan ang\n\n•\n•\n\nPelaksanaan perolehan aset berpandukan spesifikasi standard.\nSemakan dan kajian semula standard spesifikasi.\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 2\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":87,"p":221,"t":"PRAKARSA 3: MEMPERKASAKAN PRASARANA DAN SOKONGAN\nPEMBELAJARAN PENDIDIKAN KHAS\nPrakarsa ini menumpukan kepada pemerkasaan prasarana dan sokongan pembelajaran pendidikan khas kepada MBPK sejajar dengan peningkatan enrolmen yang\nketara, khususnya dalam tempoh lima tahun sejak tahun 2020 (Rajah 7.10). Pelaksanaan prakarsa ini menuntut kepada keperluan peluasan program pendidikan\nkhas yang merangkumi Sekolah Pendidikan Khas (SPK), Program Pendidikan Khas Integrasi (PPKI) dan Program Pendidikan Inklusif (PPI), melengkapkan kemudahan\nmesra Orang Kelainan Upaya (OKU) serta memantapkan perkhidmatan sokongan dan pembelajaran pendidikan khas secara mampan, sistematik dan terancang untuk\nmemastikan sistem pendidikan yang terangkum serta akses saksama bagi MBPK. Prakarsa ini selaras dengan dasar yang menekankan pendidikan untuk semua tanpa\ndiskriminasi serta komitmen Malaysia terhadap Konvensyen Tentang Hak Orang Kurang Upaya Pertubuhan Bangsa-Bangsa Bersatu (United Nations Convention on the\nRights of Persons with Disabilities - CRPD).\n\nBilangan MBPK Mengikut Program Pendidikan Khas\n2025\n\nTahun\n\n2024\n\n2023\n\n25,043\n\nTahun\n\nJumlah\n\nPeratus\nPeningkatan (%)\n\n2020\n\n93,951\n\n-\n\nSekolah Pendidikan Khas (SPK)\n\n2021\n\n97,220\n\n3.48\n\nProgram Pendidikan Khas Integrasi (PPKI)\n\n2022\n\n105,785\n\n8.81\n\nProgram Pendidikan Inklusif\n(PPI Penuh di Arus Perdana Sahaja)\n\n2023\n\n116,044\n\n9.70\n\n2024\n\n132,264\n\n13.98\n\n2025\n\n147,512\n\n11.53\n\n119,225\n\n3244\n22,344\n\n106,827\n\n3093\n18,949\n\n94,237\n\n2858\n17,713\n\n2022\n\n85,362\n\n2710\n16,504\n\n2021\n2686\n\n16,855\n\n2020\n\n78,030\n\n74,447\n\n2649\n\nBilangan Murid\n\nSumber: Bahagian Pendidikan Khas, data seperti pada 31 Oktober 2025\n\nRajah 7.10 Enrolmen MBPK yang Berdaftar di Sekolah KPM (2020 – 31 Oktober 2025)\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":87,"p":222,"t":"Pelaksanaan prakarsa ini menumpukan kepada tiga isu utama, iaitu kekurangan kemudahan mesra KU di\ninstitusi pendidikan KPM, capaian terhad kepada Pusat Perkhidmatan Pendidikan Khas (3PK) dan\nkekurangan peralatan serta bahan sokongan pembelajaran yang bersesuaian.\n\nPelaksanaan prakarsa secara berfasa melalui tiga komponen utama\n\nRa a\n\nMelengkapkan\nkem da an\nmesra K\n\nPel asan\nperk idmatan\n3PK\n\nPem ekalan peralatan\nsokongan pem ela aran\npendidikan k as\n\nPenyediaan kemudahan asas mesra\nKU seperti susur landai, susur\ntangan, tandas KU dan parkir\nKU serta kemudahan KU lain\nseperti laluan taktil (tactile path), lif,\nsistem amaran kecemasan (lampu\nstrob dan loceng kecemasan) dan\nkemudahan lain selaras dengan reka\nbentuk sejagat (uni ersal design).\nFasa awal memberikan keutamaan\nkepada institusi pendidikan KPM yang\nmempunyai MBPK.\n\nPenubuhan premis tetap 3PK\negeri di egeri Sembilan, P\nKuala Lumpur dan P Labuan\nserta penubuhan 3PK daerah dan\npewujudan 3PK Bergerak untuk\nkawasan yang sukar mendapat\nakses kepada perkhidmatan\nsokongan pendidikan khas.\n\nPembelian peralatan, kerjasama\nsektor awam dan swasta serta\nmenggalakkan ino asi tempatan.\nAntara peralatan sokongan\npembelajaran yang dicadangkan\ntermasuklah mesin braille, mesin\nembosser, papan pintar, maker\nkit, kit kemahiran motor kasar dan\nmotor halus dan sebagainya.\n\nPelaksanaan Prakarsa Teras Strategik 4 Strategi 1 Prakarsa 3\n\nPelaksanaan prakarsa ini menyumbang kepada pencapaian Matlamat Pembangunan Mampan Keempat\n(S 4), iaitu Pendidikan Bermutu dan S\n10, yakni Mengurangkan Ketidaksamaan demi memastikan tiada\nmurid tercicir daripada sistem pendidikan negara.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":87,"p":223,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini bertumpu kepada memperkukuh ekosistem pendidikan khas melalui tiga tumpuan utama, iaitu peningkatan kemudahan mesra KU di institusi\npendidikan KPM, termasuklah mewajibkan penyediaan kemudahan tersebut dalam pembangunan institusi pendidikan baharu, peluasan 3PK di semua peringkat serta\npembekalan peralatan sokongan pembelajaran pendidikan khas. Pelaksanaan prakarsa ini dilaksanakan secara berfasa dari tahun 2026 hingga tahun 2035 bagi\nmenjamin akses pendidikan yang terangkum dan seimbang kepada semua MBPK.\n\nPel asan P sat Perk idmatan Pendidikan K as 3PK\n\nRa a\n\nasa\n2026 202\nPenubuhan 3PK Baharu\n\n•\n\nPenubuhan premis tetap 3PK egeri di egeri Sembilan, pewujudan 3PK aerah dan\n3PK Bergerak bagi memperkukuh akses kepada perkhidmatan sokongan pendidikan\nkhas.\n\nasa 2\n2030\nPel asan Pelaksanaan\n\n•\n\nPenubuhan premis tetap 3PK egeri di P Kuala Lumpur, peluasan 3PK aerah\ndan 3PK Bergerak di lokasi terpilih bagi memperluas akses perkhidmatan sokongan\npendidikan khas ke lebih banyak wilayah.\n\nasa 3\n(2031 — 2035\nPel asan Rangkaian 3PK\n\n•\n\nPenubuhan premis tetap 3PK egeri di P Labuan, peluasan 3PK aerah dan 3PK\nBergerak di lokasi terpilih bagi mengukuhkan rangkaian perkhidmatan sokongan\npendidikan khas pada peringkat nasional.\n\n2 aris Masa Pelaksanaan Strategi 1 Prakarsa 3\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":87,"p":224,"t":"Peningkatan Kem da an Mesra K di Instit si Pendidikan\n\nRa a\n\nasa\n(2026 — 202\nPeningkatan Kem da an\nAsas Mesra K\n\n•\n\nMeningkatkan kemudahan mesra KU di institusi pendidikan KPM.\n\nasa 2\n(2028 — 2030\nPel asan Kem da an\n\n•\n\nPeluasan kemudahan mesra KU di institusi pendidikan KPM.\n\nasa 3\n(2031 — 2035\nPenyemp rnaan Akses\n\n•\n\nSemua institusi pendidikan KPM dilengkapi dengan kemudahan mesra KU\nsepenuhnya.\n\n3 aris Masa Pelaksanaan Strategi 1 Prakarsa 3\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":87,"p":225,"t":"Peningkatan Bekalan Peralatan Sokongan Pem ela aran\n\nRa a\n\nasa\n(2026 — 202\n\n•\n\nBekalan peralatan sokongan pembelajaran di 360 buah institusi pendidikan KPM.\n\nasa 2\n(2028 — 2030\n\n•\n\nBekalan peralatan sokongan pembelajaran di 540 buah institusi pendidikan KPM.\n\nasa 3\n(2031 — 2035\n\n•\n\nBekalan peralatan sokongan pembelajaran di 900 buah institusi pendidikan KPM.\n\naris Masa Pelaksanaan Strategi 1 Prakarsa 3\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":88,"p":226,"t":"PRAKARSA 4: MEMPERKUKUH KEMUDAHAN SEDIA ADA YANG\nBERFUNGSI, TERANGKUM DAN BERIMPAK\nPrakarsa ini dirangka bagi memastikan kemudahan ﬁzikal di institusi\npendidikan KPM berfungsi secara optimum, bersifat terangkum dan mampu\nmemberikan kesan yang bermakna terhadap pengalaman pembelajaran\nmurid secara menyeluruh.\nAktiviti utama yang menjadi tumpuan pelaksanaan prakarsa ini adalah\nseperti yang berikut:\n• Penyediaan kemudahan asas di semua institusi pendidikan KPM\nmerangkumi bekalan elektrik, air bersih, capaian internet dan sistem\nkumbahan yang berfungsi dengan baik.\n• Pengoptimuman prasarana sedia ada, terutamanya sekolah kurang\nmurid dan kuarters pendidik tidak berpenghuni dimanfaatkan\nsepenuhnya bagi mengurangkan pembaziran aset, meningkatkan\npenggunaan kemudahan sedia ada dan menyumbang kepada\nkesejahteraan komuniti serta pembangunan pendidikan mampan.\n• Penambahbaikan\nkemudahan\nsukan\nbagi\nmenggalakkan\npembangunan sahsiah dan kesihatan murid melalui aktiiti ﬁzikal yang\nselamat dan kondusif.\n• Pemodenan pusat sumber sekolah sebagai ruang pembelajaran yang\ninteraktif dan menyokong perkembangan bakat murid menerusi\nteknologi terkini dan AI.\n\nBAB 7 TERAS STRATEGIK 4"},{"sec":88,"p":227,"t":"GARIS MASA PELAKSANAAN\nPrakarsa ini bertujuan memastikan semua institusi pendidikan KPM dilengkapi dengan kemudahan asas yang selamat, selesa dan berfungsi sepenuhnya, di samping\ndioptimumkan penggunaannya. Selain itu, perkembangan bakat murid secara menyeluruh turut diberikan penekanan menerusi penggunaan teknologi digital terkini\nyang interaktif. Pelaksanaan prakarsa ini dijalankan secara berfasa seperti yang berikut\n\nMelengkapkan Kem da an Asas di Sem a Instit si Pendidikan\nasa\n2026 202\nangka Pendek\n\n•\n•\n•\n•\n•\n•\n\nasa 2\n2030\nangka Seder ana\n\n•\n•\n•\n•\n•\n•\n\nasa 3\n(2031 — 2035\nangka Pan ang\n\n•\n•\n•\n\nRa a\n\nMengenal pasti tahap ketersediaan kemudahan asas di sekolah.\nKajian geofizik bagi potensi sumber air.\nMenentukan kaedah pembaikan, naik taraf atau gantian dan anggaran kos.\nReka Bentuk elanggang Serbaguna Terbuka Berbumbung ( STB) dan sistem solar.\nPenyelenggaraan segera air terawat, bekalan elektrik, tandas, musala, kantin, bilik\ndarjah, meja, kerusi dan rangkaian internet.\nMenggunakan peruntukan Penyelenggaraan Institusi Pendidikan (PIP).\nPenilaian lanjut berdasarkan keutamaan keperluan.\nPenyediaan rancangan pembiayaan swasta bagi projek baharu.\nPembinaan panel solar mengikut kategori bangunan.\nPenyediaan bekalan air terawat secara berfasa (telaga tiub/Atmospheric ater\nenerator-A\n).\nPembaikan kemudahan asas seperti tandas, musala dan kantin.\nLantikan pengurusan fasiliti (Facility Management - FM) bagi penyelenggaraan berkala.\nPeluasan pelaksanaan FM secara menyeluruh.\nPengukuhan tadbir urus aset dan penyelenggaraan pre entif bagi memastikan kos efektif,\nkelestarian tenaga dan kecekapan opera
