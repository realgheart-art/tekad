Penilaian MAL\n\nPembangunan\nMekanisme Pemantauan\ndan Penilaian Amalan\nKemampanan\n\nRintis Instrumen Pemantauan\ndan Penilaian Amalan\nKemampanan\n\nPemantauan, Penilaian\ndan Pengiktirafan\nInstitusi Pendidikan KPM\nyang Melaksanakan\nAmalan Kemampanan\n\nRintis Latihan\nPembangunan\nKompetensi\nKemampanan untuk\nJurulatih (Train-therainer\n\nPenambahbaikan Modul dan\nPeluasan Latihan Pembangunan\nKompetensi Kemampanan\nuntuk Jurulatih (Train-therainer\n\nPemantauan serta\nPenilaian Impak\nModul dan Latihan\nPembangunan\nKompetensi\nKemampanan untuk\nJurulatih (Train-therainer\n\nTeras\nStrategik 6\nStrategi 4\n\nP1: Menilai dan\nMengiktiraf Institusi\nPendidikan KPM yang\nMenerapkan Amalan\nKemampanan\n\nTeras\nStrategik 6\nPemboleh\nDaya\n\nPendanaan, Kepakaran\ndan Logistik untuk\nSemua Prakarsa\nBerkaitan RPM\n\nLAMPIRAN"},{"sec":142,"p":344,"t":"Teras dan\nStrategi\n\nPrakarsa\n\nFasa 1 - Prakarsa Impak\nSegera\n2026 202\n\nFasa 2 - Prakarsa Jangka\nSederhana\n2030\n\nFasa 3 - Prakarsa Jangka\nPanjang\n2035\n\nTeras\nStrategik7\nStrategi 1\n\nP1: Memantapkan\nPelaksanaan Pelan\nStrategik Komunikasi KPM\nyang Berstruktur dan\nBersasar\n\nPembangunan Pelan\nKomunikasi Strategik\nKPM\n\nPelaksanaan Kajian\nKeberkesanan Sistem\nKomunikasi KPM\n\nPengukuhan dan\nPenambahbaikan\nBerterusan Sistem\nKomunikasi\n\nTeras\nStrategik 7\nStrategi 2\n\nP1: Menyusun Semula\nFungsi, Struktur dan\nPerjawatan Bahagian\nKPM, JPN, PPD dan\nInstitusi Pendidikan KPM\n\nPelaksanaan Kajian\nKeberkesanan Fungsi\ndan Struktur Semasa\nOrganisasi KPM\n\nPelaksanaan\nPenstrukturan Semula\nStruktur Organisasi KPM\n\nPenilaian dan\nPenambahbaikan\nBerterusan Struktur\nOrganisasi KPM\n\nP2: Memperkasakan Polisi\ndan Prosedur Penamatan\nPegawai di KPM\n\nPembangunan dan\nPelaksanaan Prosedur\nOperasi Standard Baharu\n\nPenstrukturan dan\nPenubuhan Panel\nPenilai Khas\n\nNormalisasi Agihan Skor\nPrestasi Tahunan dan\nPemantauan Berterusan\n\nLAMPIRAN"},{"sec":142,"p":345,"t":"Teras dan\nStrategi\n\nPrakarsa\n\nFasa 1 - Prakarsa Impak\nSegera\n2026 202\n\nFasa 2 - Prakarsa Jangka\nSederhana\n2030\n\nFasa 3 - Prakarsa Jangka\nPanjang\n2035\n\nTeras\nStrategik 7\nStrategi 3\n\nP1: Memperkukuh\nPelaksanaan Autonomi\nTerpimpin di Institusi\nPendidikan KPM\n\nKajian Kesiapsediaan\nInstitusi dan Semakan\nSemula Garis Panduan\nSedia Ada\n\nPelaksanaan dan\nPemantauan Autonomi\nTerpimpin Secara\nBerfasa\n\nPenarafan Autonomi\nTerpimpin\n\nP2: Mengoptimumkan\nPenggunaan Fasiliti dan\nPrasarana di Institusi\nPendidikan KPM\n\nSemakan Semula\nPeraturan Kewangan\ndalam SPK dan SPI\n\nPenyediaan Garis\nPanduan Pelaporan\ndan Penurunan Kuasa\nkepada Pentadbir\nSekolah KPM\n\nPemerkasaan\nPenggunaan Fasiliti\ndan Prasarana serta\nPemantauan Berterusan\n\nP1: Membangunkan\nPelan Pengurusan\nPerubahan KPM\n\nPembangunan Pelan\nPengurusan Perubahan\n\nPelaksanaan dan Penilaian Pelan Pengurusan\nPerubahan\n\nPembangunan Pelan\nPengurusan Risiko yang\nMenyeluruh\n\nPelaksanaan dan Pemantauan Pelan Pengurusan\nRisiko\n\nTeras\nStrategik 7\nStrategi 4\n\nP2: Membangunkan\nPelan Pengurusan Risiko\nKPM\n\nLAMPIRAN"},{"sec":142,"p":346,"t":"LAMPIRAN 4: PRAKARSA PENDIDIKAN RMK13\nRancangan Malaysia Ketiga Belas (RMK13), yang merangkumi\ntempoh 2026 hingga 2030, merupakan rancangan pembangunan\nnasional yang memandu hala tuju pembangunan sosioekonomi\nnegara.\nTema RMK13, “Melakar Semula Pembangunan” mencerminkan\naspirasi untuk mencapai pembangunan yang lebih terangkum,\nlestari, dan berdaya saing masa hadapan. RMK13 berteraskan\nmatlamat untuk menaikkan siling ke arah menjadikan Malaysia\nsebagai peneraju ekonomi Asia, menaikkan lantai untuk\nmeningkatkan darjat kehidupan rakyat, dan memperkukuh\ntatakelola melalui reformasi sektor awam. Matlamat ini\nmenekankan kepentingan mencapai keseimbangan antara\nkemajuan ekonomi, kesejahteraan rakyat dan keutuhan institusi\nuntuk merealisasikan aspirasi RMK13.\n\nSumber: RMK13\n\nLAMPIRAN"},{"sec":142,"p":347,"t":"RMK13 menggariskan keutamaan pembangunan bawah empat tonggak\nutama, iaitu meningkatkan mobiliti sosial. Dalam tonggak ini, reformasi\npendidikan menjadi bidang tumpuan utama yang menegaskan peranan penting\npendidikan sebagai jaringan keselamatan sosial yang ‘menaikkan lantai’ melalui\npeningkatan taraf hidup dan pengurangan jurang ketidaksamarataan, serta\nsebagai pemangkin utama kemajuan yang ‘menaikkan siling’ dengan\nmemacu pertumbuhan ekonomi dan mobiliti sosial. Selain itu, perancangan dan\npembangunan bakat tersedia masa hadapan juga menjadi keutamaan.\n\nSumber: RMK13\n\nRMK13 menekankan bahawa reformasi pendidikan secara menyeluruh memerlukan komitmen bersama semua pihak melalui pendekatan keseluruhan negara untuk\nmemperkukuh sistem pendidikan merentasi kontinum pembelajaran. Reformasi ini akan melahirkan rakyat Malaysia yang berilmu pengetahuan, berdaya cipta,\nberketerampilan, berakhlak mulia, berkeyakinan tinggi, bertanggungjawab dan berkeupayaan mencapai kesejahteraan diri dan memberikan sumbangan terhadap\nkeharmonian dan kemakmuran keluarga, masyarakat dan negara. Langkah ini juga akan membangunkan bakat masa hadapan yang mampu memenuhi keperluan\nekonomi dan menyokong perubahan struktur industri serta meningkatkan daya saing negara.\n\nLAMPIRAN"},{"sec":142,"p":348,"t":"Lapan strategi utama telah diperkenalkan bawah agenda reformasi pendidikan RMK13.\n\nMemperkukuh Tadbir\nUrus\n\nTatakelola sistem pendidikan akan diperkukuh pada semua peringkat pembelajaran melalui beberapa anjakan utama,\ntermasuk:\n• Penyelarasan semula tadbir urus pendidikan dari peringkat prasekolah hingga pendidikan tinggi bagi meningkatkan\nkeberkesanan penyampaian perkhidmatan.\n• Penggubalan akta baharu untuk mengawal selia pendidikan awal kanak-kanak serta pengukuhan mekanisme\npemantauan bagi pendidikan alternatif.\n• Penubuhan Majlis Pendidikan Negara yang berperanan menyelaras, memantau dan mengenal pasti tindakan intervensi\nbagi memastikan sistem pendidikan negara progresif dan bertaraf dunia.\n\nMerasionalisasikan\nFungsi dan Peranan\nInstitusi Pendidikan\n\nFungsi dan peranan institusi pendidikan akan dirasionalisasi bagi mengoptimumkan sumber dan meningkatkan mutu\npendidikan negara. Pelaksanaan strategi ini merangkumi:\n• Penstrukturan semula fungsi dan peranan institusi pendidikan bagi memastikan kompetensi pendidik kekal relevan\ndengan keperluan semasa.\n• Pengukuhan kerjasama antara institusi dalam latihan profesionalisme berterusan, penyelidikan dan inovasi.\n\nMempertingkat\nKeberhasilan\nPendidikan\n\nKeberhasilan pendidikan akan dipertingkat melalui pelaksanaan transformasi menyeluruh merentasi semua peringkat\npembelajaran, termasuk:\n• Pendidikan awal kanak-kanak diwajibkan pada umur lima tahun bagi mengoptimumkan perkembangan minda awal,\ndengan pelaksanaan kurikulum prasekolah kebangsaan secara mandatori yang menekankan nilai, pembentukan\nkarakter, pemikiran kritis dan kemahiran hidup.\n• Pendidikan rendah akan bermula pada umur enam tahun, selaras dengan amalan antarabangsa.\n• Bahasa Inggeris akan digunakan sebagai sebahagian daripada bahasa pembelajaran dan perhubungan di tahap satu,\nmanakala pembelajaran bahasa tambahan akan diperluas bagi memperkukuh penguasaan pelbagai bahasa sejak\nawal persekolahan.\n• Kurikulum sekolah akan ditambah baik dengan penekanan kepada kenegaraan, sosioemosi, literasi asas, kemahiran\ndigital, keusahawanan, kewangan dan kelestarian.\n• Akses pendidikan untuk murid berkeperluan khas akan diperluas dari prasekolah hingga sekolah menengah bagi\nmemastikan tiada murid tercicir.\n• Kajian semula sistem persekolahan akan dilaksanakan bagi menentukan waktu persekolahan optimum, menilai\nkeberkesanan sekolah khusus, serta menambah baik model pendidikan bagi pelajar pintar cerdas dan berbakat.\n\nMenambah Baik\nPenilaian dan\nPentaksiran\nPembelajaran\n\nPenilaian dan pentaksiran pembelajaran akan ditambah baik agar setanding dengan standard antarabangsa melalui:\n• Kajian untuk menilai keberkesanan sistem penilaian dan pentaksiran di peringkat persekolahan.\n• Pengenalan pengukuran baharu keberhasilan graduan bagi menangani ketidakpadanan kemahiran serta\nmengurangkan isu graduan bekerja bawah kelayakan.\n\nLAMPIRAN"},{"sec":142,"p":349,"t":"Memantapkan\nKompetensi dan\nKecekapan Warga\nPendidik\n\nUsaha memantapkan kompetensi dan kecekapan pendidik akan dilaksanakan untuk mempertingkatkan mutu pendidikan\nmelalui:\n• Pemantapan mekanisme pengambilan pendidik secara terbuka bagi memastikan bakat terbaik diserap ke dalam\nprofesion keguruan.\n• Pelaksanaan program peningkatan kemahiran berterusan bagi memastikan pendidik kekal relevan dengan keperluan\npendidikan semasa.\n• Latihan pendidik sekolah rendah untuk mengajar semua mata pelajaran asas pada tahap satu, kecuali Pendidikan Islam\nyang diajar oleh pendidik khusus.\n• Kajian kebolehlaksanaan penempatan dan mobiliti silang antara profesion bagi meningkatkan kompetensi pendidik dan\nmenarik bakat bermutu.\n• Semakan semula laluan kenaikan pangkat pendidik bagi mewujudkan kerjaya yang lebih berdaya saing dan setanding\ndengan profesion lain.\n\nMenambah Baik\nPelaburan Pendidikan\n\nPelaburan dalam pendidikan akan dipertingkat bagi memastikan perbelanjaan kerajaan lebih berkesan dan berimpak\ntinggi.\n• Penyediaan fasiliti pendidikan, termasuk prasekolah, akan diperkukuh mengikut keperluan semasa, dengan pembinaan\nsekolah dijadikan syarat bagi projek perumahan berskala besar.\n• Konsep sekolah vertikal akan diperluas bagi menangani isu kepadatan dan kekurangan tapak, manakala sekolah\nberasaskan komuniti akan diperluas di kawasan pedalaman dan komuniti Orang Asli.\n• Penajaan pendidikan oleh kerajaan dan syarikat berkaitan kerajaan (GLC) akan diteliti agar sejajar dengan keperluan\nnegara.\n• Pewujudan platform nasional baharu bagi menyelaras penajaan dan sumbangan pendidikan secara lebih cekap dan\ntelus, termasuk sumbangan daripada ibu bapa, alumni, masyarakat, sektor swasta dan industri.\n\nMemperkasa\nPembelajaran\nSepanjang Hayat\n\nPembelajaran Sepanjang Hayat (PSH) akan diperkukuh dan dibudayakan melalui prakarsa seperti:\n• Program PSH untuk warga emas akan diperluas melalui konsep Universiti Era Ketiga.\n• Fasiliti awam seperti pusat sukan dan perpustakaan akan dioptimumkan bagi pelaksanaan PSH, termasuk\npembelajaran kendiri dan rakan sebaya.\n• Tadbir urus PSH akan ditambah baik untuk mengarusperdanakannya sebagai komponen penting dalam sistem\npendidikan negara.\n\nLAMPIRAN"},{"sec":142,"p":350,"t":"Memperkukuh\nEkosistem TVET\n\nEkosistem TVET akan diperkukuh melalui:\n• Penubuhan Suruhanjaya TVET bagi mengawal selia dan menyelaras institusi, strategi, dan pelaksanaan Dasar TVET\nNegara.\n• Peluasan tahap pensijilan kemahiran bawah Sistem Persijilan Kemahiran Malaysia.\n• Sistem penarafan institusi TVET bagi menjamin mutu program dan memastikan agihan peruntukan lebih berkesan.\n• Penawaran program TVET diselaraskan dengan keperluan industri berasaskan pertubuhan dan nilai tinggi (High Growth\nHigh Value - HGHV) serta sektor strategik dan teknologi termaju.\n• Kerjasama antara institusi TVET awam dengan industri akan dipergiat melalui perkongsian kepakaran, teknologi,\npembangunan kurikulum, serta peningkatan kemahiran tenaga pengajar.\n• Penawaran program T ET diperluas kepada pelajar tahfiz dan huffaz.\n\nKeseluruhan aspirasi dan teras strategik RPM 2026 - 2035 adalah sejajar dengan strategi dalam agenda reformasi pendidikan RMK13. RMK13 dan RPM\n2026 — 2035 menegaskan peranan pendidikan sebagai pemangkin utama pembangunan negara dan jaringan keselamatan sosial yang memperkukuh mobiliti sosial,\nmengurangkan ketidaksamarataan, serta membangunkan bakat masa hadapan. Pendekatan yang saling melengkapi ini mencerminkan komitmen untuk membina\nsistem pendidikan yang lebih terangkum, berdaya saing dan responsif terhadap keperluan masa hadapan negara.\n\nLAMPIRAN"},{"sec":143,"p":351,"t":"SINGKATAN\n3M\n3PK\n4A\nAceTVET\nAI\nAKP\nAMal\nAPC\nASEAN\nBC\nBCA\nBIM\nBM entaksiran Psikometrik\nRancangan Integrasi Murid untuk Perpaduan\nRancangan Makanan Tambahan\nRancangan Malaysia Ke-13\nReturn on Investment/Pulangan atas Pelaburan\nReturn on Value/Pulangan Nilai\nSekolah Berasrama Penuh\nSustainable Dovelopment Goals/Matlamat Pembangunan Mampan\nSoutheast Asia Primary Learning Metrics\nStandard Kecergasan Fizikal Kebangsaan\nSistem Penarafan Bersepadu Institusi Pendidikan Tinggi Malaysia\nSchool Improvement Partners\nSistem Pengurusan Pembelajaran\nSchool Improvement Specialist Coaches\nSistem Pengurusan Aduan Awam\nSekolah Kurang Murid\nStandard Mutu Pendidikan Malaysia\nSesi Libat Urus\nSubject Matter Expert\nStandard Operating Procedure/Prosidur Operasi Standard\nSekolah Pendidikan Khas\nSistem Penarafan Keselamatan Sekolah\nSistem Pentaksiran Pendidikan Kebangsaan\nSistem Sahsiah Diri Murid\nSistem Saraan Perkhidmatan Awam\nStandard Mutu Pendidikan Malaysia Gelombang 2\n\nStudent-Teacher-Expert\nScience, Technology, Engineering and Mathematics\nSumbangan Wang Awam\nLAMPIRAN"},{"sec":143,"p":356,"t":"TEA\nTIMSS\nTNB\nTOR\nTVET\nTS25\nUA\nUI\nUX\nUNDP\nUNESCO\nUNICEF\nWAN\nWBL\nXR\n\nLAMPIRAN\n\nTechnology-Enhanced Assessment\nTrends in International Mathematics and Science Study\nTenaga Nasional Berhad\nTerms of Refference/Terma Rujukan\nTechnical and Vocational Education and Training/ Pendidikan dan Latihan Teknikal dan Vokasional\nTranformasi Sekolah 2025\nUniversiti Awam\nUser Interface/Antara Muka Pengguna\nUser Experience/Pengalaman Pengguna\nUnited Nations Development Programme\nUnited Nations Children’s Fund\nWide Area Network/ Rangkaian Kawasan Luas\nWork-Based Learning / Pembelajaran Berasaskan Kerja\nExtended Reality/Realiti Lanjutan"},{"sec":144,"p":357,"t":"GLOSARI\nIstilah\nekonomi hijau\nsosial. Dalam ekonomi hijau, pertumbuhan pekerjaan dan pendapatan didorong oleh pelaburan awam dan swasta dalam aktiviti\nekonomi, prasarana dan aset yang membolehkan pengurangan pelepasan karbon dan pencemaran, peningkatan kecekapan\ntenaga dan sumber, serta pencegahan kehilangan biodiversiti dan perkhidmatan ekosistem (UNEP-UN).\ninstitusi pendidikan\nKPM\n\nMerangkumi semua institusi pendidikan prasekolah, rendah, menengah dan lepas menengah.\n\ninstitusi pendidikan\nhijau/ mampan\n\nInstitusi yang menggabungkan prinsip-prinsip pembangunan lestari dalam semua aspek operasi, pengurusan, kurikulum,\ndan budaya sekolah, bagi membentuk murid dan warga institusi yang berdaya tindak, bertanggungjawab dan beretika dalam\nmenangani cabaran alam sekitar, sosial dan ekonomi secara holistik. (UNESCO, 2017)\n\njurulatih utama\n\nMerupakan pendidik atau pegawai yang berpengalaman luas dan dilatih untuk menyampaikan latihan kepada kumpulan lain,\nterutamanya dalam model latih pelatih (train-the-trainer).\n\nkemahiran hijau\n\nPengetahuan, kebolehan, nilai dan sikap yang diperlukan untuk hidup dalam membangunkan dan menyokong masyarakat yang\nlestari dan cekap sumber dalam penggunaan tenaga dan sumber secara eﬁsien, pengetahuan tentang teknologi hijau dan\ntenaga boleh diperbaharui, kemahiran menyelesaikan masalah berkaitan dengan alam sekitar, sikap bertanggungjawab\nterhadap kelestarian dalam pekerjaan harian (UNESCO-UNEVOC, 2013).\n\npegawai teknikal\n\nPegawai di KPM, JPN, atau PPD yang mempunyai kepakaran khusus dan menyokong pelaksanaan program, dasar atau aspek\nteknikal.\n\nLAMPIRAN"},{"sec":144,"p":358,"t":"Istilah\n\npembantu guru\n\nMembantu guru bagi tugasan selain PdP (perkeranian) seperti mengemas kini kehadiran murid, perekodan penerimaan/\npemulangan, menyatukan dan menyusun kertas pentaksiran/peperiksaan, pengisian data PAJSK dan lain-lain.\n\npembelajaran\nberasaskan masalah\n(problem-based\nlearning)\n\nPembelajaran berasaskan masalah (PBM) merupakan satu strategi pengajaran dan pembelajaran aktif berpusatkan murid\nyang mengenal pasti masalah autentik (kontekstual dan situational) untuk merangsang pelajar bertindak secara pembelajaran\nregulasi kendiri (self-regulated learning) dan mengaplikasikan berkemahiran pemikiran kritis sebagai penyelesai masalah.\n\npemimpin pendidik\n\nMerujuk pengetua, guru besar atau pemimpin dalam pasukan kepimpinan sekolah yang memainkan peranan aktif dalam\nusaha memimpin pengurusan serta aspek pengajaran dan pembelajaran di sekolah.\n\npemimpin sistem\n\nMerujuk pemimpin pada peringkat sistem yang mempunyai pengaruh ke atas pelbagai sekolah atau seluruh daerah/negeri.\nLazimnya terdiri daripada pegawai di Jabatan Pendidikan Negeri (JPN), Pejabat Pendidikan Daerah (PPD) atau pegawai\npada peringkat kementerian yang terlibat dalam perancangan strategik, pelaksanaan dasar dan pemantauan sistem.\n\npendekatan\nkeseluruhan sekolah\n(whole-of-school\napproach)\n\nPendekatan Keseluruhan Sekolah (WSA) direka bentuk secara anjal dan sentiasa berkembang untuk memenuhi keperluan\npembelajaran di sekolah. Pelaksanaan pendekatan ini boleh bermula dengan pelan tindakan jangka pendek, contohnya\nselama satu tahun, tetapi secara idealnya perlu diterapkan dan dikekalkan dalam tempoh yang lebih lama untuk memastikan\nimpak yang berterusan. WSA melibatkan warga sekolah termasuklah rakan kongsi luar dan berintegrasi dengan setiap aspek\nkehidupan sekolah bagi mewujudkan persekitaran pembelajaran yang menyeluruh serta berkesan.\n\npendekatan\npengajaran antara\ndisiplin\n\nDalam pendekatan pengajaran antara disiplin, hubungan antara pelbagai disiplin dianalisis, disintesis dan diharmonisasikan\nke dalam satu keseluruhan yang terkoordinasi dan koheren, dengan tumpuan pada persamaan antara disiplin. Guru yang\nmenggunakan pendekatan ini, menyusun kurikulum berdasarkan pembelajaran bersama merentasi disiplin untuk menekankan\nkemahiran dan konsep antara disiplin. Pelbagai disiplin tetap dapat dikenali, tetapi memainkan peranan yang kurang menonjol\nberbanding dengan pendekatan multi disiplin.\n\npendekatan\npengajaran multi\ndisiplin\n\nDalam pendekatan pengajaran multi disiplin, tumpuan terutamanya diberikan kepada pelbagai disiplin. Guru yang\nmenggunakan pendekatan ini menyusun konsep daripada pelbagai disiplin mengelilingi satu tema. Tema tersebut dikaji dari\nsudut pandang setiap subjek secara berasingan.\n\npendekatan\npengajaran\ntransdisiplin\n\nDalam pendekatan transdisiplin guru menyusun kurikulum berdasarkan soalan autentik dan masalah kontekstual relevan yang\ndikenal pasti oleh murid. Murid akan menerokai jawapan masalah ini dalam konteks dunia nyata dengan mengintegrasikan\nperspektif dari pelbagai disiplin bagi menghubungkan pengetahuan baharu dan pemahaman yang lebih mendalam dengan\npengalaman sebenar. Sempadan antara disiplin yang berbeza telah bercampur dan diintegrasikan sepenuhnya.\n\nLAMPIRAN"},{"sec":144,"p":359,"t":"Istilah\nPendidikan untuk\nKewarganegaran\nGlobal (KG)\n(Global Citizenship\nEducation - GCED)\n\nSatu pendekatan pendidikan yang bertujuan melahirkan individu yang berpengetahuan, prihatin dan bertanggungjawab\nterhadap isu-isu global serta berupaya menyumbang secara aktif kepada keamanan, keadilan dan pembangunan mampan\npada peringkat tempatan dan antarabangsa (UNESCO).\n\nPendidikan untuk\nPembangunan\nMampan (Education\nfor Sustainable\nDevelopment - ESD)\n\nPendekatan yang memperkasakan murid untuk membuat keputusan yang bijak dan tindakan yang bertanggungjawab\ndemi kelestarian alam sekitar, kemampanan ekonomi dan masyarakat yang adil untuk generasi masa ini dan akan datang.\nPendekatan ini merangkumi pemerolehan pengetahuan, kemahiran, nilai, sikap dan tingkah laku yang diperlukan untuk\nmenjalani kehidupan secara lestari. Pendidikan untuk Pembangunan Mampan (ESD) merupakan satu proses pembelajaran\nsepanjang hayat dan merupakan sebahagian penting daripada pendidikan bermutu. (UNESCO)\n\npekerjaan lestari\n\nPekerjaan yang menyumbang pada memelihara atau memulihara alam sekitar, sama ada dalam sektor tradisional seperti\npembuatan dan pembinaan, atau dalam sektor baharu seperti tenaga boleh baharu dan kecekapan tenaga.\n\npihak swasta\n\nMerujuk entiti, organisasi atau individu yang menjalankan aktiviti ekonomi atau perniagaan yang tidak dimiliki, dikawal atau\ndiurus oleh kerajaan. Hal ini merangkumi sektor korporat, perusahaan kecil dan sederhana (PKS), syarikat multinasional serta\nusahawan individu.\n\nwarga pendidik\n\nIstilah umum yang merangkumi semua individu yang terlibat dalam ekosistem pendidikan — termasuklah guru, pemimpin\nsekolah dan pegawai pendidikan.\n\npihak\nberkepentingan\n\nMerangkumi pihak dalam dan luar KPM. Pihak ini terdiri daripada murid, guru, pensyarah, pentadbir sekolah atau institusi,\npengurusan tertinggi serta pegawai KPM. Sementara itu, pihak berkepentingan turut merangkumi ibu bapa atau penjaga,\nLembaga Pengelola atau Lembaga Pengarah, PIBG, PIBKS, komuniti setempat, agensi kerajaan, institusi pengajian tinggi,\nindustri, Pihak Berkuasa Tempatan (PBT), badan profesional, CSO, NGO serta masyarakat awam.\n\nPlatform Digital\nSehenti\n\nPlatform Digital Sehenti merujuk kepada satu sistem atau platform bersepadu berasaskan digital yang menghimpunkan\npelbagai perkhidmatan, maklumat, aplikasi dan transaksi dalam satu akses tunggal bagi memudahkan urusan pengguna\nsecara lebih cekap, pantas dan sistematik. Dalam konteks KPM, Platform Digital Sehenti ialah platform bersepadu yang\nberfungsi sebagai titik akses utama (single point of access) kepada perkhidmatan, sistem dan maklumat berkaitan pendidikan,\nmelibatkan warga pendidik, murid, ibu bapa, pentadbir serta pihak berkepentingan.\n\nLAMPIRAN"},{"sec":145,"p":360,"t":"INDEKS"},{"sec":145,"p":361,"t":"INDEKS (TERAS STRATEGIK 1–7)\nA\nAdvokasi\n265, 268, 270-271, 279-280, 288\nAgen perubahan\n123, 270, 276, 279, 282, 314, 318, 341\nAkauntabiliti\n23, 30, 105, 109, 115, 270, 286, 293, 299, 306, 308-309, 311, 316317, 320\nAkaun SUWA\n309, 310\nAkses pendidikan\n28, 46-48, 63-64, 86, 96, 139, 159-161, 208, 221, 291, 323324, 346\nAkses terangkum\n118, 124, 147, 159, 333\nAI-Powered Personalised Learning\n230, 234\nAlam sekitar\n23, 30, 12 in Finland?, Second Edition. Teachers College Press.\nSEA-PLM 2019 Main Regional Report: Children’s Learning in 6 Southeast Asian Countries. (2020).\nSinakou, E., Donche, V., & Van Petegem, P. (2022). Action-orientation in education for sustainable development: Teachers’ interests and instructional practices.\nJournal of Cleaner Production, 370, 133469. https://doi.org/10.1016/j.jclepro.2022.133469\nStandards and Costs Committee, Economic Planning Unit, Prime Minister’s Department. (2015). Guidelines and Regulations for Building Planning (2015 ed.). Prime\nMinister’s Department.\nTalentCorp Malaysia. (2024). MyMahir Impact Study 2024. Talent Corporation Malaysia Berhad.\nUNESCO. (2014). Education Systems in ASEAN+6 Countries: A Comparative Analysis of Selected Educational Issues. In Education Policy Research Series\nDiscussion Document No. 5. Education Policy and Reform Unit, U ESC Bangkok. https //www.right-to-education.org/sites/right-to-education.org/files/resourceattachments/U ESC Education Systems in Asia Comparati e Analysis 2014.pdf\nU ESC . (2015). lobal citizenship education topics and learning objecti es. In UNESCO eBooks. https://doi.org/10.54675/drhc3544\nU ESC . (2016). Schools in action, global citizens for sustainable de elopment a guide for students. In UNESCO eBooks. https://doi.org/10.54675/ceag5439\nUNESCO. (2017). Education for Sustainable Development Goals: Learning Objectives. In UNESCO eBooks. https://doi.org/10.54675/cgba9153\nUNESCO. (2018). Preparing Teachers for Global Citizenship Education: A Template. https://unesdoc.unesco.org/ark:/48223/pf0000265452\nUNESCO. (2020). Education for sustainable development: a roadmap. In UNESCO eBooks. https://doi.org/10.54675/yfre1448\nUNESCO. (2021). Reimagining Our Futures Together: A New Social Contract for Education. In UNESCO eBooks. https://doi.org/10.54675/asrb4722\nUNESCO Institute for Statistics. (2023). Government Expenditure on Education, Total (% of Government Expenditure) 2014-2023.\nUNESCO Institute for Statistics. (2025). SDG 4 Country Profiles: Malaysia. Institute for Statistics (UIS). https //download.uis.unesco.org/S 4/S 4-ProfileMalaysia.pdf\n\nRUJUKAN"},{"sec":146,"p":372,"t":"U ESC , International Labour rganization,\norld Bank. (2023). Building Better Formal TVET Systems: Principles and Practice in Low- and Middle-Income\nCountries. The orld Bank, U ESC , and IL . https //www.ilo.org/sites/default/files/wcmsp5/groups/public/ ed emp/ ifp skills/documents/publication/\nwcms 888095.pdf\nUNESCO-UNEVOC International Centre for Technical and Vocational Education and Training. (2024). Biennial Report 2022-2023: Transforming TVET for the\nFuture. U ESC . https //une oc.unesco.org/pub/unesco-une oc biennial report 2022-23 online.pdf\nUNICEF. (n.d.). Korea Institute for Curriculum and Evaluation: Collaborating on Joint Advocacy and Technical Exchanges. https://www.unicef.org/gok/our-partners/\nkice\nUnit Pengurusan Penyampaian RPM (DMU). (2024). Laporan Tahunan 2023. Kementerian Pendidikan Malaysia.\nUnited Nations. (2006). Convention on the Rights of Persons with Disabilities and Optional Protocol. https://www.un.org/disabilities/documents/convention/\nconvoptprot-e.pdf\nUnited Nations. (2015). Transforming Our World: The 2030 Agenda for Sustainable Development.\nViac, C., & Fraser, P. (2020). Teachers’ well-being: A framework for data collection and analysis. OECD Education Working Papers. https://doi.org/10.1787/\nc36fc9d3-en\nong, K. ., Baki, R. (2020). Career Counselling for Malaysia Sports Schools Possibility and Subjecti ity. International Research Journal of Education and\nSciences (IRJES), 4(1). https://www.masree.info/wp-content/uploads/2020/04/IRJES-6.pdf\nWorld Bank. (2020). The Education Systems of the Future.\nWorld Bank. (2021). Education quality and equity in China. World Bank.\nWorld Bank. (2023). Shaping First Steps: A Comprehensive Review of Preschool Education in Malaysia. The Malaysia Development Experience Series. https://doi.\norg/10.1596/39851\nWorld Bank. (2024). Malaysia Economic Monitor - Bending Bamboo Shoots : Strengthening Foundational Skills (English). World Bank Group. http://documents.\nworldbank.org/curated/en/099041724092521963\nahya, ., Ishak, ., Rahim, ., Usuldin, . S. (2020). Kesejahteraan psikologi dan keperluan perkhidmatan kaunseling dalam kalangan guru di Kementerian\nPendidikan Malaysia. Jurnal Psikologi Dan Kaunseling, 11.\n\nRUJUKAN"},{"sec":146,"p":373,"t":"Dokumen Rancangan Pendidikan Malaysia 2026 – 2035 diterbitkan dalam bahasa Melayu dan bahasa Inggeris. Sekiranya\nwujud sebarang percanggahan atau kandungan yang tidak konsisten antara versi bahasa Melayu dengan versi bahasa Inggeris,\nkandungan versi bahasa Melayu tersebut mengatasi versi bahasa Inggeris dan adalah diterima pakai."},{"sec":146,"p":374,"t":""},{"sec":146,"p":375,"t":"ISBN 978-983-9425-39-0"}]}</script>
<script>
(function(){
"use strict";
const DATA = JSON.parse(document.getElementById('rpm-data').textContent);
const OUT = DATA.outline, PAGES = DATA.pages, META = DATA.meta;
const pageMap = {}; PAGES.forEach(p=>pageMap[p.p]=p);
const lc = s => (s||'').toLowerCase();
const pagesLC = PAGES.map(p=>lc(p.t));
const $ = id => document.getElementById(id);

// teras short descriptions for hero (titles condensed)
const TERAS = [
  {n:1,d:"Memastikan sistem pendidikan Malaysia yang terangkum, dinamik dan relevan."},
  {n:2,d:"Mengoptimumkan potensi setiap murid melalui pembelajaran bermakna untuk menjadi warganegara global."},
  {n:3,d:"Mentransformasikan pendidik agar berkeupayaan tinggi dan berorientasikan masa hadapan."},
  {n:4,d:"Memantapkan prasarana fizikal dan digital di semua institusi pendidikan KPM."},
  {n:5,d:"Mempergiat sinergi antara institusi pendidikan KPM dengan pihak berkepentingan."},
  {n:6,d:"Membudayakan kemampanan dalam ekosistem pendidikan."},
  {n:7,d:"Meningkatkan kecekapan tadbir urus dan sistem penyampaian."}
];
const CIRI = ["Beradab","Berilmu","Berkemahiran","Berdaya Tahan","Berkeyakinan"];
const TUMPUAN = ["Mutu","Akses dan Ekuiti","Ketersediaan Sumber dan Kecekapan","Keluwesan","Kemampanan"];

// map: bab index -> outline index of the teras babs (kind 'bab' with "Teras Strategik")
const terasBabIdx = OUT.filter(o=>o.k==='bab' && /Teras Strategik\s*\d/.test(o.t));
function babOfTeras(n){ return terasBabIdx.find(o=>new RegExp("Teras Strategik\\s*"+n+"\\b").test(o.t)); }
function findByTitle(rx){ return OUT.find(o=>rx.test(o.t)); }
// cari indeks outline yang julat halamannya [s,e) merangkumi halaman p; -1 jika tiada (mis. kulit/kandungan)
function secOfPage(p){ for(let k=0;k<OUT.length;k++){ if(p>=OUT[k].s && p<OUT[k].e) return k; } return -1; }

let current = null; // current outline index, or null = home
let searching = false; // true bila sedang papar hasil carian
let lastQuery = "";

/* ---------- NАV TREE ---------- */
function buildNav(){
  const nav = $('nav'); nav.innerHTML='';
  // group: front, babs, end
  let html='';
  const front = OUT.filter(o=>o.k==='front');
  const end = OUT.filter(o=>o.k==='end');
  if(front.length){
    html+='<div class="nav-sec-label">Permulaan</div>';
    front.forEach(o=>{ html+=navItem(o,'n-l2'); });
  }
  html+='<div class="nav-sec-label">Kandungan Utama</div>';
  // babs with children
  OUT.forEach((o,i)=>{
    if(o.k!=='bab') return;
    const teras = /Teras Strategik\s*(\d)/.exec(o.t);
    const tnum = teras? teras[1] : '';
    const short = o.t.replace(/^BAB\s*\d+\s*[—-]\s*/,'');
    html+=`<button class="n-item n-bab" data-bab="${i}" data-i="${i}">`+
      (tnum?`<span class="tnum">${tnum}</span>`:`<span class="tnum">${o.t.match(/BAB\s*(\d+)/)?.[1]||'•'}</span>`)+
      `<span style="flex:1;min-width:0">${esc(short)}</span>`+
      `<svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>`+
      `</button>`;
    // children: items after this bab until next bab
    html+=`<div class="n-children" data-children="${i}" style="display:none">`;
    for(let j=i+1;j<OUT.length;j++){
      const c=OUT[j]; if(c.k==='bab'||c.k==='end') break;
      if(c.lv===2){
        const tag = c.k==='strat'?'<span class="kind-tag">Strategi</span>':(c.k==='pemboleh'?'<span class="kind-tag">P. Daya</span>':'');
        html+=`<button class="n-item n-l2" data-i="${j}"><span class="dot"></span><span style="flex:1;min-width:0">${esc(stripNum(c.t))}</span>${tag}</button>`;
      }else if(c.lv===3){
        html+=`<button class="n-item n-l3" data-i="${j}"><span class="dot"></span><span style="flex:1;min-width:0">${esc(stripNum(c.t))}</span></button>`;
      }
    }
    html+=`</div>`;
  });
  if(end.length){
    html+='<div class="nav-sec-label">Penutup &amp; Lampiran</div>';
    end.forEach(o=>{ const i=OUT.indexOf(o); html+=`<button class="n-item n-l2" data-i="${i}"><span class="dot"></span><span style="flex:1">${esc(o.t)}</span></button>`; });
  }
  nav.innerHTML=html;
  nav.querySelectorAll('.n-bab').forEach(b=>{
    b.addEventListener('click',()=>{
      const i=+b.dataset.bab; const kids=nav.querySelector(`[data-children="${i}"]`);
      const isOpen=b.classList.contains('open');
      if(isOpen && current===i){
        // already open and viewing this bab -> collapse
        b.classList.remove('open'); if(kids) kids.style.display='none';
      } else {
        b.classList.add('open'); if(kids) kids.style.display='block';
        goSec(i,true);
      }
    });
  });
  nav.querySelectorAll('.n-item:not(.n-bab)').forEach(b=>{
    b.addEventListener('click',()=>goSec(+b.dataset.i));
  });
}
function navItem(o,cls){ const i=OUT.indexOf(o); return `<button class="n-item ${cls}" data-i="${i}"><span class="dot"></span><span style="flex:1">${esc(o.t)}</span></button>`; }
function stripNum(t){ return t.replace(/^\d+\.\d+\s*/,''); }

/* expand the bab containing index i, mark active */
function syncNav(i){
  const nav=$('nav');
  nav.querySelectorAll('.n-item').forEach(b=>b.classList.remove('active'));
  if(i==null) return;
  const o=OUT[i];
  // find owning bab
  let babI = o.bab;
  if(o.k==='bab') babI=i;
  if(o.k!=='front' && o.k!=='end'){
    const babBtn=nav.querySelector(`.n-bab[data-bab="${babI}"]`);
    const kids=nav.querySelector(`[data-children="${babI}"]`);
    if(babBtn&&kids&&!babBtn.classList.contains('open')){ babBtn.classList.add('open'); kids.style.display='block'; }
  }
  const act=nav.querySelector(`.n-item[data-i="${i}"]`);
  if(act){ act.classList.add('active'); act.scrollIntoView({block:'nearest'}); }
}

/* ---------- RENDER: paragraphs ---------- */
function renderDoc(text, q){
  const blocks = text.split(/\n{2,}/);
  let html='';
  for(let blk of blocks){
    blk=blk.trim(); if(!blk) continue;
    const oneLine = blk.replace(/\n+/g,' ').replace(/\s{2,}/g,' ').trim();
    // langkau header/footer berjalan spt "BAB 4 TERAS STRATEGIK 1" (huruf besar, ulang tiap halaman)
    if(/^BAB\s*\d+\b/i.test(oneLine) && !/[a-z]/.test(oneLine)) continue;
    const isHead = oneLine.length<=64 && /^[0-9A-ZÀ-Ý][0-9A-ZÀ-Ý\s.,:&'\-()\/]+$/.test(oneLine) && /[A-ZÀ-Ý]/.test(oneLine) && !/[a-z]/.test(oneLine.replace(/\b(dan|atau|di|ke|untuk|serta)\b/gi,''));
    if(isHead && oneLine.length>2){
      html+=`<h4 class="doc-h">${hl(esc(oneLine),q)}</h4>`;
    } else {
      html+=`<p>${hl(esc(oneLine),q)}</p>`;
    }
  }
  return html||'<p style="color:var(--ink-faint)">(Tiada teks pada halaman ini — kemungkinan halaman grafik atau rajah dalam dokumen asal.)</p>';
}
function hl(s,q){
  if(!q) return s;
  try{ const rx=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); return s.replace(rx,'<mark>$1</mark>'); }catch(e){ return s; }
}
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

/* ---------- OPEN a section ---------- */
function goSec(i, scrollTop=true, q=null){
  current=i; lastQuery = q||""; searching=false;
  const o=OUT[i];
  const c=$('content'); 
  let pagesHtml='';
  for(let p=o.s;p<o.e;p++){
    const pg=pageMap[p]; if(!pg) continue;
    pagesHtml+=`<div class="page-block"><div class="page-tab"><span class="ln"></span>Halaman cetak ${p-2}</div><div class="doc">${renderDoc(pg.t,q)}</div></div>`;
  }
  const babO = OUT[o.bab]||null;
  const kindLbl = ({front:'Permulaan',bab:'Bab',sub:'Bahagian',strat:'Strategi',prak:'Prakarsa',pemboleh:'Pemboleh Daya',end:'Lampiran'})[o.k]||'';
  const prn=o.pr, pdf=o.pdf;
  c.innerHTML=`<div class="view">
    <div class="read-head">
      <div class="read-kind">${kindLbl}</div>
      <h2 class="read-title">${esc(o.t.replace(/^BAB\s*\d+\s*[—-]\s*/,''))}</h2>
      ${ (babO && o.k!=='bab' && o.k!=='front' && o.k!=='end') ? `<div class="read-bab"><span class="pill">${esc(babTag(babO))}</span> ${esc(babO.t.replace(/^BAB\s*\d+\s*[—-]\s*/,''))}</div>`:'' }
    </div>
    <div class="read-rule"></div>
    ${pagesHtml}
    ${navFoot(i)}
  </div>`;
  buildCrumb(i);
  updatePgRef(prn,pdf);
  updateNavBtns(i);
  syncNav(i);
  bindFoot();
  if(scrollTop) $('scroll').scrollTop=0;
  if(q){ // scroll to first mark
    requestAnimationFrame(()=>{ const m=c.querySelector('mark'); if(m) m.scrollIntoView({block:'center'}); });
  }
  closeMobileNav();
}
function babTag(babO){ const m=/Teras Strategik\s*(\d)/.exec(babO.t); if(m) return 'Teras '+m[1]; const b=/BAB\s*(\d+)/.exec(babO.t); return b?'Bab '+b[1]:''; }

function navFoot(i){
  const prev=i>0?OUT[i-1]:null, next=i<OUT.length-1?OUT[i+1]:null;
  return `<div class="read-foot">
    <button class="pv" ${prev?'':'disabled'} ${prev?`data-go="${i-1}"`:''}><span class="dir">‹ Sebelum</span><span class="t">${prev?esc(shortT(prev.t)):'—'}</span></button>
    <button class="nx" ${next?'':'disabled'} ${next?`data-go="${i+1}"`:''}><span class="dir">Seterusnya ›</span><span class="t">${next?esc(shortT(next.t)):'—'}</span></button>
  </div>`;
}
function shortT(t){ return t.replace(/^BAB\s*\d+\s*[—-]\s*/,'').replace(/:.*$/,m=>m.length>40?': …':m); }
function bindFoot(){ document.querySelectorAll('.read-foot button[data-go]').forEach(b=>b.addEventListener('click',()=>goSec(+b.dataset.go))); }

function buildCrumb(i){
  const o=OUT[i]; const cr=$('crumb');
  let parts=[`<a class="home-lnk" id="crHome" href="#">Utama</a>`];
  if(o.k==='front'){ parts.push(`<span class="sep">›</span><b>${esc(o.t)}</b>`); }
  else if(o.k==='end'){ parts.push(`<span class="sep">›</span><b>${esc(o.t)}</b>`); }
  else {
    const babO=OUT[o.bab];
    if(babO && o.bab!==i){ parts.push(`<span class="sep">›</span><a href="#" data-go="${o.bab}">${esc(babTag(babO)||'Bab')}</a>`); parts.push(`<span class="sep">›</span><b>${esc(shortT(o.t))}</b>`); }
    else { parts.push(`<span class="sep">›</span><b>${esc(shortT(o.t))}</b>`); }
  }
  cr.innerHTML=parts.join(' ');
  cr.querySelector('#crHome').addEventListener('click',e=>{e.preventDefault();goHome();});
  cr.querySelectorAll('a[data-go]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();goSec(+a.dataset.go);}));
}
function updatePgRef(prn,pdf){ const el=$('pgref'); el.style.display=''; el.innerHTML=`ms. cetak <b>${prn}</b>`; }
function updateNavBtns(i){
  $('prevBtn').disabled = !(i>0); $('nextBtn').disabled=!(i<OUT.length-1);
  $('prevBtn').onclick=()=>{ if(i>0) goSec(i-1); };
  $('nextBtn').onclick=()=>{ if(i<OUT.length-1) goSec(i+1); };
}

/* ---------- HOME ---------- */
function goHome(){
  current=null; lastQuery=""; searching=false;
  syncNav(null);
  $('crumb').innerHTML=`<b>Halaman Utama</b>`;
  $('pgref').style.display='none';
  $('prevBtn').disabled=true; $('nextBtn').disabled=true;
  const c=$('content');
  const erIdx=OUT.findIndex(o=>/Ringkasan Eksekutif/i.test(o.t));
  const sasIdx=OUT.findIndex(o=>/Sasaran Wajib Capai/i.test(o.t));
  const gloIdx=OUT.findIndex(o=>/^Glosari/i.test(o.t));
  const lampIdx=OUT.findIndex(o=>/^Lampiran/i.test(o.t));
  const ciriIdx=OUT.findIndex(o=>/Lima Ciri Murid/i.test(o.t));
  const tumpIdx=OUT.findIndex(o=>/Lima Tumpuan/i.test(o.t));
  c.innerHTML=`<div class="view">
    <div class="cover">
      <div class="eyebrow">${esc(META.publisher)}</div>
      <h1>Rancangan Pendidikan Malaysia</h1>
      <div class="years">${esc(META.years)}</div>

      <div class="sign"><div class="by">by Cikgu Shahril</div><div class="sector">Sektor Perancangan &amp; Pengurusan PPD, JPN Kedah</div></div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num">7</div><div class="lbl">Teras Strategik</div></div>
      <div class="stat"><div class="num">31,106</div><div class="lbl">Input JMDPN 2024 dari seluruh negara</div></div>
      <div class="stat"><div class="num">320</div><div class="lbl">Pakar dalam Diskusi Kumpulan Berfokus</div></div>
      <div class="stat"><div class="num">10<span class="u"> thn</span></div><div class="lbl">Tempoh pelaksanaan 2026–2035</div></div>
    </div>

    <div class="sec-head"><span class="k">Tujuh Teras Strategik</span><span class="rule"></span><span class="hint">Klik untuk membaca</span></div>
    <div class="teras-grid" id="terasGrid"></div>

    <div class="sec-head"><span class="k">Insan Sejahtera — Lima Ciri Murid</span><span class="rule"></span></div>
    <div class="insan">
      <p class="lead">Matlamat RPM 2026–2035 ialah melahirkan <b>Insan Sejahtera</b> — individu seimbang yang beradab, berilmu, berkemahiran, berdaya tahan dan berkeyakinan, berteraskan Falsafah Pendidikan Kebangsaan dan Rukun Negara.</p>

    <div class="sec-head"><span class="k">Rujukan Pantas</span><span class="rule"></span></div>
    <div class="quick" id="quickLinks"></div>
  </div>`;

  // teras cards
  const tg=$('terasGrid');
  TERAS.forEach(t=>{
    const bab=babOfTeras(t.n);
    const btn=document.createElement('button'); btn.className='teras';
    btn.innerHTML=`<div class="ring">${t.n}</div><div><div class="tt">Teras Strategik ${t.n}</div><div class="desc">${esc(t.d)}</div></div>`;
    if(bab) btn.addEventListener('click',()=>goSec(OUT.indexOf(bab)));

  const cc=$('ciriChips');

/* ---------- SEARCH ---------- */
let searchT=null;
function doSearch(q){
  q=q.trim();
  const c=$('content');
  if(q.length<2){ if(current==null) goHome(); else goSec(current,false,null); return; }
  const lq=lc(q);
  $('crumb').innerHTML=`<a class="home-lnk" id="crHome2" href="#">Utama</a> <span class="sep">›</span> <b>Carian</b>`;
  $('crHome2').addEventListener('click',e=>{e.preventDefault();$('searchInput').value='';onClr();goHome();});
  $('pgref').style.display='none'; $('prevBtn').disabled=true; $('nextBtn').disabled=true;
  syncNav(null); searching=true;

  // 1) outline title matches
  const titleHits=[];
  OUT.forEach((o,i)=>{ if(lc(o.t).includes(lq)) titleHits.push(i); });
  // 2) page text matches — hanya halaman yang berada dalam bahagian yang boleh dibuka
  const pageHits=[];
  for(let k=0;k<pagesLC.length;k++){
    const idx=pagesLC[k].indexOf(lq);
    if(idx<0) continue;
    const p=PAGES[k].p, sec=secOfPage(p);
    if(sec<0) continue; // kulit/kandungan/halaman luar bahagian — langkau supaya klik tak buka bahagian salah
    pageHits.push({p, idx, k, sec});
  }
  const total=titleHits.length+pageHits.length;
  let html=`<div class="view"><h2 class="sr-head">Hasil carian</h2><div class="sr-meta"><b>${total}</b> padanan untuk “${esc(q)}” — ${titleHits.length} tajuk bahagian, ${pageHits.length} halaman.</div>`;
  if(total===0){
    html+=`<div class="sr-empty"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3" stroke-linecap="round"/></svg><b>Tiada padanan dijumpai</b>Cuba kata kunci lain, atau perkataan yang lebih ringkas.</div></div>`;
    c.innerHTML=html; $('scroll').scrollTop=0; return;
  }
  if(titleHits.length){
    html+=`<div class="sr-group-label">Pergi terus ke bahagian<span class="rule"></span></div>`;
    titleHits.slice(0,12).forEach(i=>{ const o=OUT[i]; const babO=OUT[o.bab];
      html+=`<button class="sr-item" data-go="${i}"><div class="sr-top"><span class="sr-title">${hl(esc(o.t),q)}</span><span class="sr-pg">ms. ${o.pr}</span></div>${babO&&o.bab!==i?`<div class="sr-bab">${esc(babTag(babO))} · ${esc(babO.t.replace(/^BAB\s*\d+\s*[—-]\s*/,''))}</div>`:''}</button>`;
    });
  }
  if(pageHits.length){
    html+=`<div class="sr-group-label">Dalam teks (${pageHits.length})<span class="rule"></span></div>`;
    pageHits.slice(0,60).forEach(h=>{
      const pg=pageMap[h.p]; const o=OUT[h.sec]; const babO=OUT[o.bab];
      const snip=makeSnip(pg.t,h.idx,q.length);
      html+=`<button class="sr-item" data-page="${h.p}" data-sec="${h.sec}"><div class="sr-top"><span class="sr-title">${esc(shortT(o.t))}</span><span class="sr-bab">${babO?esc(babTag(babO)):''}</span><span class="sr-pg">ms. ${h.p-2}</span></div><div class="sr-snip">${hl(esc(snip),q)}</div></button>`;
    });
    if(pageHits.length>60) html+=`<div class="sr-meta" style="margin-top:14px">Menunjukkan 60 padanan teratas daripada ${pageHits.length}. Perincikan carian untuk hasil lebih tepat.</div>`;
  }
  html+=`</div>`;
  c.innerHTML=html; $('scroll').scrollTop=0;
  c.querySelectorAll('.sr-item[data-go]').forEach(b=>b.addEventListener('click',()=>goSec(+b.dataset.go,true,q)));
  c.querySelectorAll('.sr-item[data-page]').forEach(b=>b.addEventListener('click',()=>goSec(+b.dataset.sec,true,q)));
}
function makeSnip(text,idx,qlen){
  const start=Math.max(0,idx-70), end=Math.min(text.length,idx+qlen+90);
  let s=text.slice(start,end).replace(/\n+/g,' ').replace(/\s{2,}/g,' ').trim();
  if(start>0) s='… '+s; if(end<text.length) s=s+' …'; return s;
}

/* ---------- events ---------- */
function onSearchInput(e){
  const v=e.target.value; $('searchBox').classList.toggle('has',v.length>0);
  clearTimeout(searchT); searchT=setTimeout(()=>doSearch(v),130);
}
function onClr(){ $('searchInput').value=''; $('searchBox').classList.remove('has'); if(current==null) goHome(); else goSec(current,false,null); $('searchInput').focus(); }
function openMobileNav(){ $('app').classList.add('nav-open'); }
function closeMobileNav(){ $('app').classList.remove('nav-open'); }

function init(){
  buildNav(); goHome();
  $('searchInput').addEventListener('input',onSearchInput);
  $('searchClr').addEventListener('click',onClr);
  $('homeBtn').addEventListener('click',goHome);
  $('homeBtn').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();goHome();}});
  $('menuBtn').addEventListener('click',openMobileNav);
  $('scrim').addEventListener('click',closeMobileNav);
  document.addEventListener('keydown',e=>{
    if(e.key==='/' && document.activeElement!==$('searchInput')){ e.preventDefault(); $('searchInput').focus(); }
    else if(e.key==='Escape'){ if($('searchInput').value){ onClr(); } $('searchInput').blur(); closeMobileNav(); }
    else if((e.key==='ArrowRight')&&current!=null&&!searching&&!e.target.matches('input')&&current<OUT.length-1){ goSec(current+1); }
    else if((e.key==='ArrowLeft')&&current!=null&&!searching&&!e.target.matches('input')&&current>0){ goSec(current-1); }
  });
}
init();
})();
</script>
