ra berfasa\ndan berterusan merangkumi\ntiga komponen utama, iaitu\nintegrasi\nelemen\nPPM,\npengupayaan jurulatih utama\n(JU)\nserta\npengukuhan\nkepimpinan (Rajah 9.8).\n\nRajah 9.8 Komponen Pembangunan Kapasiti Pendidik dan Pemimpin Pendidikan bagi PPM\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":116,"p":280,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPerancangan dan Pembangunan\nModul dan Latihan bagi Pendidik\ndan Pemimpin Pendidikan\n\n•\n\nPerancangan dan pembangunan modul latihan kemampanan yang berstruktur dan\nkhusus untuk guru praperkhidmatan, guru dalam perkhidmatan, pemimpin institusi\npendidikan KPM, PPD, JPN dan Kementerian. Pengupayaan jurulatih utama sebagai\npembimbing dan kursus PLC berkaitan akan diperkukuh sebagai sokongan\npembelajaran berterusan.\n\nFasa 2\n(2028 – 2030)\nPelaksanaan Modul\ndan Pengukuhan PLC\n\n•\n•\n\nPelaksanaan modul berkaitan kemampanan secara bersemuka dan dalam talian.\nPenawaran latihan melalui kursus dalam talian terbuka (Massive Open Online Courses\n- MOOC) bagi memperkukuh pembangunan profesional.\n\nFasa 3\n(2031 – 2035)\nPeluasan, Pemantauan serta\nPenilaian Modul dan Latihan\n\n•\n\nPeluasan, pemantauan dan penilaian untuk penambahbaikan modul dan latihan.\n\nRajah 9.9 Garis Masa Pelaksanaan Strategi 2 Prakarsa 1\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":117,"p":281,"t":"STRATEGI 3: MENINGKATKAN ADVOKASI DAN PROMOSI PPM\nDALAM EKOSISTEM PENDIDIKAN SECARA TERANGKUM\nStrategi ketiga menumpukan kepada usaha memperluas dan mengukuhkan jaringan\ndan jalinan strategik antara institusi pendidikan KPM dengan pelbagai pihak\nberkepentingan di dalam dan luar negara secara terancang, berstruktur, terangkum\nserta berterusan bagi memastikan kejayaan pelaksanaan prakarsa PPM. Penekanan\ndiberikan kepada usaha advokasi dan promosi yang menyeluruh berkaitan dengan\nPPM dan pembudayaan kemampanan dalam kalangan warga KPM.\nPrakarsa Strategi 3\n\nMengoptimumkan\njaringan dan jalinan\nuntuk PPM\n\nMemperkasakan murid dan\nwarga pendidikan sebagai\nagen perubahan amalan\nkemampanan\n\nRajah 9.10 Prakarsa bagi Strategi 3\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":118,"p":282,"t":"PRAKARSA 1: MENGOPTIMUMKAN JARINGAN DAN JALINAN\nUNTUK PPM\nMatlamat prakarsa ini adalah untuk mengoptimumkan\njaringan dan jalinan strategik, memperkukuh kolaborasi\nbagi memacu penyelesaian masalah berasaskan data\nserta advokasi amalan pembudayaan kemampanan\nPrakarsa ini memberikan tumpuan kepada pengukuhan kerjasama antara semua entiti KPM\ndengan pihak berkepentingan dalam aspek PPM seperti kementerian lain (Kementerian Sains,\nTeknologi dan Inovasi, Kementerian Sumber Asli dan Kelestarian Alam serta Kementerian\nPendidikan Tinggi), agensi kerajaan dan swasta, CSO berkaitan dengan PPM, pihak berkuasa\ntempatan dan komuniti.\nJaringan dan jalinan juga akan diperluas ke peringkat serantau dan antarabangsa melalui\nplatform strategik dan inovatif bagi membolehkan perkongsian kepakaran dan amalan\nterbaik, peluang kerjasama berimpak tinggi serta pelibatan yang lebih holistik dalam\nmempromosikan PPM secara lebih meluas dan berterusan. Pembangunan Portal PPM KPM\nsebagai pusat sehenti untuk perkongsian data dan maklumat berkaitan dengan PPM menjadi\ntumpuan utama prakarsa ini.\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":118,"p":283,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPembangunan dan\nPelancaran Portal PPM\n\n•\n\nPembangunan portal yang interaktif sebagai pusat sehenti maklumat, data dan\npelaksanaan amalan PPM sebagai rujukan dan hebahan dalam kalangan warga\nKPM dan orang awam.\n\nFasa 2\n(2028 – 2030)\nPenambahbaikan\nPortal PPM\n\n•\n\nPenambahbaikan teknikal merangkumi ﬁtur tambahan, ruang interaksi dan\npengintegrasian pelbagai sumber data bagi meningkatkan keterjangkauan dan\nkebolehcapaian.\n\nFasa 3\n(2031 – 2035)\nPengukuhan, Pemantauan\ndan Penilaian Portal PPM\n\n•\n\nPenilaian portal secara skala penuh bagi penambahbaikan portal dan memperkukuh\nkolaborasi pelbagai pihak berkepentingan.\n\nRajah 9.11 Garis Masa Pelaksanaan Strategi 3 Prakarsa 1\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":119,"p":284,"t":"PRAKARSA 2: MEMPERKASAKAN MURID DAN WARGA KPM\nSEBAGAI AGEN PERUBAHAN AMALAN KEMAMPANAN\nMatlamat prakarsa ini adalah untuk melahirkan murid dan\nwarga pendidikan menjadi agen perubahan bagi\npembudayaan amalan kemampanan secara menyeluruh\n\nPrakarsa ini mengadaptasi konsep living lab menerusi Makmal\nAktif Lestari (MAL) sebagai ruang kolaboratif untuk\nmembangunkan kompetensi, nilai dan amalan PPM dalam\nkalangan warga pendidik. MAL turut melibatkan komuniti,\npihak berkuasa tempatan, CSO, institusi pendidikan tinggi dan\nrakan industri dalam projek penyelesaian masalah berasaskan\nkonteks setempat.\nPendekatan ini melangkaui isu alam sekitar dan turut merangkumi\nisu sosial serta ekonomi seperti kemiskinan, keselamatan\nmakanan dan malnutrisi.\n\nPelaksanaan secara kolaboratif\nAktiviti melibatkan domain kognitif,\nsosioemosi dan tingkah laku\n\nKONSEP\nMAKMAL\nAKTIF LESTARI\n(MAL)\n\nTumpuan aktiviti berdasarkan konteks\nlokaliti (local level action)\nLatihan dan bimbingan berterusan\nPendekatan seluruh institusi (murid, guru,\npentadbir, komuniti, PBT dan lain-lain)\nPlatform dan prinsip menterjemahkan\npengetahuan kepada tindakan\n\nRajah 9.12 Konsep Makmal Aktif Lestari\n\nBAB 9 TERAS STRATEGIK 6\n\nMelalui MAL, aktiviti berpusatkan murid memberikan penekanan\nkepada tindakan yang transformatif meliputi aspek kognitif,\nsosioemosi dan tingkah laku. MAL juga akan menjadi platform\npembelajaran sepanjang hayat, membina kemahiran kepimpinan,\nkolaborasi dan empati secara lebih mendalam ke arah melahirkan\nIkon Lestari di institusi pendidikan KPM (Rajah 9.12)."},{"sec":119,"p":285,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nReka Bentuk dan Pelaksanaan\nRintis Kerangka MAL\n\n•\n\nReka bentuk dan pembangunan kerangka MAL serta pelaksanaan projek rintis\nberdasarkan kerangka yang dibangunkan di institusi pendidikan KPM yang terpilih.\n\nFasa 2\n(2028 – 2030)\nPeluasan Kohort\nPelaksanaan MAL\n\n•\n\nPeluasan pelaksanaan MAL secara berperingkat. Fasa ini memberikan penekanan\nkepada pengukuhan pengurusan aktiviti berdasarkan kerangka MAL, pemantapan\nbimbingan dan kerjasama rakan strategik secara berterusan.\n\nFasa 3\n(2031 – 2035)\nPengukuhan Jaringan,\nPemantauan dan\nPenilaian MAL\n\n•\n\nPengukuhan jaringan MAL pada pelbagai peringkat. Peranan komuniti dalam\npembangunan amalan PPM akan diberikan penekanan dan disokong oleh program\nmentor menti antara institusi pendidikan KPM.\nPemantauan dan penilaian secara sistematik.\n\n•\n\nRajah 9.13 Garis Masa Pelaksanaan Strategi 3 Prakarsa 2\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":120,"p":286,"t":"STRATEGI 4: MEMPERKUKUH PEMANTAUAN DAN PENILAIAN\nPELAKSANAAN PPM DI INSTITUSI PENDIDIKAN KPM\nPemantauan dan penilaian yang tersusun, bersepadu dan berteraskan data penting untuk\npenambahbaikan amalan kemampanan yang berterusan. Bagi menjayakan strategi ini, pembangunan\nmekanisme pemantauan dan penilaian amalan kemampanan yang standard diperlukan untuk\nmemastikan ketekalan dan mengenal pasti ruang penambahbaikan.\nStrategi 4 memastikan pelaksanaan PPM dipantau dan dinilai berdasarkan kerangka nasional yang\nmenyeluruh, merangkumi dimensi sosial, kepimpinan dan pelibatan komuniti dalam pembudayaan\namalan kemampanan.\n\nPrakarsa Strategi 4\n\nMenilai dan mengiktiraf institusi pendidikan KPM\nyang menerapkan amalan kemampanan\n\nRajah 9.14 Prakarsa bagi Strategi 4\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":121,"p":287,"t":"PRAKARSA 1: MENILAI DAN MENGIKTIRAF INSTITUSI PENDIDIKAN\nKPM YANG MENERAPKAN AMALAN KEMAMPANAN\n\nMatlamat prakarsa ini adalah\nuntuk memupuk pembudayaan\nkemampanan dalam ekosistem\npendidikan melalui pemantauan,\npenilaian dan penarafan\nsecara berterusan\n\nPrakarsa ini bertujuan untuk mewujudkan mekanisme\npemantauan dan penilaian yang sistematik dan menyeluruh bagi\nmemastikan setiap aktiviti berkaitan dengan PPM mencapai\nmatlamat\npembudayaan\nkemampanan\nseperti\nyang\ndisasarkan. Pengiktirafan amalan kemampanan di institusi\npendidikan KPM yang merangkumi dimensi sosioekonomi dan\nalam sekitar menggalakkan penambahbaikan pelaksanaan\nsecara berterusan.\nKriteria pemantauan, penilaian dan pengiktirafan berpandukan\nkerangka badan antarabangsa seperti UNESCO, UNICEF, OECD\ndan serantau akan disesuaikan dengan konteks pendidikan di\nMalaysia. Kerangka yang berstruktur, telus dan selari dengan\npiawaian kemampanan antarabangsa membolehkan institusi\npendidikan KPM dinilai secara objektif seterusnya berpotensi\ndijadikan model institusi pendidikan mampan pada peringkat\nserantau dan global.\nBAB 9 TERAS STRATEGIK 6"},{"sec":121,"p":288,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nPembangunan Mekanisme Pemantauan\ndan Penilaian Amalan Kemampanan\n\n•\n\nAnalisis situasi untuk membina kerangka pemantauan, penilaian dan penarafan serta\npembangunan alat pengukuran yang merangkumi domain kemampanan alam sekitar\ndan sosioekonomi.\n\nFasa 2\n(2028 – 2030)\nRintis Instrumen Pemantauan\ndan Penilaian Amalan Kemampanan\n\n•\n\nPelaksanaan rintis di institusi pendidikan KPM yang mengambil kira faktor geograﬁ,\nlokaliti dan jenis institusi pendidikan untuk memastikan kerangka penilaian yang\ndibangunkan bersifat terangkum dan boleh diguna pakai pada semua peringkat.\n\nFasa 3\n(2031 – 2035)\nPemantauan, Penilaian dan\nPengiktirafan Institusi Pendidikan\nKPM yang Melaksanakan Amalan\nKemampanan\n\n•\n\nPeluasan institusi pendidikan KPM yang menjalani proses penilaian dan penarafan\nsecara bertanggungjawab untuk memastikan pelaksanaan budaya kemampanan\nberlaku.\n\nRajah 9.15 Garis Masa Pelaksanaan Strategi 4 Prakarsa 1\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":122,"p":289,"t":"PEMBOLEH DAYA: PENGUPAYAAN PENDANAAN, KEPAKARAN\nDAN LOGISTIK UNTUK SEMUA PRAKARSA BERKAITAN PPM\nBagi memastikan ketiga-tiga komponen pemboleh daya dilaksanakan secara\nbersepadu dan sistematik, penyelarasan berpusat yang cekap adalah amat penting.\nPemantauan dan penilaian akan menjamin ketelusan dan penambahbaikan berterusan.\nPembudayaan amalan kemampanan memerlukan sokongan serta penyelarasan berterusan dari segi pendanaan,\nkepakaran dan logistik bersama-sama dengan pihak berkepentingan dan agensi antarabangsa. Tanpa sokongan tiga\nkomponen utama ini, pelaksanaan prakarsa PPM akan menghadapi kekangan dan kurang berkesan.\nPelaksanaan prakarsa seperti pembangunan modul dan latihan, pemantauan dan penilaian serta perancangan aktiviti\nmemerlukan bantuan kepakaran daripada pelbagai pihak berkepentingan.\nDari sudut logistik dan pengoperasian, bahan bantu mengajar, peralatan dan kemudahan sokongan serta kemudahan\nICT adalah penting. Hal ini juga merangkumi penyelarasan agihan sumber dana secara strategik. Ketiga-tiga komponen\nini merupakan asas bagi memastikan proses pembudayaan kemampanan dapat dilaksanakan dengan berkesan,\nRajah 9.16 Cadangan Model Fungsi Pemboleh Daya\nterangkum dan saksama.\n\nGARIS MASA PELAKSANAAN\nFasa 1\n(2026 – 2027)\nRintis\n\n•\n\nRintis latihan pembangunan kompetensi kemampanan untuk jurulatih (Train-the-trainer).\n\nFasa 2\n(2028 – 2030)\nPenambahbaikan dan Peluasan\n\n•\n\nPenambahbaikan modul dan peluasan latihan pembangunan kompetensi kemampanan\nuntuk jurulatih (Train-the-trainer).\n\nFasa 3\n(2031 – 2035)\nPemantauan dan Penilaian\n\n•\n\nPemantauan dan penilaian impak modul dan latihan pembangunan kompetensi\nkemampanan untuk jurulatih (Train-the-trainer).\n\nRajah 9.17 Garis Masa Pelaksanaan Pemboleh Daya\nBAB 9 TERAS STRATEGIK 6"},{"sec":123,"p":290,"t":"9.4 KESIMPULAN\nTeras Strategik 6 menekankan pendekatan keseluruhan institusi\ndan masyarakat ke arah pembudayaan kemampanan secara\nmenyeluruh dalam ekosistem pendidikan. Usaha ini merangkumi\npengukuhan kurikulum dan pedagogi, latihan pendidik dan\npemimpin pendidikan, advokasi dan pengukuhan jaringan\nkerjasama strategik serta pemantauan, penilaian dan penarafan\namalan kemampanan institusi pendidikan KPM.\nIntegrasi PPM mengupayakan warga KPM, khususnya murid\ndengan kompetensi kemampanan, manakala kapasiti pendidik\nakan dibangunkan untuk memastikan pelaksanaan yang\nkonsisten di institusi pendidikan KPM. Kerjasama dengan pihak\nberkepentingan akan memperkaya pengalaman pembelajaran\nmurid melalui penyelesaian masalah berasaskan konteks\nsetempat. Mekanisme pemantauan dan penilaian yang\nbersepadu pula menjamin ketekalan dan mutu pelaksanaan PPM\ndi seluruh negara.\nPendanaan, kepakaran dan logistik berfungsi sebagai pemboleh\ndaya bagi memastikan semua prakarsa bawah Teras Strategik\n6 dapat dilaksanakan secara transformatif ke arah melahirkan\nmurid yang berdaya tahan, beretika dan membudayakan amalan\nkemampanan demi masa hadapan negara yang lebih lestari.\n\nBAB 9 TERAS STRATEGIK 6"},{"sec":124,"p":291,"t":"BAB\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":125,"p":292,"t":"TERAS STRATEGIK 7 | MENINGKATKAN KECEKAPAN TADBIR URUS\nDAN SISTEM PENYAMPAIAN\n\nRINGKASAN\nTeras Strategik 7 menumpukan usaha memperkukuh\nstruktur dan fungsi tadbir urus KPM dengan\nmemperjelas peranan antara KPM, JPN, PPD dan\ninstitusi pendidikan KPM. Tadbir urus yang mantap\nmembolehkan KPM mengurus sumber manusia,\nkewangan dan prasarana dengan lebih optimum,\nseterusnya meningkatkan mutu perkhidmatan\nkepada murid, pendidik dan komuniti pendidikan.\nSelain itu, Teras Strategik 7 menekankan\npelaksanaan komunikasi strategik yang berkesan,\npengurusan perubahan dan risiko yang teratur serta\nautonomi terpimpin di institusi pendidikan. Hal ini\nbagi memperkukuh keupayaan membuat keputusan\ndengan lebih cepat dan responsif. Pendekatan ini\nmenyokong aspirasi kerajaan untuk membentuk\nsektor awam yang tangkas, bertanggungjawab\ndan berorientasikan hasil supaya setiap peringkat\norganisasi dapat melaksanakan tanggungjawab\ndengan integriti tinggi dan kefahaman jelas terhadap\nperanan masing-masing.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":126,"p":293,"t":"10.1 PENGENALAN DAN RASIONAL\nTadbir urus yang berkesan dalam sektor\npendidikan\nbertujuan\nmemastikan\nsistem pendidikan ditadbir secara telus,\nbertanggungjawab dan berintegriti. Melalui\namalan tadbir urus yang mantap, proses\nperancangan dasar dapat dilaksanakan\ndengan lebih teratur dan berasaskan bukti,\nmanakala\npengurusan\nsumber\ndapat\ndioptimumkan bagi mengelakkan pembaziran\nserta ketirisan. Di samping itu, tadbir urus yang\nbermutu membolehkan keutamaan pendidikan\nditentukan\nsecara\nobjektif,\nseterusnya\nmemastikan setiap keputusan yang dibuat\ndapat memenuhi keperluan murid, institusi dan\nkomuniti pendidikan.\nTadbir urus yang berkesan mendorong\nkecekapan penyampaian perkhidmatan yang\nakan menentukan keberhasilan pelaksanaan\ndasar secara menyeluruh. Penyampaian\nperkhidmatan yang cekap memastikan sistem\nkomunikasi yang responsif, sumber manusia\nyang optimum, pengurusan prasarana\ndan latihan profesional yang mantap serta\npengurusan institusi pendidikan yang baik,\nsejajar dengan keperluan semua pihak untuk\nmencapai objektif yang ditetapkan. Hal ini\nbukan sahaja meningkatkan mutu pengajaran\ndan pembelajaran, malah memperkukuh\nkesaksamaan akses pendidikan. Secara\nkeseluruhan, tadbir urus yang baik dan\npenyampaian perkhidmatan yang cekap\nmerupakan asas penting bagi mewujudkan\nsistem pendidikan yang efektif, responsif dan\nberdaya saing.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":126,"p":294,"t":"Teras Strategik 7 menggariskan kecekapan tadbir urus dan keberkesanan sistem penyampaian yang merupakan asas kepada kejayaan keseluruhan sistem pendidikan\nnegara. KPM sebagai organisasi yang besar dengan pelbagai lapisan pengurusan memerlukan struktur dan prosedur pentadbiran yang jelas, koordinasi yang mantap\nserta sistem komunikasi yang bersepadu agar setiap dasar dan keputusan strategik dapat dilaksanakan dengan efisien.\nJadual 10.1 Kerangka Strategik Pengukuhan Tadbir Urus dan Struktur Organisasi KPM\n\nPersekitaran\n\nInput\n\nAktiviti\n\nOutput\n\nHasil\n\n1.\n\n1.\n\n1.\n\n1.\n\n1.\n\n2.\n\n3.\n4.\n5.\n\nMaklumat KPM tidak\ndisampaikan secara\nmenyeluruh dan berkesan.\nStruktur KPM diperkemas\nbagi menjelaskan peranan\ndan meningkatkan\nkeberkesanan pengurusan\npendidikan.\nKekurangan keberkesanan\npelaksanaan prosedur\npenamatan pegawai KPM.\nJurang kapasiti mengurus\npentadbiran sekolah\nsecara autonomi.\nJurang pengurusan risiko\nsebagai mekanisme\nmitigasi risiko operasi.\n\n2.\n3.\n4.\n5.\n\nMedium komunikasi sedia\nada.\nStruktur organisasi KPM\ndan fungsi sedia ada.\nLatihan kepada\nkepimpinan sekolah dan\npentadbiran.\nKerjasama antara jabatan\ndan pemegang taruh.\nKepakaran teknikal\ndalam pengurusan risiko,\nperubahan dan komunikasi.\n\n2.\n\n3.\n4.\n5.\n\n6.\n\nMemantapkan pelaksanaan\nPelan Strategik Komunikasi\nKPM yang berstruktur dan\nbersasar.\nMenyusun semula fungsi/\nstruktur dan perjawatan\nBahagian KPM, JPN, PPD\ndan institusi pendidikan\nKPM.\nMemperkasakan polisi dan\nprosedur penamatan\npegawai di KPM.\nMengukuhkan pelaksanaan\nautonomi di institusi\npendidikan KPM.\nMengoptimumkan\npenggunaan fasiliti dan\nprasarana di institusi\npendidikan KPM.\nMembangunkan Pelan\nPengurusan Perubahan dan\nRisiko KPM.\n\n2.\n3.\n4.\n5.\n\nPelan komunikasi\nstrategik dilaksanakan.\nFungsi organisasi yang\ndistruktur semula.\nProses pelantikan\npegawai yang lebih\nmantap.\nPolisi autonomi dan\npenjanaan pendapatan\ninstitusi.\nPelan pengurusan\nrisiko dan perubahan\ndibangunkan.\n\n2.\n\n3.\n\n4.\n\nPelan komunikasi yang\nresponsif dan proaktif.\nPengukuhan fungsi\ndan struktur organisasi\nKPM, JPN, PPD dan\ninstitusi pendidikan.\nPeningkatan\nkemampuan\npemberian autonomi\nterpimpin.\nPengurusan risiko\ndan perubahan yang\nberkesan.\n\nPengurangan institusi berprestasi rendah dilaksanakan melalui pengurusan operasi yang efektif dan pendekatan menyeluruh untuk\nmerapatkan jurang prestasi sedia ada.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":127,"p":295,"t":"Pelaksanaan dasar, program dan projek pendidikan sering kali menghadapi cabaran dari segi penyelarasan antara peringkat pengurusan, kekangan kapasiti sumber\nmanusia dan kewangan, kekurangan mekanisme komunikasi serta pelaksanaan pemantauan yang efektif. Oleh itu, Teras Strategik 7 dirangka bagi menangani isu-isu\nini melalui lima tumpuan utama:\n1.\n2.\n3.\n4.\n5.\n\nPemantapan Pelan Strategik Komunikasi KPM bagi memastikan penyampaian maklumat dan arahan strategik berlaku secara jelas, telus dan menyeluruh pada\nsemua peringkat.\nPenyusunan semula fungsi dan struktur organisasi KPM, JPN, PPD dan institusi pendidikan bagi memperjelas bidang kuasa dan tanggungjawab.\nPemantapan prosedur penamatan pegawai dan amalan akauntabiliti agar hanya pegawai yang kompeten kekal dalam sistem pendidikan.\nPelaksanaan autonomi terpimpin di institusi pendidikan untuk meningkatkan kecekapan pengurusan institusi pendidikan dan tindak balas terhadap keperluan.\nPembangunan Pelan Pengurusan Perubahan dan Risiko KPM untuk memperkukuh daya tahan institusi pendidikan terhadap ketidaktentuan operasi dan dasar.\n\nPelaksanaan Teras Strategik 7 akan mewujudkan budaya organisasi berprestasi tinggi, pengukuhan akauntabiliti serta peningkatan kecekapan penggunaan sumber\ndalam usaha menyampaikan perkhidmatan pendidikan yang bermutu kepada semua pihak berkepentingan.\n\n10.2 KEADAAN\nSEMASA\n\nTeras Strategik 7 menumpukan pelaksanaan dasar dan prakarsa KPM yang masih berdepan dengan pelbagai\ncabaran struktur dan operasi. Kajian mendapati wujud ketidakjelasan fungsi, struktur dan bidang kuasa antara\njabatan dengan bahagian dalam KPM yang menyebabkan pertindihan peranan serta kelewatan untuk membuat\nkeputusan.\nPertama, mekanisme penyampaian maklumat dan arahan antara peringkat KPM yang masih bersifat atas-bawah\n(top-down) dan tidak menyeluruh adalah antara isu utama yang mengekang tadbir urus yang berkesan. Kekangan ini\nmenyebabkan maklumat penting tidak disampaikan dengan jelas kepada warga pendidikan sehingga ke peringkat\nakar umbi. Selain itu, sistem aduan sedia ada perlu ditambah baik agar lebih sistematik bagi menangani isu serta\nmendapatkan maklum balas daripada pelanggan dan pihak berkepentingan secara berkesan.\nKedua, semakan pelaksanaan dasar sedia ada menunjukkan bahawa masih wujud ketidakselarasan peranan serta\nfungsi pada semua peringkat pengurusan. Di samping itu, prosedur penamatan warga KPM yang tidak kompeten perlu\ndiperkasakan bagi memastikan warga KPM yang berprestasi tinggi dapat terus meningkatkan mutu perkhidmatan\npendidikan secara cemerlang.\nKetiga, keupayaan institusi pendidikan KPM untuk mengurus dan mentadbir secara kendiri masih belum diperluas dan\nperlu ditingkatkan bagi mengurangkan kebergantungan kepada JPN dan PPD. Hal ini boleh menjejaskan kecekapan\noperasi dan keupayaan institusi pendidikan untuk menyediakan penyelesaian berasaskan keperluan semasa.\nKeempat, pengurusan risiko dan perubahan organisasi perlu dioptimumkan dengan pemantapan pelan pengurusan\nrisiko yang sistematik dan menyeluruh bagi menangani situasi kecemasan atau cabaran operasi. Begitu juga dengan\nprosedur pengurusan perubahan yang perlu dilaksanakan secara berstruktur supaya pelaksanaan dasar baharu\ndapat dipraktikkan pada semua peringkat pelaksanaan.\nBAB 10 TERAS STRATEGIK 7"},{"sec":128,"p":296,"t":"10.3 MATLAMAT\nTeras Strategik 7 bertujuan memperkukuh kecekapan tadbir urus dan\nsistem penyampaian pada semua peringkat KPM. Teras ini merangkumi\npengukuhan struktur organisasi bagi meningkatkan kejelasan peranan\ndan tanggungjawab dalam memperkasakan autonomi institusi pendidikan\nsecara terpimpin. Selain itu, pendekatan ini turut menumpukan kepada\npemantapan pelan dan mekanisme komunikasi berstruktur serta\nbersasar untuk memastikan penyampaian maklumat yang tepat melalui\nmedia massa dan medium bersesuaian mengikut kawasan bandar dan\n\nluar bandar, sejajar dengan Strategi 1 Prakarsa 1 dalam memantapkan\npelaksanaan Pelan Strategik Komunikasi KPM.\nTeras ini menekankan pengurusan yang telus, bertanggungjawab, tangkas\ndan mampu bertindak balas pantas terhadap perubahan dasar dalam\nmemastikan perkhidmatan pendidikan disampaikan secara cekap dan\nberkesan. Matlamat teras ini diterjemahkan melalui empat strategi utama:\n\nTERAS STRATEGIK 7\n\nMENINGKATKAN KECEKAPAN TADBIR URUS DAN SISTEM PENYAMPAIAN\n\nSTRATEGI 1\nMengukuhkan pelan komunikasi\nKPM yang lebih responsif dan\nproaktif\n\nSTRATEGI 2\nMemperkukuh fungsi dan struktur\norganisasi bahagian, jabatan\npendidikan negeri, pejabat\npendidikan daerah dan institusi\npendidikan KPM\n\nSTRATEGI 3\nMeningkatkan pemberian autonomi\nterpimpin kepada institusi\npendidikan KPM\n\nSTRATEGI 4\nMemperkasakan Pengurusan\nPerubahan dan Risiko\n\n1.\n\n1.\n\n1.\n\n1.\n\nMemantapkan pelaksanaan\nPelan Strategik Komunikasi\nKPM yang berstruktur dan\nbersasar.\n\n2.\n\nMenyusun semula fungsi,\nstruktur dan perjawatan\nBahagian KPM, JPN, PPD dan\ninstitusi pendidikan KPM.\nMemperkasakan polisi dan\nprosedur penamatan pegawai\ndi KPM.\n\n2.\n\nMemperkukuh pelaksanaan\nautonomi terpimpin di institusi\npendidikan KPM.\nMengoptimumkan penggunaan\nfasiliti dan prasarana di institusi\npendidikan KPM.\n\n2.\n\nMembangunkan Pelan\nPengurusan Perubahan KPM.\nMembangunkan Pelan\nPengurusan Risiko KPM.\n\nPelaksanaan Teras Strategik 7 akan membolehkan KPM dan institusi\npendidikan berfungsi sebagai organisasi pembelajaran berasaskan\ndata, mengamalkan budaya komunikasi terbuka serta pengurusan\nperubahan dan risiko yang mampan.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":129,"p":297,"t":"STRATEGI 1: MENGUKUHKAN PELAN KOMUNIKASI KPM\nYANG RESPONSIF DAN PROAKTIF\nStrategi ini menumpukan penambahbaikan mekanisme komunikasi sedia\nada bagi menangani isu ketidaksamaan dalam penyampaian maklumat,\narahan dan dasar di seluruh KPM, di samping akses maklumat yang\nterhad kepada institusi pendidikan di bawahnya. Tumpuan utama adalah\nuntuk membangunkan Pelan Strategik Komunikasi KPM yang berstruktur,\nbersasar dan bersepadu bagi memastikan penyampaian maklumat dari\n\nperingkat atasan hingga pelaksana di lapangan dapat diterjemah dengan\njelas, difahami dan dilaksanakan secara berkesan.\nMelalui strategi ini, KPM akan membangunkan satu platform komunikasi\nbersepadu dan mesra pengguna untuk memperkukuh hubungan antara\npenggubal dasar, pelaksana dan penerima manfaat pendidikan.\n\nPrakarsa Strategi 1\n\nMemantapkan pelaksanaan Pelan Strategik\nKomunikasi KPM yang berstruktur dan bersasar\nRajah 10.1 Prakarsa bagi Strategi 1\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":130,"p":298,"t":"PRAKARSA 1: MEMANTAPKAN PELAKSANAAN PELAN STRATEGIK\nKOMUNIKASI KPM YANG BERSTRUKTUR DAN BERSASAR\n\nPrakarsa ini bertujuan membangunkan dan melaksanakan Pelan Strategik Komunikasi KPM yang berasaskan prinsip ketelusan, kecekapan dan\nketerangkuman. Melalui prakarsa ini, setiap pekeliling, dasar atau arahan baharu akan disampaikan menggunakan pelbagai saluran, termasuk\nideo, soalan lazim dan infografik, bagi memastikan kefahaman yang jelas dan menyeluruh dalam kalangan warga KPM.\nPelaksanaan prakarsa ini merangkumi perkara yang berikut:\n1.\n2.\n3.\n4.\n5.\n\nKajian penyatuan sistem komunikasi dari peringkat atasan ke pelaksana dan sistem aduan KPM bagi memastikan penyampaian maklumat\ndasar, pekeliling dan laporan dilaksanakan secara bersepadu.\nKajian kebolehlaksanaan migrasi sistem komunikasi sedia ada, contohnya daripada Sistem Pengurusan Aduan Awam (SISPAA) kepada\nsistem khusus KPM seperti MOIES bagi memantapkan pengurusan aduan dan maklum balas pengguna. Aliran dalam tindakan menyelesaikan\naduan juga akan ditambah baik melalui prakarsa ini.\nPembangunan Pelan Strategik Komunikasi yang responsif, telus dan proaktif, disokong oleh pelan komunikasi digital serta saluran interaktif\nyang mesra pengguna.\nPelaksanaan prakarsa sokongan komunikasi, termasuk pengeluaran bahan komunikasi tambahan seperti video pendek, soalan lazim dan\nposter; penganjuran sesi taklimat dan hari bertemu pelanggan bagi meningkatkan kefahaman pelaksana dasar; serta SLU berkala dengan\npihak berkepentingan sebelum pelaksanaan dasar baharu bagi memastikan penterjemahan yang tepat pada semua peringkat.\nMekanisme penyampaian maklumat yang pelbagai melalui penggunaan media massa dan medium yang berbeza serta bersesuaian mengikut\nkawasan bandar dan luar bandar.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":130,"p":299,"t":"GARIS MASA PELAKSANAAN\nGaris masa pelaksanaan Prakarsa ini dirangka bagi memastikan setiap langkah penyelarasan komunikasi, penambahbaikan sistem\ndan sokongan pelaksanaan dijalankan secara berperingkat, tersusun dan berimpak tinggi pada semua peringkat.\nFasa 1\n(2026 — 2027)\nPembangunan Pelan\n\nPenubuhan dan pelaksanaan sistem komunikasi bersepadu KPM.\n\nFasa 2\n(2028 — 2030)\nKajian Keberkesanan\n\nSemua bahagian KPM dan institusi pendidikan menggunakan sistem komunikasi baharu.\n\nFasa 3\n(2031 — 2035)\nPenambahbaikan Berterusan\n\nSistem komunikasi diperkukuh dan ditambah baik secara berterusan bagi memastikan\npenyampaian maklumat yang bersepadu dan efektif di semua peringkat.\n\nPembangunan Pelan Strategik Komunikasi KPM.\n\nPelaksanaan Kajian Keberkesanan Sistem Komunikasi.\n\nRajah 10.2 Garis Masa Pelaksanaan Strategi 1 Prakarsa 1\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":131,"p":300,"t":"STRATEGI 2: MEMPERKUKUH FUNGSI DAN\nSTRUKTUR ORGANISASI BAHAGIAN, JABATAN PENDIDIKAN\nNEGERI, PEJABAT PENDIDIKAN DAERAH DAN INSTITUSI\nPENDIDIKAN KPM\nStrategi ini menekankan keperluan memperkukuh\nkecekapan tadbir urus dan sistem penyampaian\ndalam ekosistem pendidikan negara. Strategi ini\nmerangkumi pelaksanaan dua prakarsa, iaitu:\n• Menyusun semula fungsi, struktur dan\nperjawatan bahagian KPM, JPN, PPD dan\ninstitusi pendidikan KPM.\n• Memperkasakan\ndasar\ndan\nprosedur\npenamatan pegawai di KPM.\nPenstrukturan semula ini dijangka meningkatkan\nkecekapan sistem pendidikan melalui pengurangan\nbirokrasi dan pemerkasaan proses membuat\nkeputusan. Penjajaran fungsi yang lebih jelas\nakan\nmenghapuskan\npertindihan\ntugas,\nmengoptimumkan penggunaan sumber manusia\nserta memperkukuh kepakaran khusus di setiap\nbahagian. Secara keseluruhan, langkah ini\nmembentuk ekosistem tadbir urus yang lebih\ncekap, responsif dan berupaya menyokong\npeningkatan mutu pengajaran dan pembelajaran.\nMalaysia\nmencatatkan\nantara\nperatusan\nperbelanjaan pendidikan yang tertinggi di rantau ini,\niaitu antara 15% hingga 20% daripada keseluruhan\nperbelanjaan kerajaan pada tahun 2022 hingga\ntahun 2025. Oleh itu, prestasi pendidikan mesti\ndiselaraskan dengan pelaburan tersebut.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":131,"p":301,"t":"Prakarsa Strategi 2\n\nMenyusun semula fungsi,\nstruktur dan perjawatan\nBahagian KPM, JPN, PPD dan\ninstitusi pendidikan KPM\n\nMemperkasakan polisi\ndan prosedur penamatan\npegawai di KPM\n\nRajah 10.5\n10.3Prakarsa\nPrakarsaTeras\nbagi Strategi\n2 7: Strategi 2\nStrategik\n\nSejak Pelan Pembangunan Pendidikan 2013 — 2025, Malaysia\nkonsisten berada dalam kalangan negara perbelanjaan terbesar\nuntuk pendidikan sebagai peratusan perbelanjaan Kerajaan\n(% perbelanjaan kerajaan)\n21.89 21.30 21.35 21.65\n\n20.70\n\n20.46 20.15\n\n18.14\n\n17.11\n\n15.62\n\n2014\n\n2015\n\n2016\n\n2017\n\nEast Asia and Pacific (EAP)\nMalaysia\n\n2018\n\n2019\n\n2020\n\nHong Kong\n\nMiddle-income countries\n\n2021\n\n2022\n\nIndonesia\nPhilippines\n\n2023\n\nJapan\nSingapore\n\nRajah 10.4 Perbandingan Peruntukan Sektor Pendidikan Mengikut Negara\n\nPenstrukturan semula juga bertujuan memperjelas bidang kuasa, memperkukuh akauntabiliti\ndan memastikan sumber sedia ada dimanfaatkan secara optimum bagi menjana impak\npendidikan yang lebih mampan dan berkesan. Secara keseluruhan, prakarsa ini mencerminkan\nkomitmen KPM untuk berubah daripada model pentadbiran atas-bawah kepada sistem tadbir\nurus pendidikan yang lebih dinamik, terangkum dan berdaya saing. Pendekatan ini merupakan\nlangkah proaktif bagi memastikan sistem pendidikan negara kekal relevan dan mampu\nmelahirkan generasi yang bersedia menghadapi teknologi dan globalisasi.\nBAB 10 TERAS STRATEGIK 7"},{"sec":132,"p":302,"t":"PRAKARSA 1: MENYUSUN SEMULA FUNGSI, STRUKTUR DAN\nPERJAWATAN BAHAGIAN KPM, JPN, PPD DAN INSTITUSI\nPENDIDIKAN KPM\nPrakarsa ini menumpukan penyusunan semula fungsi, struktur dan perjawatan di KPM, JPN, PPD serta institusi pendidikan di bawah KPM.\nUsaha ini merupakan transformasi menyeluruh bagi menangani cabaran sistemik yang membebankan pentadbiran pendidikan negara.\nUsaha ini turut mengambil kira keperluan untuk meningkatkan kecekapan struktur organisasi sedia ada bagi memenuhi perubahan pesat\nlandskap pendidikan negara yang kompleks dan dinamik.\nAntara komponen yang perlu diambil kira dalam prakarsa penyusunan semula struktur organisasi KPM termasuklah pengekalan pegawai\njawatan gred DG14 di Bahagian, JPN dan PPD, di samping mobilisasi guru besar dan guru penolong kanan PPP Gred 10 ke atas.\nMatlamat utama prakarsa ini adalah seperti yang berikut:\n1.\n2.\n3.\n4.\n5.\n6.\n\nMenstruktur semula fungsi dan bidang kuasa setiap bahagian serta institusi KPM dengan jelas dan tegas bagi memastikan setiap\nperanan seperti pentadbiran pendidikan, penggubalan dasar, penyelarasan pelaksanaan dan operasi di lapangan difahami dengan\ntepat.\nMengelakkan pertindihan tanggungjawab yang boleh menyebabkan kekeliruan, pembaziran sumber dan kelewatan dalam\npenyampaian perkhidmatan pendidikan kepada sekolah dan murid.\nRasionalisasi agihan perjawatan dan fungsi secara seimbang serta saksama berasaskan prinsip do more with less for more.\nMengekalkan PPP jawatan gred DG14 di Bahagian, JPN dan PPD.\nMobilisasi Guru Besar dan Guru Penolong Kanan gred DG10 dan ke atas di sekolah rendah.\nMemperkukuh peranan School Improvement Partners (SIP+) dan School Improvement Specialist Coaches (SISC+) dalam menyediakan\nsokongan profesional secara berterusan melalui pendekatan coaching dan mentoring.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":132,"p":303,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 — 2027)\nKajian Struktur dan Fungsi\nSemasa\n\nMelaksanakan kajian menyeluruh terhadap struktur dan fungsi bahagian KPM, JPN dan PPD\nuntuk mengenal pasti pertindihan fungsi dan bidang kuasa yang menjejaskan keberkesanan\npenyampaian perkhidmatan pendidikan.\n\nFasa 2\n(2028 — 2030)\nPelaksanaan Pengukuhan\nStruktur\n\nMelaksanakan SLU dengan agensi pusat seperti JPA dan Kementerian Kewangan,\nmenyediakan cadangan pengukuhan struktur KPM termasuklah JPN, PPD dan institusi\npendidikan serta melaksanakan projek rintis untuk menguji keberkesanan pelan struktur yang\ntelah ditambah baik.\n\nFasa 3\n(2031 — 2035)\nPenilaian dan\nPenambahbaikan\nBerterusan\n\nMelaksanakan kajian keberkesanan dan penyusunan semula secara berterusan bagi\nmemastikan struktur KPM sentiasa optimum dan relevan dengan keperluan organisasi.\n\nRajah 10.7 Fasa Pelaksanaan Teras Strategik 7 Strategi 2 Prakarsa 1\n\nRajah 10.5 Garis Masa Pelaksanaan Strategi 2 Prakarsa 1\n\nPelaksanaan penstrukturan semula yang merangkumi penyelarasan perjawatan dan\nfungsi utama dirangka untuk memperjelas tanggungjawab serta meningkatkan kecekapan\npenyampaian perkhidmatan. Pemerkasaan mekanisme pemantauan dan pelaporan\nmemastikan penambahbaikan tadbir urus dan pengurusan sumber pada semua peringkat\norganisasi dijalankan secara berterusan. Pendekatan ini selaras dengan RPM 2026 – 2035\nsupaya transformasi struktur membolehkan agenda pendidikan nasional dilaksanakan\nsecara strategik, bersepadu dan berimpak tinggi.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":133,"p":304,"t":"PRAKARSA 2: MEMPERKASAKAN POLISI DAN\nPROSEDUR PENAMATAN PEGAWAI DI KPM\n\nKeperluan untuk melaksanakan prakarsa ini wujud akibat ketirisan terhadap pematuhan dasar pemisah (exit policy) sedia ada. Data daripada Human Resources\nManagement Information System (HRMIS) menunjukkan bahawa lebih 1,000 orang pegawai telah mencatat markah Laporan Nilaian Prestasi Tahunan (LNPT) di bawah\n60 peratus, iaitu markah prestasi minimum yang sepatutnya melalui proses penamatan. Pelaksanaan dasar penamatan ini untuk memastikan hanya pegawai dan AKP\nyang kompeten, berintegriti dan berprestasi yang dikekalkan dalam sistem pendidikan negara.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":133,"p":305,"t":"Ringkasan Carta Alir\nMula\n\n< 75%\n\nPegawai berprestasi rendah\n\nPPSM jalankan siasatan (1 tahun)\ntidak setuju\nmarkah\n\nPegawai kekal\n\nsetuju\nmarkah\n\nPegawai menjalani tempoh\npemerhatian (6 bulan)\n\nSelesai\n\nPegawai dinilai oleh PPPK\n> 75%\n\n< 75%\nKetua Jabatan hantar surat tunjuk sebab & pengawai\nkemuka penjelasan - 14 hari (termasuk\npermohonan hadir representasi)\n\nKesihatan\n\nRujuk\nHospital\n\nPegawai\nkekal\n\nLNPK\n\nTidak\nPenuhi\nsyarat\n(Bab F)\n\nSelesai\n\nPerakuan penamatan perkhidmatan kepada PPDP\n\nPenuhi\nsyarat\n(Bab F)\n\nPPDP hendaklah memberi peluang pegawai\nmembuat representasi (jika pegawai memohon)\n\nsetuju\n\nLembaga\nPerubatan\n\nPegawai\nkekal\n\nPPDP\ntidak setuju\n\nSihat\n\nSelesai\n\nJPA cadang penamatan perkhidmatan kepada JPN\n\nTidak Sihat\n\nUlasan & pengesahan JPN kepada JPA\nPegawai\nkekal\n\nYDPA\ntidak setuju\n\nsetuju\n\nSelesai\n\nPDKA\n\nBersara Atas\nSebab Kesihatan\nRujukan Singkatan\nPPSM – Panel Pembangunan Sumber Manusia\nPPPK – Panel Penilai Prestasi Khas\nPPDP – Panel Penilai Dasar Penamatan\nLNPK – Laporan Penilaian Prestasi Khas\nYDPA – Yang di-Pertuan Agong\nPDKA – Penamatan Demi Kepentingan Awam\nJPN – Jabatan Peguam Negara\nJPA – Jabatan Perkhidmatan Awam\n\nRajah 10.6 Ringkasan Carta Alir Penamatan Pegawai Perkhidmatan Pendidikan Berprestasi Rendah\nBAB 10 TERAS STRATEGIK 7"},{"sec":133,"p":306,"t":"GARIS MASA PELAKSANAAN\nGaris masa pelaksanaan ditetapkan dari 15 Januari 2026 hingga 31 Mac 2028, memberikan tempoh kira-kira 27 bulan untuk melaksanakan semua fasa\nprakarsa, dari peringkat awal hingga akhir bagi kitaran pertama atau pelaksanaan rintis. Garis masa ini realistik dan mengambil kira keperluan perubahan\ndasar pada peringkat JPA, proses perundangan, jika perlu, pembangunan SOP dan sistem IT, latihan kakitangan serta pelaksanaan secara menyeluruh.\nFasa 1\n(2026 — 2027)\nPembangunan SOP dan\nPersediaan Panel\n\n1.\n2.\n\nFasa 2\n(2028 — 2030)\nPenubuhan Panel dan\nPelaksanaan\n\n1.\n\nFasa 3\n(2031 — 2035)\nNormalisasi Skor dan\nPemantauan Berterusan\n\n1.\n\n3.\n4.\n\n2.\n3.\n\n2.\n3.\n4.\n\nMenyusun Prosedur Operasi Standard (SOP) baharu untuk proses penamatan pegawai.\nMenetapkan Terms of Reference (TOR) bagi Panel Penilai Khas yang akan dibentuk di fasa\npertengahan.\nMengambil rujukan daripada pekeliling Dasar Pemisahan SSPA dan garis panduan JPA.\nLatihan penilaian prestasi pertama untuk tahun 2026 dijalankan pada penghujung tahun 2026.\nMenubuhkan Panel Penilai Khas yang bebas, berintegriti dan berwibawa untuk menilai cadangan\npenamatan pegawai.\nMemendekkan tempoh penilaian khas dari 12 bulan kepada kurang dari enam bulan bagi\nmempercepat proses keputusan tanpa mengurangkan keadilan.\nPanel memastikan keputusan dibuat berdasarkan merit dan bukti prestasi sebenar.\nNormalisasi agihan skor prestasi tahunan bagi semua pegawai KPM untuk mencerminkan prestasi\nsebenar secara objektif.\nMemantau trend penilaian prestasi dan mengenal pasti sebarang kriteria untuk tindakan\npembetulan.\nMeningkatkan sistem teknologi maklumat bagi menyediakan analitik dan papan pemuka\n(dashboard) prestasi secara masa nyata.\nMemberikan pengiktirafan kepada pegawai cemerlang dan memastikan pegawai lemah\nmenerima intervensi atau dikeluarkan mengikut prosedur.\n\nRajah\nTeras Strategik\nStrategi 22 Prakarsa 2\nRajah 10.9\n10.7 Fasa\nGarisPelaksanaan\nMasa Pelaksanaan\nStrategi 27 Prakarsa\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":134,"p":307,"t":"STRATEGI 3: MENINGKATKAN PEMBERIAN AUTONOMI\nTERPIMPIN KEPADA INSTITUSI PENDIDIKAN KPM\nStrategi ini menumpukan kepada kesinambungan strategi PPPM 2013 —\n2025, iaitu meningkatkan autonomi terpimpin pengurusan sekolah. Autonomi\nterpimpin yang diberikan tertumpu kepada pengurusan kewangan bagi\nsekolah yang mencapai pengiktirafan audit cemerlang selama tiga tahun\nberturut-turut.\nRPM 2026 — 2035 bertujuan memperluas bidang autonomi terpimpin\nmerangkumi pengurusan kurikulum, murid, sumber manusia dan perolehan.\nSelain perluasan bidang autonomi terpimpin, strategi ini juga akan melahirkan\npentadbir yang lebih kreatif dengan meningkatkan nilai pulangan atas\npelaburan (Return on Investment - ROI) melalui pengoptimuman prasarana di\ninstitusi pendidikan KPM.\n\nPrakarsa Strategi 3\n\nMemperkukuh\npelaksanaan\nautonomi\nterpimpin di\ninstitusi pendidikan\nKPM\n\nMengoptimumkan\npenggunaan\nfasiliti dan\nprasarana\ndi institusi\npendidikan KPM\n\nRajah 10.8 Prakarsa bagi Strategi 3\nBAB 10 TERAS STRATEGIK 7"},{"sec":135,"p":308,"t":"PRAKARSA 1: MEMPERKUKUHKAN PELAKSANAAN AUTONOMI\nTERPIMPIN DI INSTITUSI PENDIDIKAN KPM\nPrakarsa ini menumpukan kepada peluasan bidang\nautonomi terpimpin di institusi pendidikan KPM dengan\nmenggunakan kerangka program Transformasi Sekolah\n2025 (TS25), Sekolah Amanah dan Sekolah\nBerprestasi Tinggi sebagai garis dasar (baseline).\n\nMODEL SEKOLAH AUTONOMI\n\nJalinan\nStrategik\nSekolah dan\nKomuniti\n\nPengurusan\nSumber\nManusia\n\nMutu\nKurikulum\nPengurusan\nKurikulum\n\nAutonomi\nTerpimpin\n\nPengurusan\nPerolehan\n\nAkauntabiliti\nPengurusan\nKewangan\n\nRajah 10.9 Model Sekolah Autonomi\n\nBAB 10 TERAS STRATEGIK 7\n\nPengurusan\nMurid\n\nPengurusan\nKewangan\n\nPengupayaan\nKepimpinan"},{"sec":135,"p":309,"t":"Konsep autonomi terpimpin beroperasi dalam rangka kerja yang jelas,\nmerangkumi standard kurikulum, amalan pentaksiran dan nilai komuniti. Namun,\ndaripada mewajibkan setiap keputusan dibuat pada peringkat atasan atau\nmembenarkan kebebasan tanpa batasan, autonomi terpimpin mewujudkan\npersekitaran berstruktur yang memberikan ruang kepada pasukan sekolah untuk\nberinovasi sambil kekal selaras dengan matlamat, nilai dan amalan berasaskan\nbukti yang dikongsi bersama.\nModel ini menggambarkan autonomi terpimpin dalam lima bidang,\niaitu kewangan, perolehan, sumber manusia, pengurusan murid dan\npenyampaian kurikulum, dengan kesan yang dihasratkan seperti yang berikut:\n1.\n\nKewangan: tanggungjawab yang lebih besar terhadap perbelanjaan bagi\nmembolehkan pendekatan berasaskan hasil yang memberikan nilai lebih baik\ndengan mengambil kira keperluan khusus setiap sekolah.\n\n2. Kepimpinan: autonomi terpimpin juga akan membina kapasiti pasukan\nsekolah dan pemimpin sekolah dengan memperkasakan mereka untuk\nmengambil pemilikan terhadap arah tuju strategik dan pengurusan operasi\nsetiap sekolah.\n3. Pelibatan pihak berkepentingan: model ini turut meningkatkan pembinaan\nhubungan dengan pihak berkepentingan setiap sekolah untuk memanfaatkan\nsokongan dan sumber luar, termasuk ibu bapa, industri dan komuniti setempat.\n4. Mutu: autonomi terpimpin dalam penyampaian kurikulum memastikan semua\nmurid menerima asas yang kukuh dan konsisten, sambil membenarkan\n\nDaripada pemantauan berasaskan pematuhan, pemimpin menggunakan\npendekatan bimbingan dan kolaboratif untuk membantu pendidik memperhalusi\npilihan mereka berdasarkan amalan dipacu data dan berasaskan bukti.\nAkhirnya, autonomi terpimpin memupuk budaya profesionalisme, kerjasama\ndan penambahbaikan berterusan.\nDari segi pendekatan, pelaksanaan prakarsa ini merangkumi langkah-langkah\nyang berikut:\n1.\n\nPembangunan SOP baharu bagi proses autonomi terpimpin dan kewangan\nsekolah.\n\n2.\n\nPenjajaran semula mekanisme sokongan pentadbir melalui modul latihan,\nbimbingan dan pemindahan amalan terbaik.\n\n3.\n\nProjek rintis pada tahun 2026 melibatkan 200 buah sekolah yang layak\ndengan pemantauan berfasa berdasarkan skor pencapaian.\n\n4.\n\nPelaporan autonomi terpimpin diselaraskan ke dalam Standard Kualiti\nPendidikan Malaysia Gelombang 2 (SKPMg2) dan platform ePrestasi untuk\npemantauan digital.\n\n5.\n\nPemantapan District Transformation Programme (DTP) untuk meningkatkan\nkeupayaan JPN dan PPD bagi mengurus tadbir institusi pendidikan dan\nmendorong pentadbir untuk membuat keputusan secara kontekstual dan\nterpimpin.\n\npembelajaran. Sekolah akan membuat keputusan mengenai PdP berdasarkan\nkeperluan murid, disesuaikan dengan konteks dan seterusnya meningkatkan\npencapaian murid.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":135,"p":310,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 — 2027)\nSemakan Garis Panduan\n\nPenyusunan SOP, pembangunan dasar autonomi terpimpin, kajian kesiapsediaan institusi dan\npenandaarasan amalan antarabangsa.\n\nFasa 2\n(2028 — 2030) Pelaksanaan\ndan Pemantauan secara\nBerfasa\n\nPelaksanaan berfasa autonomi terpimpin pengurusan kurikulum, murid, sumber manusia, kewangan\ndan perolehan, latihan intensif serta sokongan pengurusan berterusan.\n\nFasa 3\n(2031 — 2035)\nPenarafan\n\nPenarafan pencapaian autonomi terpimpin, sistem pemantauan yang efektif dan pengukuhan\nintegriti serta akauntabiliti tadbir urus institusi pendidikan KPM.\n\nRajah 10.10 Garis Masa Pelaksanaan Strategi 3 Prakarsa 1\n\nSecara keseluruhan, fasa ini dijangka meningkatkan bilangan\nsekolah yang layak menerima autonomi terpimpin menjelang\ntahun 2035. Dalam jangka panjang, prakarsa ini diharap dapat\nmewujudkan ekosistem institusi pendidikan yang lebih inovatif dan\nbertanggungjawab, serta mampu membuat keputusan berdasarkan\nkonteks tempatan dan komuniti, menyokong keperluan dan\nmeningkatkan keberhasilan murid.\n\nBAB 10 TERAS STRATEGIK 7\n\nAutonomi terpimpin mengurangkan kebergantungan terhadap aras\npentadbiran yang lebih tinggi, sekali gus mempercepat penyampaian\nperkhidmatan pendidikan dan memperkukuh keberkesanan\npelaksanaan dasar. Dengan adanya sistem pemantauan digital,\npelaporan berkala dan pensijilan prestasi autonomi terpimpin,\nintegriti perbelanjaan dan akauntabiliti sekolah dapat dikekalkan\nsecara konsisten dan telus."},{"sec":136,"p":311,"t":"PRAKARSA 2:\nMENGOPTIMUMKAN\nPENGGUNAAN FASILITI\nDAN PRASARANA DI\nINSTITUSI PENDIDIKAN\nKPM\n\nPada masa ini, segala hasil daripada aset sekolah berdasarkan kadar caj yang\nditetapkan oleh Surat Pekeliling Ikhtisas (SPI) disalurkan ke dalam akaun SUWA\ninstitusi masing-masing yang memerlukan kelulusan pendaftar, sebelum hasil\ntersebut boleh digunakan.\nDi samping itu, kadar caj fasiliti sekolah dan kelengkapannya yang dibenarkan untuk\ndisewa, diselaraskan di seluruh institusi pendidikan di Malaysia.\nPenyelarasan kadar caj ini membataskan autonomi pentadbir sekolah untuk\nmenetapkan kadar caj yang berdaya saing dengan penyedia fasiliti lain.\n\nPrakarsa ini bertujuan mengukuhkan insentif institusi pendidikan\nuntuk meningkatkan nilai ROI melalui pengoptimuman\n\nTanpa langkah pembaharuan terhadap dasar penggunaan aset dan peraturan hasil,\nkeupayaan institusi pendidikan untuk menjana pendapatan alternatif secara terkawal\ndan bertanggungjawab akan terus terbatas.\n\nkewangan. Sumber pendapatan tambahan ini boleh digunakan\nbagi memberikan nilai tambah kepada program-program\nsekolah demi manfaat murid, pendidik dan komuniti. Secara\ntidak langsung, prakarsa ini menyokong usaha penurunan kuasa\nkepada pentadbir serta memastikan pengurusan kewangan\nyang telus, cekap, berintegriti dan akauntabiliti.\n\nSkop Prakarsa 2\nPerbelanjaan pentadbiran institusi pendidikan KPM menggunakan pulangan daripada\n1.\n2.\n3.\n4.\n5.\n\nPeluasan kelengkapan fasiliti yang dibenarkan disewa melebihi sembilan jenis fasiliti\nyang kini dibenarkan.\nPenurunan kuasa mengenai jenis dan agensi luar bagi kelulusan masuk premis institusi\npendidikan kepada pentadbir.\nSaluran dan penjanaan sewaan premis dan fasiliti kepada akaun Kumpulan Wang\nSumbangan Awam (SUWA).\nPenurunan kuasa keputusan kelulusan kegunaan akaun SUWA kepada pihak\npentadbir institusi pendidikan.\n\nRajah 10.11 Gambaran Skop Strategi 3 Prakarsa 2\nBAB 10 TERAS STRATEGIK 7"},{"sec":136,"p":312,"t":"Dalam pelaksanaan Prakarsa ini, prosedur berkaitan dengan penggunaan dan pengeluaran dana daripada akaun SUWA akan disemak semula dan dipermudah.\nInstitusi pendidikan juga akan diberikan autonomi terpimpin dalam penetapan kadar caj sewaan bagi meningkatkan insentif penyewaan secara berdaya saing dan\nmenguntungkan. Langkah ini memerkasakan pentadbir sekolah untuk menjana dan mengurus kewangan, meningkatkan ketangkasan dalam penyelenggaraan kos\ntertentu serta mengurangkan kekangan birokrasi.\n\nGARIS MASA PELAKSANAAN\nFasa 1\n1.\n(2026 — 2027)\nSemakan Semula\nPeraturan\n2.\nKewangan\n\nAutonomi Menetapkan Kadar Caj Sewaan Tersendiri – Semakan semula peraturan kewangan seperti yang\nterkandung dalam SPK dan SPI bagi membolehkan pentadbir sekolah melaksanakan penyewaan penggunaan\nfasiliti kepada agensi luar secara sah dan teratur.\nPeluasan dan Kelengkapan Fasiliti yang Dibenarkan Disewa Melebihi Sembilan Jenis Fasiliti yang Kini\nDibenarkan – Pembangunan mekanisme ROI melalui sistem kutipan hasil berasaskan aplikasi digital atau modul\ntambahan dalam MOEIS untuk memastikan hasil dijana dan diurus dengan cekap. Pelaksanaan projek rintis\npada tahun 2027 di sekolah terpilih, dengan prestasi hasil dan perbelanjaan dilaporkan secara berkala dalam\nmesyuarat kewangan sekolah.\n\nFasa 2:\n1.\n(2028 — 2030)\nPenyediaan Garis\nPanduan\n2.\n\nPenurunan Kuasa Mengenai Jenis dan Agensi Luar bagi Kelulusan Masuk Premis Sekolah kepada Pentadbir\nSekolah – Penyediaan garis panduan pelaporan dan audit hasil sewaan bagi menyokong ketelusan dan integriti\nsistem.\nSaluran dan Penjanaan Sewaan Premis dan Fasiliti kepada Akaun SUWA – Penurunan kuasa kepada pentadbir\nuntuk mengurus akaun SUWA secara terpimpin, merangkumi kutipan, kelulusan dan pelaporan perbelanjaan.\n\nFasa 3:\n1.\n(2031 — 2035)\nPemerkasaan\n2.\nPelaksanaan dan\nPemantauan\n\nKelonggaran Deﬁnisi Perbelanjaan di bawah Akaun SUWA – Memperkasakan sekolah untuk membuat keputusan\nberdasarkan keperluan sebenar tanpa menunggu kelulusan hierarki berlapis.\nPenurunan Kuasa Keputusan Kelulusan Kegunaan Akaun SUWA kepada Pihak Pentadbir Sekolah – Menyokong\nkeupayaan institusi untuk bertindak pantas, berdikari serta menyokong sistem pendidikan yang cekap, telus dan\nberorientasikan prestasi.\n\nRajah 10.12 Garis Masa Pelaksanaan Strategi 3 Prakarsa 2\n\nSecara keseluruhan, pelaksanaan prakarsa ini dijangka mewujudkan pengurusan sekolah\nyang lebih mampan, membolehkan keputusan berkaitan dengan fasiliti dan hasil dibuat\ndengan lebih cepat dan berdikari. Usaha ini seterusnya menyokong operasi yang lebih\nberkesan serta aspirasi sistem pendidikan yang cekap, telus dan berprestasi tinggi.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":137,"p":313,"t":"STRATEGI 4: MEMPERKASAKAN PENGURUSAN PERUBAHAN\nDAN RISIKO\nStrategi ini khusus kepada pemerkasaan pengurusan perubahan dan pengurusan risiko secara menyeluruh sebagai mekanisme utama untuk mitigasi cabaran\npelaksanaan pengoperasian pendidikan. Pendekatan yang sistematik untuk mengenal pasti, menganalisis dan menangani risiko berupaya mengekang ketidakstabilan\nsistem pendidikan ketika berhadapan dengan pelbagai krisis.\nPrakarsa di bawah strategi ini ialah membangunkan dua pelan pengurusan yang menyeluruh seperti yang berikut:\n\n1. Pelan Pengurusan Perubahan\n\n2. Pelan Pengurusan Risiko\n\n•\n\n•\n\n•\n•\n•\n\nMemberi tumpuan kepada pembangunan pelan perubahan sesuatu dasar\nyang sentiasa ditambah baik bagi menyokong strategi KPM pada masa\nhadapan.\nMemastikan prakarsa reformasi diterima dan disokong oleh semua lapisan\nwarga KPM dan komuniti.\nMenyelaraskan komunikasi, mengenal pasti ejen perubahan, memberikan\nlatihan berfasa serta memantau tahap penerimaan dan penyesuaian dalam\norganisasi.\nMembina naratif perubahan yang jelas, meningkatkan kepercayaan dan\nmotivasi penjawat awam serta menyokong budaya organisasi yang tangkas,\nterangkum dan berorientasikan hasil.\n\n•\n•\n•\n\nMenangani risiko berbangkit dalam operasi harian KPM secara tangkas dan\nberkesan.\nMengenal pasti, menilai dan menangani pelbagai risiko termasuklah\nkewangan, pematuhan, keselamatan siber, bencana alam, kesihatan dan\nkegagalan pelaksanaan.\nMemastikan integriti belanjawan, pematuhan undang-undang dan\nkelangsungan perkhidmatan pendidikan.\nMembina budaya kerja proaktif dan akauntabiliti pada semua peringkat\nserta meningkatkan keyakinan awam terhadap ketelusan dan kecekapan\nkementerian.\n\nPrakarsa Strategi 4\n\nMembangunkan Pelan Pengurusan\nPerubahan KPM\n\nMembangunkan Pelan Pengurusan\nRisiko KPM\n\nRajah 10.13 Prakarsa bagi Strategi 4\nBAB 10 TERAS STRATEGIK 7"},{"sec":138,"p":314,"t":"PRAKARSA 1: MEMBANGUNKAN PELAN PENGURUSAN\nPERUBAHAN KPM\nFasa Kunci\n\nPenilaian Keadaan Semasa\n\nPemetaan Pihak Berkepentingan dan Penyediaan Pelibatan\n\nPerundingan dan Kajian Operasi\n\nLaporan Penyatuan dan Penemuan\nRajah 10.14 Strategi Pelaksanaan Pembangunan Pelan Perubahan KPM\n\nStrategi ini merangkumi tiga komponen, iaitu:\n1.\n2.\n3.\n\nPenubuhan jawatankuasa pelaksana.\nPenetapan kapasiti sumber manusia dan penetapan garis dasar.\nPelaksanaan pelan pengurusan perubahan.\n\nPelbagai strategi dan dasar yang telah dirancang secara berterusan bergantung\nsepenuhnya pada tahap penerimaan dan pelibatan warga KPM pada pelbagai\nperingkat. Pengurusan perubahan yang sistematik dan berkesan mengurangkan\njurang komunikasi antara pembuat dasar dengan pelaksana.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":138,"p":315,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 — 2027)\nPembangunan\nPelan\n\n1.\n2.\n\nPenetapan tinjauan awal dan indikator bagi mengenal pasti jurang pemahaman dan kesan perubahan di setiap\nperingkat di KPM.\nKaji selidik yang menyeluruh dan semakan dokumen bagi menilai strategi utama.\n\nFasa 2 dan 3\n(2028 — 2035)\nPelaksanaan\ndan Penilaian\nPelan\n\n1.\n2.\n3.\n4.\n\nPenetapan kapasiti sumber manusia dengan penubuhan jawatankuasa.\nPenyediaan kerangka Model Pelan Pengurusan Perubahan, pelaksanaan dan penilaian.\nPeluncuran Pelan Pengurusan Perubahan.\nAktiviti pemantauan dan penambahbaikan.\n\nRajah 10.15 Garis Masa Pelaksanaan Strategi 4 Prakarsa 1\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":138,"p":316,"t":"Pendekatan penubuhan pelan akan dilaksanakan secara menyeluruh melalui pelaksanaan berfasa. Antara tindakan utama termasuklah:\n\n01 Pembangunan\nPelan Lima Tahun\n\n02 Pengaktifan Agen\nPerubahan\n\n03 Latihan dan Modul\nPerubahan\n\n04 Pemetaan Jurang\nKompetensi dan\nProses\n\nPelan ini merujuk amalan\nterbaik antarabangsa bagi\nsemua perubahan organisasi\nKPM.\n\nPengenalpastian dan\npengaktifan agen\nperubahan pada peringkat\nKementerian, JPN, PPD dan\nsekolah.\n\nLatihan dan modul\ndisediakan kepada semua\nagen perubahan.\n\nKaji selidik menyeluruh dijalankan bagi mengenal pasti\njurang daripada segi sumber manusia dan proses, termasuk\nkompetensi sumber manusia KPM, mekanisme sokongan untuk\nmenterjemah dasar ke dalam prosedur, penilaian keupayaan\nmenyelesaikan isu dan halangan perubahan serta mekanisme\npemantauan, sokongan dan maklum balas.\n\n05 Penjajaran\nPeranan Pihak\nBerkepentingan\n\n06 Rangka Kerja\nPelaksanaan dan\nPenilaian\n\n07 Komunikasi\nPerubahan\n\n08 Pemantauan dan\nPelaporan\n\n09 Penubuhan\nJawatankuasa\nKhusus\n\nHasil pemetaan jurang\ndigunakan untuk\nmenetapkan peranan setiap\npihak berkepentingan\nbagi merapatkan jurang\ntanggungjawab semasa\npelaksanaan perubahan.\n\nPelan pengurusan\nperubahan akan\nmenyediakan rangka kerja\nyang konsisten, lengkap\ndengan garis masa dan\npanduan naratif.\n\nKomunikasi dijalankan\nmelalui pelbagai saluran\ntermasuklah sesi dialog\nawam (town hall), iaitu sesi\ntaklimat umum bersamasama media, sesi suai kenal,\nbengkel pelaksanaan dan\npengumuman rasmi.\n\nSistem pemantauan\ndiintegrasikan ke dalam\npapan pemuka pelaksanaan\nstrategik sedia ada\nKPM serta memastikan\npemantauan dan pelaporan\nberjalan secara sistematik.\n\nJawatankuasa ini\nbertanggungjawab\nmengenal pasti jurang\nkapasiti sumber manusia\ndalam pentafsiran dan\npenterjemahan perubahan\ndasar, mengenal pasti pihak\nberkepentingan utama\nuntuk memudah cara\npengurusan perubahan\nserta menubuhkan pelan\npengurusan perubahan\ndan mekanisme sokongan\nmenyeluruh.\n\nSecara keseluruhan, pelan ini dijangka menyumbang kepada pembentukan budaya kerja KPM yang lebih tangkas, terbuka dan responsif. Setiap prakarsa tidak lagi dilihat\nsebagai arahan berasingan dari pihak atasan, tetapi sebagai sebahagian daripada perjalanan bersama ke arah sistem pendidikan yang lebih cekap, berorientasikan\nhasil dan mampan. Dengan komunikasi yang lebih strategik dan sokongan terancang, pelaksanaan perubahan dapat dipraktikkan secara lebih konsisten dan terangkum.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":139,"p":317,"t":"PRAKARSA 2: MEMBANGUNKAN PELAN PENGURUSAN RISIKO KPM\nPrakarsa ini memberikan tumpuan kepada pembentukan pelan pengurusan risiko yang meliputi rantaian pelaporan, indikator risiko berkepentingan serta garis\npanduan pemantauan, penyelenggaran dan pelaporan risiko.\n\nPelaksanaan kadar kerja yang\ndipersetujui\nProses Pengurusan Risiko dipantau dan\ndibandingkan dengan amalan terbaik\nMesyuarat diadakan untuk mengenal\npasti masalah pelaksanaan\nMasalah dibawa kepada kepimpinan\ntertinggi untuk diselesaikan\n\nMengenalpasti dan memeta\npotensi risiko di KPM, JPN, PPD\ndan Institusi Pendidikan KPM\n\nPembinaan keupayaan Unit\nRisiko berdasarkan cadangan\nyang dipersetujui\n\nBuku Panduan yang\nmenyeluruh mengenai Risiko\ndan Tadbir Urus untuk KPM\n\nRajah 10.16 Tiga Komponen Asas Pengurusan Risiko Menyeluruh\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":139,"p":318,"t":"Mengekalkan Pandangan Risiko Jabatan Secara Bersepadu\nSetiap jabatan perlu sentiasa mengenal pasti, memantau dan mengemas kini\nprofil risikonya dalam satu portfolio risiko yang bersepadu.\n\nMenteri\nTimbalan\nMenteri\n\nMembangunkan dan Melaksanakan Papan Pemuka Risiko Peringkat Jabatan\nPemilik Risiko perlu membangunkan dan menyelenggara papan pemuka yang\nmenyatukan semua risiko khusus jabatan, dan dikemas kini secara berkala bagi\ntujuan membuat keputusan.\n\nKSU\nBKew\n\nBPSM\n\nJPN\n\nPPD\n\nBPSH\n\nBhgn. lain\n\nInstitusi Pendidikan\n\nMemastikan Unit Risiko Memberi Sokongan Berterusan\nUnit Risiko perlu membantu Pemilik Risiko sepanjang keseluruhan kitaran\npengurusan risiko, termasuk proses mengenal pasti, menilai, mengurangkan,\nmemantau dan melapor risiko.\n\nRajah 10.17 Cadangan Mekanisme Pengurusan Risiko\n\nMenggalakkan Akauntabiliti Dalam Kalangan Pemilik Risiko\nMelantik dan memberi kuasa kepada Pemilik Risiko untuk bertanggungjawab\nsepenuhnya dalam mengurus, mendokumentasi dan melapor risiko jabatan\nmasing-masing.\n\nGARIS MASA PELAKSANAAN\nFasa 1\n(2026 — 2027)\nPembangunan\nPelan\n\n1.\n\nFasa 2 dan 3\n(2028 — 2035)\nPelaksanaan\ndan\nPemantauan\nsecara Berfasa\n\n1.\n\n2.\n3.\n\n2.\n3.\n\nPengumpulan data dan proses\npemetaan risiko berdasarkan\nkes terdahulu.\nKaji selidik secara menyeluruh.\nPenyediaan Garis Panduan\nUtama Pengurusan Risiko KPM.\nPenyediaan Pelan Pengurusan\nRisiko di JPN, PPD dan institusi\npendidikan KPM secara berfasa\nsehingga selesai.\nPemantauan pelaksanaan.\nPenilaian dan penambahbaikan\nberterusan.\n\nRajah 10.18 Garis Masa Pelaksanaan Strategi 4 Prakarsa 2\n\nBAB 10 TERAS STRATEGIK 7\n\nMenyeragamkan Format Pelaporan Risiko\nPenetapan format pelaporan risiko yang konsisten bagi membolehkan\npenyatuan dan perbandingan antara jabatan lebih mudah dilaksanakan.\nMengkaji dan Mengemas Kini Risiko Secara Berkala\nMenyediakan jadual tetap untuk semakan dan kemas kini risiko di peringkat\njabatan dan organisasi secara berkala.\n\nPrakarsa ini turut bertujuan mengadaptasi amalan terbaik pengurusan risiko yang\nakan dimasukkan ke dalam pelan pengurusan risiko berdasarkan hasil kajian dan\nkeperluan KPM. Sebagai Kementerian yang menguruskan lebih 10,000 institusi\npendidikan dan hampir setengah juta penjawat awam, KPM beroperasi dalam\npersekitaran yang kompleks dan sentiasa berubah. Oleh itu, kerangka pengurusan\nrisiko yang menyeluruh dan bersepadu amat penting bagi mengelakkan ancaman\nyang boleh menjejaskan keberkesanan dasar, integriti kewangan dan kelangsungan\nperkhidmatan pendidikan."},{"sec":139,"p":319,"t":"PENDEKATAN PEMBANGUNAN PELAN PENGURUSAN RISIKO\n1.\n\nPembangunan Kerangka\ndan Garis Panduan Risiko\n\n•\n•\n•\n\nMenggabungkan kerangka antarabangsa.\nMembangunkan garis panduan risiko dan SOP melalui SLU.\nMenyediakan dokumen teknikal seperti Frequently Asked Questions (FAQ) dan modul latihan untuk diedarkan menjelang\ntahun 2029.\n\n2. Reka Bentuk dan\nPembangunan Sistem\nDigital Risiko\n\n•\n\nMembangunkan Aplikasi Pengurusan Risiko yang merangkumi modul pelaporan digital, pemetaan sumber dan papan\npemuka risiko merentas enam kategori, iaitu kewangan, operasi, teknologi, reputasi, keselamatan dan bencana.\nMenyepadukan papan pemuka risiko digital dengan sistem pengurusan sedia ada KPM.\n\n3. Pembangunan Pelan\nRisiko pada Semua\nPeringkat Pengurusan\n\n•\n\n4. Pelantikan Pegawai\nBertanggungjawab\n\n•\n\nMelantik pegawai bertanggungjawab untuk menyokong pemilik risiko sepanjang keseluruhan kitaran pengurusan risiko:\nmengenal pasti, menilai, mengurangkan, memantau dan melapor.\n\n5. Pelaksanaan Kitaran\nPelaporan Risiko\n\n•\n\nMelaksanakan mekanisme pelaporan secara berperingkat dari bawah ke atas untuk dinilai dan disahkan oleh Jawatankuasa\nRisiko KPM.\nMemastikan semua jabatan dan institusi pendidikan mempunyai pelan risiko yang aktif dan dikemas kini berdasarkan garis\npanduan seragam.\nMelaksanakan pelaporan dan pemantauan risiko secara bersepadu melalui sistem digital untuk membolehkan tindakan\nsegera dan lebih cekap.\n\n•\n\n•\n\n•\n•\n\nMenjelang tahun 2029, semua peringkat pengurusan seperti JPN, PPD dan sekolah akan membangunkan pelan risiko\nmasing-masing berdasarkan pelan risiko induk KPM dan FAQ.\nPelan risiko mengambil kira faktor lokaliti, geograﬁ, kebolehcapaian dan keperluan setempat.\n\n6. Penubuhan Struktur\nJawatankuasa\nPengurusan Risiko\n\n•\n•\n•\n\nMenetapkan indikator risiko berkepentingan berdasarkan hala tuju RPM 2026 – 2035 dan dokumen strategik negara.\nMembentuk kerangka jawatankuasa pelaporan risiko serta memetakan peranan pihak berkepentingan.\nMencadangkan penubuhan jawatankuasa pemandu yang dipengerusikan oleh YB Menteri bagi memastikan ketelusan dan\npenjajaran hala tuju KPM.\n\n7.\n\n•\n•\n•\n\nUnit Risiko KPM memberikan sokongan berterusan dalam penilaian, penyelenggaraan dan pelaporan risiko.\nMenyelaraskan format pelaporan risiko melalui format standard.\nMengkaji dan mengemas kini senarai risiko berkepentingan kepada KPM.\n\n•\n•\n•\n\nMenginstitusikan pengurusan risiko sebagai amalan kerja proaktif dan berterusan.\nMemastikan pemilik risiko dan Unit Risiko memainkan peranan bagi meningkatkan akauntabiliti dan kesiapsiagaan.\nMengukuhkan proses pemantauan berterusan dan pengesanan awal berdasarkan petunjuk risiko yang jelas dan boleh\ndikesan secara digital.\n\nPengukuhan Fungsi Unit\nRisiko\n\n8. Pemantapan Budaya\nPengurusan Risiko\n\nRajah 10.19 Pendekatan Pembangunan Pelan Pengurusan Risiko\nBAB 10 TERAS STRATEGIK 7"},{"sec":140,"p":320,"t":"10.4 KESIMPULAN\nTeras Strategik 7 menumpukan kepada usaha memperkukuh tadbir urus\ndan sistem penyampaian KPM bagi memastikan pelaksanaan dasar\npendidikan yang lebih cekap, responsif dan berorientasikan hasil.\nTeras ini menekankan peranan KPM, JPN, PPD dan institusi pendidikan\ndengan jelas. Hal ini supaya pengurusan sumber manusia, kewangan dan\nprasarana dapat dioptimumkan demi meningkatkan mutu perkhidmatan\nkepada murid, pendidik dan komuniti.\nLima isu utama telah dikenal pasti, iaitu penyampaian maklumat yang\ntidak seragam, pertindihan fungsi organisasi, pelaksanaan dasar\npenamatan pegawai yang kurang efektif, kebergantungan tinggi\nsekolah kepada PPD/JPN akibat kekurangan autonomi terpimpin serta\nkelemahan dalam pengurusan risiko dan perubahan.\n\nBagi mengatasi cabaran ini, empat strategi utama dirangka:\n1.\n\nStrategi 1 menumpukan pembangunan Pelan Strategik Komunikasi KPM yang\nlebih berstruktur, telus dan bersasar, termasuklah sistem komunikasi bersepadu,\npenggunaan bahan sokongan seperti infografik dan ideo, serta libat urus sistematik.\n2. Strategi 2 melibatkan penyusunan semula fungsi dan struktur bahagian KPM, JPN,\nPPD dan institusi pendidikan, termasuklah memperkukuh prosedur penamatan\npegawai berprestasi rendah melalui SOP baharu, panel penilai khas dan normalisasi\nskor prestasi.\n3. Strategi 3 memberikan penekanan kepada peluasan autonomi terpimpin dalam aspek\nkurikulum, murid, sumber manusia, kewangan dan perolehan. Institusi pendidikan juga\nmendapat pulangan melalui pengoptimuman aset fizikal, tertakluk kepada terma yang\nditetapkan.\n4. Strategi 4 pula menumpukan kepada pembinaan Pelan Pengurusan Perubahan dan\nPelan Pengurusan Risiko yang menyeluruh, merangkumi latihan agen perubahan, garis\npanduan risiko, sistem digital pelaporan risiko dan penubuhan jawatankuasa khusus.\nSecara keseluruhan, pelaksanaan Teras Strategik 7 dijangka mewujudkan organisasi\npendidikan yang moden, tangkas, telus dan berasaskan data, sekali gus memastikan\nkeberkesanan penyampaian perkhidmatan pendidikan menjelang tahun 2035.\n\nBAB 10 TERAS STRATEGIK 7"},{"sec":141,"p":321,"t":"KESIMPULAN\nRPM 2026 – 2035"},{"sec":141,"p":322,"t":"Rancangan Pendidikan Malaysia 2026 — 2035 merupakan dokumen strategik\nyang mengukuhkan transformasi sistem pendidikan negara. Kurikulum\nPersekolahan 2027 dengan pendekatan yang lebih dinamik, terangkum dan\nbersepadu merupakan sebahagian daripada usaha KPM mentransformasikan\npendidikan negara. Tujuan RPM 2026 — 2035 adalah untuk memastikan sistem\npendidikan sentiasa responsif terhadap perubahan global dan keperluan masa\nhadapan dengan keberhasilan murid dijadikan ukuran utama kejayaan\npendidikan yang holistik dan bermutu. Matlamat utama RPM 2026 — 2035 ialah\nmelahirkan insan sejahtera yang beradab, berilmu, berkemahiran, berdaya tahan\ndan berkeyakinan, digerakkan melalui tujuh teras strategik yang saling\nmelengkapi. Hal ini bagi menjamin transformasi pendidikan dilaksanakan secara\nmenyeluruh, berkesan dan mampan.\n\nKerjasama strategik antara KPM dengan pelbagai pihak berkepentingan\ndiperkukuh demi mewujudkan ekosistem pendidikan yang teratur, responsif\ndan berimpak tinggi. Sinergi ini meliputi pengembangan sumber, kepakaran\ndan peluang bagi menyokong perkembangan murid dari segi sosial, ekonomi\ndan budaya. Selain itu, pembudayaan kemampanan diutamakan agar murid\nberkembang sebagai individu bertanggungjawab sosial dan peka terhadap alam\nsekitar serta keadilan sosial, sejajar dengan aspirasi pembangunan lestari negara.\nTadbir urus yang cekap, telus dan bertanggungjawab menjadi sandaran bagi\nmemastikan setiap dasar dan prakarsa RPM 2026 — 2035 dapat dilaksanakan\nsecara optimum dan berkesan pada semua peringkat. Hal ini menyediakan asas\nkepada sistem pendidikan yang tangkas, berdaya saing dan berakauntabiliti\ntinggi, bersedia untuk menghadapi cabaran masa kini dan masa hadapan.\n\nTujuh teras strategik menjadi nadi pelaksanaan RPM 2026 — 2035 yang akan\ndisambut oleh JPN, PPD dan sekolah bagi penyediaan rancangan taktikal dan\nrancangan operasi. Tumpuan utama diberikan kepada penstrukturan semula\nsistem persekolahan kebangsaan agar pendidikan lebih relevan, saksama dan\nterbuka kepada semua lapisan masyarakat. Kurikulum berasaskan standard dan\nberorientasikan kompetensi dibangunkan secara holistik bagi membentuk murid\nyang seimbang dari segi intelek, sahsiah dan kemahiran abad ke-21, bersedia\nmenghadapi cabaran globalisasi dan kemajuan teknologi. Pada masa yang\nsama, peranan pendidik dan pemimpin sekolah diperkasakan sebagai agen\ntransformasi utama yang memiliki kompetensi tinggi dan kepimpinan\ntransformatif. Hal ini bagi memastikan mutu pengajaran dan pembelajaran\nsentiasa relevan dan bertumpu kepada keberhasilan. Dari segi prasarana ﬁzikal\ndan digital, RPM 2026 – 2035 menekankan pembangunan ﬁzikal dan digital yang\nkukuh, termasuklah penyediaan capaian Internet berkelajuan tinggi, bekalan\nperanti digital yang mencukupi, di samping sistem maklumat pintar bagi\nmemperkukuh pedagogi interaktif dan inovatif serta meningkatkan pengalaman\npembelajaran murid secara keseluruhan.\n\nBerteraskan prinsip keanjalan, kemampanan dan inovasi, RPM 2026 — 2035\ndirangka bagi memastikan sistem pendidikan negara kekal relevan dan dinamik.\nMelalui penerapan teknologi digital dan AI serta pendekatan sistematik bagi\nmemperkukuh akses dan mutu pendidikan, RPM 2026 — 2035 mempertingkat\nkeupayaan sistem pendidikan negara untuk menghadapi perubahan dan cabaran\nmasa hadapan seiring dengan arus pembangunan global yang pesat. RPM 2026\n— 2035 bukan sekadar rancangan pendidikan nasional, tetapi merupakan agenda\nstrategik negara yang berpaksikan Falsafah Pendidikan Kebangsaan untuk\nmembangunkan potensi individu secara menyeluruh dan bersepadu. Rancangan\nini bermatlamat melahirkan insan sejahtera yang seimbang dan harmonis dari\nsegi intelek, rohani, emosi, dan jasmani berdasarkan kepercayaan kepada Tuhan.\nMelalui usaha ini, KPM bukan sahaja membina generasi warganegara global yang\nberetika, beradab dan bertanggungjawab, malah melahirkan modal insan yang\nberpemikiran kritis dan kreatif serta mampu memberi sumbangan terhadap\nkeharmonian dan kemakmuran keluarga, masyarakat dan negara demi memacu\nmasa hadapan Malaysia yang mampan, terangkum dan sejahtera."},{"sec":142,"p":323,"t":"LAMPIRAN"},{"sec":142,"p":324,"t":"LAMPIRAN 1: RINGKASAN DOKUMEN LAPORAN SESI LIBAT\nURUS JELAJAH MASA DEPAN PENDIDIKAN NEGARA 2024\nDokumen ini merumuskan dapatan rasmi daripada Sesi Libat Urus (SLU) Jelajah\ndijalankan oleh KPM sepanjang Februari hingga Julai 2024. Sesi ini merupakan\n2026 – 2035, iaitu rancangan baharu yang akan menggantikan PPPM 2013 – 2025.\n\nMasa Depan Pendidikan Negara (JMDPN)\nsebahagian daripada usaha pembangunan\n\nyang\nRPM\n\nMatlamat utama laporan ini adalah untuk mengumpulkan pandangan dan cadangan daripada pelbagai pihak berkepentingan termasuklah pendidik, pemimpin\nsekolah, ibu bapa, murid, komuniti, pihak industri dan badan NGO (Pertubuhan Bukan Kerajaan). Pandangan ini digunakan untuk membantu KPM merangka rancangan\ntransformasi pendidikan yang lebih relevan dengan keperluan masa hadapan negara.\n\n1. Objektif dan Rasional Pelaksanaan SLU\nSLU bertujuan untuk:\n• PPPM 2013 – 2025 menghampiri tempoh tamat dan terdapat keperluan untuk membangunkan satu rancangan pendidikan yang menyeluruh sesuai dengan\nkeperluan semasa dan akan datang.\n• Perubahan global: teknologi, digitalisasi, keperluan pekerjaan baharu, menuntut sistem pendidikan lebih anjal.\n• KPM berhasrat memastikan rancangan pendidikan baharu bersifat terangkum dan berdasarkan data dan bukti, bukan keputusan top-down semata-mata.\nSLU merupakan platform untuk mendapatkan input secara langsung dan menyeluruh dari seluruh negara.\n\n2. Metodologi Pembangunan RPM 2026 – 2035\nProses pembangunan rancangan dilaksanakan melalui empat fasa utama:\nFasa\n\nTumpuan Utama\n\nFasa 1: SLU JMDPN\n\nMengumpul cadangan dan isu pendidikan semasa melalui SLU di seluruh negara.\n\nFasa 2: Diskusi Kumpulan Berfokus & Dialog Awam\n\nMengkaji cadangan lebih mendalam dan menguji kesesuaian idea yang dikemukakan.\n\nFasa 3: Makmal Penyelesaian Masalah dan Penulisan RPM\n2026 – 2035\n\nMemformulasikan strategi penyelesaian.\n\nFasa 4: Pemuktamadan RPM 2026 – 2035\n\nPembentangan ke Jemaah Menteri dan penerbitan rasmi pada awal Januari 2026.\n\nKeseluruhan proses menekankan kolaborasi, keputusan berasaskan data, bukti dan sinergi antara komuniti, sekolah, industri dan kerajaan.\n\nLAMPIRAN"},{"sec":142,"p":325,"t":"3. Tumpuan Perbincangan SLU Mengikut Tema Utama\nIsi kandungan laporan dibahagikan kepada 8 tema besar:\n• Dasar dan Perancangan\n• Kurikulum dan Pembelajaran\n• Pembangunan Prasarana Fizikal dan Digital\n• Pengoperasian Institusi Pendidikan\n• Pendidik dan Pemimpin\n• Pengurusan dan Kewangan\n• Murid\n• Pelibatan Ibu Bapa, Komuniti dan Sektor Swasta\nDaripada semua tema ini, beberapa isu umum dikenal pasti:\n• Ketidaksamarataan akses pendidikan (bandar/luar bandar, status sosioekonomi dan MBPK).\n• Keperluan transformasi kurikulum agar selari dengan keperluan industri.\n• Kompetensi pendidik dan pemimpin sekolah perlu dipertingkatkan.\n• Prasarana fizikal dan digital (internet, peranti digital) masih tidak seimbang.\n• Pelibatan ibu bapa dan komuniti masih tidak optimum.\n\n4. Tema Utama dan Dapatan Penting\nA. Dasar dan Perancangan\n• Cadangan semakan semula Akta Pendidikan 1996 supaya relevan dengan isu teknologi dan pembelajaran luwes dan terangkum.\n• Cadangan memendekkan tempoh persekolahan kepada 12 tahun selaras dengan amalan antarabangsa.\n• Pendidikan prasekolah dicadangkan sebagai wajib dan percuma, terutamanya bagi kanak-kanak 5 tahun (4+).\n• Tumpuan kepada autonomi pendidikan Sabah dan Sarawak, selaras dengan Perjanjian MA63.\nB. Kurikulum dan Pembelajaran\n• Kurikulum perlu relevan dengan pekerjaan masa depan.\n• Peningkatan STEM dan TVET bermula dari sekolah rendah.\n• Pentaksiran Bilik Darjah (PBD) diperkukuh, tidak terlalu peperiksaan berpusat.\n• Pemartabatan bahasa Melayu dan pengukuhan bahasa Inggeris.\n• Penekanan pembentukan karakter dan kemahiran insaniah (soft skills).\n\nLAMPIRAN"},{"sec":142,"p":326,"t":"C. Pembangunan Prasarana Fizikal Dan Digital\n• Sekolah daif dan kemudahan tidak seragam antara bandar dan luar bandar.\n• Kelemahan capaian internet dan peranti digital.\n• Peluasan peranti digital kepada murid golongan sasaran.\n• Semua sekolah mencapai akses internet stabil.\n• Penambahan kelas prasekolah, khasnya di kawasan pedalaman.\nD. Pengoperasian Institusi Pendidikan\n• Kolaborasi antara sekolah, komuniti dan industri masih rendah.\n• Kekurangan institusi khas untuk murid pintar cerdas.\n• Kepadatan kelas, terutama di bandar.\n• Membina Akademi Pintar mengikut zon.\n• Penggunaan bilik darjah digital untuk pengurangan kepadatan.\nE. Pendidik dan Pemimpin\n• Cabaran kekurangan guru opsyen dan pendidik kompeten digital.\n• Latihan kepimpinan perlu diperkukuh, termasuk modul pemikiran strategik dan transformasi sekolah.\n• Menggalakkan budaya pembelajaran sepanjang hayat untuk pendidik.\nF. Pengurusan dan Kewangan\n• Autonomi pengurusan kewangan di sekolah dipertingkatkan.\n• Sekolah dibenarkan menjana pendapatan terkawal melalui kolaborasi luar.\nG. Murid\n• Pembentukan sahsiah dan jati diri.\n• Literasi digital dan keselamatan dalam talian.\n• Kesamarataan akses pendidikan bagi MBPK, Orang Asli dan B40.\n• Menangani isu keciciran murid melalui intervensi awal dan kaunseling.\n• Menggalakkan sektor swasta menyediakan peluang TVET, STEM dan kokurikulum.\nH. Pelibatan Ibu Bapa, Komuniti dan Sektor Swasta\n• PIBG diperkukuh dalam isu disiplin dan sahsiah murid.\n• Mengurangkan birokrasi agar sekolah lebih mudah menerima sumbangan industri.\n• Menggalakkan sektor swasta menyediakan peluang TVET, STEM dan kokurikulum.\n\nLAMPIRAN"},{"sec":142,"p":327,"t":"5. Hala Tuju Masa Hadapan\nPelaksanaan semua cadangan dalam RPM 2026 – 2035 digariskan berdasarkan tiga hasil utama:\n• Sistem pendidikan terangkum dan adil untuk semua murid.\n• Kurikulum dan pengajaran relevan dengan masa depan.\n• Ekosistem pendidikan berdaya tahan dan mampan.\n\nKesimpulan\nLaporan SLU ini menjadi asas dalam merangka RPM 2026 – 2035. Ia menggambarkan hasrat rakyat Malaysia terhadap sistem pendidikan yang berikut:\n• Holistik\n• Relevan dengan perubahan global\n• Menitikberatkan keperluan murid\n• Mengurangkan jurang pendidikan antara kawasan\nTransformasi pendidikan yang dicadangkan bukan hanya berbentuk kurikulum baharu, tetapi satu transformasi sistem pendidikan agar Malaysia mampu\nmelahirkan modal insan masa hadapan yang berdaya saing, kreatif, beradab, berakhlak, kreatif dan berinovatif.\n\nLAMPIRAN"},{"sec":142,"p":328,"t":"LAMPIRAN 2: PIHAK BERKEPENTINGAN YANG TERLIBAT\nDALAM METODOLOGI\nPasukan Petugas Projek Rancangan Pendidikan Malaysia\n2026 – 2035\n• Dato’ Ts. Dr. Hj. Aminuddin bin Hassim, Ketua Setiausaha\n• Datuk Dr. Mohd Azam bin Ahmad, Ketua Pengarah Pendidikan Malaysia\n• Dato’ Wan Hashim bi n dan peluasan pelaksanaan. Seterusnya, Fasa 3 merangkumi Prakarsa Jangka Panjang (2031 — 2035) yang menumpukan kepada\nkelestarian, penambahbaikan berterusan dan pelarasan dasar berdasarkan hasil dan pembelajaran daripada fasa-fasa sebelumnya.\n\nTeras dan\nStrategi\n\nPrakarsa\n\nFasa 1 - Prakarsa Impak\nSegera\n2026 202\n\nFasa 2 - Prakarsa Jangka\nSederhana\n2030\n\nFasa 3 - Prakarsa Jangka\nPanjang\n2035\n\nTeras\nStrategik 1\nStrategi 1\n\nP1: Memperkasakan\nPendidikan Sains dan\nMatematik\n\nKajian dan\nPenambahbaikan Dasar\nPelaksanaan Pendidikan\nSains dan Matematik\n\nPembangunan Sumber,\nKompetensi Pendidik dan\nPelaksanaan Rintis bagi\nPendidikan Sains dan\nMatematik\n\nPelaksanaan\ndan Penilaian\nProgram Pendidikan\nSains dan Matematik\n\nP2: Memperkukuh\nImplementasi Dasar\nMemartabatkan Bahasa\nMelayu Memperkukuh\nBahasa Inggeris (MBMMBI)\n\nPenambahbaikan Dasar\nMBMMBI\n\nPeningkatan Mutu dan\nKompetensi Pendidik\ndalam PdP BM dan BI\n\nPengukuhan PdP BM dan\nBI\n\nP3: Mengkaji Semula\nDasar Pengambilan dan\nPenempatan Pegawai\nPerkhidmatan Pendidikan\n\nMemperluas Sumber\nBakat Calon Pendidik\n\nPenekanan Terhadap\nMutu Pengambilan PPP\n\nPenempatan Berasaskan\nKeperluan\n\nLAMPIRAN"},{"sec":142,"p":333,"t":"Teras dan\nStrategi\n\nPrakarsa\n\nFasa 1 - Prakarsa Impak\nSegera\n(2026 — 2027)\n\nFasa 2 - Prakarsa Jangka\nSederhana\n(2028 — 2030)\n\nFasa 3 - Prakarsa Jangka\nPanjang\n(2031 — 2035)\n\nTeras\nStrategik 1\nStrategi 2\n\nP1: Memperkasakan\nStruktur Persekolahan\nKebangsaan\n\nPembangunan Struktur\nPersekolahan Merujuk\nModel Persekolahan\nK-12\n\nPenyediaan Rang\nUndang-undang Pendidikan\nStruktur Baharu Sistem\nPersekolahan\n\nPelaksanaan, Penilaian\ndan Penambahbaikan\nStruktur Persekolahan\ndan Pendidikan Wajib\nPrasekolah\n\nP2: Menambah Baik\nDasar Penawaran\nBahasa Tambahan serta\nPengoperasian Bahasa\nCina dan Bahasa Tamil\n\nPenambahbaikan\nDasar Penawaran dan\nPengoperasian Bahasa\nTambahan (BC dan BT)\n\nKajian Kebolehlaksanaan\nBa
