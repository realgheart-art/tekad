an 4\nPelaksanaan Rancangan Transformasi Pendidikan\nMatematik Malaysia\nPelaksanaan KP2027 Tahun 2 dan Tingkatan 2\nPenataran KP2027 Tahun 3 dan Tingkatan 3\nPenyerahan Dokumen Kurikulum Tingkatan 4 dan Tingkatan 5\nkepada LP\nPelaksanaan dan Pemantauan Rancangan Transformasi\nPendidikan Matematik Malaysia\n\n2031 2030 2029\n\n2028 2027 2026\n\nGARIS MASA PEMBANGUNAN DAN PELAKSANAAN KP2027 SERTA\nRANCANGAN TRANSFORMASI PENDIDIKAN MATEMATIK MALAYSIA\n1.\n2.\n3.\n4.\n\nPelaksanaan KP2027 Tahun 3 dan Tingkatan 3\nPenataran KP2027 Tahun 4 dan Tingkatan 4\nPembangunan Dokumen Kurikulum Mata Pelajaran Tahun 6\nPelaksanaan dan Pemantauan Rancangan Transformasi\nPendidikan Matematik Malaysia\n\n1.\n2.\n3.\n\nPelaksanaan KP2027 Tahun 4 dan Tingkatan 4\nPenataran KP2027 Tahun 5 dan Tingkatan 5\nPelaksanaan dan Pemantauan Rancangan Transformasi\nPendidikan Matematik Malaysia\n\n1.\n2.\n3.\n4.\n\nPelaksanaan KP2027 Tahun 5 dan Tingkatan 5\nPenataran KP2027 tahun 6\nPelaksanaan KP 2027 tahun 6 (2032)\nPelaksanaan dan Pemantauan Rancangan Transformasi\nPendidikan Matematik Malaysia\n\nRajah 5.10 Garis Masa Pelaksanaan Strategi 1 Prakarsa 1\nBAB 5 TERAS STRATEGIK 2"},{"sec":47,"p":134,"t":"PERUNTUKAN PER KAPITA\nPeruntukan Per Kapita (Per Capita Grant - PCG) sedia ada tidak lagi\nmenggambarkan keperluan sebenar pelaksanaan kurikulum semasa dan wujud\nketidakseimbangan antara peringkat pendidikan, jenis sekolah dan kategori\nmurid. Kadar semasa dilihat tidak memadai untuk menyokong pendekatan PdP\nseperti pembelajaran berasaskan permainan, penggunaan teknologi, keperluan\nmurid berkeperluan pendidikan khas (MBPK) serta kepelbagaian jurusan\npada peringkat lepas menengah. Di samping itu, kekangan keluwesan dalam\npenggunaan peruntukan menyulitkan penyesuaian terhadap keperluan PdP\nyang semakin dinamik.\n\nBAHAN\nSOKONGAN\nKURIKULUM\nBahan Pengajaran\nBuku teks, modul dan\nbahan amali\n\nOleh itu, semakan semula kadar PCG perlu dilaksanakan dengan mengambil\nkira kos semasa, jenis kurikulum, lokasi sekolah dan kategori murid. Peruntukan\nkhas juga perlu disediakan bagi murid berkeperluan khas dan menyokong\npelaksanaan PdP digital. Langkah ini dijangka dapat memastikan pelaksanaan\nPCG yang lebih adil, luwes serta berkeupayaan menyokong pelaksanaan\nkurikulum secara bermutu dan holistik.\n\nBahan Bantu Mengajar\nAlat bantu mengajar,\nperisian pembelajaran,\naplikasi interaktif\n\nBAHAN SOKONGAN KURIKULUM\n\nPeralatan Sokongan\nPeranti digital dan alat\nteknikal\n\nPelaksanaan KP2027 disokong melalui penyediaan pelbagai bahan yang bersifat\nterangkum dan menyeluruh. Sokongan ini merangkumi bahan pengajaran seperti\nbuku teks, modul dan e-RPH; bahan bantu mengajar termasuk alat bukan digital\ndan aplikasi pembelajaran; peralatan seperti tablet, mesin Braille dan alat amali;\ndan panduan serta bahan latihan guru yang turut mengambil kira keperluan\nMBPK. Prakarsa ini membantu memastikan kurikulum dapat dilaksanakan\ndengan lebih berkesan dan memenuhi keperluan semua murid.\n\nPanduan dan Bahan\nLatihan Guru\nModul pengajaran,\nmanual pelaksanaan\n\nRajah 5.11 Bahan Sokongan Kurikulum\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":48,"p":135,"t":"KAJIAN LONGITUDINAL KURIKULUM PERSEKOLAHAN\nPelaksanaan kajian membujur (longitudinal) amat penting kerana membolehkan penilaian secara mendalam dan berterusan terhadap kesan pelaksanaan\nKP2027 sepanjang tempoh persekolahan murid. Kajian ini menyediakan data empirikal yang menyeluruh untuk memahami perkembangan murid daripada\nperingkat prasekolah hingga menengah atas, termasuk dalam aspek pencapaian akademik, sahsiah, kemahiran abad ke-21 dan kesejahteraan diri. Maklumat\nyang diperoleh dapat dimanfaatkan untuk menambah baik dasar dan amalan pendidikan secara berasaskan bukti, sekali gus memastikan sistem pendidikan\nkekal relevan, responsif dan terangkum mengikut keperluan sebenar murid.\n\nSTRATEGI 2:\nMENINGKATKAN KEMAHIRAN MURID\nTeras Strategik 2 Strategi 2 menekankan penguasaan kemahiran asas seperti membaca, menulis, mengira dan berfikir secara kritis sebagai asas utama pembentukan\nmurid yang berilmu dan berdaya saing. Kemahiran ini perlu dikuasai sejak awal persekolahan kerana kemahiran ini menjadi kunci kepada pencapaian akademik,\npembangunan potensi diri dan pembentukan sahsiah murid secara menyeluruh.\n\nPrakarsa Strategi 2\n\nPengukuhan literasi dan\nnumerasi murid Tahap\n1 untuk membina asas\npembelajaran yang kukuh\n\nPemerkasaan\nketerampilan bahasa\nbagi mempertingkatkan\nkecekapan komunikasi\ndan penguasaan pelbagai\nbahasa\n\nPenyediaan peluang\npembelajaran sepanjang\nhayat untuk membina\nkeluwesan dan daya\ntahan ketika menghadapi\nperubahan\n\nPembangunan kemahiran\nmasa hadapan, khususnya\nkemahiran digital dan\ninovatif bagi meningkatkan\nkesiapsiagaan murid pada\nera teknologi\n\nRajah 5.12 Prakarsa bagi Strategi 2\nBAB 5 TERAS STRATEGIK 2"},{"sec":49,"p":136,"t":"PRAKARSA 1: MEMPERKUKUH LITERASI DAN NUMERASI MURID\nTAHAP 1\nKemahiran literasi dan numerasi merupakan faktor penting untuk memastikan murid menguasai kemahiran asas. Penguasaan kemahiran asas ini penting untuk\nperkembangan murid bagi menghadapi cabaran masa hadapan. Pelaksanaan KP2027 memberikan penekanan terhadap kemahiran literasi dan numerasi murid Tahap\n1 secara bertumpu dalam bilik darjah dengan menggunakan strategi pengajaran yang sesuai berdasarkan tahap penguasaan murid.\nPendekatan untuk memperkukuh kemahiran literasi dan numerasi dibangunkan secara holistik berasaskan empat prinsip utama yang menekankan pelibatan aktif murid\ndalam proses pembelajaran kendiri seperti yang ditunjukkan dalam Rajah 5.13.\n\nPemerkasaan Murid (Student Empowerment)\n\nMemberikan kuasa kepada murid untuk membuat keputusan, menyertai proses\npembelajaran dan membina keyakinan diri.\n\nPembelajaran Murid (Student Learning)\n\nMenyesuaikan kaedah PdP dengan keperluan murid untuk memastikan pembelajaran\nlebih bermakna dan berkesan.\n\nPemilikan Pembelajaran oleh Murid (Student Ownership)\n\nMembimbing murid menetapkan matlamat, memantau kemajuan dan mengambil\ntanggungjawab terhadap pembelajaran mereka sendiri.\n\nSuara Murid (Student Voice)\n\nMendengar pandangan murid, melibatkan murid dalam pembuatan keputusan dan\nmenambah baik pengalaman pembelajaran.\n\nRajah 5.13 Empat Prinsip Utama dalam Proses Pembelajaran Kendiri\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":49,"p":137,"t":"GARIS MASA PELAKSANAAN\nPendekatan strategi ini memberikan tumpuan terhadap pengukuhan literasi dan numerasi murid melalui pelaksanaan berfasa yang berasaskan prinsip Build–\nMeasure–Learn. Pendekatan ini digerakkan melalui tiga unsur utama, iaitu Instrumen Diagnostik, Mekanisme Sokongan dan Pembangunan Kompetensi bagi\nmemastikan setiap murid menguasai kemahiran asas secara menyeluruh dan berterusan.\n\nFasa 1\n(2026 — 2027)\nPerancangan dan\nPembangunan\nInstrumen Literasi\ndan Numerasi\n\n1.\n2.\n3.\n\nFasa 2\n(2028 — 2030)\nPengoperasian dan\nPenataran\n\n1.\n2.\n\n4.\n5.\n\n3.\n4.\n\nFasa 3\n(2031 — 2035)\nPengukuhan dan\nPemantauan\n\n1.\n2.\n3.\n4.\n\nPembangunan instrumen diagnostik literasi dan numerasi.\nGuru dilatih untuk mentadbir, menganalisis dan merancang intervensi berpandukan data melalui sistem diagnostik berpusat.\nModel sokongan teknikal pada peringkat sekolah, PPD dan JPN diwujudkan bagi memantau pelaksanaan dan memberikan\nsokongan profesional.\nModul pedagogi literasi dan numerasi dibangunkan untuk memperkukuh kompetensi guru Tahap 1.\nProgram bimbingan dan pementoran oleh Jurulatih Pakar Pembangunan Sekolah dan Jurulatih Utama secara berterusan.\nPeluasan pelaksanaan ke semua sekolah rendah dan penggunaan data diagnostik bagi memperkukuh mutu PdP.\nGuru dilatih untuk menggunakan dapatan diagnostik bagi merancang intervensi bersasar, manakala sistem dalam talian\ndigunakan untuk analisis prestasi murid pada semua peringkat.\nKomuniti Pembelajaran Profesional (Professional Learning Community – PLC) dan pusat rujukan literasi numerasi negeri\ndiwujudkan.\nProgram bimbingan dan pementoran diperluas ke seluruh sekolah rendah dengan sokongan pemantauan responsif oleh PPD\ndan JPN bagi memastikan keberkesanan pelaksanaan.\nPelaksanaan kelestarian penggunaan teknologi digital dan pemantauan berpandukan data. Instrumen diagnostik diperkasa\ndengan pentaksiran autentik dan digital adaptif yang menilai kemahiran aplikasi murid dalam konteks sebenar.\nPemantauan berterusan melalui kaedah kunjung bantu dan analisis data pada peringkat daerah dan negeri.\nPelantar digital latihan kendiri diperkenalkan bagi menyokong pembangunan profesionalisme guru secara berterusan.\nKajian impak dilaksanakan bagi menambah baik strategi latihan dan kandungan berdasarkan keberkesanan terhadap\npembelajaran murid.\n\nRajah 5.14 Garis Masa Pelaksanaan Strategi 2 Prakarsa 1\nBAB 5 TERAS STRATEGIK 2"},{"sec":50,"p":138,"t":"PRAKARSA 2: MEMPERKUKUH KETERAMPILAN BERBAHASA\nPrakarsa bagi mencapai matlamat murid berketerampilan dalam bahasa Melayu, berkeyakinan dalam bahasa Inggeris dan berkebolehan dalam bahasa tambahan\ndilanjutkan dalam RPM 2026 – 2035 demi kesinambungan peningkatan penguasaan berbahasa murid. Bagi memastikan penguasaan bahasa murid dapat ditingkatkan\nsecara menyeluruh dan berkesan, lima pendekatan digariskan untuk meningkatkan keterampilan, keyakinan serta kebolehan murid dalam bahasa Melayu, bahasa\nInggeris dan bahasa tambahan.\n\nPemerkasaan bahasa\nmerentas kurikulum\n\nPemerkasaan dan\npeluasan bahasa\ntambahan\n\nJaminan mutu guru\nbahasa\n\nPeluasan sokongan\nbersasar dan\nintervensi khusus\n\nPersekitaran sekolah\nyang positif\n\nMengaplikasikan konsep\n“semua guru ialah guru\nbahasa” bagi memastikan\nsemua guru, bukan hanya\nguru bahasa, menguasai\nkompetensi minimum serta\nmengintegrasikan kemahiran\nbahasa secara tepat dan\njelas dalam PdP. Lantaran itu,\npenyediaan panduan laras\nbahasa mengikut bidang serta\nlatihan berterusan kepada\nsemua guru untuk menyokong\npenguasaan bahasa murid\nmenjadi suatu keperluan\npelaksanaan.\n\nMenawarkan bahasa etnik,\nbahasa antarabangsa dan\nbahasa isyarat yang boleh\ndilaksanakan melalui PdP\ntradisional dalam kelas atau\nmelalui pembelajaran alternatif\nseperti kursus dalam talian\nyang menawarkan kelayakan\nmikro. Penawaran mata\npelajaran Bahasa Isyarat\nMalaysia sebagai bahasa\ntambahan juga selari dengan\nperancangan KP2027.\n\nMemastikan guru bahasa\nmematuhi standard KSBM\ndan CEFR yang ditetapkan\ntermasuk latihan intensif\nkepada guru yang belum\nmencapai tahap yang\nditetapkan.\n\nMenyediakan sokongan\nbersasar kepada murid melalui\nintervensi khusus, terutamanya\nkepada MBPK, murid orang\nAsli dan murid peralihan\nmelalui pendekatan terangkum\ndan pelaksanaan di pelbagai\nperingkat institusi pendidikan.\n\nMenyediakan suasana\nyang menggalakkan\npenguasaan dan penggunaan\nbahasa secara semula jadi\ndalam pelbagai konteks\npembelajaran dan aktiviti\nharian murid seperti Highly\nImmersive Programme\n(HIP) untuk bahasa Inggeris\ndan pendekatan Sahabat\nBahasa untuk bahasa\nMelayu. Pendekatan ini\nmenyokong reformasi\npendidikan sekolah dalam\nRMK13 melalui pembangunan\nkecekapan pelbagai bahasa.\nSelain itu, RPM 2026 – 2035\nmenyasarkan untuk melahirkan\nmurid yang berketerampilan\ndalam tiga bahasa, iaitu\nbahasa Melayu, bahasa\nInggeris dan sekurangkurangnya satu bahasa\ntambahan.\n\nRajah 5.15 Pemerkasaan Bahasa Merentas Kurikulum\n\nPendekatan ini menyokong reformasi pendidikan sekolah dalam RMK13 melalui pembangunan kecekapan pelbagai bahasa. Selain itu, RPM 2026 – 2035 menyasarkan\nuntuk melahirkan murid yang berketerampilan dalam tiga bahasa, iaitu bahasa Melayu, bahasa Inggeris dan sekurang-kurangnya satu bahasa tambahan.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":50,"p":139,"t":"GARIS MASA PELAKSANAAN\nPelaksanaan prakarsa dirancang secara berfasa dari tahun 2026 hingga tahun 2035 bagi memastikan pembangunan kompetensi bahasa dalam kalangan\nguru dan murid berlaku secara sistematik, bertumpu dan berterusan. Pendekatan ini membolehkan KPM menilai dan mengukur keberkesanan intervensi yang\ndilaksanakan, memperkukuh keupayaan pelaksana pada pelbagai peringkat serta menyesuaikan strategi berdasarkan keperluan sebenar di lapangan.\nFasa 1\n(2026 — 2027)\nPembinaan Asas\nPelaksanaan dan\nStrategi\n\n1.\n\nFasa 2\n(2028 — 2030)\nPelaksanaan Intervensi\ndan Pengukuhan\nKompetensi\n\n1.\n2.\n3.\n4.\n\nPelaksanaan intervensi bersasar untuk murid dan pembangunan profesional berterusan untuk guru bahasa.\nProgram Sahabat Bahasa diperluas bagi membudayakan penggunaan bahasa di sekolah.\nBahasa tambahan dan kelayakan mikro diperkenalkan untuk memperluas akses dan pengiktirafan murid.\nJalinan strategik antara universiti dengan agensi tempatan dan antarabangsa turut diperhebat bagi\nmenyokong pelaksanaan yang berkesan.\n\nFasa 3\n(2031 — 2035)\nKelestarian dan\nPenambahbaikan\nBerasaskan Impak\n\n1.\n\nPemantauan dan penambahbaikan berasaskan impak terhadap keberkesanan program, latihan dan strategi\npedagogi.\nKerjasama nasional dan antarabangsa diperkasakan melalui program silang budaya dan pertukaran bahasa.\n\n2.\n\n2.\n\nPenilaian kompetensi guru bahasa, pelaksanaan kursus intensif serta penyediaan garis panduan dan\nrancangan hala tuju bahasa.\nAnalisis jurang keupayaan dan semakan penawaran bahasa tambahan sebagai asas penetapan sasaran dan\nintervensi baharu bagi memperkukuh pelaksanaan pada semua peringkat.\n\nPelaksanaan berfasa prakarsa ini menegaskan komitmen KPM untuk melahirkan murid yang kompeten dalam pelbagai bahasa, beridentiti nasional yang kukuh\nserta berkeupayaan tinggi untuk berinteraksi pada peringkat global. Pendekatan progresif ini memastikan setiap fasa saling melengkapi, daripada membina asas\nkukuh dan melatih guru kepada memperluas pelaksanaan dan akhirnya mengekalkan penambahbaikan berterusan.\nRajah 5.16 Garis Masa Pelaksanaan Strategi 2 Prakarsa 2\nBAB 5 TERAS STRATEGIK 2"},{"sec":51,"p":140,"t":"PRAKARSA 3: MEMBUDAYAKAN PEMBELAJARAN SEPANJANG\nHAYAT UNTUK MURID\nPembelajaran Sepanjang Hayat (PSH) merujuk proses pembelajaran yang\nberterusan tanpa mengira umur, latar belakang atau kaedah pelaksanaan sama\nada secara formal, bukan formal atau tidak formal. Seiring dengan tumpuan RPM\n2026 – 2035, PSH berperanan untuk memastikan pembelajaran tidak terhenti\nhanya selepas tamat persekolahan atau universiti.\nSelain itu, PSH turut mewujudkan budaya pembelajaran yang membuka peluang\nkepada semua individu termasuklah mereka yang kurang berkemampuan atau\nterlepas peluang pendidikan formal untuk terus menimba ilmu dan memperbaharui\nkemahiran.\nPrakarsa PSH berteraskan empat komponen utama 4A, iaitu Akses, Aspirasi,\nAsah dan Aplikasi yang saling melengkapi untuk memperkukuh pembelajaran\nsepanjang hayat murid. Model 4A merupakan strategi holistik yang memperkasa\npembelajaran sepanjang hayat melalui peluasan peluang, pemantapan kemahiran\ndan pembinaan kerjaya murid secara bersepadu.\nAkses menekankan peluasan peluang pendidikan yang saksama melalui sekolah\ndalam talian bertauliah. Prakarsa ini menjamin pendidikan bermutu untuk semua\ndengan sokongan capaian Internet mampu milik, bantuan peranti digital dan\npenubuhan Hab Pembelajaran Digital komuniti.\nAspirasi membentuk hala tuju dan matlamat kerjaya murid melalui program\npenerokaan kerjaya. Instrumen psikometrik seperti Career Maturity Inventory\n(CMI) digunakan untuk menilai kesiapsiagaan kerjaya bagi murid berumur 13\ntahun hingga 18 tahun, manakala portfolio digital “Laluan Masa Depan Saya”\ndalam pelantar DELIMa membantu murid mengenal pasti kekuatan, minat dan\npotensi diri secara sistematik.\nAsah memberikan penekanan terhadap pembangunan kemahiran berterusan\nmelalui modul kelayakan mikro yang diiktiraf dalam DELIMa, diinspirasikan\ndaripada amalan SkillsFuture Singapore dan HRD Corp Malaysia. Pendekatan\nini meningkatkan kebolehpasaran murid serta mengiktiraf pembelajaran\nbukan formal sebagai sebahagian daripada ekosistem kemahiran negara.\n\nBAB 5 TERAS STRATEGIK 2\n\nAplikasi menyediakan ruang kepada murid untuk mengamalkan pembelajaran\ndalam konteks dunia sebenar melalui kolaborasi strategik antara sekolah, industri\ndan komuniti melalui Rangkaian Aplikasi Kemahiran Nasional. Melalui rangkaian\nini, murid terlibat dalam pelbagai bentuk pengalaman seperti latihan maya, projek\nkomuniti, hackathon, bootcamp dan penempatan jangka pendek yang dibimbing\noleh mentor industri."},{"sec":51,"p":141,"t":"PRAKARSA PEMBELAJARAN SEPANJANG HAYAT 4A\n\nAKSES\n\nASPIRASI\n\nASAH\n\nAPLIKASI\n\nMurid golongan\nrentan boleh\nmengakses\npendidikan melalui\nsekolah dalam talian\nyang bertauliah.\n\nMurid menentukan\naspirasi kerjaya\nmelalui Program\nPenerokaan Kerjaya &\nKemahiran digital dan\n\nMurid mengasah\nkemahiran secara\nberterusan melalui\nmodul kelayakan mikro\nyang diiktiraf dalam\npelantar DELIMa.\n\nMurid\nmengaplikasikan\npembelajaran dalam\ndunia nyata melalui\nkerjasama strategik\nantara industri,\nkomuniti dan sekolah.\n\nRajah 5.17 Prakarsa PSH Model 4A\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":51,"p":142,"t":"GARIS MASA PELAKSANAAN\nStrategi pelaksanaan prakarsa dirangka secara berfasa bagi memastikan pembangunan ekosistem pembelajaran yang menyeluruh dan berkesan, bermula dari\ntahun 2026 hingga tahun 2035. Pelaksanaan dibahagikan kepada tiga fasa utama seperti yang berikut:\n\nFasa 1\n(2026 — 2027)\nMemperkasakan\nPembelajaran Holistik\ndan Terangkum untuk\nSemua Murid\n\n1.\n2.\n3.\n\nFasa 2\n(2028 — 2030)\nPembangunan Ekosistem\nPendidikan Sepanjang\nHayat\n\n1.\n2.\n3.\n4.\n5.\n\nFasa 3\n(2031 — 2035)\nPengukuhan Ekosistem\nSokongan Pembelajaran\nSepanjang Hayat Secara\nMenyeluruh\n\n1.\n2.\n3.\n\n4.\n\n4.\n\nMenyediakan akses peranti dan Internet asas bagi keperluan murid.\nMengintegrasikan perancangan kerjaya dan pensijilan mikro.\nMenubuhkan hab komuniti pembelajaran murid bagi memperkukuh asas kemahiran dan pengiktirafan\npembelajaran.\nMembangunkan modul Standard Kompetensi PSH Murid.\nPelaksanaan program kesedaran PSH.\nPenerokaan kendiri, bimbingan kerjaya dan pembangunan asas PSH di sekolah.\nPeluasan laluan pembelajaran anjal melalui kelayakan mikro yang menghubungkan murid dengan dunia sebenar.\nMemperkenalkan sekolah dalam talian dan memperluas hab komuniti pembelajaran.\n\nPengukuhan ekosistem sokongan PSH.\nPembelajaran diperibadikan melalui bimbingan berasaskan AI.\nPengiktirafan kelayakan mikro serta penjaminan mutu dan keberkesanan jangka panjang bagi melahirkan\nmurid berkemahiran dan berdaya tahan.\nMenyediakan ruang pembelajaran anjal dan makmal inovasi untuk pembelajaran kendiri dan projek.\n\nRajah 5.18 Garis Masa Pelaksanaan Strategi 2 Prakarsa 3\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":52,"p":143,"t":"PRAKARSA 4: MEMPERKUKUH KEMAHIRAN MURID MASA HADAPAN\nPerkembangan pesat teknologi digital seperti AI, internet kebendaan (Internet of Things - IoT), rantaian blok (blockchain), pengkomputeran awan dan teknologi 5G\ntelah mengubah secara menyeluruh landskap pendidikan, pekerjaan dan komunikasi global. Keadaan ini menuntut tindakan strategik untuk memperkukuh sistem\npembelajaran agar seiring dengan perubahan global yang semakin kompleks.\nWalaupun kadar penyertaan murid dalam pertandingan inovasi dan kreativiti adalah tinggi (81.5%), namun skor kompetensi digital menunjukkan penurunan dari tahun\n2022 hingga tahun 2024. Faktor utama yang dikenal pasti ialah ketidakseimbangan akses terhadap prasarana digital, mutu pelaksanaan pembelajaran yang tidak\nsekata, tahap kesediaan pendidik dalam penggunaan teknologi serta penguasaan literasi digital dan pemikiran komputasional murid yang masih belum menyeluruh.\nPelaksanaan Teras Strategik 2 Strategi 2 Prakarsa 4 adalah berasaskan enam komponen utama seperti yang berikut:\n\nKOMPONEN 3\nEKOSISTEM 4\n\nKurikulum dan\nKokurikulum\n\nPembelajaran Berasaskan Projek, Pembelajaran Berasaskan Komuniti, Pembelajaran Autentik\ndan Pemerkasaan PBS serta DCS (Digital Competency Score).\n\nPersekitaran\nFizikal dan Maya\n\nRuang/Pelantar Digital dan Bengkel Fizikal sebagai fasilitator pembelajaran.\n\nSumber,\nPeralatan dan\nTeknologi\nPembangunan\nKeupayaan Murid\ndan Guru\n\nPeralatan Fizikal Kreatif, Sumber Digital dan Perisian, serta Bahan Sokongan sebagai kelengkapan\npembelajaran.\n\nKemahiran Insaniah seperti Komunikasi, Penyelesaian Masalah, Kepimpinan dan Keusahawanan.\n\nPelibatan\n\nSeminar, forum, audio siar, dan pertandingan sebagai medium pengayaan dan pendedahan.\n\nKolaborasi dan\nJaringan\n\nKerjasama dengan industri, institusi pendidikan tinggi, komuniti, alumni, PIBG dan PIBKS.\n\nPemimpin Masa Hadapan: Meningkatkan pemikiran kreatif dan kritis, melahirkan bakat inovatif yang menyelesaikan masalah masyarakat serta menyediakan\nmurid untuk cabaran masa hadapan.\n\nMelahirkan murid berdaya saing global yang menguasai kemahiran masa hadapan.\nRajah 5.19 Komponen Ekosistem Kemahiran Masa Hadapan\nBAB 5 TERAS STRATEGIK 2"},{"sec":52,"p":144,"t":"GARIS MASA PELAKSANAAN\nPelaksanaan prakarsa ini dirancang secara berfasa bagi memastikan pembangunan kemahiran masa hadapan murid dapat dijalankan secara sistematik,\nmenyeluruh dan berimpak tinggi.\nFasa 1\n(2026 — 2027)\nPemupukan Budaya dan\nAsas Ekosistem\n\n1.\n2.\n3.\n4.\n\nPembinaan asas ekosistem pembelajaran masa hadapan melalui kajian keupayaan murid dan guru serta\naudit prasarana ﬁzikal dan digital.\nPembangunan Modul Kemahiran Masa Hadapan bagi guru dan murid.\nPenstrukturan semula aktiviti kokurikulum supaya relevan dengan minat dan kecenderungan murid.\nPemerkasaan Pentaksiran Berasaskan Sekolah (PBS) dan Skor Kompetensi Digital digunakan bagi menilai\npencapaian murid secara holistik.\n\nFasa 2\n1.\n(2028 — 2030)\nPengukuhan dan\nPembudayaan Sistematik 2.\n\nPengukuhan kemahiran masa hadapan secara sistematik melalui pembelajaran kontekstual, kolaborasi\ndengan industri dan institusi pengajian tinggi serta program pengantarabangsaan untuk pengalaman global\nmurid.\nPembudayaan pembelajaran berasaskan inovasi, kolaborasi dan kepimpinan turut dibudayakan selaras\nkeperluan dunia semasa.\n\nFasa 3\n(2031 — 2035)\nPemerkasaan dan\nKelestarian Holistik\n\nPemantapan dan kelestarian pelaksanaan melalui pengoperasian penuh modul di semua sekolah.\nPelaksanaan Program Pengiktirafan Ikon Pemimpin Masa Hadapan.\nPenghasilan Laporan Keberhasilan Program bagi menilai impak.\n\n1.\n2.\n3.\n\nPelaksanaan ini turut disepadukan dengan Dasar Pendidikan Digital (DPD) agar modul, pentaksiran dan pembangunan prasarana ﬁzikal dan digital dapat\ndigerakkan secara selaras serta saling melengkapi. Pada masa yang sama, kerjasama strategik dengan industri dan komuniti akan diperkukuh melalui struktur\ntadbir urus yang jelas, manakala pemimpin projek utama akan dilantik untuk menyelaras pelbagai pihak berkepentingan pada semua peringkat.\nRajah 5.20 Garis Masa Pelaksanaan Strategi 2 Prakarsa 4\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":53,"p":145,"t":"STRATEGI 3:\nMEMBANGUNKAN BAKAT\nStrategi 3 memberikan penekanan terhadap pembangunan bakat murid secara\nholistik dalam pelbagai bidang strategik dan berimpak tinggi. Keutamaan\ndiberikan terhadap pemerkasaan bidang STEM, TVET serta sukan dan seni bagi\nmelahirkan generasi yang celik teknologi, berdaya saing, berdisiplin dan berjati\ndiri. Bidang sains sosial dan pengajian agama turut diberikan perhatian untuk\nmemperkukuh nilai sejagat, pemikiran kritikal dan pembinaan akhlak. Tumpuan\nutama diberikan kepada tiga aspek penting. Pertama, meningkatkan kesedaran\nmelalui program pendedahan awal kerjaya dan promosi laluan bakat. Kedua,\nmemperluas akses kepada program perantisan, bimbingan industri dan peluang\npembelajaran baharu. Ketiga, menyediakan laluan pembangunan bakat khusus\ntermasuk program transisi kerjaya dan laluan bagi MBPK.\n\nUsaha memperkukuh laluan kerjaya murid melalui kolaborasi strategik antara\nsekolah, industri dan institusi pengajian tinggi amat penting bagi menjamin\nkebolehpasaran dan kesediaan murid menghadapi dunia pekerjaan. Melalui\nkerangka kerjasama sektor awam dan swasta, pelbagai rakan strategik industri\nterlibat dalam melaksanakan prakarsa ini.\nPrakarsa ini turut mengoptimumkan penggunaan prasarana fizikal dan digital dan\nkepakaran industri di institusi pendidikan KPM bagi memperkukuh pembelajaran\namali dan pendedahan kepada teknologi semasa. Pendekatan menyeluruh ini\nberperanan meningkatkan kesedaran, kecekapan dan kebolehpasaran murid di\nsamping menyokong pelaksanaan Satu Sekolah Satu Industri sebagai platform\nintegrasi pendidikan dan industri yang mampan ke arah melahirkan tenaga kerja\nmasa hadapan.\n\nPrakarsa Strategi 3\n\nMembangunkan bakat secara holistik\ndalam pelbagai bidang\n\nLaluan STEM\n\nLaluan TVET\n\nLaluan sukan\ndan seni\n\nMemperkasakan\nekosistem kolaboratif\nyang menyokong\npembangunan bakat\nSTEM secara holistik\n\nMemperkasakan\nekosistem bakat TVET\nyang holistik melalui\nkolaborasi strategik\n\nMembangunkan bakat\nmurid dalam bidang\nsukan dan seni\n\nRajah 5.21 Prakarsa bagi Strategi 3\nBAB 5 TERAS STRATEGIK 2"},{"sec":54,"p":146,"t":"PRAKARSA 1: MEMBANGUNKAN BAKAT MURID SECARA HOLISTIK\nDALAM PELBAGAI BIDANG STEM, TVET, SUKAN DAN SENI\nMemperkasakan Ekosistem Kolaboratif\nPembangunan Bakat STEM secara Holistik\n\nyang\n\nMenyokong\n\nEkosistem kolaboratif STEM yang melibatkan kerjasama strategik antara\ninstitusi pendidikan, industri, komuniti dan agensi kerajaan amat penting\ndalam membangunkan bakat murid secara holistik. Usaha ini penting bagi\nmeningkatkan penyertaan murid dalam bidang STEM yang kini masih\nrendah. Selain itu, prakarsa ini bukan sahaja memastikan penyertaan\nmenyeluruh dan peluang yang adil bagi semua murid, malah sejajar dengan\naspirasi negara ke arah ekonomi berteknologi tinggi melalui pembentukan\nmodal insan STEM yang kompeten, inovatif dan adaptif.\nPelaksanaan prakarsa ini memberi tumpuan kepada pembangunan dan\npelaksanaan Pelan Hala Tuju Bakat STEM 2026 — 2035 yang merangkumi\ntiga komponen utama. Komponen pertama menekankan peluasan akses\ndan pengenalpastian awal melalui penilaian prakarsa sedia ada serta\npembangunan sistem pemproﬁlan minat murid berasaskan data\npsikometrik. Komponen kedua memberikan tumpuan terhadap\npelaksanaan program pembangunan laluan kerjaya dan akademik serta\nkemahiran masa hadapan, termasuk program kesedaran kerjaya dan\nprogram\nintervensi\nakademik\nberasaskan\nkepakaran,\niaitu\nStudent-Teacher-Expert (STE). Di samping itu, program Work-Based\nLearning (WBL) bagi murid menengah atas turut diperkenalkan. Komponen\nketiga pula memberi tumpuan kepada pengukuhan sistem pemproﬁlan\nmurid, peluasan program WBL serta pemantauan berpandukan data\nuntuk menilai keberkesanan pelaksanaan.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":54,"p":147,"t":"GARIS MASA PELAKSANAAN\nPelaksanaan secara berfasa membolehkan kitaran pelaksanaan projek rintis, penilaian dan seterusnya disusuli pelaksanaan yang lebih meluas sekiranya dapatan\ndaripada fasa rintis terbukti menunjukkan hasil yang menggalakkan.\n\nFasa 1\n(2026 — 2027)\nPembangunan Pelan\nHala Tuju Bakat STEM\n\n1.\n2.\n3.\n4.\n\nFasa 2\n(2028 — 2030)\nPelanjutan Program\nPemerkasaan STEM\n\n1.\n\nFasa 3\n(2031 — 2035)\nPenilaian dan\nPelaksanaan\n\n1.\n\n2.\n\n2.\n\nMembangunkan Pelan Hala Tuju Bakat STEM 2026 — 2035 dengan menggunakan pendekatan keseluruhan\nkerajaan (whole-of-government) dan pendekatan keseluruhan masyarakat (whole-of-society) yang melibatkan\npelbagai kementerian, agensi, institusi pendidikan, sektor industri serta ibu bapa dan komuniti.\nProgram Kerjaya STEM sedia ada diteruskan, dan pada masa yang sama projek rintis Program Intervensi\nAkademik Student-Teacher-Expert (STE).\nProgram Personalised Education Pathway.\nPenyediaan kurikulum bagi WBL pula berada pada fasa penyediaan kurikulum.\nPelaksanaan Program Kerjaya STEM dan Program Intervensi Akademik STE berpandukan Pelan Hala Tuju\nBakat STEM 2026 — 2035.\nPelaksanaan projek rintis Sistem Pemproﬁlan Murid yang merangkumi Program Personalised Education\nPathway dan program WBL dalam kalangan murid Tingkatan 4 di 10 buah sekolah menengah.\n\nMelaksanakan penilaian Program Kerjaya STEM, Program Akademik Murid STE, WBL dan Sistem Pemproﬁlan\nMurid.\nPelaksanaan Sistem Pemproﬁlan Murid yang merangkumi Program Personalised Education Pathway dan\nperluasan program WBL dalam kalangan murid Tingkatan 4 di seluruh sekolah menengah.\n\nSejajar dengan RMK13, sasaran utama adalah untuk menggalakkan pembelajaran aliran STEM sebagai laluan pilihan murid.\n\nRajah 5.22 Garis Masa Pelaksanaan Strategi 3 Prakarsa 1: Memperkasakan Ekosistem Kolaboratif yang Menyokong Pembangunan Bakat STEM secara Holistik\nBAB 5 TERAS STRATEGIK 2"},{"sec":54,"p":148,"t":"Memperkasakan Ekosistem Bakat TVET yang Holistik Melalui Kolaborasi Strategik\nDalam tempoh pelaksanaan RPM 2026 — 2035, bidang TVET terus menjadi\nkeutamaan strategik. Penekanan diberikan terhadap pemerkasaan TVET pada\nsemua peringkat persekolahan bagi memupuk minat awal terhadap\nkemahiran teknikal, seterusnya membangunkan generasi murid yang\nberpengetahuan, cekap dan berdaya saing dalam pelbagai bidang industri.\nPelbagai intervensi strategik bagi memperkukuh kesedaran, akses dan laluan\nkerjaya murid dalam bidang TVET dilaksanakan melalui kerjasama erat dengan\nindustri dan agensi berkaitan. Usaha ini selaras dengan aspirasi untuk melahirkan\ntenaga kerja berkemahiran tinggi yang memenuhi keperluan ekonomi negara.\nPerantisan industri merupakan pendekatan pendidikan yang mengintegrasikan\npembelajaran teori di institusi dengan latihan praktikal di tempat kerja.\nPemerkasaan program perantisan industri akan dilaksanakan bagi memberikan\npeluang kepada murid untuk mendapat pengalaman dunia sebenar, memperkukuh\nkemahiran praktikal serta memahami budaya kerja profesional.\nPenawaran program TVET baharu yang relevan dengan keperluan industri\nsetempat berpotensi meningkatkan enrolmen murid dalam aliran TVET di bawah\nKPM. Kajian pasaran mengikut lokaliti perlu dilakukan secara berkala supaya\nprogram sentiasa selari dengan permintaan semasa. Penawaran program perlu\nmengambil kira keperluan kerjaya masa hadapan yang mendepani revolusi\nindustri termasuklah penguasaan kemahiran digital, automasi, kecerdasan buatan,\nrobotik, analitik data dan teknologi hijau.\n\nBAB 5 TERAS STRATEGIK 2\n\nSelain itu, pelaksanaan program baharu SBP TVET di sekolah berasrama penuh\nterpilih bermula daripada Tingkatan Satu dapat memperkenalkan pendidikan\nTVET secara formal pada peringkat menengah rendah serta membentuk asas\nkemahiran yang kukuh sejak peringkat awal.\nRasionalisasi program TVET dilaksanakan untuk memastikan program ini kekal\nrelevan dengan keperluan pasaran kerja semasa dan perkembangan teknologi\ndalam industri. Keperluan utama bagi melaksanakan rasionalisasi program TVET\nadalah dengan memastikan bahawa setiap program yang ditawarkan benarbenar memenuhi kehendak industri dan dapat menjamin kebolehpasaran graduan.\nLaluan kerjaya diperkasakan melalui program transisi ke kerjaya, pelaksanaan\nWBL dan kerjasama berterusan dengan industri untuk menjamin kesinambungan\nantara pembelajaran dengan pekerjaan. Pendekatan ini dipacu melalui sinergi\nberimpak tinggi yang merangkumi latihan kemahiran berstruktur, pembangunan\nkurikulum, perkongsian fasiliti, latihan peningkatan kemahiran, pengiktirafan\nindustri dan penyediaan peluang pekerjaan.\nMelalui pendekatan bersepadu ini, KPM komited untuk meningkatkan enrolmen\ndan kebolehpasaran murid TVET serta membentuk tenaga kerja yang kompeten\ndan berdaya saing menjelang tahun 2035."},{"sec":54,"p":149,"t":"GARIS MASA PELAKSANAAN\nStrategi ini akan dilaksanakan secara berfasa dari tahun 2026 hingga tahun 2035. Pendekatan berfasa ini membolehkan penyesuaian berterusan terhadap\nkerjaya dan perkembangan global.\n\nFasa 1\n(2026 — 2027)\nPerancangan dan\nPembangunan Asas\nTVET\n\nFasa 2\n(2028 — 2030)\nPeluasan Program\nKesedaran, Akses dan\nLaluan Kerjaya TVET\n\nFasa 3\n(2031 — 2035)\nPemerkasaan dan\nKelestarian Laluan TVET\n\n1.\n2.\n3.\n4.\n5.\n6.\n\nMeningkatkan kesedaran TVET sebagai laluan pendidikan dan kerjaya utama.\nMelaksanakan kempen kejayaan graduanTVET.\nMemastikan akses terangkum TVET untuk semua kategori murid.\n\n1.\n2.\n3.\n4.\n\nMemperluas kesedaran dan pendedahan terhadap peluang pendidikan serta laluan kerjaya TVET.\nMengoperasikan institusi TVET baharu menumpukan kepada automasi dan teknologi terkini.\nMemperkasa kolaborasi strategik dengan industri melalui Jawatankuasa Hubungan Industri TVET KPM.\nMemperluas akses latihan dan peluang kerjaya melalui jaringan industri yang sistematik.\n\n1.\n2.\n3.\n4.\n5.\n\nMelaksanakan penilaian impak berasaskan data dan penambahbaikan berterusan.\nMemperluas akses TVET melalui pelantar digital, kerjasama industri dan penglibatan komuniti.\nMemantapkan sokongan terangkum bagi memastikan akses TVET kepada semua murid.\nMenyelaras kurikulum TVET secara berterusan mengikut keperluan industri.\nMemastikan kelestarian laluan kerjaya TVET bagi meningkatkan kebolehpasaran graduan.\n\nMelaksanakan kajian rasionalisasi program TVET sedia ada relevan dengan keperluan industri.\nMeningkatkan kerjasama awam-swasta bagi sokongan kerjaya murid dan pembangunan kepakaran guru.\n\nRajah 5.23 Garis Masa Pelaksanaan Strategi 3 Prakarsa 1: Memperkasakan Ekosistem Bakat TVET yang Holistik Melalui Kolaborasi Strategik\nBAB 5 TERAS STRATEGIK 2"},{"sec":54,"p":150,"t":"Membangunkan Bakat Murid dalam Bidang Sukan dan Seni\nBidang sukan dan seni semakin diiktiraf sebagai\nkomponen penting dalam pembangunan modal\ninsan. Teras Strategik 2 Strategi 3 Sub Prakarsa 1C\nbertujuan mengukuhkan pembangunan bakat murid\ndalam bidang sukan dan seni melalui tiga pendekatan\nutama, iaitu peningkatan kesedaran, peluasan akses\ndan pengukuhan laluan kerjaya. Pendekatan ini\ndilaksanakan melalui kerjasama strategik antara KPM,\nagensi sukan, institusi seni dan industri bagi memastikan\nbakat murid digilap secara berterusan.\nTiga aktiviti utama diperkenalkan, iaitu peningkatan\nkesedaran, pengukuhan akses dan ekosistem\nsokongan serta pembinaan laluan kerjaya. Kerjasama\nstrategik dengan pihak industri akan merentasi\nketiga-tiga aktiviti ini bagi memastikan impak yang\nlebih menyeluruh, sistematik dan berdaya tinggi.\n\nPeningkatan Kesedaran: Pencetus Aspirasi Bakat\n\nKesedaran awal menjadi pemangkin utama dalam membentuk minat, membina\nmotivasi dan menentukan hala tuju kerjaya murid berbakat, khususnya dalam\nbidang bukan akademik yang sebelum ini kurang diberikan tumpuan.\nSehubungan dengan itu, beberapa program yang dirangka untuk menyokong\npenerokaan awal kerjaya murid adalah seperti yang berikut:\n• MyBakat Expo Kerjaya Sukan dan Seni Malaysia.\n• Lawatan ke industri dan institusi sukan atau seni.\n• Program Aspirasi Kerjaya.\n\nPeluasan Akses dan Ekosistem Sokongan\n\nPendekatan ini bertujuan memastikan murid berbakat dalam sukan dan seni\nmendapat akses yang adil dan menyeluruh kepada peluang pembangunan diri\nsejak peringkat awal sebagai asas penting untuk membina hala tuju kerjaya\nmereka pada masa hadapan. Bagi mencapai hasrat tersebut, beberapa usaha\nturut diberikan penekanan, iaitu:\n• Penambahan kapasiti institusi bakat.\n• Program pembangunan bakat.\n• Jalinan strategik bersama industri.\n\nPengukuhan Laluan Kerjaya: Dari Sekolah ke Dunia Profesional\n\nBAB 5 TERAS STRATEGIK 2\n\nPendekatan ini menumpukan pembinaan laluan kerjaya yang tersusun, progresif\ndan diiktiraf untuk murid berbakat dalam bidang sukan dan seni bermula dari\nperingkat sekolah rendah. Sehubungan dengan itu, beberapa komponen utama\nturut diperkenalkan, iaitu:\n• Bimbingan dan Pemetaan Pelan Kerjaya Murid.\n• Program Pemerkasaan Kerjaya MyBakat.\n• Pendedahan dunia sebenar melalui WBL.\n• Pensijilan dan Pengiktirafan.\n• Pemetaan dan pemadanan bakat."},{"sec":54,"p":151,"t":"GARIS MASA PELAKSANAAN\nFasa pelaksanaan prakarsa ini dijalankan secara berperingkat mengikut tahap keutamaan dan kesediaan ekosistem pendidikan. Setiap fasa menumpukan objektif\nkhusus, bermula dengan pencetusan kesedaran, diikuti dengan peluasan akses kepada pembangunan bakat dan diakhiri dengan pengukuhan laluan kerjaya murid\nsecara tersusun dan berimpak tinggi.\n\nFasa 1\n(2026 — 2027)\nPencetus Aspirasi\n\n1.\n\nFasa 2\n(2028 — 2030)\nPeluasan dan\nPemerkasaan\n\n1.\n\nFasa 3\n(2031 — 2035)\nPemantapan dan\nPengiktirafan\n\n1.\n2.\n3.\n\n2.\n3.\n\n2.\n\n4.\n\nMeningkatkan kesedaran murid terhadap potensi kerjaya dalam bidang sukan dan seni melalui program\nperintis seperti MyBakat Expo, Program Aspirasi Kerjaya, lawatan ke industri dan institusi pendidikan.\nMembangunkan Modul Bimbingan Awal dan Pelan Kerjaya Individu.\nPelaksanaan jaringan awal dengan institusi dan industri serta pemetaan bakat dan pembangunan pangkalan\ndata kerjaya.\n\nMemperluas pelaksanaan prakarsa ke seluruh negara dengan pengukuhan akses kepada program\npembangunan bakat, termasuk penubuhan sekolah satelit, program modular anjal dan peningkatan kapasiti\ninstitusi sedia ada.\nMurid mengikuti bimbingan mentor industri (MyBakat Mentorship), program WBL dan program persediaan\nkerjaya, melalui pelibatan komuniti dan sektor profesional.\n\nMelaksanakan pemadanan kerjaya secara sistematik melalui pangkalan data kerjaya.\nMenawarkan pensijilan kemahiran, laluan dwikelayakan dan pengiktirafan pencapaian murid.\nMembina laluan kerjaya yang mantap dan berdaya saing melalui pemadanan kerjaya sistematik, pensijilan\nkemahiran, laluan dwikelayakan dan pengiktirafan pencapaian murid.\nMemperkukuh kedudukan sukan dan seni sebagai pilihan kerjaya yang diiktiraf.\n\nRajah 5.24 Garis Masa Pelaksanaan Strategi 3 Prakarsa 1: Membangunkan Bakat Murid dalam Bidang Sukan dan Seni\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":55,"p":152,"t":"STRATEGI 4:\nMEMBENTUK KARAKTER\nPembentukan karakter yang kukuh penting untuk melahirkan murid yang\nholistik, berakhlak dan stabil dari segi mental. Dengan karakter yang mantap,\nmurid lebih bersedia untuk berﬁkir secara global, menghormati kepelbagaian\nbudaya dan beretika. Pendekatan ini memastikan mereka menjadi\nwarganegara global yang bertanggungjawab serta berdaya saing.\n\nPrakarsa Strategi 4\n\nMemperkasakan\nkesejahteraan murid\nmerangkumi kesihatan\n\nRajah 5.25 Prakarsa bagi Strategi 4\n\nBAB 5 TERAS STRATEGIK 2\n\nMemperkukuh jati diri\ndan kerohanian murid"},{"sec":56,"p":153,"t":"PRAKARSA 1: MEMPERKASAKAN KESEJAHTERAAN MURID\nMERANGKUMI KESIHATAN FIZIKAL, MENTAL DAN SOSIAL\nSistem pendidikan yang terangkum dan berkesan hanya dapat dibina apabila kesejahteraan murid dijadikan sebagai teras utama. Oleh itu, KPM komited dalam usaha\nmemperkukuh ekosistem yang menyokong kesihatan fizikal, mental dan sosial murid. Matlamat strategi ini adalah untuk memastikan murid mempunyai tubuh badan\nyang sihat, emosi yang stabil, bebas daripada gejala buli dan gangguan seksual serta mampu membina hubungan sosial yang positif. Isu buli dan gangguan seksual\nmerupakan cabaran utama yang boleh menjejaskan kesejahteraan menyeluruh murid. Gejala ini bukan sekadar tingkah laku agresif individu tetapi mencerminkan corak\nsosial yang berulang. Dengan memastikan kesejahteraan menyeluruh, murid dapat mencapai kecemerlangan akademik dan pembentukan sahsiah yang seimbang.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":56,"p":154,"t":"1. Kesihatan Fizikal\nPelaksanaan Rancangan Makanan Tambahan (RMT)\ndiperluas kepada murid sekolah menengah, selain terus\nmenyokong murid sekolah rendah.\nKumpulan sasaran termasuklah murid daripada keluarga\nB40, masyarakat orang Asli dan MBPK.\nTujuan: Bagi memastikan setiap murid menerima nutrisi\nseimbang yang menyokong perkembangan ﬁzikal dan\nkeupayaan kognitif.\n\n•\n•\n•\n\n2. Kesejahteraan Mental\nPendekatan sistemik bagi menangani isu buli dan gangguan\nseksual.\nMelaksanakan\nlangkah\npencegahan\ntermasuklah\nmemahami punca, corak dan kesan gejala serta merancang\nintervensi menyeluruh dan mampan.\n\n•\n•\n\n3. Kesejahteraan Sosial\n•\n\nMurid membina hubungan positif melalui:\n- Program rakan sebaya\n- Kepimpinan murid dan Duta Sahsiah\n- Program Ekspresi Anak Remaja Lestari (PEARL)\nyang menekankan motivasi dan ketahanan diri\nMemperkukuh sistem sokongan psikososial melalui\npemerkasaan pengisian maklumat modul sahsiah dalam\nSistem Sahsiah Diri Murid MOEIS.\nDisokong dengan jaringan kerjasama strategik antara KPM,\nJPN, PPD serta agensi kerajaan dan bukan kerajaan.\n\n•\n•\n\n4. Sistem Sokongan dan\nPemantauan Kesejahteraan\nMurid Melalui Model\nSistem Sokongan Pelbagai\nPeringkat (MSP)\nKesejahteraan murid memerlukan mekanisme menyeluruh untuk\nmengukur, menyokong dan membiayai intervensi secara holistik.\nSehubungan dengan itu, KPM telah membangunkan Sistem Sokongan\ndan Pemantauan Kesejahteraan Murid yang merangkumi tiga\nkomponen utama, iaitu\n1.\n\nIndeks Kesejahteraan Murid (IKM)\na. Membolehkan pihak sekolah dan KPM memperoleh data\nsahih mengenai tahap kesejahteraan murid.\nb. Data ini digunakan untuk merancang program dan intervensi\nberdasarkan keperluan lokaliti serta memastikan langkah\nyang diambil tepat dan bersesuaian dengan konteks sekolah.\n\n2.\n\nUnit Kaunseling Sekolah\na. Memberikan sokongan psikososial melalui intervensi awal,\nbimbingan bersasar dan penjagaan emosi berterusan.\nb. Fungsi unit diperkukuh melalui kerangka kerja strategik termasuk\nstruktur, perjawatan, kompetensi dan kerjasama rentas sektor.\n\n3.\n\nPeruntukan Per Kapita (PCG)\na. Meningkatkan peruntukan untuk Bimbingan dan Kaunseling\nserta aktiviti kesejahteraan murid pada peringkat KPM, JPN\ndan PPD.\nb. Menyokong pelbagai program seperti perkhidmatan\nkaunseling, kesejahteraan murid, program kerjaya, sokongan\npsikososial, intervensi murid dan kerjasama strategik dengan\npihak berkepentingan.\n\nRajah 5.26 Kesejahteraan Murid Dijadikan Teras Utama bagi Membina Sistem Pendidikan yang Terangkum dan Berkesan\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":56,"p":155,"t":"MODEL SISTEM SOKONGAN\nPELBAGAI PERINGKAT (MSP)\nPembangunan Indeks\nKesejahteraan Murid dan\nPenambahbaikan Prosedur\nOperasi Standard (Standard\nOperating Procedure - SOP)\n\nPengukuhan Unit\nKaunseling Sekolah\nMenyemak semula\nnisbah GBK dan\npemerkasaan latihan\nkepada guru Bimbingan\ndan Kaunseling (GBK).\n\nMemperhalus SOP untuk\nprakarsa yang melibatkan\nkesejahteraan murid.\n\nPencegahan,\nIntervensi dan\nMitigasi\n\nPengenalan Kumpulan\nParaprofesional dalam\nPendidikan\nMenambah sokongan\nprofesional dalam sistem\npendidikan dengan\nkerjasama pelbagai pihak.\n\nPengajian Semula\nPengiraan, Pembiayaan\ndan Perbelanjaan\nPrakarsa Kesejahteraan\nMurid\n\nUntuk menjadikan sistem ini lebih berkesan, KPM memperkenalkan\nMSP, yang mengintegrasikan peranan guru, GBK, profesional\nkesihatan, ibu bapa dan komuniti dalam menyokong kesihatan\nﬁzikal, emosi dan sosial murid. Model yang berasaskan prinsip\npencegahan, intervensi dan mitigasi ini diperkukuh melalui beberapa\nkomponen utama seperti yang berikut:\n•\n\nIKM dan SOP: Memastikan pemantauan berasaskan data dan\npelaksanaan intervensi yang seragam serta boleh diukur.\n\n•\n\nPenambahan Profesional: Pewujudan pegawai psikologi dan\njururawat komuniti bagi memperkukuh sokongan profesional,\nkhususnya dalam isu kesihatan mental, emosi dan\npembangunan sosial murid.\n\n•\n\nPengukuhan Unit Kaunseling Sekolah: Penyesuaian nisbah\nkaunselor kepada murid serta peningkatan kapasiti guru\nBimbingan dan Kaunseling untuk memastikan intervensi awal\nyang sistematik.\n\n•\n\nPenyemakan Pembiayaan dan Perbelanjaan Prakarsa\nKesihatan Murid: Menilai semula penjanaan, pembiayaan, dan\nperbelanjaan bagi mengoptimumkan program sedia ada.\n\nPendekatan MSP membolehkan sekolah mengenal pasti murid\nberisiko lebih awal dan menyediakan sokongan yang sesuai.\nPemantauan berterusan, pelaporan data kesejahteraan dan\nintervensi bersasar mengikut tahap risiko murid memastikan\nkesejahteraan mereka dipelihara, meminimumkan faktor risiko\nﬁzikal, mental dan sosioemosi serta memperkukuh kesiapsiagaan\nsekolah menghadapi krisis.\n\nMenyokong prakarsa\nbaharu dan peluasan\nprakarsa sedia ada.\n\nRajah 5.27 Model Sistem Sokongan Pelbagai Peringkat sebagai Kerangka Utama Penjaminan\nKesejahteraan Murid\nBAB 5 TERAS STRATEGIK 2"},{"sec":56,"p":156,"t":"GARIS MASA PELAKSANAAN\nStrategi ini akan dilaksanakan secara berfasa dari tahun 2026 hingga tahun 2035 dengan setiap fasa dirancang untuk mencapai objektif tertentu secara\nberperingkat.\n\nFasa 1\n(2026 — 2027)\nPembangunan Asas\nKesejahteraan Murid\n\n1.\n\nFasa 2\n(2028 — 2030)\nPemerkasaan Sistem\nSokongan Kesejahteraan\nMurid\n\n1.\n\nFasa 3\n(2031 — 2035)\nPengukuhan Menyeluruh\n\n1.\n2.\n\n2.\n3.\n4.\n5.\n\n2.\n3.\n4.\n\n3.\n4.\n\nIKM dibangunkan sebagai instrumen pengukuran dengan ujian rintis dan latihan Guru Bimbingan dan\nKaunseling (GBK).\nUnit Kaunseling Sekolah distruktur semula dan modul latihan baharu diperkenalkan.\nProgram Ekspresi Anak Remaja Lestari (PEARL) dilaksanakan di 1000 sekolah.\nRancangan Makanan Tambahan (RMT) disemak semula agar responsif terhadap lokasi dan inflasi.\nCadangan rintis 1000 Pusat Sokongan Kesejahteraan dan Kerjaya diperkenalkan, bersama kajian semula PCG\ndan rangka kerjasama strategik rentas sektor.\nIKM diperluas untuk intervensi bersasar, manakala Unit Kaunseling Sekolah diperkukuh dengan nisbah 1:250\nmurid dan latihan kompetensi GBK.\nRMT diperluas ke sekolah menengah.\nPusat Sokongan dan Kerjaya diperluas ke 4000 sekolah dan Program PEARL juga diperluas.\nProgram SEL/Second Step dilaksanakan untuk pembangunan sosioemosi dan pencegahan buli. Kajian semula\nPCG serta pengukuhan kerjasama strategik dengan agensi kerajaan, swasta dan NGO turut dijalankan.\nPemantauan IKM diteruskan dengan intervensi berimpak tinggi.\nUnit Kaunseling Sekolah direformasi secara holistik termasuk pengantarabangsaan dan perkongsian amalan\nterbaik.\nSemua sekolah mempunyai akses ke Pusat Sokongan dan Kerjaya, dan Program PEARL dilaksanakan secara\nmenyeluruh untuk membina daya tahan mental, motivasi kendiri dan ketahanan sosial murid.\nPeruntukan pembangunan murid ditambah pada semua peringkat KPM, JPN dan PPD bagi memastikan\nkesinambungan program.\n\nRajah 5.28 Garis Masa Pelaksanaan Strategi 4 Prakarsa 1\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":57,"p":157,"t":"PRAKARSA 2: MEMPERKUKUH JATI DIRI DAN KEROHANIAN MURID\nKementerian Pendidikan komited mengangkat kerohanian sebagai teras pembentukan insan dan jati diri dalam sistem pendidikan kebangsaan. Pengukuhan\nmata pelajaran Pendidikan Islam, Pendidikan Moral serta pelaksanaan program pembangunan sahsiah dilaksanakan secara bersepadu. Penekanan terhadap\npenghayatan ibadah, akhlak, adab dan nilai kemanusian diterapkan sebagai asas sahsiah, manakala etika dan pemupukan perpaduan diperkukuh dengan\nmengamalkan prinsip Rukun Negara. Murid diharapkan mampu menghayati etika dan nilai kemanusiaan, menyelesaikan konﬂik secara harmoni melalui\npertimbangan bijak serta bertindak dengan betul dalam situasi kritikal.\n\nPrakarsa 2\n\nPenerapan nilai\n\nPENERAPAN NILAI ASAS PEMBENTUKAN JATI DIRI\nPengalaman berimpak\n\nPenerapan nilai asas seperti kejujuran, hormat, kasih sayang dan amanah merupakan asas membentuk jati diri dan\nkerohanian murid. Dengan ekosistem pendidikan menyeluruh, murid dapat mengamalkan nilai murni dalam tutur kata\ndan tingkah laku harian, membentuk generasi berilmu, berakhlak mulia dan berjiwa sejahtera. Pemegang taruh seperti\npemimpin sekolah, guru, ibu bapa dan komuniti memainkan peranan penting melalui transformasi minda, pembangunan\nprofesional berterusan, teladan, komunikasi berkesan dan kerjasama strategik.\n\nPEMUPUKAN PERPADUAN MELALUI PENGALAMAN BERIMPAK TINGGI\nPenerapan penilaian bagi\nmemperkukuh pembangunan\nsahsiah murid secara holistik\n\nPerpaduan merupakan tunjang kestabilan dan kemakmuran negara. Murid dihargai untuk memahami kepelbagaian\nsebagai kekuatan dan asas keharmonian sosial. Program seperti Kelab Rukun Negara, Khidmat Masyarakat (≥40 jam\npersekolahan), Program Pertukaran Murid Asrama Malaysia (AMal) dan Rancangan Integrasi Murid untuk Perpaduan\n(RIMUP) membina tanggungjawab sosial, toleransi dan semangat kebersamaan. Pelaksanaan prakarsa berimpak\ntinggi disokong melalui model kos efektif, terangkum dan pembiayaan alternatif seperti perkongsian awam-swasta,\ntajaan korporat dan sumbangan komuniti.\nBAB 5 TERAS STRATEGIK 2"},{"sec":57,"p":158,"t":"PENGETUA DAN GURU BESAR\nPGB G R\n\nKPM PN PPD\nPengurusan tertinggi pendidikan (KPM, JPN, PPD): Perlu\nmenjalani kursus penerapan dan amalan nilai.\n\nPGB: NPQEL perlu memberi tumpuan kepada transformasi\nminda, kemampuan dan keterampilan serta penerapan\namalan nilai yang bersesuaian.\n\nCPD diperkasakan dalam kalangan pengurusan tertinggi KPM\nbagi tujuan penerapan nilai.\n\nGuru: Meningkatkan kefahaman silibus yang dipelajari,\nmelaksanakan seperti yang dikehendaki silibus, membuat\npemantauan keberkesanan dan tindakan intervensi.\nCPD diperkasakan dalam kalangan PGB (IAB) dan Guru\n(IPG, IPTA dan IPTS).\n\nIBU BAPA\n\nMurid\nMurid mengamalkan\nnilai murni dalam tutur\nkata dan tingkah laku\nharian.\n\nPelibatan secara aktif dalam penerapan nilai di rumah\ndan di sekolah.\nMeningkatkan kesedaran, keprihatinan atau/ komitmen\ntentang kepentingan pendidikan dan amalan berteraskan\nnilai-nilai murni menerusi media massa, PIBG, NGO dan semua\nagensi serta kementerian yang terlibat.\n\nRajah 5.29 Peranan Pemegang Taruh dalam Penerapan Nilai Asas Pembentukan Jati Diri Murid\n\nBAB 5 TERAS STRATEGIK 2\n\nKOMUNITI\nPelibatan aktif dalam menyokong pembudayaan\nnilai murni pada peringkat sekolah dan masyarakat.\nMeningkatkan kesedaran dan komitmen terhadap kepentingan\npendidikan berteraskan nilai melalui sokongan berterusan\ndaripada media, NGO, pemimpin komuniti, sektor swasta,\nagensi kerajaan serta kementerian berkaitan."},{"sec":57,"p":159,"t":"PENGUKUHAN EKOSISTEM\nPENERAPAN NILAI\nPenerapan nilai dalam pendidikan memerlukan pelibatan\nholistik semua pemegang taruh bagi memastikan\nkeberkesanan dan kesinambungan. Pemimpin sekolah dan\nguru memainkan peranan utama dengan melaksanakan\ntransformasi minda, memperkukuh kefahaman terhadap\nkurikulum nilai serta meningkatkan pemantauan dan\nintervensi pada peringkat sekolah. Bagi memastikan\nnilai diterapkan secara konsisten dalam pengajaran dan\nkepimpinan, Program Pembangunan Profesionalisme\nBerterusan (Continuous Professional Development CPD) diperkuat sebagai asas peningkatan kompetensi\nguru dan pemimpin.\nIbu bapa pula bertindak sebagai faktor penentu\nmelalui teladan, komunikasi yang berkesan dan\nsokongan terhadap usaha sekolah, manakala komuniti\nmenyumbang melalui sokongan dan kerjasama strategik\ndengan media, NGO, sektor swasta serta agensi kerajaan.\nKesemua elemen ini membina ekosistem pendidikan yang\nmenyokong penerapan nilai secara menyeluruh.\nPengurusan tertinggi pendidikan (KPM, JPN, PPD) perlu\nmemastikan kursus dan program CPD dijalankan secara\nberstruktur dan berimpak tinggi, selaras dengan dasar\ndan tadbir urus pendidikan berpaksikan nilai. Pendekatan\nini menekankan kesinambungan antara kepimpinan, guru,\nkeluarga dan komuniti, seterusnya membentuk murid\nyang berakhlak mulia, berjati diri dan berjiwa sejahtera,\nmenjadikan nilai sebagai asas dalam kehidupan harian\nmereka.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":57,"p":160,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 — 2027)\nAsas Pembentukan Jiwa\ndan Nilai\n\n1. Pembinaan asas rohani murid melalui integrasi kurikulum, kokurikulum dan persekitaran sekolah.\n2. Penerapan nilai universal seperti kejujuran, hormat, kasih sayang dan amanah melalui pengalaman\npembelajaran kontekstual.\n3. Guru bertindak sebagai pemudah cara nilai, manakala murid mengamalkan pembelajaran berasaskan\npengalaman seperti khidmat masyarakat, reﬂeksi harian dan jurnal nilai diri.\n4. Sekolah digalakkan untuk menyediakan modul latihan dan ruang “sudut jiwa” bagi keseimbangan emosi.\n5. Kepimpinan Berjiwa Insan diperkenalkan untuk memperkukuh kesejahteraan guru.\n6. Program Sekolah Penyayang dan Sekolah Ihsan diperluas sebagai ekosistem permulaan budaya spiritual\nterangkum.\n\nFasa 2\n(2028 — 2030)\nPengukuhan Amalan dan\nEkosistem Kerohanian\nSekolah\n\n1. Memperluas pelaksanaan prakarsa ke seluruh negara dengan pengukuhan akses kepada program\npengukuhan ekosistem sekolah yang menyokong perkembangan rohani berterusan.\n2. Sekolah dijadikan komuniti nilai dengan pelibatan kepimpinan, guru, ibu bapa, komuniti dan agensi agama.\n3. Program Pembelajaran Berasaskan Nilai dan Empati diperkenalkan.\n4. Program kepimpinan murid seperti Pemimpin Muda Berjiwa Insan dilaksanakan untuk menggabungkan\nkemahiran komunikasi, pemikiran kritis dan reﬂeksi rohani.\n5. Murid digalakkan untuk menulis jurnal reﬂeksi diri, sementara kerjasama dengan komuniti diperluas melalui\nProgram Komuniti Ihsan bagi menguatkan pembangunan moral dan kerohanian sosial.\n\nFasa 3\n(2031 — 2035)\nKemandirian Rohani\ndan Pembentukan Insan\nSeimbang Global\n\n1. Kurikulum diperluas kepada dimensi Kepimpinan Kerohanian dan Kewarganegaraan Global, menekankan\nnilai keagamaan, kemanusiaan dan kelestarian.\n2. Murid menilai isu global seperti keadilan sosial, perubahan iklim dan keamanan dunia melalui perspektif nilai\ndan kerohanian.\n3. Konsep “Global Soul, Local Heart” diperkenalkan untuk menyeimbangkan identiti rohani nasional dengan\nketerbukaan nilai sejagat.\n4. Pemantauan dan penilaian formatif dilakukan melalui portfolio nilai, projek komuniti dan penilaian kendiri.\n5. Guru dan GBK bertindak sebagai mentor rohani bagi memastikan nilai kerohanian menjadi cara hidup yang\nberterusan.\n\nRajah 5.30 Garis Masa Pelaksanaan Strategi 4 Prakarsa 2\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":58,"p":161,"t":"Menjelang tahun 2035, strategi menyeluruh dijangka dapat melahirkan murid yang cemerlang akademik, berakhlak mulia, berempati\ndan penyayang. Kerjasama sekolah, ibu bapa, agensi kerajaan dan NGO akan memastikan pendidikan membina insan sejahtera\nserta menjadikan sekolah tempat selamat, bermakna dan membentuk warganegara global beretika.\n\nPEMBOLEH DAYA\nBagi memastikan pelaksanaan strategi dilakukan secara berkesan dan menyeluruh, Teras Strategik 2 menekankan dua pemboleh daya utama, iaitu akses terangkum\ndan pentaksiran pintar. Akses terangkum memastikan setiap murid menerima peluang pendidikan yang adil dan saksama tanpa mengira latar belakang sosioekonomi,\nlokasi atau keperluan khas, manakala pentaksiran pintar menggunakan teknologi digital dan AI untuk menilai kemajuan murid secara holistik serta menyesuaikan\npengajaran bagi meningkatkan keberkesanan pembelajaran. Kedua-dua pemboleh daya ini berperanan sebagai pemangkin pelaksanaan empat strategi utama dalam\nusaha melahirkan murid berilmu, berkemahiran, beretika dan berdaya saing pada peringkat global.\n\nPrakarsa Pemboleh Daya\n\nAkses Terangkum Program\nBersasar Golongan Khusus\n\nPentaksiran Pintar\nMemperkasakan Pentaksiran\nBersepadu Menggunakan\nTeknologi Digital dan AI\n\nRajah 5.31 Prakarsa bagi Pemboleh Daya\n\nPEMBOLEH DAYA 1:\nAKSES TERA KUM PR\n\nRAM BERSASAR\n\nL\n\nA K USUS\n\nAkses pendidikan yang saksama dan terangkum bagi semua murid tanpa mengira latar sosioekonomi, lokasi, keupayaan atau budaya menjadi asas sistem pendidikan\nyang saksama. Program bersasar memberikan tumpuan kepada murid orang Asli dan peribumi, MBPK, murid daripada keluarga miskin tegar serta murid pintar cerdas\ndengan pendekatan yang mengambil kira cabaran khusus setiap kumpulan bagi menyediakan peluang pembelajaran yang bermakna dan menyeluruh.\nBAB 5 TERAS STRATEGIK 2"},{"sec":58,"p":162,"t":"KEMENJADIAN MURID BERKEPERLUAN\nKHUSUS YANG HOLISTIK DAN INKLUSIF\n(KEMILAU)\n\nOrang Asli\n\nPeribumi\n\nMurid\nBerkeperluan\nKhusus\n\n• PENGESANAN AWAL MURID BERKEPERLUAN\nPENDIDIKAN KHAS DAN PINTAR CERDAS\nMBPK\n\nMiskin Tegar\n\nPintar Cerdas\nRajah 5.32 Murid Berkeperluan Khusus (MBK)\n\nBagi memastikan golongan ini mendapat peluang pendidikan yang setara\ndan bermutu, beberapa strategi telah dirangka. Pelaksanaan strategi ini\ndisokong oleh sistem bantuan dan intervensi bersepadu yang melibatkan\nkerjasama guru, ibu bapa, komuniti, agensi kerajaan dan pakar\nprofesional bagi memastikan setiap murid berkeperluan khusus\nmendapat akses pendidikan yang adil, terangkum dan bermakna, selaras\ndengan aspirasi KPM.\n\nBAB 5 TERAS STRATEGIK 2\n\nModel KEMILAU menekankan pembangunan ekosistem pendidikan terangkum\nyang menyeluruh, bermula daripada pengesanan awal, pelaksanaan pengalaman\npembelajaran yang bermakna, sehinggalah kepada penyertaan berterusan MBK\ndalam sistem pendidikan arus perdana.\n\nPengesanan awal murid berkeperluan pendidikan khas dan pintar cerdas\ndilakukan sejak awal bagi membolehkan intervensi dan sokongan yang\ntepat. Langkah ini mengukuhkan pendidikan terangkum serta memastikan\ntindak balas terhadap keperluan murid yang pelbagai berlaku sejak\nperingkat awal persekolahan.\n\n• PELAKSANAAN PENGALAMAN PEMBELAJARAN\nYANG BERMAKNA\nPendekatan lebih luwes dan berpusatkan murid digunakan bagi memastikan\npembelajaran relevan dengan keperluan individu. Pembelajaran alternatif\nserta bahan dan peralatan sokongan diperkasa mengikut kemahiran dan\nlokaliti supaya murid berkeperluan khusus mendapat akses pembelajaran\nbermutu secara menyeluruh.\nPembangunan kurikulum berasaskan pengayaan, projek mini dan Ekosistem\nPembelajaran Berasaskan Bakat menghubungkan sekolah, universiti dan\nindustri. Program Mentor Global dan Pertukaran Akademik memberikan\npendedahan antarabangsa.\nPengalaman pembelajaran turut diperkukuh melalui Model Sekolah Komuniti\nInklusif yang menekankan penghayatan budaya, bahasa ibunda dan nilai\nwarisan. Usaha ini disokong oleh peluasan Program Mobiliti Pendidik dan\nMentor Komuniti, penggunaan inovasi pembelajaran digital luar bandar serta\nkerjasama dengan agensi kerajaan dan NGO tempatan."},{"sec":58,"p":163,"t":"• PENINGKATAN PENYERTAAN MURID\nBERKEPERLUAN KHUSUS DALAM\nPENDIDIKAN\nUsaha meningkatkan pendidikan komuniti orang Asli digerakkan\nmelalui program kesedaran bersama ibu bapa dan komuniti,\npeluasan Sekolah Model Khas Komprehensif K11 di kawasan berisiko\nkeciciran serta pembangunan modul pembinaan jati diri dan\nlatihan fasilitator yang menyokong minat dan daya tahan murid.\nPendekatan ini memastikan kesinambungan pembelajaran dan\nsokongan bersepadu antara sekolah, keluarga dan komuniti.\nProgram Zero Dropout Schools mengesan murid yang berisiko\nkeciciran, seterusnya disokong dengan intervensi komuniti,\nbantuan holistik, pembelajaran selepas sekolah dan kerjasama\nsektor swasta bagi meningkatkan kemudahan pendidikan.\nSekolah arus perdana dilengkapi dengan kemudahan mesra\nMBPK, dibantu oleh penggunaan Teknologi Bantu Pintar dan.\nkehadiran guru terlatih melalui Program Kompetensi Guru Inklusif.\nRangkaian sokongan psikososial menyediakan terapi, kaunseling\ndan intervensi bersepadu.\nBagi memastikan golongan ini mendapat peluang pendidikan yang setara dan bermutu, beberapa strategi telah dirangka. Pelaksanaan strategi ini disokong\noleh sistem bantuan dan intervensi bersepadu yang melibatkan kerjasama guru, ibu bapa, komuniti, agensi kerajaan dan pakar profesional, bagi memastikan\nsetiap murid berkeperluan khusus mendapat akses pendidikan yang adil, terangkum dan bermakna, selaras dengan aspirasi KPM.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":58,"p":164,"t":"GARIS MASA PELAKSANAAN\nFasa 1\n(2026 — 2027)\nMenyedia Akses,\nMengukuh Sokongan\n\n1.\n\nFasa 2\n(2028 — 2030)\nMemperluas Intervensi,\nMenjamin Mutu\n\n1.\n2.\n\nPeluasan intervensi dan peningkatan mutu pelaksanaan.\nPeluasan pendekatan dwibahasa, teknologi untuk MBPK dipertingkat, pemantauan kes individu bagi murid\nmiskin tegar dilaksanakan, manakala murid pintar cerdas diberikan peluang perantisan bersama-sama IPT\ndan industri bagi mengembangkan bakat.\n\nFasa 3\n(2031 — 2035)\nMelestari\nketerangkuman,\nMemperkasakan Potensi\n\n1.\n\nMelestarikan keterangkuman dan memperkasakan potensi murid melalui pembangunan Pusat Kecemerlangan\nKomuniti.\nMelaksanakan program transisi ke pekerjaan bagi MBPK.\nMembangunkan sistem data pintar kebajikan murid.\nMenyediakan laluan pembelajaran yang anjal termasuk Akademi Kecemerlangan untuk murid pintar cerdas.\n\n2.\n\n2.\n3.\n4.\n\nRajah 5.33 Garis Masa Pelaksanaan Pemboleh Daya 1\n\nBAB 5 TERAS STRATEGIK 2\n\nMenyediakan akses dan sokongan awal melalui program bersasar kepada komuniti orang Asli, MBPK, murid\nmiskin tegar dan murid pintar cerdas.\nMelaksanakan modul pembelajaran terbeza, latihan guru, bantuan kebajikan, saringan awal bakat serta\npengukuhan jaringan sokongan komuniti dan NGO."},{"sec":59,"p":165,"t":"PEMBOLEH DAYA 2: PENTAKSIRAN PINTAR - PENTAKSIRAN\nBERSEPADU MENGGUNAKAN TEKNOLOGI DIGITAL DAN\nKECERDASAN BUATAN\nPentaksiran yang diperkukuh melalui teknologi digital dan AI menjadi asas penting dalam usaha KPM membina sistem pendidikan yang berteraskan bukti, responsif\ndan berpaksikan potensi murid. Melalui sistem pentaksiran yang berasaskan data dan berterusan, guru, murid dan ibu bapa memperoleh maklum balas yang boleh\nditindak secara segera untuk menambah baik proses pengajaran dan pembelajaran. Dengan itu, pemboleh daya ini memperkukuh hubungan antara pedagogi,\npembelajaran dan sokongan rumah, menjadikan keseluruhan ekosistem pendidikan lebih tangkas, telus dan berimpak tinggi.\nPelaksanaan Technology-Enhanced Assessment (TEA) menandakan\nlangkah strategik KPM dalam mentransformasikan pendekatan\npentaksiran ke arah yang lebih menyeluruh dan adaptif. Kaedah ini bukan\nsahaja menilai pencapaian akademik, tetapi juga meneroka kekuatan,\nminat, gaya pembelajaran serta keupayaan murid melalui teknologi\ninteraktif dan adaptif. Pendekatan ini membolehkan setiap murid dinilai\nsecara lebih adil, kontekstual dan bermakna, sejajar dengan matlamat\npendidikan holistik yang menumpukan pembangunan potensi diri dan\nsahsiah. Guru dapat mengenal pasti keperluan pembelajaran individu,\nmerancang intervensi yang bersasar serta memantau kemajuan murid\ndengan lebih tepat dan berasaskan bukti.\nPelantar DELIMa berperanan sebagai ekosistem penyokong yang\nmenyepadukan fungsi pentaksiran digital dengan keperluan semua pihak\nberkepentingan. Melalui pelantar ini, guru dapat menilai kemajuan murid\nsecara pantas dan analitik; murid dapat memahami keupayaan diri serta\nmenetapkan matlamat pembelajaran kendiri, manakala ibu bapa\nmenerima maklum balas yang telus dan segera untuk menyokong\npembelajaran anak di rumah. Prakarsa ini memperkukuh amalan\npentaksiran sedia ada melalui integrasi teknologi, data dan AI, seterusnya\nmembina persekitaran pendidikan digital yang bersepadu dan\nkolaboratif.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":59,"p":166,"t":"GARIS MASA PELAKSANAAN\nPelaksanaan TEA dilaksanakan secara berfasa mulai tahun 2026 hingga tahun 2035. Fasa 1 dan Fasa 2 akan dibangunkan untuk memberikan tumpuan terhadap\npengukuhan ekosistem digital serta pembangunan kapasiti guru dan murid.\n\nFasa 1\n(2026 — 2027)\nPemantapan Asas\n\n1.\n2.\n\nProjek rintis dilaksanakan di sekolah terpilih untuk menilai keberkesanan awal TEA.\nGuru dan murid diberikan latihan asas tentang pentaksiran digital, penggunaan platform TEA dan analisis data, seterusnya\ndisokong oleh rancangan komunikasi strategik bagi memastikan penerimaan dan kesiapsiagaan.\n\nFasa 2\n(2028 — 2030)\nPelancaran Aktif\n\n1.\n2.\n\nPeluasan TEA secara berperingkat ke sekolah yang bersedia sebelum dilaksanakan di seluruh sistem.\nPemantauan berasaskan data digunakan untuk menambah baik algoritma, reka bentuk dan fungsi sistem secara\nberterusan.\n\nFasa 3\n(2031 — 2035)\nPengukuhan dan\nPemantapan\n\n1.\n\nSebagai komponen utama pentaksiran nasional, TEA menumpukan kepada pentaksiran kendiri, pembangunan\ne-portfolio dan pengukuhan autonomi pembelajaran murid.\nAudit berkala, analitik pembelajaran dan laporan impak tahunan memastikan kelestarian sistem.\n\n2.\n\nRajah 5.34 Garis Masa Pelaksanaan Pemboleh Daya 2\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":60,"p":167,"t":"5.4 KESIMPULAN\nTeras Strategik 2 memberikan tumpuan terhadap usaha mengoptimumkan\npotensi setiap murid melalui pengalaman pembelajaran yang bermakna, dengan\nmatlamat melahirkan warganegara global yang kompeten dan berdaya saing.\nEmpat strategi utama digariskan bagi mencapai hasrat ini. Pendekatan ini\nmemastikan sistem pendidikan Malaysia bukan sekadar menyampaikan\nkandungan tetapi membina insan yang seimbang, beretika dan bersedia\nmenghadapi perubahan dunia.\nPendekatan mengoptimumkan potensi murid melalui pembelajaran bermakna\nsangat penting dalam era teknologi dan globalisasi yang menuntut murid memiliki\nkemahiran berﬁkir aras tinggi, kreatiiti, daya tahan dan kebolehan menyesuaikan\ndiri. Apabila pembelajaran dikaitkan dengan kehidupan sebenar, murid dapat\nmemahami ilmu dengan lebih mendalam serta mengembangkan potensi\nmengikut minat dan kemampuan masing-masing. Hal ini adalah untuk\nmemastikan setiap murid mendapat peluang yang adil untuk berkembang\nsebagai individu yang yakin dan berupaya meneruskan pembelajaran sepanjang\nhayat.\nPembentukan murid sebagai warganegara global menjadi semakin penting\ndalam dunia yang saling bergantung dan dipacu interaksi merentas budaya.\nMurid perlu diperkasa dengan literasi global, empati, nilai kemanusiaan dan\nkeupayaan bekerjasama dalam persekitaran kepelbagaian masyarakat.\nKecekapan ini bukan sahaja meningkatkan kebolehpasaran mereka pada\nperingkat antarabangsa, malah membolehkan mereka menjadi penyumbang\naktif kepada keamanan, kemampanan dan kesejahteraan sejagat.\nTeras Strategik 2 merupakan tonggak penting dalam memastikan sistem\npendidikan Malaysia dapat melahirkan generasi yang bukan sahaja cemerlang\ndalam akademik, tetapi juga mempunyai kompetensi, karakter dan kesedaran\nglobal yang diperlukan untuk memimpin masa hadapan. Melalui pendekatan\nholistik ini, setiap murid dibangunkan sebagai insan sejahtera yang berilmu,\nberintegriti dan mampu menyumbang secara bermakna kepada kemajuan\nnegara dan masyarakat dunia.\n\nBAB 5 TERAS STRATEGIK 2"},{"sec":61,"p":168,"t":"BAB\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":63,"p":169,"t":"TERAS STRATEGIK 3 | MENTRANSFORMASIKAN PENDIDIK\nAGAR BERKEUPAYAAN TINGGI DAN BERORIENTASIKAN\nMASA HADAPAN\n\nRINGKASAN\nPendidik merupakan penggerak utama kejayaan pelaksanaan dasar dan sistem pendidikan negara.\nTeras Strategik 3 memberikan tumpuan kepada usaha mentransformasikan pendidik agar berkeupayaan\ntinggi dan berorientasikan masa hadapan untuk memenuhi keperluan sistem pendidikan abad ke-21.\nKerangka strategi dalam Teras Strategik 3 berasaskan empat strategi utama, iaitu meningkatkan\nkesejahteraan pendidik; memperkasakan kompetensi pendidik melalui pemberdayaan pembangunan\nprofesionalisme berterusan secara berstruktur dan bermutu; mentransformasikan latihan keguruan agar\nbersifat adaptif, dinamik dan relevan; serta membangunkan pemimpin transformatif, berkeupayaan\ntinggi dan berorientasikan masa hadapan. Usaha ini disokong oleh pembudayaan penyelidikan dan\ninovasi berimpak tinggi melalui penubuhan pusat yang memberikan tumpuan kepada penyelidikan dan\ninovasi di bawah KPM.\n\nPendidik meliputi guru,\npensyarah, pemimpin institusi\npendidikan, kaunselor dan\nPegawai Perkhidmatan\nPendidikan di KPM, JPN, PPD\nserta institusi pendidikan KPM.\n\nMelalui pelaksanaan strategi di bawah Teras Strategik 3, warga pendidik akan lebih berdaya tahan\ndalam bidang profesional yang diceburi serta mempunyai laluan kerjaya yang progresif dan bermakna.\nSeterusnya, sistem pendidikan negara akan dipacu oleh tenaga pendidik yang kompeten, sejahtera dan\nberwawasan, sekali gus memperkukuh keupayaan Malaysia untuk melahirkan generasi masa hadapan\nyang beradab, berilmu, berkemahiran, berdaya tahan dan berkeyakinan selaras dengan matlamat RPM\n2026 – 2035.\n\n6.1 PENGENALAN DAN RASIONAL\nMutu pendidikan sesebuah negara bergantung pada pendidiknya. Sebagai pemacu keberhasilan murid\ndan transformasi pendidikan, pendidik memainkan peranan yang amat penting dalam merealisasikan\naspirasi nasional.\nBAB 6 TERAS STRATEGIK 3"},{"sec":63,"p":170,"t":"Pendidik berperanan untuk membentuk bakat masa hadapan yang beradab, berilmu, berkemahiran, berdaya tahan dan berkeyakinan. Cabaran abad ke-21 menuntut\nanjakan strategik dalam pembangunan dan pemerkasaan kompetensi pendidik. Kajian Pembangunan Model Guru Futuristik Malaysia oleh Institut Pendidikan Guru\nMalaysia (IPGM) pada tahun 2020 menegaskan keperluan membentuk pendidik yang holistik dan responsif terhadap perubahan. Dapatan kajian ini turut disokong oleh\npelbagai SLU melalui Jelajah Pendidikan Negara pada tahun 2024 yang secara konsisten menekankan keperluan peningkatan mutu pendidik agar kekal relevan serta\nberkesan dalam konteks pendidikan masa kini dan akan datang. Oleh itu, usaha pemerkasaan kompetensi pendidik adalah penting untuk mencapai pendidikan bermutu\ndi Malaysia.\n\nKajian global (Barber dan Mourshed, 2007; Opper, 2019; Engida, Iyasu\ndan Fentie, 2024) secara konsisten menunjukkan bahawa mutu pendidik\nmerupakan faktor terpenting yang mempengaruhi keberhasilan murid\ndi sekolah, manakala pendidik yang kompeten dan efektif bukan sahaja\ndapat meningkatkan hasil pembelajaran untuk semua murid tetapi\nberperanan penting dalam merapatkan jurang pencapaian antara\nmurid daripada latar belakang yang berbeza. Kerangka Matlamat\nPembangunan Mampan 4 Pendidikan Bermutu (SDG 4) menekankan\nbahawa pelaburan strategik dalam pembangunan profesionalisme\nkeguruan kunci untuk meningkatkan mutu pendidikan dan memastikan\nhasil pembelajaran yang terangkum dan saksama.\n\nStrategi dan prakarsa di bawah teras strategik ini bertujuan memastikan sistem\npendidikan negara digerakkan oleh tenaga pendidik yang kompeten dan\nberpotensi untuk mencapai matlamat serta hasil yang sejajar dengan aspirasi\nFalsafah Pendidikan Kebangsaan. Teras strategik ini juga merupakan\nkesinambungan daripada PPPM 2013 – 2025, khususnya Anjakan 4 yang\nmemberikan tumpuan kepada mentransformasi profesion keguruan menjadi\nprofesion pilihan dan Anjakan 5 yang memastikan kepimpinan berprestasi tinggi\nditempatkan di setiap sekolah.\nHasil pelaksanaan strategi dan prakarsa dalam teras strategik ini dijangka\nmembawa kepada beberapa keberhasilan utama bagi pendidik, murid dan\nsistem pendidikan negara.\n\nBAB 6 TERAS STRATEGIK 3\n\nHasil Pelaksanaan Strategi\ndan Prakarsa\nPendidik akan menjadi lebih bermotivasi, kompeten dan sejahtera\nserta mempunyai peluang untuk mengakses laluan kerjaya yang\nlebih luwes dan progresif. Usaha membangunkan kapasiti pendidik\nturut disokong oleh ekosistem pendidikan yang menggalakkan\nperkembangan profesional berterusan, sekali gus memperkukuh\ndaya tahan dan profesionalisme dalam kalangan warga pendidik.\nMurid akan mendapat manfaat daripada pengalaman pembelajaran\nyang lebih relevan, bermakna dan holistik hasil daripada pengajaran\nbermutu oleh guru yang berkeupayaan tinggi. Keberhasilan murid\njuga diharapkan akan meningkat seiring dengan persekitaran sekolah\nyang lebih selamat, terangkum dan menyokong apabila diterajui oleh\nkepimpinan pendidikan yang berkesan serta berwawasan sistemik.\nSistem pendidikan negara akan menjadi lebih dinamik, responsif\ndan inovatif untuk membolehkan pelaksanaan dasar yang lebih\nmenyeluruh dan berasaskan bukti, pengagihan sumber yang lebih\nstrategik serta pelaburan yang lebih berkesan dalam pembangunan\nmodal insan."},{"sec":64,"p":171,"t":"6.2 KEADAAN SEMASA\nPelbagai usaha telah dilaksanakan di bawah PPPM 2013 – 2025 bagi meningkatkan\nmutu pendidikan melalui penekanan terhadap pembangunan kapasiti pendidik\ndan usaha memartabatkan profesion keguruan sebagai profesion pilihan. Antara\npencapaian di bawah rancangan ini termasuklah pengenalan instrumen penilaian guru\nyang baharu, iaitu 60% daripada skor penilaian adalah berasaskan keberkesanan\npengajaran serta usaha memastikan 60% guru sekolah rendah dan 90% guru sekolah\nmenengah memiliki ijazah (Unit Pengurusan Penyampaian, 2025).\nData dari tahun 2010 hingga tahun 2022 juga menunjukkan bahawa hampir semua\nwarga pendidik KPM memperoleh markah tinggi dalam penilaian prestasi tahunan\ndengan hanya 0.02% mencatatkan skor bawah 60% (World Bank, 2024). Namun begitu,\nhasil penilaian ini dilihat tidak seiring dengan pencapaian murid dalam pentaksiran\nantarabangsa seperti PISA dan TIMSS, menandakan bahawa mekanisme penilaian\ndan indikator mutu guru sedia ada masih belum memberikan gambaran menyeluruh\nterhadap keberkesanan sebenar pengajaran dan pembelajaran di bilik darjah (World\nBank, 2023).\nTambahan pula, landskap pendidikan pasca-COVID-19 telah berubah secara drastik\ndengan isu keciciran pembelajaran dan juga pemansuhan peperiksaan UPSR dan\nPT3. Perubahan ini menuntut pendidik untuk menilai semula pendekatan PdP\nagar selari dengan keperluan semasa dan perkembangan murid. Oleh itu, usaha\nmeningkatkan kompetensi warga pendidik adalah penting untuk mengoptimumkan\nhasil pembelajaran murid.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":64,"p":172,"t":"BEBAN TUGAS GURU DAN KESEJAHTERAAN\nPENDIDIK\n\nKajian oleh Bahagian Psikologi dan Kaunseling KPM (2020)\nmendapati bahawa tahap kesejahteraan psikologi guru berada\npada tahap sederhana tinggi, manakala tahap keperluan\nperkhidmatan kaunseling guru berada pada tahap yang\ntinggi. ata dari Sistem Profiling igital Kesihatan Psikologi\nPegawai Perkhidmatan Awam (MyPsyD) turut menunjukkan\ntahap tekanan kerja yang tinggi dalam kalangan warga\npendidik disertai dengan akses yang terhad kepada sokongan\nkaunseling dan intervensi psikososial.\n\nBagi menangani isu beban tugas guru, KPM telah memperkenalkan\nbeberapa langkah intervensi pada tahun 2023 seperti pemansuhan\nsambutan, majlis atau pertandingan yang tidak memberikan impak\nkepada pembelajaran, pelanjutan waktu untuk mengisi data kehadiran\nmurid dan pelantikan pengawas peperiksaan yang dibuka kepada\nindividu selain guru. Selain itu, KPM turut menempatkan pembantu guru\ndi sekolah sebagai usaha awal untuk meringankan beban tugas guru.\nNamun, penyelesaian jangka panjang yang mampan dan berimpak tinggi\nperlu dirangka untuk menangani isu beban tugas dan kesejahteraan guru\nagar PdP dan perkembangan murid menjadi tumpuan utama.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":64,"p":173,"t":"LATIHAN KEGURUAN DAN PEMBANGUNAN\nPROFESIONALISME BERTERUSAN\nDalam memastikan mutu sistem pendidikan negara kekal relevan\ndan berdaya saing, usaha memperkukuh kompetensi dan\nprofesionalisme guru amat penting. Pelan Induk Pembangunan\nProfesionalisme Keguruan (PIPPK) yang diperkenalkan pada tahun\n2016 merupakan satu usaha untuk memperkukuh pembangunan\nprofesionalisme berterusan dan laluan kerjaya PPP. Pada masa ini,\nsetiap pegawai dan ketua jabatan hendaklah memastikan pegawai\nmengikuti program pembangunan kompetensi sekurang-kurangnya\n40 jam setahun selaras dengan Dasar Pembangunan Bakat\nPerkhidmatan Awam.\nPada tahun 2024, 100% pegawai KPM telah mencapai ketetapan\nminimum lima hari latihan setahun (Bahagian Pengurusan Sumber\nManusia, KPM). Namun, kadar pematuhan ini tidak semestinya\nmencerminkan peningkatan sebenar dalam kompetensi dan amalan\nprofesional mereka, memandangkan mutu dan keberkesanan\nlatihan yang diikuti masih belum dapat dijamin atau dinilai secara\nkonsisten. Dapatan laporan oleh Bank Dunia (2024) menunjukkan\nbahawa kebanyakan latihan adalah bersifat umum dan kurang\ndisesuaikan dengan keperluan individu, bidang atau tahap kerjaya,\nsekali gus mengurangkan impak terhadap peningkatan kemahiran\npedagogi terutamanya dalam aspek berkaitan dengan pengajaran\nterbeza dan pendidikan terangkum.\n\nBAB 6 TERAS STRATEGIK 3"},{"sec":64,"p":174,"t":"Usaha untuk memperkasakan kompetensi guru yang dilaksanakan\noleh KPM selaras dengan prakarsa dalam PPPM 2013 – 2025\ntelah membawa kemajuan, namun masih terdapat jurang yang\nperlu dirapatkan.\nAntara prakarsa dan pencapaian yang dilaporkan dalam Laporan\nTahunan PPPM pada tahun 2023 termasuklah:\n•\n\nSemua guru opsyen BI disasarkan mencapai tahap\npenguasaan minimum CEFR C1. Melalui kursus Pro-ELT yang\ndikendalikan oleh English Language Teaching Centre (ELTC),\nsebanyak 33,894 daripada 47,546 guru telah dilatih sehingga\nBI mencapai tahap minimum CEFR C1.\n\n37,843\n\n36,473\n\n•\n\nInstrumen Penilaian Kompetensi Guru bidang STEM telah dibangunkan\nsebagai panduan untuk merancang pembangunan profesionalisme\nberterusan yang lebih bersasar dan berstruktur. Sebanyak 1,677\n(72.84%) daripada 2,302 guru yang menjalani latihan pemantapan\nkompetensi STEM telah melengkapkan instrumen tersebut pada tahun\n2023 dengan 98.87% guru kompeten.\n\nNamun begitu, pencapaian murid dalam Pentaksiran Kompetensi dan\nLiterasi (PKL) serta pentaksiran antarabangsa seperti PISA tidak seiring\ndengan pelaporan dan peningkatan kompetensi guru. Laporan PISA\n2022 menunjukkan penurunan pencapaian murid bagi ketiga-tiga domain\nserta skor purata murid adalah lebih rendah daripada skor purata OECD\nbagi ketiga-tiga literasi. Hal ini menunjukkan bahawa masih terdapat jurang\nantara peningkatan kompetensi guru dengan pencapaian murid. Analisis\nlanjut diperlukan bagi mengenal pasti hubungan antara mutu latihan dengan\nsokongan, termasuklah mekanisme penilaian guru sedia ada dengan hasil\npembelajaran murid.\n\n37,090\n\n39,398\n\n39,304\n\n39,005\n\n6,285\n(16.00%)\n\n6,107\n(15.66%)\n\n32,712\n\n36, 817\n\n25,129\n62.05%\n\n52.55%\n\n49.89%\n\n49.53%\n\n52.53%\n\n18,761\n15,593\n\n17,191\n\n18,878\n\n18,066\n\n2020\n\n2021\n\n2022\n\n2023\nTing. 2\n\nBilangan guru Opsyen BI yang mencapai tahap minimum CEFR C1\n\n18,115\n\n18,316\n11,095\n(60.58%)\n\n19,485\n(4.76%)\n\n2019\n\n18,315\n4,862\n(26.55%)\n\n8,727\n(22.15%)\n\n3,167\n(17.48%)\n\nMatematik Kewangan\nTing. 2\nTing. 2\n\nBacaan\nTing. 2\n\nBilangan sampel\n\nTahun 6\n\nMatematik Kewangan\nTahun 6\nTahun 6\n\n7,835\n(21.28%)\n\nBacaan\nTahun 6\n\nBilangan dan peratus >600\n\nPeratus guru Opsyen BI yang mencapai tahap minimum CEFR C1\n\nSumber: Bahagian Pengurusan Sekolah Harian\n\nRajah 6.1 Pencapaian Guru Opsyen BI yang Mencapai Tahap Minimum CEFR C1\n\nBAB 6 TERAS STRATEGIK 3\n\nSumber: Bahagian Pembangunan Kurikulum\n\nRajah 6.2 Pencapaian Peratus Murid yang Mencapai Skor 600 ke atas dalam PKL"},{"sec":64,"p":175,"t":"Dalam konteks global, laporan Future of Jobs (World Economic Forum, 2025)\nmeramalkan bahawa hampir 39% kemahiran pada masa ini dalam pasaran kerja\nglobal akan berubah atau menjadi usang menjelang 2030. Keadaan ini\nmenandakan keperluan mendesak bagi sistem pendidikan untuk menyediakan\npeluang peningkatan kemahiran (upskilling), kemahiran semula (reskilling) dan\nrentas kemahiran (cross-skilling) yang sistematik dan berterusan kepada\npendidik agar mereka dapat menyampaikan pendidikan yang relevan dengan\nkeperluan semasa dan pada masa hadapan, di samping melahirkan murid yang\nbersedia menghadapi dunia pekerjaan yang kian berubah. Tumpuan kepada\npeningkatan kecekapan penggunaan teknologi dalam kalangan pendidik juga\nperlu dititikberatkan bagi memperkaya proses PdP serta memastikan pendidik\nsentiasa seiring dengan kemajuan teknologi dan inovasi pendidikan.\n\nPertindihan serta ketidakselarasan kandungan latihan oleh pelbagai penyedia\nlatihan di KPM turut menyebabkan berlaku pengulangan kandungan atau\nkeciciran bidang kritikal yang memerlukan tumpuan. Situasi ini bukan sahaja\nmengurangkan keberkesanan pelaksanaan latihan, malah mengehadkan ruang\ninovasi dan kepelbagaian pendekatan dalam latihan. Di samping itu, keadaan ini\nmenyebabkan sumber kewangan dan tenaga pengajar tidak dimanfaatkan\nsecara optimum.\n\nSeiring dengan keperluan tersebut, peruntukan bagi latihan dalam perkhidmatan\ntelah meningkat sebanyak 40% dari tahun 2024 hingga tahun 2025 dengan\njumlah perbelanjaan dianggarkan sebanyak RM47 seorang setahun pada tahun\n2025. Langkah ini mencerminkan komitmen kerajaan dalam menyokong\npembangunan profesionalisme pendidik yang berterusan. Namun begitu, jumlah\nini masih jauh lebih rendah ber
